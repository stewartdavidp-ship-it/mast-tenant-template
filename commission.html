<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commissions — My Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="storefront-tenant.js"></script>
<script src="tenant-brand.js?v=2"></script>
<style>
  :root {
    --cream: #FAF6F0;
    --cream-dark: #F0E8DB;
    --charcoal: #1A1A1A;
    --warm-gray: #6B6560;
    --warm-gray-light: #9B958E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--charcoal);
    background: var(--cream);
    overflow-x: hidden;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.25rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(250,246,240,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--cream-dark);
  }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--charcoal);
    text-decoration: none;
  }
  .nav-links { list-style: none; display: flex; gap: 2rem; }
  .nav-links a {
    color: var(--warm-gray);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--charcoal); }

  .page-content {
    margin-top: 80px;
    padding: 6rem 2rem 4rem;
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px - 100px);
  }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300;
    color: var(--charcoal);
    margin-bottom: 1rem;
    line-height: 1.1;
  }
  .page-subtitle {
    font-size: 1.1rem;
    color: var(--warm-gray);
    margin-bottom: 2rem;
    max-width: 500px;
    line-height: 1.6;
  }
  .btn-back {
    padding: 0.75rem 2rem;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    background: var(--charcoal);
    color: var(--cream);
    transition: opacity 0.2s;
  }
  .btn-back:hover { opacity: 0.85; }

  footer {
    padding: 2rem 2rem 1.5rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--warm-gray-light);
    border-top: 1px solid var(--cream-dark);
  }
  footer a { color: var(--warm-gray-light); text-decoration: none; }
  footer a:hover { color: var(--warm-gray); }
  .footer-links {
    list-style: none;
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .powered-by { margin-top: 1rem; font-size: 0.75rem; color: var(--warm-gray-light); }
  .powered-by a { font-weight: 500; }

  .tenant-content { opacity: 0; transition: opacity 0.3s ease; }
  .tenant-content.ready { opacity: 1; }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { gap: 1rem; }
    .page-content { padding: 4rem 1.5rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand" data-tenant="brand">My Shop</a>
  <ul class="nav-links">
    <li><a href="shop.html">Shop</a></li>
    <li><a href="schedule.html">Events</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="#" id="navSignIn">Sign In</a></li>
  </ul>
</nav>

<main class="page-content tenant-content">
  <h1 class="page-title">Custom Commissions</h1>
  <p class="page-subtitle">Interested in a custom piece? Our commission process is being set up. Check back soon or get in touch directly.</p>
  <a href="index.html" class="btn-back">Back to Home</a>
</main>

<footer class="tenant-content">
  <ul class="footer-links">
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="schedule.html">Events</a></li>
    <li><a href="commission.html">Commissions</a></li>
    <li><a href="orders.html">Orders</a></li>
  </ul>
  <div data-tenant="year-brand"></div>
  <div class="powered-by"><a href="https://runmast.com">Powered by Mast</a></div>
</footer>

<script>
window.TENANT_READY.then(function() {
  document.querySelectorAll('.tenant-content').forEach(function(el) {
    el.classList.add('ready');
  });
  var brand = window.TENANT_BRAND;
  if (brand && brand.name) {
    document.title = 'Commissions — ' + brand.name;
  }
}).catch(function(err) {
  console.error('[commission] Tenant init failed:', err.message);
  document.querySelectorAll('.tenant-content').forEach(function(el) {
    el.classList.add('ready');
  });
});
</script>
</body>
</html>
