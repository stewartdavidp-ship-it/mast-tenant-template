<!-- Early tenant prefetch — starts Firestore fetch immediately during HTML parsing,
     before any external scripts download. storefront-tenant.js consumes the result. -->
<script>
(function(){
  var B='https://firestore.googleapis.com/v1/projects/mast-platform-prod/databases/(default)/documents';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  function uv(v){if(v==null)return null;if('stringValue' in v)return v.stringValue;if('booleanValue' in v)return v.booleanValue;if('integerValue' in v)return Number(v.integerValue);if('doubleValue' in v)return v.doubleValue;if('nullValue' in v)return null;if('timestampValue' in v)return v.timestampValue;if('mapValue' in v){var o={};var f=v.mapValue.fields||{};for(var k in f)o[k]=uv(f[k]);return o;}if('arrayValue' in v)return(v.arrayValue.values||[]).map(uv);return null;}
  function uf(fields){var o={};for(var k in fields)o[k]=uv(fields[k]);return o;}
  function uw(d){if(d&&typeof d==='object'&&!Array.isArray(d)&&'_v' in d&&Object.keys(d).length===1)return d._v;return d;}
  window.__earlyTenant=fetch(B+'/platform_tenantsByDomain/'+ek).then(function(r){return r.ok?r.json():null}).then(function(doc){
    var tid=doc&&doc.fields?uw(uf(doc.fields)):null;
    if(typeof tid!=='string'||!tid)return null;
    return fetch(B+'/platform_tenantPublicConfigs/'+tid).then(function(r){return r.ok?r.json():null}).then(function(cdoc){
      if(!cdoc||!cdoc.fields)return null;
      var pc=uf(cdoc.fields);
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>

    margin-top: 1.5rem;

  .powered-by-mast a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    opacity: 0.9;
    transition: opacity 0.3s;
  }
  .powered-by-mast a:hover { opacity: 1; }
  .powered-by-mast svg { width: 8px; height: 16px; flex-shrink: 0; }
  .powered-by-mast .pbm-stack { display: flex; flex-direction: column; gap: 1px; }
  .powered-by-mast .pbm-wm {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: -0.025em;
    color: #f0ebe0;
    line-height: 1;
  }
  .powered-by-mast .pbm-label {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;

    letter-spacing: 0.03em;
    color: #6a8aaa;

  }

  /* ========= POLICIES ========= */
  .policies-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 5rem 3rem 7rem;
  }

  .policies-tabs {
    display: flex;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    margin-bottom: 2.5rem;
    gap: 0;
  }

  html.dark .policies-tabs {
    border-bottom-color: rgba(255,255,255,0.12);
  }

  .policy-tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 0.75rem 1.25rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--warm-gray);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    margin-bottom: -1px;
    white-space: nowrap;
  }

  .policy-tab-btn:hover {
    color: var(--charcoal);
  }

  .policy-tab-btn.active {
    color: var(--amber);
    border-bottom-color: var(--amber);
  }

  .policy-panel {
    display: none;
    color: var(--text);
    line-height: 1.8;
    font-weight: 300;
    font-size: 0.95rem;
  }

  .policy-panel.active {
    display: block;
  }

  /* Prose styling for admin-written policy content */
  .policy-panel h2,
  .policy-panel h3,
  .policy-panel h4 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    color: var(--charcoal);
    margin: 1.5rem 0 0.6rem;
    line-height: 1.3;
  }

  .policy-panel h2 { font-size: 1.5rem; }
  .policy-panel h3 { font-size: 1.25rem; }

  .policy-panel p {
    color: var(--warm-gray);
    margin-bottom: 1rem;
  }

  .policy-panel ul,
  .policy-panel ol {
    padding-left: 1.5rem;
    margin-bottom: 1rem;
    color: var(--warm-gray);
  }

  .policy-panel li {
    margin-bottom: 0.4rem;
  }

  .policy-panel a {
    color: var(--primary);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .policy-panel strong {
    font-weight: 500;
    color: var(--charcoal);
  }

  .policies-empty {
    text-align: center;
    color: var(--warm-gray);
    font-size: 1rem;
    padding: 5rem 0;
    font-weight: 300;
    font-style: italic;
  }

  .policies-loading {
    text-align: center;
    color: var(--warm-gray-light);
    font-size: 0.9rem;
    padding: 4rem 0;
  }

  /* ========= RESPONSIVE ========= */

    .page-header { padding: 7rem 1.5rem 3rem; }
    .policies-section { padding: 3rem 1.5rem 5rem; }
    .policy-tab-btn { padding: 0.6rem 0.9rem; font-size: 0.7rem; }
  }

<script>
  // Intersection Observer for scroll animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
</script>
<script>
  // Helper: escape text for safe innerHTML use
  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // Format a policy type string into a display label (e.g. "gift_cards" → "Gift Cards")
  function formatPolicyType(type) {
    if (!type) return 'Policy';
    var map = { faq: 'FAQ', gift_cards: 'Gift Cards', returns: 'Returns', shipping: 'Shipping', terms: 'Terms & Conditions' };
    if (map[type]) return map[type];
    return type.charAt(0).toUpperCase() + type.slice(1).replace(/_/g, ' ');
  }

  // Switch the active policy tab (window-scoped for onclick handlers)
  window.switchPolicyTab = function(index) {
    var buttons = document.querySelectorAll('.policy-tab-btn');
    var panels = document.querySelectorAll('.policy-panel');
    buttons.forEach(function(btn, i) {
      btn.classList.toggle('active', i === index);
      btn.setAttribute('aria-selected', i === index ? 'true' : 'false');
    });
    panels.forEach(function(panel, i) {
      panel.classList.toggle('active', i === index);
    });
  };

  // Render policies into the tab UI
  function renderPolicies(policies) {
    var container = document.getElementById('policiesContainer');
    if (!container) return;

    if (!policies || policies.length === 0) {
      container.innerHTML = '<div class="policies-empty">Policies coming soon.</div>';
      return;
    }

    var tabsHtml = '<div class="policies-tabs" role="tablist">';
    var panelsHtml = '<div class="policies-panels">';

    policies.forEach(function(policy, i) {
      var label = esc(policy.title || formatPolicyType(policy.type));
      var tabId = 'policy-tab-' + i;
      var panelId = 'policy-panel-' + i;
      var isActive = i === 0;

      tabsHtml +=
        '<button class="policy-tab-btn' + (isActive ? ' active' : '') + '" ' +
          'role="tab" ' +
          'aria-selected="' + (isActive ? 'true' : 'false') + '" ' +
          'aria-controls="' + panelId + '" ' +
          'id="' + tabId + '" ' +
          'onclick="switchPolicyTab(' + i + ')">' +
          label +
        '</button>';

      // policy.body is HTML authored by tenant admins — innerHTML is intentional here.
      // It is never written from user input; Firestore rules restrict writes to admin role.
      panelsHtml +=
        '<div class="policy-panel' + (isActive ? ' active' : '') + '" ' +
          'id="' + panelId + '" ' +
          'role="tabpanel" ' +
          'aria-labelledby="' + tabId + '">' +
          (policy.body || '') +
        '</div>';
    });

    tabsHtml += '</div>';
    panelsHtml += '</div>';
    container.innerHTML = tabsHtml + panelsHtml;
  }

  // Load policies from Firestore after tenant resolves
  window.TENANT_READY.then(function() {
    var app;
    try { app = firebase.app(); } catch (e) { app = firebase.initializeApp(TENANT_FIREBASE_CONFIG); }
    MastDB.init({ firestore: app.firestore(), tenantId: TENANT_ID });

    // Query cs_policies where storefrontEnabled == true; sort client-side by displayOrder.
    // Client-side sort lets us apply the Infinity fallback for policies missing displayOrder,
    // avoiding a composite Firestore index requirement.
    app.firestore()
      .collection('tenants/' + TENANT_ID + '/cs_policies')
      .where('storefrontEnabled', '==', true)
      .get()
      .then(function(snapshot) {
        var policies = [];
        snapshot.forEach(function(doc) {
          policies.push(Object.assign({ id: doc.id }, doc.data()));
        });
        policies.sort(function(a, b) {
          var orderA = (a.displayOrder != null && a.displayOrder !== undefined) ? a.displayOrder : Infinity;
          var orderB = (b.displayOrder != null && b.displayOrder !== undefined) ? b.displayOrder : Infinity;
          return orderA - orderB;
        });
        renderPolicies(policies);
      })
      .catch(function(err) {
        console.error('[policies] Failed to load policies:', err.message);
        renderPolicies([]);
      });

  }).catch(function(err) { console.error('[policies] Tenant resolution failed:', err.message); });
</script>

<!-- ============ ANALYTICS TRACKING ============ -->
<script>
window.TENANT_READY.then(function() {
  var HITS = 'analytics/hits';
  var now = new Date();
  var page = 'policies';
  var d = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0');
  function track(type, action) {
    var hit = { t: type, p: page, ts: Date.now(), d: d };
    if (action) hit.a = action;
    MastDB.push(HITS, hit).catch(function() {});
  }
  track('pv');
}).catch(function() {});
</script>
