<script>
(function(){
  var B='https://firestore.googleapis.com/v1/projects/mast-platform-prod/databases/(default)/documents';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  function uv(v){if(v==null)return null;if('stringValue' in v)return v.stringValue;if('booleanValue' in v)return v.booleanValue;if('integerValue' in v)return Number(v.integerValue);if('doubleValue' in v)return v.doubleValue;if('nullValue' in v)return null;if('timestampValue' in v)return v.timestampValue;if('mapValue' in v){var o={};var f=v.mapValue.fields||{};for(var k in f)o[k]=uv(f[k]);return o;}if('arrayValue' in v)return(v.arrayValue.values||[]).map(uv);return null;}
  function uf(fields){var o={};for(var k in fields)o[k]=uv(fields[k]);return o;}
  function uw(d){if(d&&typeof d==='object'&&!Array.isArray(d)&&'_v' in d&&Object.keys(d).length===1)return d._v;return d;}
  window.__earlyTenant=fetch(B+'/platform_tenantsByDomain/'+ek).then(function(r){return r.ok?r.json():null}).then(function(doc){
    var tid=doc&&doc.fields?uw(uf(doc.fields)):null;
    if(typeof tid!=='string'||!tid)return null;
    return fetch(B+'/platform_tenantPublicConfigs/'+tid).then(function(r){return r.ok?r.json():null}).then(function(cdoc){
      if(!cdoc||!cdoc.fields)return null;
      var pc=uf(cdoc.fields);
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="storefront.css">

<style>
.cb-container {
  max-width: 520px;
  margin: 0 auto;
  padding: 7rem 2rem 4rem;
}

  text-align: center;
  margin-bottom: 2rem;
}

  font-family: 'Cormorant Garamond', serif;

}

}

  background: var(--surface-card, #FAF6F0);

  padding: 2rem;
  border: 1px solid var(--border-subtle, #E8E0D4);
}

}

  width: 100px;
  font-weight: 500;
  color: var(--text, #1A1A1A);
}

  color: var(--warm-gray, #666);
}
.cb-field {
  margin-bottom: 1.25rem;
}
.cb-field label {
  display: block;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;

}
.cb-field select {
  width: 100%;

  border: 1px solid var(--border-subtle, #E8E0D4);

}

  outline: none;

}
.cb-note p { margin: 0; }
.cb-note--pass {
  background: #E8F5E9;
  border-left: 4px solid #4CAF50;

  background: #FFF8E1;

@media (prefers-color-scheme: dark) {
  .cb-note--pass {
    background: rgba(46, 125, 50, 0.15);
    color: #A5D6A7;
  }
  .cb-note--paid {
    background: rgba(255, 213, 79, 0.12);
    color: #FFE082;
  }
}
[data-theme="dark"] .cb-note--pass {
  background: rgba(46, 125, 50, 0.15);
  color: #A5D6A7;
}

  background: rgba(255, 213, 79, 0.12);
  color: #FFE082;
}
@media (max-width: 768px) {
  .cb-container { padding: 6rem 1.25rem 3rem; }
  .cb-header h1 { font-size: 1.6rem; }

<body>
<nav id="mainNav"></nav>
<div class="nav-mobile-menu" id="mobileMenu"></div>

<div class="cb-container">
  <div class="cb-header">
    <h1>Cancel Booking</h1>
    <p>Cancel your class enrollment</p>
  </div>
  <div id="cbContent">
    <div class="cb-msg">Loading...</div>
  </div>
</div>

<footer id="siteFooter"></footer>

<script src="storefront-tenant.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="storefront-theme.js"></script>
<script src="storefront-nav.js"></script>
<script src="tenant-brand.js?v=2"></script>

<script>
(function() {
  'use strict';

  var TENANT_ID = null;
  var FUNCTION_BASE = 'https://us-central1-mast-platform-prod.cloudfunctions.net/';

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function getEnrollmentId() {
    var params = new URLSearchParams(window.location.search);
    return params.get('enrollment') || '';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      var d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    } catch (_) { return dateStr; }
  }

  function formatTime(timeStr) {
    if (!timeStr || !timeStr.includes(':')) return timeStr || '';
    var parts = timeStr.split(':').map(Number);
    var h = parts[0]; var m = parts[1];
    var ampm = h >= 12 ? 'PM' : 'AM';
    return ((h % 12) || 12) + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }

  function showMessage(msg) {
    document.getElementById('cbContent').innerHTML = '<div class="cb-msg">' + esc(msg) + '</div>';
  }

  function init() {
    var enrollmentId = getEnrollmentId();
    if (!enrollmentId) {
      showMessage('Invalid link. No enrollment ID found.');
      return;
    }

    window.TENANT_READY.then(function() {
      TENANT_ID = window.TENANT_ID;
      loadCancelInfo(enrollmentId);
    });
  }

  function loadCancelInfo(enrollmentId) {
    fetch(FUNCTION_BASE + 'getBookingCancelInfo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { tenantId: TENANT_ID, enrollmentId: enrollmentId } })
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      var result = data.result || data;
      if (result.error) {
        showErrorState(result.error, result.alreadyCancelled);
        return;
      }
      if (!result.success) {
        showMessage('Unable to load booking details. Please try again.');
        return;
      }
      renderCancelForm(enrollmentId, result);
    })
    .catch(function(err) {
      showMessage('Unable to load booking details. Please try again.');
    });
  }

  function showErrorState(message, alreadyCancelled) {
    var el = document.getElementById('cbContent');
    var icon = alreadyCancelled ? '&#10003;' : '&#9888;';
    var iconClass = alreadyCancelled ? 'cb-success-icon' : 'cb-error-icon';
    var title = alreadyCancelled ? 'Already Cancelled' : 'Unable to Cancel';
    el.innerHTML = '<div class="cb-error">' +
      '<div class="' + iconClass + '">' + icon + '</div>' +
      '<h2>' + esc(title) + '</h2>' +
      '<p>' + esc(message) + '</p>' +
      '<a href="/classes.html" class="cb-link">Browse Classes</a>' +
    '</div>';
  }

  function formatPrice(cents) { return '$' + (cents / 100).toFixed(2); }

  function renderCancelForm(enrollmentId, info) {
    var el = document.getElementById('cbContent');

    var infoHtml = '<div class="cb-info">' +
      '<p class="cb-info-title">' + esc(info.className) + '</p>';

    if (info.date) {
      infoHtml += '<div class="cb-info-row"><span class="cb-info-label">Date</span><span class="cb-info-value">' + esc(formatDate(info.date)) + '</span></div>';
    }
    if (info.startTime) {
      infoHtml += '<div class="cb-info-row"><span class="cb-info-label">Time</span><span class="cb-info-value">' + esc(formatTime(info.startTime)) + '</span></div>';
    }
    if (info.instructorName) {
      infoHtml += '<div class="cb-info-row"><span class="cb-info-label">Instructor</span><span class="cb-info-value">' + esc(info.instructorName) + '</span></div>';
    }
    if (info.locationName) {
      infoHtml += '<div class="cb-info-row"><span class="cb-info-label">Location</span><span class="cb-info-value">' + esc(info.locationName) + '</span></div>';
    }
    infoHtml += '</div>';

    // Payment-specific messaging (window-aware)
    var paymentNote = '';
    if (info.paymentType === 'pass') {
      var pn = info.passName ? esc(info.passName) : 'your pass';
      if (info.withinWindow) {
        paymentNote = '<div class="cb-note cb-note--paid">' +
          '<p>This cancellation is within the <strong>' + info.cancellationWindowHours + '-hour</strong> cancellation window. ' +
          'Your <strong>' + pn + '</strong> visit will be restored if the spot is filled from the waitlist. Otherwise, the studio will review your request.</p></div>';
      } else {
        paymentNote = '<div class="cb-note cb-note--pass">' +
          '<p>Your <strong>' + pn + '</strong> visit will be restored to your account when you cancel.</p></div>';
      }
    } else if (info.paymentType === 'paid' && info.pricePaidCents > 0) {
      if (info.withinWindow) {
        paymentNote = '<div class="cb-note cb-note--paid">' +
          '<p>This cancellation is within the <strong>' + info.cancellationWindowHours + '-hour</strong> cancellation window. ' +
          'You paid <strong>' + formatPrice(info.pricePaidCents) + '</strong> for this booking. You\'ll receive store credit if the spot is filled from the waitlist. Otherwise, the studio will review your request.</p></div>';
      } else {
        paymentNote = '<div class="cb-note cb-note--pass">' +
          '<p>You paid <strong>' + formatPrice(info.pricePaidCents) + '</strong> for this booking. Store credit will be added to your account.</p></div>';
      }
    }

    el.innerHTML = '<div class="cb-card">' +
      '<p style="font-size:0.88rem;color:var(--warm-gray);margin:0 0 1.25rem;">Hi ' + esc(info.customerName || 'there') + ', you can cancel your enrollment below.</p>' +
      infoHtml +
      paymentNote +
      '<div class="cb-field">' +
        '<label>Reason for cancellation (optional)</label>' +
        '<select id="cbReason">' +
          '<option value="">Select a reason</option>' +
          '<option value="Schedule conflict">Schedule conflict</option>' +
          '<option value="No longer interested">No longer interested</option>' +
          '<option value="Found another class">Found another class</option>' +
          '<option value="Financial reasons">Financial reasons</option>' +
          '<option value="Other">Other</option>' +
        '</select>' +
      '</div>' +
      '<button class="cb-btn" id="cbSubmitBtn" onclick="window._submitCancel()">Cancel My Enrollment</button>' +
    '</div>';
  }

  window._submitCancel = function() {
    var enrollmentId = getEnrollmentId();
    var reasonEl = document.getElementById('cbReason');
    var btn = document.getElementById('cbSubmitBtn');
    var reason = reasonEl ? reasonEl.value : '';

    if (btn) { btn.disabled = true; btn.textContent = 'Cancelling...'; }

    fetch(FUNCTION_BASE + 'cancelBookingEnrollment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { tenantId: TENANT_ID, enrollmentId: enrollmentId, reason: reason } })
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      var result = data.result || data;
      if (result.success) {
        var el = document.getElementById('cbContent');
        var refundMsg = '';
        if (result.paymentType === 'pass' && result.passRestored) {
          var pn = result.passName ? esc(result.passName) : 'Your pass';
          refundMsg = '<div class="cb-note cb-note--pass" style="margin:1rem 0;text-align:left;">' +
            '<p><strong>Pass visit restored.</strong> ' + pn + ' visit has been returned to your account.</p></div>';
        } else if (result.paymentType === 'pass' && result.refundStatus === 'pending_review') {
          refundMsg = '<div class="cb-note cb-note--paid" style="margin:1rem 0;text-align:left;">' +
            '<p><strong>Under review.</strong> This cancellation is within the cancellation window. Your pass visit will be restored if the spot is filled, or the studio will review your request.</p></div>';
        } else if (result.paymentType === 'paid' && result.refundStatus === 'store_credit') {
          refundMsg = '<div class="cb-note cb-note--pass" style="margin:1rem 0;text-align:left;">' +
            '<p><strong>Store credit approved.</strong> Your payment of ' + formatPrice(result.pricePaidCents) + ' will be added to your account as store credit.</p></div>';
        } else if (result.paymentType === 'paid' && result.pricePaidCents > 0) {
          refundMsg = '<div class="cb-note cb-note--paid" style="margin:1rem 0;text-align:left;">' +
            '<p><strong>Under review.</strong> This cancellation is within the cancellation window. You\'ll receive store credit if the spot is filled, or the studio will review your request.</p></div>';
        }
        el.innerHTML = '<div class="cb-success">' +
          '<div class="cb-success-icon">&#10003;</div>' +
          '<h2>Enrollment Cancelled</h2>' +
          '<p>Your enrollment has been cancelled successfully.</p>' +
          refundMsg +
          '<a href="/classes.html" class="cb-link">Browse Classes</a>' +
        '</div>';
      } else {
        showErrorState(result.error || 'Unable to cancel. Please try again or contact us.');
        if (btn) { btn.disabled = false; btn.textContent = 'Cancel My Enrollment'; }
      }
    })
    .catch(function(err) {
      alert('Error: ' + err.message);
      if (btn) { btn.disabled = false; btn.textContent = 'Cancel My Enrollment'; }
    });
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
