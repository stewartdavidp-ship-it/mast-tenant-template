<script>
(function(){
  var B='https://firestore.googleapis.com/v1/projects/mast-platform-prod/databases/(default)/documents';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  function uv(v){if(v==null)return null;if('stringValue' in v)return v.stringValue;if('booleanValue' in v)return v.booleanValue;if('integerValue' in v)return Number(v.integerValue);if('doubleValue' in v)return v.doubleValue;if('nullValue' in v)return null;if('timestampValue' in v)return v.timestampValue;if('mapValue' in v){var o={};var f=v.mapValue.fields||{};for(var k in f)o[k]=uv(f[k]);return o;}if('arrayValue' in v)return(v.arrayValue.values||[]).map(uv);return null;}
  function uf(fields){var o={};for(var k in fields)o[k]=uv(fields[k]);return o;}
  function uw(d){if(d&&typeof d==='object'&&!Array.isArray(d)&&'_v' in d&&Object.keys(d).length===1)return d._v;return d;}
  window.__earlyTenant=fetch(B+'/platform_tenantsByDomain/'+ek).then(function(r){return r.ok?r.json():null}).then(function(doc){
    var tid=doc&&doc.fields?uw(uf(doc.fields)):null;
    if(typeof tid!=='string'||!tid)return null;
    return fetch(B+'/platform_tenants/'+tid).then(function(r){return r.ok?r.json():null}).then(function(tdoc){
      if(!tdoc||!tdoc.fields)return null;
      var tf=uf(tdoc.fields);var pc=tf.publicConfig||null;
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>

<style>
.rgc-container {
  max-width: 560px;
  margin: 0 auto;
  padding: 7rem 2rem 4rem;
}
.rgc-header {
  text-align: center;
  margin-bottom: 2rem;
}
.rgc-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin: 0 0 0.5rem;
  color: var(--text);
}
.rgc-header p {
  font-size: 0.95rem;
  color: var(--warm-gray, #888);
}

/* Sign-in prompt */
.rgc-signin {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--warm-gray, #888);
}
.rgc-signin-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-radius: 6px;
  border: 1px solid var(--border, #444);
  background: #fff;
  color: #333;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  margin-top: 1rem;
  transition: background 0.2s;
}
.rgc-signin-btn:hover { background: #f5f5f5; }

/* Form card */
.rgc-card {
  background: var(--surface-card);
  border: 1px solid var(--surface-card-border);
  border-radius: 10px;
  padding: 2rem;
}
.rgc-card-icon {
  text-align: center;
  font-size: 2.5rem;
  margin-bottom: 1rem;
}
.rgc-label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.75rem;
  text-align: center;
}

/* Code input group */
.rgc-code-group {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 1.5rem;
}
.rgc-code-input {
  width: 72px;
  height: 48px;
  text-align: center;
  font-family: 'DM Sans', monospace;
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--surface-card-border, #e0e0e0);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);

  transition: border-color 0.2s;
}
.rgc-code-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--primary) 20%, transparent);
}
.rgc-code-sep {
  font-size: 1.2rem;
  color: var(--warm-gray, #888);
  user-select: none;
}

/* Submit button */
.rgc-submit-wrap {
  text-align: center;
  margin-bottom: 1rem;
}
.rgc-submit {
  display: inline-block;
  padding: 0.9rem 3rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid var(--primary);
  border-radius: var(--scale-border-radius, 2px);
  background: var(--primary);
  color: #fff;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 400;
}
.rgc-submit:hover:not(:disabled) {
  background: var(--primary-light);
  border-color: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px color-mix(in srgb, var(--primary) 35%, transparent);
}
.rgc-submit:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Legacy code toggle */
.rgc-legacy-toggle {
  text-align: center;
  margin-bottom: 1rem;
}
.rgc-legacy-link {
  font-size: 0.8rem;
  color: var(--warm-gray, #888);
  cursor: pointer;
  text-decoration: underline;
  background: none;
  border: none;
  font-family: inherit;
}
.rgc-legacy-link:hover { color: var(--primary); }
.rgc-legacy-input {
  width: 100%;
  max-width: 320px;
  height: 44px;
  text-align: center;
  font-family: 'DM Sans', monospace;
  font-size: 1rem;
  border: 1px solid var(--surface-card-border, #e0e0e0);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  margin: 0 auto 1.5rem;
  display: block;
  padding: 0 12px;
  transition: border-color 0.2s;
}
.rgc-legacy-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--primary) 20%, transparent);
}
.rgc-legacy-hint {
  text-align: center;
  font-size: 0.78rem;
  color: var(--warm-gray, #888);
  margin-bottom: 0.75rem;
}

/* Status messages */
.rgc-status {
  text-align: center;
  font-size: 0.9rem;
  padding: 0.75rem 1rem;
  border-radius: 6px;
  margin-top: 1rem;
  display: none;
}
.rgc-status.visible { display: block; }
.rgc-status.success {
  background: rgba(6,95,70,0.15);
  color: #4DB6AC;
  border: 1px solid rgba(6,95,70,0.25);
}
.rgc-status.error {
  background: rgba(200,60,60,0.12);
  color: #EF9A9A;
  border: 1px solid rgba(200,60,60,0.2);
}

/* Success detail */
.rgc-success-detail {
  text-align: center;
  margin-top: 1.5rem;
}
.rgc-success-amount {
  font-family: 'DM Sans', sans-serif;
  font-size: 2rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}
.rgc-success-label {
  font-size: 0.85rem;
  color: var(--warm-gray, #888);
  margin-bottom: 1rem;
}
.rgc-wallet-link {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 6px;
  background: var(--primary);
  color: #fff;
  text-decoration: none;
  font-size: 0.85rem;
  transition: background 0.2s;
}
.rgc-wallet-link:hover {
  background: var(--primary-light);
}

@media (max-width: 768px) {
  .rgc-container { padding: 6rem 1.25rem 3rem; }
  .rgc-header h1 { font-size: 1.8rem; }
  .rgc-code-input { width: 60px; height: 44px; font-size: 1rem; }
  .rgc-card { padding: 1.5rem 1.25rem; }
}
@media (max-width: 400px) {
  .rgc-code-group { gap: 4px; }
  .rgc-code-input { width: 52px; height: 40px; font-size: 0.9rem; }
  .rgc-code-sep { font-size: 1rem; }
}
</style>
</head>
<body>
<nav id="mainNav"></nav>

<div class="rgc-container">
  <div class="rgc-header">
    <h1>Redeem Gift Card</h1>
    <p>Enter your gift card code to add it to your wallet</p>
  </div>
  <div id="rgcContent">
    <div style="text-align:center;padding:4rem 2rem;color:var(--warm-gray,#888);">Loading...</div>
  </div>
</div>

<footer id="siteFooter"></footer>

<script src="storefront-tenant.js"></script>
<script src="storefront-theme.js"></script>
<script src="storefront-nav.js"></script>
<script src="tenant-brand.js?v=2"></script>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
(function() {
  'use strict';

  /* ---- Utilities ---- */

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function formatMoney(cents) {
    return '$' + (Math.abs(cents) / 100).toFixed(2);
  }

  /* ---- Rate Limiting ---- */

  var RATE_KEY = 'rgc_attempts';
  var RATE_MAX = 5;
  var RATE_WINDOW = 10 * 60 * 1000; // 10 minutes

  function checkRateLimit() {
    try {
      var raw = sessionStorage.getItem(RATE_KEY);
      if (!raw) return true;
      var attempts = JSON.parse(raw);
      var now = Date.now();
      // Prune old attempts
      attempts = attempts.filter(function(t) { return now - t < RATE_WINDOW; });
      sessionStorage.setItem(RATE_KEY, JSON.stringify(attempts));
      return attempts.length < RATE_MAX;
    } catch (e) {
      return true;
    }
  }

  function recordAttempt() {
    try {
      var raw = sessionStorage.getItem(RATE_KEY);
      var attempts = raw ? JSON.parse(raw) : [];
      var now = Date.now();
      attempts = attempts.filter(function(t) { return now - t < RATE_WINDOW; });
      attempts.push(now);
      sessionStorage.setItem(RATE_KEY, JSON.stringify(attempts));
    } catch (e) { /* ignore */ }
  }

  /* ---- URL param extraction ---- */

  function extractCodeFromUrl() {
    try {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      if (code) {
        // Clean URL after extraction
        var url = new URL(window.location);
        url.searchParams.delete('code');
        window.history.replaceState({}, '', url.pathname + (url.search || ''));
      }
      return code || null;
    } catch (e) {
      return null;
    }
  }

  var prefillCode = extractCodeFromUrl();

  /* ---- Rendering ---- */

  function renderSignIn() {
    var content = document.getElementById('rgcContent');
    content.innerHTML =
      '<div class="rgc-signin">' +
        '<p>Sign in to redeem a gift card.</p>' +
        '<button class="rgc-signin-btn" onclick="if(window.siteSignIn)window.siteSignIn();">' +
          '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.04 24.04 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>' +
          'Sign in with Google' +
        '</button>' +
      '</div>';
  }

  function renderForm() {
    var content = document.getElementById('rgcContent');

    // Pre-fill segments from URL param
    var seg = ['', '', '', ''];
    if (prefillCode) {
      var parts = prefillCode.replace(/[^A-Za-z0-9]/g, '');
      // Handle both dashed (XXXX-XXXX-XXXX-XXXX) and raw (XXXXXXXXXXXXXXXX) formats
      if (prefillCode.indexOf('-') !== -1) {
        var dashed = prefillCode.split('-');
        for (var i = 0; i < 4; i++) seg[i] = (dashed[i] || '').toUpperCase().slice(0, 4);
      } else if (parts.length >= 4) {
        seg[0] = parts.slice(0, 4).toUpperCase();
        seg[1] = parts.slice(4, 8).toUpperCase();
        seg[2] = parts.slice(8, 12).toUpperCase();
        seg[3] = parts.slice(12, 16).toUpperCase();
      }
      prefillCode = null; // consumed
    }

    content.innerHTML =
      '<div class="rgc-card">' +
        '<div class="rgc-card-icon">&#127873;</div>' +
        '<label class="rgc-label">Gift Card Code</label>' +
        '<div class="rgc-code-group">' +
          '<input type="text" class="rgc-code-input" id="rgcSeg0" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" value="' + esc(seg[0]) + '" placeholder="XXXX">' +
          '<span class="rgc-code-sep">&ndash;</span>' +
          '<input type="text" class="rgc-code-input" id="rgcSeg1" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" value="' + esc(seg[1]) + '" placeholder="XXXX">' +
          '<span class="rgc-code-sep">&ndash;</span>' +
          '<input type="text" class="rgc-code-input" id="rgcSeg2" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" value="' + esc(seg[2]) + '" placeholder="XXXX">' +
          '<span class="rgc-code-sep">&ndash;</span>' +
          '<input type="text" class="rgc-code-input" id="rgcSeg3" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" value="' + esc(seg[3]) + '" placeholder="XXXX">' +
        '</div>' +
        '<div class="rgc-submit-wrap">' +
          '<button class="rgc-submit" id="rgcSubmit">Redeem</button>' +
        '</div>' +
        '<div class="rgc-status" id="rgcStatus"></div>' +
        '<div class="rgc-legacy-toggle">' +
          '<button class="rgc-legacy-link" id="rgcLegacyToggle">I have a gift card from our previous website</button>' +
        '</div>' +
      '</div>';

    // Legacy mode state
    var legacyMode = false;

    document.getElementById('rgcLegacyToggle').addEventListener('click', function() {
      legacyMode = !legacyMode;
      var codeGroup = document.querySelector('.rgc-code-group');
      var legacyToggle = document.getElementById('rgcLegacyToggle');
      var card = document.querySelector('.rgc-card');

      if (legacyMode) {
        // Hide standard inputs, show free-form input
        codeGroup.style.display = 'none';
        legacyToggle.textContent = 'Use a standard gift card code instead';
        // Insert legacy input before submit
        var submitWrap = document.querySelector('.rgc-submit-wrap');
        var hint = document.createElement('div');
        hint.className = 'rgc-legacy-hint';
        hint.id = 'rgcLegacyHint';
        hint.textContent = 'Enter the code exactly as it appears on your old gift card';
        var inp = document.createElement('input');
        inp.type = 'text';
        inp.className = 'rgc-legacy-input';
        inp.id = 'rgcLegacyInput';
        inp.placeholder = 'Enter your old gift card code';
        inp.autocomplete = 'off';
        inp.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') { e.preventDefault(); document.getElementById('rgcSubmit').click(); }
        });
        card.insertBefore(hint, submitWrap);
        card.insertBefore(inp, submitWrap);
        inp.focus();
      } else {
        // Remove legacy input, show standard inputs
        codeGroup.style.display = 'flex';
        legacyToggle.textContent = 'I have a gift card from our previous website';
        var oldHint = document.getElementById('rgcLegacyHint');
        var oldInp = document.getElementById('rgcLegacyInput');
        if (oldHint) oldHint.remove();
        if (oldInp) oldInp.remove();
      }
    });

    // Wire up auto-advance and input filtering
    var inputs = [
      document.getElementById('rgcSeg0'),
      document.getElementById('rgcSeg1'),
      document.getElementById('rgcSeg2'),
      document.getElementById('rgcSeg3')
    ];

    inputs.forEach(function(inp, idx) {
      inp.addEventListener('input', function() {
        // Filter to alphanumeric only, uppercase
        inp.value = inp.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
        // Auto-advance on 4 chars
        if (inp.value.length === 4 && idx < 3) {
          inputs[idx + 1].focus();
          inputs[idx + 1].select();
        }
      });

      inp.addEventListener('keydown', function(e) {
        // Backspace on empty field goes to previous
        if (e.key === 'Backspace' && inp.value.length === 0 && idx > 0) {
          e.preventDefault();
          inputs[idx - 1].focus();
          inputs[idx - 1].select();
        }
        // Enter submits
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('rgcSubmit').click();
        }
      });

      // Handle paste of full code into any field
      inp.addEventListener('paste', function(e) {
        var pasted = (e.clipboardData || window.clipboardData).getData('text');
        if (!pasted) return;
        var clean = pasted.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
        if (clean.length >= 8) {
          e.preventDefault();
          inputs[0].value = clean.slice(0, 4);
          inputs[1].value = clean.slice(4, 8);
          inputs[2].value = clean.slice(8, 12);
          inputs[3].value = clean.slice(12, 16);
          // Focus the last populated field
          var lastIdx = Math.min(3, Math.floor(clean.length / 4) - 1);
          if (lastIdx >= 0) inputs[Math.min(3, lastIdx + 1 < 4 && clean.length > (lastIdx + 1) * 4 ? lastIdx + 1 : lastIdx)].focus();
        }
      });
    });

    // Focus first empty segment
    for (var f = 0; f < 4; f++) {
      if (!inputs[f].value) { inputs[f].focus(); break; }
    }

    document.getElementById('rgcSubmit').addEventListener('click', function() {
      handleRedeem(inputs, legacyMode);
    });
  }

  /* ---- Redemption Logic ---- */

  var _user;

  function showStatus(type, msg) {
    var el = document.getElementById('rgcStatus');
    if (!el) return;
    el.className = 'rgc-status visible ' + type;
    el.innerHTML = msg;
  }

  function hideStatus() {
    var el = document.getElementById('rgcStatus');
    if (el) { el.className = 'rgc-status'; el.innerHTML = ''; }
  }

  function callClaimGiftCard(payload, token) {
    var cfBase = (typeof TENANT_FIREBASE_CONFIG !== 'undefined' && TENANT_FIREBASE_CONFIG.cloudFunctionsBase)
      ? TENANT_FIREBASE_CONFIG.cloudFunctionsBase
      : 'https://us-central1-mast-platform-prod.cloudfunctions.net';
    var url = cfBase + '/claimGiftCard';
    var headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    var body = Object.assign({}, payload || {});
    if (typeof TENANT_ID !== 'undefined') body.tenantId = TENANT_ID;
    return fetch(url, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify({ data: body })
    }).then(function(r) { return r.json(); })
      .then(function(resp) { return resp.result || resp; });
  }

  function handleRedeem(inputs, isLegacy) {
    hideStatus();

    var payload = {};

    if (isLegacy) {
      var legacyInput = document.getElementById('rgcLegacyInput');
      var legacyCode = (legacyInput ? legacyInput.value.trim() : '');
      if (!legacyCode) {
        showStatus('error', 'Please enter your old gift card code.');
        if (legacyInput) legacyInput.focus();
        return;
      }
      payload.legacyCode = legacyCode;
    } else {
      var segments = inputs.map(function(inp) { return inp.value.trim().toUpperCase(); });
      for (var i = 0; i < 4; i++) {
        if (segments[i].length !== 4) {
          showStatus('error', 'Please enter all 4 segments of the gift card code.');
          inputs[i].focus();
          return;
        }
      }
      payload.code = segments.join('-');
    }

    if (!checkRateLimit()) {
      showStatus('error', 'Too many attempts. Please wait a few minutes before trying again.');
      return;
    }
    recordAttempt();

    var btn = document.getElementById('rgcSubmit');
    btn.disabled = true;
    btn.textContent = 'Redeeming...';

    _user.getIdToken().then(function(token) {
      return callClaimGiftCard(payload, token);
    }).then(function(result) {
      if (result && result.success) {
        renderSuccess(result.amountCents || 0);
      } else {
        btn.disabled = false;
        btn.textContent = 'Redeem';
        showStatus('error', (result && result.reason) || 'Unable to redeem gift card. Please try again.');
      }
    }).catch(function(err) {
      console.error('[redeem-gift-card] Claim failed:', err);
      btn.disabled = false;
      btn.textContent = 'Redeem';
      showStatus('error', 'Unable to look up gift card. Please try again.');
    });
  }

  function renderSuccess(amountCents) {
    var content = document.getElementById('rgcContent');
    content.innerHTML =
      '<div class="rgc-card">' +
        '<div class="rgc-card-icon">&#10003;</div>' +
        '<div class="rgc-status visible success" style="display:block;">Gift card redeemed successfully!</div>' +
        '<div class="rgc-success-detail">' +
          '<div class="rgc-success-amount">' + esc(formatMoney(amountCents)) + '</div>' +
          '<div class="rgc-success-label">has been added to your wallet</div>' +
          '<a href="my-wallet.html" class="rgc-wallet-link">Go to My Wallet</a>' +
        '</div>' +
      '</div>';
  }

  /* ---- Init ---- */

  window.TENANT_READY.then(function() {
    document.title = 'Redeem Gift Card \u2014 ' + (window.TENANT_TITLE_SUFFIX ? TENANT_TITLE_SUFFIX() : 'Shop');

    var app;
    try { app = firebase.app(); } catch (e) { app = firebase.initializeApp(TENANT_FIREBASE_CONFIG); }
    var auth = app.auth();

    auth.onAuthStateChanged(function(user) {
      if (user && !user.isAnonymous) {
        _user = user;
        renderForm();
      } else {
        renderSignIn();
      }
    });
  }).catch(function(err) {
    console.error('[redeem-gift-card] Tenant failed:', err);
  });
})();
</script>
<script src="cart.js"></script>
<script defer src="feedback-widget.js"></script>
<script defer src="share-widget.js"></script>

</body>
</html>
