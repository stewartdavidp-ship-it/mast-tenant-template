<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://*.firebaseio.com https://apis.google.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://us-central1-mast-platform-prod.cloudfunctions.net https://*.firebaseio.com wss://*.firebaseio.com https://*.firebasestorage.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://maps.googleapis.com https://places.googleapis.com https://api.ipify.org; img-src 'self' data: blob: https:; frame-src 'self' https://*.firebaseapp.com https://*.firebaseio.com; frame-ancestors 'none';">
<title>Product &mdash; My Shop</title><!-- TENANT: brand -->
<!-- Preconnect to external origins — saves ~200ms DNS+TLS per origin -->
<link rel="preconnect" href="https://mast-platform-prod-default-rtdb.firebaseio.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<!-- Early tenant prefetch — starts RTDB fetch immediately during HTML parsing,
     before any external scripts download. storefront-tenant.js consumes the result. -->
<script>
(function(){
  var P='https://mast-platform-prod-default-rtdb.firebaseio.com/mast-platform';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  window.__earlyTenant=fetch(P+'/tenantsByDomain/'+ek+'.json').then(function(r){return r.ok?r.json():null}).then(function(tid){
    if(!tid)return null;
    return fetch(P+'/tenants/'+tid+'/publicConfig.json').then(function(r){return r.ok?r.json():null}).then(function(pc){
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="storefront.css">
<link rel="stylesheet" href="cart.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="checkout.css" media="print" onload="this.media='all'">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script>(function(){var s=localStorage.getItem('mast-theme');var d=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='dark'||(s!=='light'&&d))document.documentElement.classList.add('dark');else document.documentElement.classList.add('light');})();</script>
<style>
  /* ========= BUTTONS ========= */
  .btn {
    display: inline-block;
    padding: 0.9rem 2.2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: all 0.3s;
    font-weight: 400;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--amber);
    color: #fff;
    border: 1px solid var(--amber);
  }

  .btn-primary:hover {
    background: var(--amber-light);
    border-color: var(--amber-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px color-mix(in srgb, var(--primary) 35%, transparent);
  }

  .btn-outline {
    background: transparent;
    color: var(--charcoal);
    border: 1px solid var(--charcoal);
  }

  .btn-outline:hover {
    background: var(--charcoal);
    color: #fff;
    transform: translateY(-2px);
  }

  .btn-outline-light {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
  }

  .btn-outline-light:hover {
    border-color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.06);
    transform: translateY(-2px);
  }

  /* ========= SECTIONS SHARED ========= */
  section { padding: 7rem 3rem; }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 1rem;
    color: var(--charcoal);
  }

  .section-subtitle {
    font-size: 1rem;
    color: var(--warm-gray);
    max-width: 520px;
    line-height: 1.7;
    font-weight: 300;
  }

  /* ========= FOOTER ========= */
  /* Powered by Mast badge */
  .powered-by-mast {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0 0;
    border-top: 1px solid rgba(255,255,255,0.12);
    margin-top: 1.5rem;
  }
  .powered-by-mast a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    opacity: 0.9;
    transition: opacity 0.3s;
  }
  .powered-by-mast a:hover { opacity: 1; }
  .powered-by-mast svg { width: 8px; height: 16px; flex-shrink: 0; }
  .powered-by-mast .pbm-stack { display: flex; flex-direction: column; gap: 1px; }
  .powered-by-mast .pbm-wm {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: -0.025em;
    color: #f0ebe0;
    line-height: 1;
  }
  .powered-by-mast .pbm-label {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.03em;
    color: #6a8aaa;
    line-height: 1;
  }

  /* ========= SCROLL ANIMATIONS ========= */
  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .glass-divider {
    height: 3px;
    background: var(--glass-gradient);
    opacity: 0.55;
  }

  /* ========= PAGE HEADER ========= */
  .page-header {
    background: var(--surface-dark);
    padding: 10rem 3rem 5rem;
    text-align: center;
  }

  .page-header .section-label { color: var(--amber-light); }
  .page-header .section-title { color: var(--on-dark); font-size: clamp(2.5rem, 5vw, 3.8rem); }
  .page-header .section-subtitle { color: var(--on-dark-muted); margin: 0 auto; }

  /* ========= CATEGORY FILTER ========= */
  .category-filter {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    max-width: 1200px;
    margin: 0 auto;
    padding-bottom: 3rem;
  }

  .filter-pill {
    padding: 0.55rem 1.5rem;
    border: 1px solid var(--cream-dark);
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-gray);
    background: var(--surface-card);
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
  }

  .filter-pill:hover,
  .filter-pill.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* ========= PRODUCT GRID ========= */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .product-card {
    background: var(--surface-card);
    border-radius: 4px;
    overflow: hidden;
    transition: all 0.3s;
  }

  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
  }

  .product-image {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1;
  }

  .product-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: transform 0.6s ease;
  }

  .product-card:hover .product-image img {
    transform: scale(1.06);
  }

  .product-category {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    font-weight: 500;
  }

  .product-info {
    padding: 1.25rem 1.5rem;
  }

  .product-info h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 400;
    margin: 0.4rem 0;
  }

  .product-link {
    display: inline-block;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    text-decoration: none;
    font-weight: 400;
    margin-top: 0.5rem;
    transition: color 0.3s;
  }

  .product-link:hover { color: var(--teal-deep); }

  .product-link::after {
    content: ' \2192';
  }

  .product-price {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--charcoal);
    margin: 0.3rem 0 0;
  }

  .category-section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 300;
    color: var(--charcoal);
    text-align: center;
    margin: 3.5rem 0 1.5rem;
    letter-spacing: 0.02em;
  }

  .category-section-title:first-of-type {
    margin-top: 0;
  }

  /* ========= SHOP CTA BANNER ========= */
  .shop-cta {
    background: linear-gradient(135deg, var(--amber) 0%, var(--amber-light) 50%, var(--amber-glow) 100%);
    text-align: center;
    padding: 5rem 3rem;
    margin-top: 4rem;
  }

  .shop-cta h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 300;
    color: #fff;
    margin-bottom: 1rem;
  }

  .shop-cta p {
    font-size: 1rem;
    color: rgba(255,255,255,0.8);
    margin-bottom: 2rem;
    font-weight: 300;
  }

  .shop-cta .btn {
    background: #fff;
    color: var(--charcoal);
    border: 1px solid #fff;
  }

  .shop-cta .btn:hover {
    background: var(--charcoal);
    color: #fff;
    border-color: var(--charcoal);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  }

  /* ========= RESPONSIVE ========= */
  @media (max-width: 1024px) {
    .product-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 768px) {
    .page-header { padding: 7rem 1.5rem 3rem; }
    .product-grid { grid-template-columns: 1fr; max-width: 400px; }
    .shop-cta { padding: 4rem 1.5rem; }
  }

  @media (max-width: 768px) {
    section { padding: 4rem 1.5rem; }
  }

  /* ========= PRODUCT DETAIL ========= */
  .product-detail {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: start;
  }

  .product-gallery {
    position: relative;
  }

  .product-gallery-main {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface-card);
    margin-bottom: 12px;
    position: relative;
  }

  .product-gallery-main img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    cursor: zoom-in;
    transition: opacity 0.2s;
  }

  /* Zoom lens overlay */
  .product-zoom-lens {
    display: none;
    position: absolute;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    pointer-events: none;
    background-repeat: no-repeat;
    z-index: 10;
    transform: translate(-50%, -50%);
  }

  .product-gallery-main:hover .product-zoom-lens {
    display: block;
  }

  @media (max-width: 768px) {
    .product-zoom-lens { display: none !important; }
  }

  .product-thumbs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .product-thumb {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }

  .product-thumb.active,
  .product-thumb:hover {
    border-color: var(--amber);
  }

  .product-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .product-detail-info {
    padding-top: 1rem;
  }

  .product-detail-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 0.75rem;
    color: var(--charcoal);
  }

  .product-detail-price {
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--primary-light);
    margin-bottom: 1.5rem;
  }

  .product-detail-price.no-price {
    color: var(--warm-gray);
    font-style: italic;
    font-weight: 300;
  }

  .product-detail-price .price-prefix {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--warm-gray);
    margin-right: 4px;
    text-transform: lowercase;
  }

  .product-availability {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .product-availability-badge {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 4px;
  }

  .product-availability-badge.made-to-order {
    background: color-mix(in srgb, var(--primary-light) 15%, transparent);
    color: var(--primary-light);
  }

  .product-availability-badge.back-ordered {
    background: color-mix(in srgb, var(--warm-gray) 15%, transparent);
    color: var(--warm-gray);
  }

  .product-availability-badge.sold {
    background: var(--bg-dark, #2a2420);
    color: var(--text-muted, #9e9890);
  }

  .product-lead-time {
    font-size: 0.82rem;
    color: var(--text-muted, #b0a89e);
    font-style: italic;
  }

  .product-description {
    margin-bottom: 1.5rem;
    font-size: 0.92rem;
    line-height: 1.7;
    color: var(--charcoal);
    display: none;
  }

  .product-description p {
    margin: 0 0 0.75rem;
  }

  .product-description p:last-child {
    margin-bottom: 0;
  }

  .product-detail-cats {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .product-detail-cat {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--warm-gray);
    background: var(--cream-dark);
    padding: 4px 14px;
    border-radius: 50px;
    text-decoration: none;
    transition: all 0.3s;
  }

  .product-detail-cat:hover {
    background: var(--charcoal);
    color: #fff;
  }

  .product-option-group {
    margin-bottom: 1.25rem;
  }

  .product-option-label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--warm-gray);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .product-option-choices {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .product-option-chip {
    padding: 6px 16px;
    border: 1px solid var(--cream-dark);
    border-radius: 50px;
    font-size: 0.82rem;
    color: var(--charcoal);
    background: var(--surface-card);
    cursor: pointer;
    transition: all 0.2s;
  }

  .product-option-chip:hover {
    border-color: var(--primary-light);
    color: var(--primary-light);
  }

  .product-option-chip.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .product-detail-actions {
    margin-top: 2rem;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .product-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-gray);
    text-decoration: none;
    margin-bottom: 2rem;
    transition: color 0.3s;
  }

  .product-back:hover { color: var(--amber); }

  .product-loading {
    text-align: center;
    padding: 6rem 2rem;
    color: var(--warm-gray);
    font-size: 1rem;
  }

  .product-not-found {
    text-align: center;
    padding: 6rem 2rem;
  }

  .product-not-found h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    margin-bottom: 1rem;
  }

  .product-not-found p {
    color: var(--warm-gray);
    margin-bottom: 2rem;
  }


  /* ── How It Was Made ── */
  .product-story {
    max-width: 700px;
    margin: 4rem auto 0;
    padding: 3rem 0;
    border-top: 1px solid var(--cream-dark);
  }

  .product-story-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--charcoal);
    margin: 0 0 0.5rem;
    text-align: center;
  }

  .product-story-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--warm-gray);
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .product-story-entry {
    margin-bottom: 2rem;
  }

  .product-story-entry img {
    display: block;
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    border-radius: 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    object-fit: cover;
  }

  .product-story-caption {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--warm-gray);
    text-align: center;
    margin-top: 0.75rem;
    line-height: 1.6;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }

  .product-story-milestone {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--charcoal);
    text-align: center;
    padding: 1.5rem 2rem;
    line-height: 1.5;
    max-width: 500px;
    margin: 0.5rem auto;
    position: relative;
  }

  .product-story-milestone::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--amber-light);
    margin: 0 auto 1rem;
  }

  .product-story-credit {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--warm-gray-light);
    text-align: center;
    margin-top: 3rem;
    letter-spacing: 0.05em;
  }

  @media (prefers-color-scheme: dark) {
    .product-story { border-top-color: #333; }
    .product-story-title { color: #f0e8db; }
    .product-story-name { color: #9b958e; }
    .product-story-milestone { color: #f0e8db; }
    .product-story-caption { color: #9b958e; }
    .product-story-credit { color: #6b6560; }
    .product-story-entry img { box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  }

  @media (max-width: 768px) {
    .product-detail {
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    .product-thumb {
      width: 52px;
      height: 52px;
    }
    .product-story {
      padding: 2rem 0;
      margin-top: 2rem;
    }
    .product-story-title { font-size: 1.6rem; }
    .product-story-milestone { padding: 1rem; font-size: 1.05rem; }
  }
  

</style>
</head>
<body>

<!-- ============ NAV ============ -->
<nav id="mainNav"></nav>

<div class="nav-mobile-menu" id="mobileMenu"></div>

<!-- ============ SHOP CATEGORY NAV ============ -->
<div class="category-filter" id="shopCategoryNav" style="padding-bottom: 1rem;"></div>

<!-- ============ PRODUCT DETAIL ============ -->
<section data-slot="product-detail" style="padding-top: 8rem;">
  <div id="productLoading" class="product-loading">Loading product...</div>
  <div id="productNotFound" class="product-not-found" style="display:none;">
    <h2>Product Not Found</h2>
    <p>The product you're looking for doesn't exist or may have been removed.</p>
    <a href="shop.html" class="btn btn-outline">Browse All Products</a>
  </div>
  <div id="productContent" style="display:none;">
    <a href="shop.html" class="product-back">&larr; Back to Shop</a>
    <div class="product-detail">
      <div class="product-gallery">
        <div class="product-gallery-main" id="galleryMain">
          <img id="mainImage" src="" alt="" />
          <div class="product-zoom-lens" id="zoomLens"></div>
        </div>
        <div class="product-thumbs" id="thumbsContainer"></div>
      </div>
      <div class="product-detail-info">
        <h1 class="product-detail-name" id="productName"></h1>
        <div class="product-detail-price" id="productPrice"></div>
        <div class="product-availability" id="productAvailability" style="display:none;"></div>
        <div class="product-detail-cats" id="productCats"></div>
        <div class="product-description" id="productDescription"></div>
        <div id="productOptions"></div>
        <div class="product-qty-wrap" id="productQtyWrap" style="display:none;">
          <div class="product-qty-label">Quantity</div>
          <div class="qty-stepper">
            <button class="qty-btn" id="qtyDec" disabled>&minus;</button>
            <span class="qty-value" id="qtyValue">1</span>
            <button class="qty-btn" id="qtyInc">+</button>
          </div>
        </div>
        <div class="product-detail-actions">

<!-- Storefront scripts first — use fetch() only, no Firebase SDK needed -->
<script src="storefront-tenant.js"></script>
<script src="storefront-theme.js"></script>
<script src="storefront-nav.js"></script>
<script src="tenant-brand.js?v=2"></script>
<!-- Firebase SDK — loaded after storefront scripts so nav/theme render first -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script>
  // Firebase — load product detail from URL param ?id=pXXX
  window.TENANT_READY.then(function() {
    var app = firebase.initializeApp(TENANT_FIREBASE_CONFIG, 'public-product');
    var db = app.database();
    window._productDb = db;

    var params = new URLSearchParams(window.location.search);
    var pid = params.get('id');
    var isStoryView = params.get('view') === 'story';
    window._isStoryView = isStoryView;
    window._pid = pid;

    if (!pid) {
      document.getElementById('productLoading').style.display = 'none';
      document.getElementById('productNotFound').style.display = '';
      return;
    }

    // Build shop category nav
    db.ref(TENANT_ID + '/public/config/categories').once('value').then(function(catSnap) {
      var catData = catSnap.val();
      var navEl = document.getElementById('shopCategoryNav');
      if (!navEl || !catData || !Array.isArray(catData)) return;
      var cats = catData.filter(function(c) { return c && c.id && c.label; });
      var html = '<a href="shop.html" class="filter-pill" style="text-decoration:none;">All</a>';
      cats.forEach(function(c) {
        html += '<a href="shop.html?cat=' + encodeURIComponent(c.id) + '" class="filter-pill" style="text-decoration:none;">' + (c.label || c.id) + '</a>';
      });
      navEl.innerHTML = html;
    });

    db.ref(TENANT_ID + '/public/products/' + pid).once('value').then(function(snap) {
      var p = snap.val();
      document.getElementById('productLoading').style.display = 'none';

      if (!p) {
        document.getElementById('productNotFound').style.display = '';
        return;
      }

      // Update page title
      document.title = (isStoryView ? 'How It Was Made: ' : '') + p.name + ' — ' + TENANT_TITLE_SUFFIX();

      // Show content
      document.getElementById('productContent').style.display = '';

      // Story-only view: hide product details, show only story
      if (isStoryView) {
        var productDetail = document.querySelector('.product-detail');
        var backLink = document.querySelector('.product-back');
        if (productDetail) productDetail.style.display = 'none';
        if (backLink) backLink.style.display = 'none';
      }
      document.getElementById('productName').textContent = p.name;

      // ── Helpers for enriched product data (window-scoped for add-to-cart) ──
      window.formatPriceCents = function(cents) {
        if (typeof cents !== 'number' || isNaN(cents)) return '';
        return '$' + (cents / 100).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      };
      window.parsePriceToCents = function(priceStr) {
        if (!priceStr) return 0;
        if (typeof priceStr === 'number') return priceStr;
        var num = parseFloat(String(priceStr).replace(/[^0-9.]/g, ''));
        return isNaN(num) ? 0 : Math.round(num * 100);
      };
      window.displayPrice = function(p) {
        if (typeof p === 'number') return formatPriceCents(p);
        return p || '';
      };
      var formatPriceCents = window.formatPriceCents;
      var parsePriceToCents = window.parsePriceToCents;
      var displayPrice = window.displayPrice;
      function findVariant(variants, selected) {
        if (!variants || !selected) return null;
        var selectedKeys = Object.keys(selected);
        if (selectedKeys.length === 0) return null;
        for (var i = 0; i < variants.length; i++) {
          var v = variants[i];
          var vOpts = v.combo || v.options;
          if (!vOpts) continue;
          var match = true;
          for (var k = 0; k < selectedKeys.length; k++) {
            if (vOpts[selectedKeys[k]] !== selected[selectedKeys[k]]) { match = false; break; }
          }
          if (match) return v;
        }
        return null;
      }

      // Store variant state
      window._productVariants = (p.variants && p.variants.length > 0) ? p.variants : null;
      window._resolvedVariantPrice = null;

      // Price
      var priceEl = document.getElementById('productPrice');
      if (p.priceType === 'request' || (!p.price && !p.variants)) {
        priceEl.textContent = 'Price on request';
        priceEl.classList.add('no-price');
        var cartBtn = document.getElementById('addToCartBtn');
        if (cartBtn) { cartBtn.style.display = 'none'; }
      } else if (window._productVariants) {
        // Find lowest variant price
        var lowest = window._productVariants.reduce(function(min, v) {
          var vp = v.priceCents || v.price;
          return (vp < min) ? vp : min;
        }, window._productVariants[0].priceCents || window._productVariants[0].price);
        priceEl.innerHTML = '<span class="price-prefix">from</span>' + escHtml(formatPriceCents(lowest));
      } else if (p.price) {
        priceEl.textContent = displayPrice(p.price);
      } else {
        priceEl.textContent = 'Price on request';
        priceEl.classList.add('no-price');
        var cartBtn2 = document.getElementById('addToCartBtn');
        if (cartBtn2) { cartBtn2.style.display = 'none'; }
      }

      // Availability & Lead Time
      if (p.availability && p.availability !== 'in-stock') {
        var availEl = document.getElementById('productAvailability');
        var availHtml = '';
        var labels = { 'made-to-order': 'Made to Order', 'back-ordered': 'Back Ordered', 'sold': 'Sold' };
        var cssClass = p.availability;
        if (labels[p.availability]) {
          availHtml += '<span class="product-availability-badge ' + cssClass + '">' + labels[p.availability] + '</span>';
        }
        if (p.leadTime) {
          availHtml += '<span class="product-lead-time">' + escHtml(p.leadTime) + '</span>';
        }
        if (availHtml) {
          availEl.innerHTML = availHtml;
          availEl.style.display = '';
        }
      }

      // Description
      if (p.description) {
        var descEl = document.getElementById('productDescription');
        descEl.innerHTML = p.description;
        descEl.style.display = 'block';
      }

      // Categories
      var catsHtml = '';
      if (p.categories && p.categories.length) {
        p.categories.forEach(function(c) {
          catsHtml += '<a href="shop.html?cat=' + encodeURIComponent(c) + '" class="product-detail-cat">' + escHtml(c) + '</a>';
        });
      }
      document.getElementById('productCats').innerHTML = catsHtml;

      // Highlight active category in shop nav
      if (p.categories && p.categories.length) {
        var navPills = document.querySelectorAll('#shopCategoryNav .filter-pill');
        navPills.forEach(function(pill) {
          var href = pill.getAttribute('href') || '';
          var match = href.match(/cat=([^&]+)/);
          if (match && p.categories.indexOf(decodeURIComponent(match[1])) !== -1) {
            pill.classList.add('active');
          }
        });
      }

      // Images
      var images = p.images || [];
      if (images.length > 0) {
        var mainImg = document.getElementById('mainImage');
        mainImg.src = images[0];
        mainImg.alt = p.name;

        if (images.length > 1) {
          var thumbsHtml = '';
          images.forEach(function(src, idx) {
            thumbsHtml += '<div class="product-thumb' + (idx === 0 ? ' active' : '') + '" data-idx="' + idx + '">' +
              '<img src="' + escHtml(src) + '" alt="' + escHtml(p.name) + ' image ' + (idx + 1) + '" loading="lazy" />' +
              '</div>';
          });
          var thumbsEl = document.getElementById('thumbsContainer');
          thumbsEl.innerHTML = thumbsHtml;
          thumbsEl.addEventListener('click', function(e) {
            var thumb = e.target.closest('.product-thumb');
            if (thumb) switchImage(parseInt(thumb.getAttribute('data-idx'), 10));
          });
        }
      }

      // Options
      // Store product data for cart
      window._productData = p;
      window._selectedOptions = {};
      window._productQty = 1;

      if (p.options && p.options.length) {
        window._requiredOptions = p.options.map(function(o) { return o.label; });
        var optHtml = '';
        p.options.forEach(function(opt) {
          optHtml += '<div class="product-option-group" data-option-label="' + escHtml(opt.label) + '">' +
            '<div class="product-option-label">' + escHtml(opt.label) + '</div>' +
            '<div class="product-option-choices">';
          opt.choices.forEach(function(choice) {
            optHtml += '<span class="product-option-chip" data-label="' + escHtml(opt.label) + '" data-value="' + escHtml(choice) + '">' + escHtml(choice) + '</span>';
          });
          optHtml += '</div></div>';
        });
        document.getElementById('productOptions').innerHTML = optHtml;

        // Click handlers for option chips
        document.querySelectorAll('.product-option-chip').forEach(function(chip) {
          chip.addEventListener('click', function() {
            var label = this.getAttribute('data-label');
            var value = this.getAttribute('data-value');
            // Deselect siblings in same group
            var group = this.closest('.product-option-group');
            group.querySelectorAll('.product-option-chip').forEach(function(c) { c.classList.remove('selected'); });
            this.classList.add('selected');
            window._selectedOptions[label] = value;
            // Resolve variant pricing when all options selected
            if (window._productVariants && window._requiredOptions) {
              var allPicked = window._requiredOptions.every(function(l) { return window._selectedOptions[l]; });
              var priceEl = document.getElementById('productPrice');
              if (allPicked) {
                var variant = findVariant(window._productVariants, window._selectedOptions);
                if (variant) {
                  var vPrice = variant.priceCents || variant.price;
                  priceEl.innerHTML = formatPriceCents(vPrice);
                  priceEl.classList.remove('no-price');
                  window._resolvedVariantPrice = vPrice;
                } else {
                  priceEl.textContent = 'Combination not available';
                  priceEl.classList.add('no-price');
                  window._resolvedVariantPrice = null;
                }
              }
            }
            checkAddToCartReady();
          });
        });

        // Auto-select options that have only one choice
        document.querySelectorAll('.product-option-group').forEach(function(group) {
          var chips = group.querySelectorAll('.product-option-chip');
          if (chips.length === 1) {
            chips[0].classList.add('selected');
            window._selectedOptions[chips[0].getAttribute('data-label')] = chips[0].getAttribute('data-value');
          }
        });
        checkAddToCartReady();
      } else {
        window._requiredOptions = [];
        checkAddToCartReady();
      }

      // Show qty stepper
      document.getElementById('productQtyWrap').style.display = '';

      // Product URL (legacy Weebly redirect)
      if (p.url) {
      }

      // Store images array for gallery switching
      window._productImages = images;

      // ── Sold Sculpture: replace cart actions with commission CTA ──
      if (p.businessLine === 'sculpture' && p.status === 'sold') {
        document.getElementById('productQtyWrap').style.display = 'none';
        var actionsEl = document.querySelector('.product-detail-actions');
        if (actionsEl) {
          actionsEl.innerHTML =
            '<div style="margin-bottom:8px;"><span style="display:inline-block;background:var(--bg-dark);color:var(--text-muted);font-size:0.82rem;font-weight:600;padding:4px 12px;border-radius:4px;">This piece has been sold</span></div>' +
            '<button class="btn btn-primary" onclick="toggleCommissionForm()">Request a Commission</button>';
        }
        window._commPid = p.pid;
        window._commPieceName = p.name;
        // Pre-select this product as inspiration
        window._commInspirationPids = [p.pid];
        buildCommissionForm();
      }

      // ── How It Was Made: load story if product has storyId ──
      if (p.storyId) {
        loadProductStory(p.storyId);
      }
    }).catch(function(err) {
      console.error('Error loading product:', err);
      document.getElementById('productLoading').style.display = 'none';
      document.getElementById('productNotFound').style.display = '';
    });
  }).catch(function(err) { console.error('[product] Tenant resolution failed:', err.message); });

  function switchImage(idx) {
    var images = window._productImages || [];
    if (!images[idx]) return;
    document.getElementById('mainImage').src = images[idx];
    var thumbs = document.querySelectorAll('.product-thumb');
    thumbs.forEach(function(t, i) {
      t.classList.toggle('active', i === idx);
    });
  }

  // ── Image Zoom on Hover ──
  (function() {
    var container = document.getElementById('galleryMain');
    var lens = document.getElementById('zoomLens');
    var img = document.getElementById('mainImage');
    if (!container || !lens || !img) return;
    var ZOOM = 2.5;

    function updateLens(e) {
      var rect = container.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      // Position lens centered on cursor
      lens.style.left = x + 'px';
      lens.style.top = y + 'px';
      // Set background to zoomed image at correct offset
      lens.style.backgroundImage = 'url(' + img.src + ')';
      lens.style.backgroundSize = (rect.width * ZOOM) + 'px ' + (rect.height * ZOOM) + 'px';
      // Center the zoom on cursor position
      var bgX = -(x * ZOOM - 90);
      var bgY = -(y * ZOOM - 90);
      lens.style.backgroundPosition = bgX + 'px ' + bgY + 'px';
    }

    container.addEventListener('mousemove', updateLens);
    container.addEventListener('mouseenter', function() {
      lens.style.display = 'block';
    });
    container.addEventListener('mouseleave', function() {
      lens.style.display = 'none';
    });
  })();

  // ── Qty Stepper ──
  document.getElementById('qtyDec').addEventListener('click', function() {
    if (window._productQty > 1) {
      window._productQty--;
      document.getElementById('qtyValue').textContent = window._productQty;
      document.getElementById('qtyDec').disabled = (window._productQty <= 1);
      document.getElementById('qtyInc').disabled = (window._productQty >= 10);
    }
  });
  document.getElementById('qtyInc').addEventListener('click', function() {
    if (window._productQty < 10) {
      window._productQty++;
      document.getElementById('qtyValue').textContent = window._productQty;
      document.getElementById('qtyDec').disabled = (window._productQty <= 1);
      document.getElementById('qtyInc').disabled = (window._productQty >= 10);
    }
  });

  // ── Add to Cart readiness check ──
  function checkAddToCartReady() {
    var required = window._requiredOptions || [];
    var selected = window._selectedOptions || {};
    var allSelected = required.every(function(label) { return selected[label]; });
    var p = window._productData;
    var hasPrice = p && (p.price || window._resolvedVariantPrice);
    // If variants exist with pricing, require a resolved variant price
    if (window._productVariants && window._productVariants.length > 0) {
      hasPrice = !!window._resolvedVariantPrice;
    }
    var btn = document.getElementById('addToCartBtn');
    if (allSelected && hasPrice) {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
    } else {
      btn.disabled = true;
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';
    }
  }

  // ── Add to Cart ──
  document.getElementById('addToCartBtn').addEventListener('click', function() {
    if (this.disabled) return;
    var p = window._productData;
    if (!p) return;

    var images = window._productImages || [];
    var resolvedPrice = window._resolvedVariantPrice
      ? formatPriceCents(window._resolvedVariantPrice)
      : displayPrice(p.price);
    var resolvedCents = window._resolvedVariantPrice || parsePriceToCents(p.price);
    MastCart.addItem({
      pid: p.pid,
      name: p.name,
      price: resolvedPrice,
      priceCents: resolvedCents,
      image: images[0] || '',
      options: Object.assign({}, window._selectedOptions),
      qty: window._productQty || 1
    });
    MastCart.showToast(p.name + ' added to cart');
  });

  // ── Commission Form (sold sculptures) ──
  window._commInspirationPids = [];
  window._commUploadFile = null;
  window._allProducts = null;

  function toggleCommissionForm() {
    var wrap = document.getElementById('commissionFormWrap');
    if (!wrap) return;
    var showing = wrap.style.display === 'none';
    wrap.style.display = showing ? '' : 'none';
    if (showing && !window._allProducts) loadProductCatalog();
  }

  function buildCommissionForm() {
    var actionsEl = document.querySelector('.product-detail-actions');
    if (!actionsEl) return;
    var formHtml =
      '<div id="commissionFormWrap" style="display:none;margin-top:16px;padding:16px;background:var(--bg);border-radius:8px;border:1px solid var(--bg-dark);">' +
        '<p style="font-size:0.88rem;color:var(--text-muted);margin:0 0 12px 0;">Tell us what you\'d like and we\'ll be in touch.</p>' +

        // ── Inspiration picker ──
        '<div style="margin-bottom:14px;">' +
          '<label style="display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:6px;font-weight:500;">Select pieces for inspiration <span style="font-weight:400;">(optional)</span></label>' +
          '<div id="commCatalogGrid" style="display:flex;flex-wrap:wrap;gap:8px;max-height:200px;overflow-y:auto;padding:4px;border:1px solid var(--bg-dark);border-radius:6px;background:white;">' +
            '<div style="padding:12px;color:#9B958E;font-size:0.82rem;">Loading catalog...</div>' +
          '</div>' +
        '</div>' +

        // ── Image upload ──
        '<div style="margin-bottom:14px;">' +
          '<label style="display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:4px;font-weight:500;">Upload a reference image <span style="font-weight:400;">(optional)</span></label>' +
          '<div id="commUploadArea" style="border:2px dashed var(--bg-dark);border-radius:6px;padding:16px;text-align:center;cursor:pointer;background:white;transition:border-color 0.2s;" onclick="document.getElementById(\'commFileInput\').click()">' +
            '<div id="commUploadPreview" style="display:none;margin-bottom:8px;"></div>' +
            '<div id="commUploadLabel" style="color:#9B958E;font-size:0.82rem;">Click or drag an image here<br><span style="font-size:0.72rem;">Max 5MB · JPG, PNG, WEBP</span></div>' +
          '</div>' +
          '<input type="file" id="commFileInput" accept="image/*" style="display:none;" onchange="handleCommFileSelect(this)">' +
        '</div>' +

        // ── Contact fields ──
        '<div style="margin-bottom:10px;"><label style="display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:4px;">Your Name</label>' +
          '<input type="text" id="commWebName" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--bg-dark);font-size:0.88rem;box-sizing:border-box;"></div>' +
        '<div style="margin-bottom:10px;"><label style="display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:4px;">Email or Phone</label>' +
          '<input type="text" id="commWebContact" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--bg-dark);font-size:0.88rem;box-sizing:border-box;"></div>' +
        '<div style="margin-bottom:12px;"><label style="display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:4px;">What are you looking for?</label>' +
          '<textarea id="commWebNotes" rows="3" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--bg-dark);font-size:0.88rem;resize:vertical;box-sizing:border-box;" placeholder="Describe the size, colors, style you have in mind..."></textarea></div>' +
        '<button id="commWebSubmitBtn" class="btn btn-primary" style="width:100%;" onclick="submitWebCommission()">Send Inquiry</button>' +
        '<div id="commWebStatus" style="margin-top:8px;font-size:0.82rem;text-align:center;"></div>' +
      '</div>';
    actionsEl.insertAdjacentHTML('beforeend', formHtml);

    // Drag-and-drop support
    var dropArea = document.getElementById('commUploadArea');
    if (dropArea) {
      ['dragenter', 'dragover'].forEach(function(ev) {
        dropArea.addEventListener(ev, function(e) { e.preventDefault(); dropArea.style.borderColor = 'var(--accent)'; });
      });
      ['dragleave', 'drop'].forEach(function(ev) {
        dropArea.addEventListener(ev, function(e) { e.preventDefault(); dropArea.style.borderColor = 'var(--bg-dark)'; });
      });
      dropArea.addEventListener('drop', function(e) {
        var files = e.dataTransfer.files;
        if (files.length > 0) handleCommFile(files[0]);
      });
    }
  }

  function loadProductCatalog() {
    var db = window._productDb;
    if (!db) return;
    db.ref(TENANT_ID + '/public/products').once('value').then(function(snap) {
      var products = [];
      snap.forEach(function(child) {
        var p = child.val();
        if (p && p.name && p.images && p.images.length) {
          products.push({ pid: p.pid || child.key, name: p.name, image: p.images[0], businessLine: p.businessLine || 'production' });
        }
      });
      window._allProducts = products;
      renderCatalogGrid();
    });
  }

  function renderCatalogGrid() {
    var grid = document.getElementById('commCatalogGrid');
    if (!grid || !window._allProducts) return;
    var selected = window._commInspirationPids || [];
    var html = '';
    window._allProducts.forEach(function(p) {
      var isSelected = selected.indexOf(p.pid) !== -1;
      html += '<div class="comm-catalog-item' + (isSelected ? ' selected' : '') + '" data-pid="' + escHtml(p.pid) + '" ' +
        'style="width:72px;flex-shrink:0;cursor:pointer;border-radius:6px;border:2px solid ' + (isSelected ? 'var(--accent)' : 'transparent') + ';padding:3px;transition:border-color 0.2s;" title="' + escHtml(p.name || '') + '">' +
        '<img src="' + escHtml(p.image) + '" alt="' + escHtml(p.name || '') + '" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;display:block;" />' +
        '<div style="font-size:0.65rem;color:var(--text-muted);margin-top:2px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">' + escHtml(p.name || '') + '</div>' +
        (isSelected ? '<div style="text-align:center;font-size:0.65rem;color:var(--accent);font-weight:600;">Selected</div>' : '') +
      '</div>';
    });
    if (!html) html = '<div style="padding:12px;color:var(--text-light);font-size:0.82rem;">No products found</div>';
    grid.innerHTML = html;
    if (!grid._clickBound) {
      grid._clickBound = true;
      grid.addEventListener('click', function(e) {
        var item = e.target.closest('.comm-catalog-item');
        if (item) toggleInspiration(item.getAttribute('data-pid'));
      });
    }
  }

  function toggleInspiration(pid) {
    var idx = window._commInspirationPids.indexOf(pid);
    if (idx === -1) {
      window._commInspirationPids.push(pid);
    } else {
      window._commInspirationPids.splice(idx, 1);
    }
    renderCatalogGrid();
  }

  function handleCommFileSelect(input) {
    if (input.files && input.files[0]) handleCommFile(input.files[0]);
  }

  function handleCommFile(file) {
    if (!file.type.match(/^image\//)) {
      alert('Please select an image file (JPG, PNG, WEBP).');
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      alert('Image must be under 5MB.');
      return;
    }
    window._commUploadFile = file;
    var preview = document.getElementById('commUploadPreview');
    var label = document.getElementById('commUploadLabel');
    if (preview && label) {
      var reader = new FileReader();
      reader.onload = function(e) {
        preview.innerHTML = '<img src="' + e.target.result + '" style="max-width:120px;max-height:120px;border-radius:6px;object-fit:cover;" />' +
          '<div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;">' + file.name + '</div>' +
          '<div style="font-size:0.68rem;color:var(--accent);cursor:pointer;margin-top:2px;" onclick="event.stopPropagation();clearCommUpload();">Remove</div>';
        preview.style.display = '';
        label.textContent = 'Change image';
      };
      reader.readAsDataURL(file);
    }
  }

  function clearCommUpload() {
    window._commUploadFile = null;
    var preview = document.getElementById('commUploadPreview');
    var label = document.getElementById('commUploadLabel');
    if (preview) { preview.innerHTML = ''; preview.style.display = 'none'; }
    if (label) { label.innerHTML = 'Click or drag an image here<br><span style="font-size:0.72rem;">Max 5MB &middot; JPG, PNG, WEBP</span>'; }
    document.getElementById('commFileInput').value = '';
  }

  function submitWebCommission() {
    var name = document.getElementById('commWebName').value.trim();
    var contact = document.getElementById('commWebContact').value.trim();
    var notes = document.getElementById('commWebNotes').value.trim();
    var statusEl = document.getElementById('commWebStatus');

    if (!name || !contact) {
      statusEl.textContent = 'Please enter your name and contact info.';
      statusEl.style.color = '#DC3545';
      return;
    }

    var btn = document.getElementById('commWebSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    statusEl.textContent = '';

    var commDb = window._productDb;
    if (!commDb) { statusEl.textContent = 'Unable to connect.'; statusEl.style.color = '#DC3545'; return; }

    var commRef = commDb.ref(TENANT_ID + '/admin/commissions');
    var commId = commRef.push().key;

    // Build inspiration list with names
    var inspirationPieces = [];
    (window._commInspirationPids || []).forEach(function(pid) {
      var match = (window._allProducts || []).find(function(p) { return p.pid === pid; });
      inspirationPieces.push({ pid: pid, name: match ? match.name : pid });
    });

    // Upload image first if present, then save commission
    var uploadPromise;
    if (window._commUploadFile) {
      var storageApp = firebase.app('public-product');
      var storageRef = storageApp.storage().ref(TENANT_ID + '/commissions/' + commId + '/reference.' + window._commUploadFile.name.split('.').pop());
      uploadPromise = storageRef.put(window._commUploadFile).then(function(snapshot) {
        return snapshot.ref.getDownloadURL();
      });
    } else {
      uploadPromise = Promise.resolve(null);
    }

    uploadPromise.then(function(imageUrl) {
      var record = {
        sourcePieceId: window._commPid || '',
        sourcePieceName: window._commPieceName || '',
        inspirationPieces: inspirationPieces.length > 0 ? inspirationPieces : null,
        referenceImageUrl: imageUrl || null,
        customerName: name,
        customerContact: contact,
        notes: notes || null,
        status: 'new',
        channel: 'web',
        createdAt: new Date().toISOString()
      };

      return commRef.child(commId).set(record);
    }).then(function() {
      // Build piece name string for notification
      var pieceNames = [];
      if (window._commPieceName) pieceNames.push(window._commPieceName);
      inspirationPieces.forEach(function(p) { if (p.name && pieceNames.indexOf(p.name) === -1) pieceNames.push(p.name); });
      var pieceName = pieceNames.join(', ') || 'Custom Piece';

      // Trigger notification (fire and forget)
      fetch(TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/commissionNotify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Tenant-ID': TENANT_ID },
        body: JSON.stringify({ commissionId: commId, pieceName: pieceName, customerName: name, customerContact: contact, notes: notes, channel: 'web' })
      }).catch(function() {});

      btn.textContent = 'Sent!';
      statusEl.textContent = 'Thank you! We\'ll be in touch soon.';
      statusEl.style.color = 'var(--accent)';
    }).catch(function(err) {
      console.error('Commission submit error:', err);
      btn.disabled = false;
      btn.textContent = 'Send Inquiry';
      statusEl.textContent = 'Something went wrong. Please try again.';
      statusEl.style.color = '#DC3545';
    });
  }

  // ── How It Was Made: render story section ──
  function loadProductStory(storyId) {
    var storyDb = window._productDb;
    if (!storyDb) return;
    storyDb.ref(TENANT_ID + '/public/stories/' + storyId).once('value').then(function(snap) {
      var story = snap.val();
      if (!story || story.status !== 'published') return;

      var entries = [];
      if (story.entries) {
        entries = Object.values(story.entries).sort(function(a, b) {
          return (a.order || 0) - (b.order || 0);
        });
      }
      if (entries.length === 0) return;

      var html = '<div class="product-story">' +
        '<h2 class="product-story-title">How It Was Made</h2>';
      if (story.title) {
        html += '<div class="product-story-name">' + escHtml(story.title) + '</div>';
      }

      entries.forEach(function(entry) {
        html += '<div class="product-story-entry">';
        if (entry.milestone && !entry.mediaUrl) {
          html += '<div class="product-story-milestone">' + escHtml(entry.milestone) + '</div>';
        }
        if (entry.mediaUrl) {
          if (entry.milestone) {
            html += '<div class="product-story-milestone">' + escHtml(entry.milestone) + '</div>';
          }
          html += '<img src="' + escHtml(entry.mediaUrl) + '" alt="" loading="lazy" />';
        }
        if (entry.caption) {
          html += '<div class="product-story-caption">' + escHtml(entry.caption) + '</div>';
        }
        html += '</div>';
      });

      // Credit line from operators
      if (story.operators && story.operators.length > 0) {
        html += '<div class="product-story-credit">Handcrafted by ' + story.operators.map(escHtml).join(' & ') + '</div>';
      }

      html += '</div>';

      // Story-only view: add link back to product page
      if (window._isStoryView) {
        var productUrl = 'product.html?id=' + encodeURIComponent(window._pid);
        html += '<div style="text-align:center;margin:2rem auto;max-width:700px;">' +
          '<a href="' + productUrl + '" style="display:inline-block;padding:10px 24px;font-size:0.9rem;color:var(--amber);border:1px solid var(--amber);border-radius:6px;text-decoration:none;transition:all 0.2s;"' +
          ' onmouseover="this.style.background=\'var(--amber)\';this.style.color=\'var(--charcoal)\'"' +
          ' onmouseout="this.style.background=\'transparent\';this.style.color=\'var(--amber)\'"' +
          '>View Product &rarr;</a></div>';
      }

      var el = document.getElementById('productStory');
      if (el) {
        el.innerHTML = html;
        el.style.display = '';
      }
    }).catch(function(err) {
      console.error('Error loading story:', err);
    });
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>
<script>
  // Intersection Observer for scroll animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

</script>

<!-- ============ ANALYTICS TRACKING ============ -->
<script>
window.TENANT_READY.then(function() {
  var db = window._productDb || firebase.app('public-product').database();
  var HITS = TENANT_ID + '/analytics/hits';
  var now = new Date();
  var page = 'product';
  var d = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0');
  var visitorIp = '';

  function track(type, action) {
    var hit = { t: type, p: page, ts: Date.now(), d: d };
    if (action) hit.a = action;
    if (visitorIp) hit.ip = visitorIp;
    db.ref(HITS).push(hit).catch(function() {});
  }

  fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(data) {
    visitorIp = data.ip || '';
  }).catch(function() {}).finally(function() {
    track('pv');
  });

  document.addEventListener('click', function(e) {
    var el = e.target.closest('a, button');
    if (!el) return;
    var href = (el.href || '').toLowerCase();
    var text = (el.textContent || '').trim().toLowerCase();
    var action = null;

    if (href.indexOf('instagram.com') !== -1) action = 'social_instagram';
    else if (href.indexOf('shop.html') !== -1) action = 'nav_shop';
    else if (href.indexOf('about.html') !== -1) action = 'nav_about';
    else if (href.indexOf('schedule.html') !== -1) action = 'nav_schedule';
    else if (href.indexOf('index.html') !== -1 || href.endsWith('/')) action = 'nav_home';

    if (action) track('ev', action);
  }, true);
}).catch(function(err) { console.error('[product] Analytics failed:', err.message); });
</script>
