<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events Manager</title><!-- TENANT: brand -->
<!-- Preconnect to external origins — saves ~200ms DNS+TLS per origin -->
<link rel="preconnect" href="https://mast-platform-prod-default-rtdb.firebaseio.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<!-- Early tenant prefetch — starts RTDB fetch immediately during HTML parsing,
     before any external scripts download. storefront-tenant.js consumes the result. -->
<script>
(function(){
  var P='https://mast-platform-prod-default-rtdb.firebaseio.com/mast-platform';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  window.__earlyTenant=fetch(P+'/tenantsByDomain/'+ek+'.json').then(function(r){return r.ok?r.json():null}).then(function(tid){
    if(!tid)return null;
    return fetch(P+'/tenants/'+tid+'/publicConfig.json').then(function(r){return r.ok?r.json():null}).then(function(pc){
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<style>
:root {
  --bg: #0a0a1a;
  --bg-secondary: #141428;
  --card: #1a1a2e;
  --border: #2a2a4a;
  --text: #e8e0d4;
  --text-secondary: #9a9089;
  --primary: #2a7c6f;
  --primary-bg: rgba(42,124,111,0.15);
  --gold: #c4944a;
  --green: #10b981;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --yellow: #f59e0b;
  --warm-gray: #888;
  --cream: #1e1e32;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}
a { color: var(--primary); text-decoration: none; }

/* Layout */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: var(--card); border-bottom: 1px solid var(--border);
}
.app-header h1 { font-size: 18px; font-weight: 700; }
.app-header .user-info { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary); }
.app-body { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-secondary { background: var(--bg-secondary); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.btn-sm { padding: 5px 12px; font-size: 0.8rem; }
.btn-link { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 0.85rem; }

/* Cards */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.card h3 { font-size: 1rem; margin: 0 0 12px; }

/* Tables */
.events-table { overflow-x: auto; }
.events-table table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.events-table th { text-align: left; padding: 8px 12px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
.events-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.events-table tr:hover td { background: rgba(255,255,255,0.02); }

/* Badge */
.badge { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: capitalize; display: inline-block; }

/* Tabs */
.tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; overflow-x: auto; }
.tab-btn { padding: 10px 18px; font-size: 0.85rem; font-weight: 600; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; color: var(--warm-gray); margin-bottom: -2px; white-space: nowrap; }
.tab-btn.active { border-bottom-color: var(--primary); color: var(--primary); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; }
.modal-box { background: var(--cream); border-radius: 12px; padding: 28px; max-width: 580px; width: 92%; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.modal-box h3 { margin: 0 0 20px; font-size: 1.2rem; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 4px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 0.9rem; background: var(--bg-secondary); color: var(--text); box-sizing: border-box;
}
.form-textarea { resize: vertical; }
.form-row { display: grid; gap: 12px; }
.form-row-2 { grid-template-columns: 1fr 1fr; }
.form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* Toast */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; background: var(--card); color: var(--text); font-size: 0.85rem; box-shadow: 0 4px 16px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2000; }
#toast.show { opacity: 1; }
#toast.error { background: var(--red); color: #fff; }

/* Auth screen */
#authScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
#authScreen h2 { font-size: 1.5rem; margin-bottom: 8px; }
#authScreen p { color: var(--text-secondary); margin-bottom: 24px; }
#signInBtn { padding: 12px 32px; font-size: 1rem; }

/* Loading */
#loadingScreen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Show grid */
.show-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
.show-card { cursor: pointer; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: border-color 0.15s; }
.show-card:hover { border-color: var(--primary); }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.stat-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); }
.stat-value { font-size: 1.3rem; font-weight: 700; margin-top: 4px; }
.stat-sub { font-size: 0.7rem; color: var(--text-secondary); }

/* Detail layout */
.detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
@media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } .form-row-2, .form-row-3 { grid-template-columns: 1fr; } }

/* Floor plan */
.floorplan-layout { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; }
@media (max-width: 768px) { .floorplan-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="app-header">
  <h1>&#127914; Events Manager</h1>
  <div class="user-info">
    <span id="userEmail"></span>
    <button class="btn btn-sm btn-secondary" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div id="authScreen" style="display:none;">
  <h2>Events Manager</h2>
  <p>Sign in to manage your shows, vendors, and events.</p>
  <button id="signInBtn" class="btn btn-primary" onclick="signIn()">Sign in with Google</button>
</div>

<div id="loadingScreen"><div class="spinner"></div></div>

<div id="appContent" class="app-body" style="display:none;">
  <div id="appHeader" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h2 id="pageTitle">Shows</h2>
    <div id="pageActions"></div>
  </div>
  <div id="pageContent"></div>
</div>

<div id="toast"></div>

<!-- Storefront tenant resolution first — no Firebase SDK needed -->
<script src="../storefront-tenant.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="../tenant-brand.js"></script>

<script src="events.js"></script>
</body>
</html>
