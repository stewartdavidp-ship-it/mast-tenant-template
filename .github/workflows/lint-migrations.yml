name: Lint migrations
on:
  pull_request:
    paths:
      - 'scripts/**'
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run R3 dry-run lint
        run: |
          set -euo pipefail
          npx --yes -p mast-deploy@latest mast-deploy-lint-migrations \
            --repo . \
            --diff "origin/${{ github.base_ref }}"
