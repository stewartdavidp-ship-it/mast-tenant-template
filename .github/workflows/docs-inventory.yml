name: docs-inventory
# Freshness gate: the generated admin inventory must match the code (same UX as the
# cache-bust lint gate). Keeps ARCHITECTURE-type docs from silently drifting on
# module/line counts. See docs/generated/admin-inventory.md.
# NB: runs on EVERY PR (no `paths:` filter) — the check is a ~15s no-op when nothing
# changed, and a path-filtered REQUIRED check would hang PRs that don't touch app/.
on:
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: inventory is fresh
        run: node scripts/gen-inventory.mjs --check
