name: CI lint

# Runs the design-token + MastDB lints on every push to main and PRs.
#
# History notes (2026-05-06):
#   - Removed `deploy` job: per CLAUDE.md "Firebase Hosting — deployed via
#     mast_hosting MCP tool. No GitHub Pages." Tenants serve from
#     mast-tenant-shared.web.app via the CF wildcard worker; GH Pages was
#     never a real consumer.
#   - Removed `sync-workflows` job: writing docs/workflows.yaml to RTDB at
#     /dev/workflows is doubly obsolete — RTDB was retired post-B.5/B.7
#     cutover (data lives in Firestore now), AND the auth had been broken
#     for ~30 days (last successful run 2026-04-07). The `mast_workflows`
#     MCP tool owns this surface and writes Firestore directly.
#   - lint-design-tokens font-size violations (427 backlog) downgraded to
#     advisory in the script; cleanup tracked separately.
#
# Update (PR #30, 2026-05-06): the 427-violation backlog was cleared and
# font-size lint is now BLOCKING again — any rem value outside the 7-scale
# (0.72/0.78/0.85/0.9/1.0/1.15/1.6) fails the build. Hex-color lint remains
# advisory pending its own cleanup pass.
#
# CI cost (ci-actions-cost-reduction.md): dropped the redundant `push:[main]`
# trigger — every change already runs this lint on its PR (the branch-protection
# merge gate), so re-running it on the identical merged commit was pure waste
# (this was the single biggest GitHub Actions consumer). Mirrors the same change
# made to mast-architecture's Build Check. Added `concurrency` to cancel
# superseded PR runs (safe — a lint run, not a deploy).

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the cache-bust guard can diff the PR against its
          # base branch (git diff origin/<base>...HEAD).
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Conflict-marker guard: fail any PR whose checked-out tree contains
      # committed `<<<<<<< / ======= / >>>>>>>` merge-conflict markers. On a
      # pull_request the checkout IS the prospective merge commit, so this catches
      # markers introduced by the merge itself (not just by a PR's own commits).
      # Added after #613 auto-merged unresolved markers into app/index.html and
      # took the whole served dev admin down — the cache-bust guard missed it
      # (MAST_MODULES_V was duplicated *inside* the conflict block) and the module
      # syntax check below only parses app/modules/*.js, not index.html's inline
      # script. Runs first so a structurally broken tree fails fast.
      - name: Conflict-marker guard
        run: node scripts/lint-conflict-markers.js
      # Cache-bust guard: fail a PR that changes admin JS/HTML without bumping
      # MAST_MODULES_V. Build 5 (internal release model — private repo) — replaces the opt-in
      # local pre-commit hook as the authoritative, un-skippable enforcement.
      # No-ops on push/dispatch (only meaningful with a PR base to diff).
      - name: Cache-bust bump guard
        run: node scripts/lint-cache-bust.js
      # Parse-check every app/modules/*.js — no other gate actually parses the
      # module JS, so a plain syntax error used to reach dev and dead-end its
      # route at runtime (a dropped `)` in products-v2.js broke Products). This
      # makes a syntax error un-mergeable.
      - name: Module syntax check
        run: node scripts/lint-syntax.js
      # Track-0 safety net: MODULE_MANIFEST integrity. No dangling src rows, no
      # duplicate routes, and every loadModule('x') literal resolves to a live
      # manifest id — so an extraction (T1) or V1 deletion (T6) can't leave a
      # broken edge that only surfaces at runtime as an "Unknown module" reject.
      - name: Manifest / route integrity
        run: node scripts/lint-manifest-integrity.js
      - name: MastDB access lint
        run: node scripts/lint-mastdb.js
      - name: Design token lint (advisory)
        run: node scripts/lint-design-tokens.js
      - name: Mode module info lint
        run: node scripts/lint-module-info.js
      - name: RBAC coverage guard
        run: node scripts/lint-rbac.js
      - name: Customer email-identity write guard
        run: node scripts/lint-customer-writes.js
      # Product readiness gate parity: shared/product-readiness.core.js must stay
      # byte-identical to mast-tenant-mcp-server's copy (the AI publish gate), so
      # the UI gate and the MCP gate cannot drift. See docs/ux-audit/product-publish-gate-plan.md §7.
      - name: Readiness gate parity guard
        run: node scripts/lint-readiness-parity.js
      # Revenue channel-normalization parity: shared/channel-normalization.core.js
      # must stay byte-identical to mast-mcp-server's copy, so the finance UI
      # breakdown and the MCP finance_get_revenue / finance_get_pnl aggregators
      # collapse the same source synonyms onto the same canonical channel key.
      - name: Channel normalization parity guard
        run: node scripts/lint-channel-normalization-parity.js
      # Labor-cost proration parity: app/modules/team-v2.js salaried formula
      # (round(monthlyCents * inclusiveDays / 30.4375)) must match the MCP tool
      # team_get_labor_cost (mast-mcp-server salaryLaborCents) — they diverged
      # once (QA-spine F7: UI pro-rated, MCP returned a flat month).
      - name: Labor-cost proration parity guard
        run: node scripts/lint-labor-parity.js
      # UX-standard conformance ratchet (UI redesign). Freezes current per-module
      # violation counts (native dialogs / rogue overlays / translateX / hardcoded
      # hex) and FAILS any PR that increases them — so the redesign standards
      # (docs/ux-audit/02–14) are MAINTAINED, not just migrated. New module files
      # must be clean (baseline 0).
      - name: UX standards ratchet
        run: node scripts/lint-ux-standards.js
      # V2 surface-standard ratchet (v2-conversion-playbook.md §6): every
      # app/modules/*-v2.js must use MastUI.pageHeader (no hand-rolled <h1>),
      # carry the uiRedesign flag gate, and be wired in MODULE_MANIFEST.
      # Existing violations frozen in v2-standard-baseline.json; new files born clean.
      - name: V2 surface-standard ratchet
        run: node scripts/lint-v2-standard.js
      # Phase-2 guardrail ratchets (mast-docs/code-health). Each freezes the
      # current per-file violation count in a committed baseline and FAILS any
      # PR that adds NET-NEW violations; new files are born clean (baseline 0).
      #   debug-console : no new [DEBUG]/PII console.* in app/   (D2-002)
      #   hardcoded-ids : no new tenant id / origin / bucket lit (D3-005/021)
      #   unbounded-read: no new MastDB.list/.onSnapshot w/o limit (D1.1)
      - name: Debug/PII console ratchet
        run: node scripts/lint-no-debug-pii-console.js
      - name: Hardcoded-ids ratchet
        run: node scripts/lint-no-hardcoded-ids.js
      - name: Unbounded-read ratchet
        run: node scripts/lint-unbounded-read.js
      - name: Shell-size ratchet (inline JS in index.html may only shrink)
        run: node scripts/lint-shell-size.js
      # Track-5 local-formatting ratchet: per-module count of hand-rolled money/date
      # formatting (`/ 100`, `.toFixed(2)`, `.toLocale*String(`) may only shrink as
      # modules adopt window.MastFormat / window.MastExport. New files born clean (0).
      - name: Local money/date formatting ratchet
        run: node scripts/lint-no-local-fmt.js
      # Track-7 unsanitized-sink ratchet: per-module count of tenant rich-text fields
      # (`.body`/`.bodyHtml`/`.description`/`.waiver*`) assigned to innerHTML WITHOUT a
      # sanitize call may only shrink as sinks route through window.MastSanitize. New
      # files born clean (0). Targeted (NOT the ~888 admin-trusted sinks).
      - name: Unsanitized tenant-content sink ratchet
        run: node scripts/lint-no-unsanitized-sink.js
      # Unit tests: the shared engines (mast-io / mast-ui / mast-entity — ~63 pure-helper
      # assertions: CSV formula-injection guard, money/date formatting, the schema engine)
      # plus the finance dollars-vs-cents normalizer (the ~27x MTD-revenue regression guard,
      # extracted live from app/modules/finance.js so it fails if that function regresses).
      # The Phase-2 ratchet self-test (test/lint-ratchet.test.js) is chained in here too:
      # it proves the clean tree passes while a freshly-written violation fixture fails.
      # Hermetic, no network, sub-second. Lives in the `lint` job so it inherits the
      # required-check merge-block. Run per-file with plain `node`, chained on `&&` so any
      # non-zero exit fails the gate. NOTE: do NOT switch to `node --test test/` — it
      # mis-handles the hand-rolled assert-throw files and reports a spurious failure on a
      # green suite (verified 2026-06-01); plain per-file `node` is correct for this suite.
      - name: Unit tests (shared engines + finance money normalizer + ratchet self-test)
        run: |
          node test/mast-io.test.js &&
          node test/mast-ui.test.js &&
          node test/mast-entity.test.js &&
          node test/finance-order-money.test.js &&
          node test/finance-pos-dedup.test.js &&
          node test/customer-filters.test.js &&
          node test/variant-reconcile.test.js &&
          node test/jobs-transitions.test.js &&
          node test/guided-header-branch.test.js &&
          node test/workflow-overrides.test.js &&
          node test/business-entity-feature-mode.test.js &&
          node test/wizard-launch-never-blocks.test.js &&
          node test/brand-sync-business-name.test.js &&
          node test/consignment-commission-rate.test.js &&
          node test/mastdb-fieldpath.test.js &&
          node test/mastdb-push-fieldpath.test.js &&
          node test/mastdb-core.test.js &&
          node test/lint-ratchet.test.js &&
          node test/lint-conflict-markers.test.js &&
          node test/lint-manifest-integrity.test.js &&
          node test/cache-bust.test.js &&
          node test/format-goldens.test.js &&
          node test/mast-format.test.js &&
          node test/mast-export.test.js &&
          node test/mast-sanitize.test.js &&
          node test/orders-core.test.js &&
          node test/mast-intake.test.js

  # Track-0 runtime safety net: boot the real admin shell headless (the localhost
  # `?testmode=1` auth bypass), navigate every major surface, and FAIL on any
  # uncaught CODE error. This is the net the static lints can't be — it catches a
  # route that only throws when you visit it (a dangling reference from an
  # extraction, a removed helper from a V1 retirement). Permission/CORS/network
  # noise from the credential-less preview user is filtered (see smoke-boot.mjs).
  # Runs in parallel to `lint`; heavier (installs a browser) so it's its own job.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps + Chromium
        working-directory: scripts
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Boot smoke (headless shell → all routes, no uncaught error)
        run: node scripts/smoke-boot.mjs
