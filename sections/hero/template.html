<section class="hero" data-slot="hero">

  <!-- Variant: full-bleed (default — video/image background with centered text) -->
  <div data-variant="full-bleed" class="active">
    <div class="hero-video-wrap">
      <video autoplay muted loop playsinline id="heroVideo">
        <!-- Video source loaded dynamically from gallery hero items -->
      </video>
    </div>
    <div class="hero-poster" id="heroPoster"></div>
    <div class="hero-overlay"></div>
    <div class="hero-vignette"></div>
    <div class="hero-content">
      <div class="hero-logo" id="heroLogo" style="display:none;"></div>
      <p class="hero-tagline" data-tenant="tagline" data-content="hero-tagline"></p>
      <h1 data-tenant="brand" data-content="hero-headline">Welcome</h1>
      <p class="hero-sub" data-tenant="description" data-content="hero-subheadline"></p>
      <div class="hero-cta">
        <a href="shop.html" class="btn btn-primary" data-content="hero-cta">Shop Now</a>
        <a href="#about" class="btn btn-outline">Learn More</a>
      </div>
    </div>
    <div class="scroll-indicator">
      <span class="label">Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </div>

  <!-- Variant: split-image (image left 60%, text right 40%) -->
  <div data-variant="split-image" style="display:none;">
    <div class="hero-split">
      <div class="hero-split-image" id="heroSplitImage"></div>
      <div class="hero-split-content">
        <div class="hero-logo" id="heroLogoSplit" style="display:none;"></div>
        <p class="hero-tagline" data-tenant="tagline" data-content="hero-tagline"></p>
        <h1 data-tenant="brand" data-content="hero-headline">Welcome</h1>
        <p class="hero-sub" data-tenant="description" data-content="hero-subheadline"></p>
        <div class="hero-cta">
          <a href="shop.html" class="btn btn-primary" data-content="hero-cta">Shop Now</a>
          <a href="#about" class="btn btn-outline">Learn More</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Variant: minimal-text (oversized typography, no image) -->
  <div data-variant="minimal-text" style="display:none;">
    <div class="hero-minimal">
      <div class="hero-logo" id="heroLogoMinimal" style="display:none;"></div>
      <p class="hero-tagline" data-tenant="tagline" data-content="hero-tagline"></p>
      <h1 class="hero-minimal-headline" data-tenant="brand" data-content="hero-headline">Welcome</h1>
      <p class="hero-sub" data-tenant="description" data-content="hero-subheadline"></p>
      <div class="hero-cta">
        <a href="shop.html" class="btn btn-primary" data-content="hero-cta">Shop Now</a>
      </div>
    </div>
  </div>

</section>
