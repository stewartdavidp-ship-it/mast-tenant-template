<div class="newsletter-bar" id="newsletterSignup" data-slot="newsletter">
  <h3 data-content="newsletter-heading">Stay in the Loop</h3>
  <p data-content="newsletter-subheadline">Events, new collections, classes &amp; studio updates — no spam, ever.</p>
  <div class="newsletter-form" id="nlSignupForm">
    <input type="text" id="nlSignupName" placeholder="Your name" style="max-width:200px;" />
    <input type="email" id="nlSignupEmail" placeholder="Your email address" />
    <button type="button" onclick="nlSubmitSignup()" data-content="newsletter-button">Subscribe</button>
    <p style="font-size:0.75rem;opacity:0.7;margin:0.5rem 0 0;max-width:400px;">By subscribing, you agree to receive email newsletters from this business. You can unsubscribe at any time.</p>
  </div>
</div>
