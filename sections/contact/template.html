<section id="contact" data-slot="contact">
  <div class="contact-section">
    <div class="contact-text fade-up">
      <p class="section-label" data-content="contact-label">Get in Touch</p>
      <h2 class="section-title" data-content="contact-heading">Let's Create Something Together</h2>
      <p class="section-subtitle" data-content="contact-subtitle">Whether you're interested in a custom commission, wholesale inquiry, taking a class, or just saying hello — we'd love to hear from you.</p>
      <div style="margin-top:2rem;">
        <div class="contact-info-item">
          <svg viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div>
            <strong>Email</strong>
            <span data-tenant="email">hello@example.com</span>
          </div>
        </div>
        <div class="contact-info-item">
          <svg viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div>
            <strong>Location</strong>
            <span data-tenant="location"></span>
          </div>
        </div>
        <div class="contact-info-item">
          <svg viewBox="0 0 24 24"><path d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div>
            <strong>Social</strong>
            <span data-tenant="instagram">@myshop on Instagram</span>
          </div>
        </div>
      </div>
    </div>
    <div class="contact-form fade-up">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="contactFormFirst" placeholder="First" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="contactFormLast" placeholder="Last" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="contactFormEmail" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Phone <span style="font-size:0.75rem;opacity:0.6;">(optional)</span></label>
        <input type="tel" id="contactFormPhone" placeholder="(555) 123-4567" />
      </div>
      <div class="form-group">
        <label>Inquiry Type</label>
        <select id="contactFormType">
          <option>General Question</option>
          <option>Custom Commission</option>
          <option>Wholesale Inquiry</option>
          <option>Class Information</option>
          <option>Event Booking</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="contactFormMessage" placeholder="Tell us about your vision..."></textarea>
      </div>
      <button class="form-submit" onclick="submitContactForm()">Send Message</button>
    </div>
  </div>
</section>
