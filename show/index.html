<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event — Show</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --card: #ffffff;
  --border: #e5e2dd;
  --text: #1a1a1a;
  --text-secondary: #6b6560;
  --primary: #2a7c6f;
  --primary-bg: rgba(42,124,111,0.08);
  --amber: #c4853c;
  --green: #10b981;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e1117;
    --card: #1a1d26;
    --border: #2d3140;
    --text: #e8e4df;
    --text-secondary: #8a8680;
    --primary: #3fa594;
    --primary-bg: rgba(63,165,148,0.14);
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.45);
  }
  .vendor-booth-badge { background: #2a2d38; }
  .modal-overlay { background: rgba(0,0,0,0.65); }
  .search-input { color-scheme: dark; }
}
html.dark {
  --bg: #0e1117;
  --card: #1a1d26;
  --border: #2d3140;
  --text: #e8e4df;
  --text-secondary: #8a8680;
  --primary: #3fa594;
  --primary-bg: rgba(63,165,148,0.14);
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.45);
}
html.dark .vendor-booth-badge { background: #2a2d38; }
html.dark .modal-overlay { background: rgba(0,0,0,0.65); }
html.light {
  --bg: #faf8f5;
  --card: #ffffff;
  --border: #e5e2dd;
  --text: #1a1a1a;
  --text-secondary: #6b6560;
  --primary: #2a7c6f;
  --primary-bg: rgba(42,124,111,0.08);
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { overflow-x: hidden; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-page { text-align: center; padding: 80px 20px; }
.error-page h2 { font-size: 22px; margin-bottom: 8px; }
.error-page p { color: var(--text-secondary); }

/* Header */
.show-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 24px 20px; }
.show-header-inner { max-width: 960px; margin: 0 auto; }
.show-name { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
.show-meta { display: flex; flex-wrap: wrap; gap: 16px; color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
.show-meta span { display: flex; align-items: center; gap: 4px; }
.show-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.5; max-width: 700px; }
.show-notes { margin-top: 12px; padding: 12px 16px; background: var(--primary-bg); border-radius: 8px; font-size: 14px; line-height: 1.5; }
.show-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
.show-links a { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; background: var(--primary-bg); color: var(--primary); border-radius: 6px; font-size: 13px; font-weight: 500; }

/* Bottom Navigation */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -2px 12px rgba(0,0,0,0.08); }
.bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 2px 10px; border: none; background: none; cursor: pointer; color: var(--text-secondary); position: relative; gap: 3px; min-width: 0; -webkit-tap-highlight-color: transparent; }
.bnav-item.active { color: var(--primary); }
.bnav-item.dimmed { opacity: 0.35; cursor: default; }
.bnav-icon { font-size: 22px; line-height: 1; display: block; }
.bnav-label { font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
.bnav-badge { position: absolute; top: 5px; left: 50%; margin-left: 6px; min-width: 16px; height: 16px; background: var(--primary); color: #fff; border-radius: 8px; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 4px; line-height: 1; }
.bnav-badge.amber { background: var(--amber); }

/* Content */
.content { max-width: 960px; margin: 0 auto; padding: 20px; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

/* Filters */
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.filter-chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; background: var(--card); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.filter-chip:hover { border-color: var(--primary); color: var(--primary); }
.filter-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.search-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--card); color: var(--text); margin-bottom: 12px; }
.search-input:focus { outline: none; border-color: var(--primary); }

/* Vendor grid */
.vendor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.vendor-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: box-shadow 0.15s, transform 0.1s; }
.vendor-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.vendor-card-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
.vendor-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: var(--border); flex-shrink: 0; }
.vendor-logo-placeholder { width: 48px; height: 48px; border-radius: 8px; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--primary); flex-shrink: 0; }
.vendor-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.vendor-category { font-size: 12px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.vendor-bio { font-size: 13px; color: var(--text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.vendor-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.vendor-tag { font-size: 11px; padding: 2px 8px; background: var(--primary-bg); color: var(--primary); border-radius: 10px; }
.vendor-booth-badge { font-size: 11px; padding: 2px 8px; background: #f0f0ed; color: var(--text-secondary); border-radius: 10px; }
.vendor-promo-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; padding: 2px 8px; background: rgba(196,133,60,0.1); color: var(--amber); border-radius: 10px; font-weight: 600; }
.pin-btn { padding: 4px 10px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); cursor: pointer; color: var(--text-secondary); }
.pin-btn.pinned { background: var(--amber); border-color: var(--amber); color: #fff; }

/* Vendor detail modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; }
.modal-box { background: var(--card); border-radius: 16px 16px 0 0; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 24px; animation: slideUp 0.25s ease-out; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@media (min-width: 640px) {
  .modal-overlay { align-items: center; }
  .modal-box { border-radius: 16px; max-height: 80vh; }
}
.modal-close { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--border); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.modal-vendor-header { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
.modal-vendor-logo { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; }
.modal-vendor-name { font-size: 20px; font-weight: 700; }
.modal-vendor-category { font-size: 13px; color: var(--text-secondary); }
.modal-section { margin-top: 16px; }
.modal-section h4 { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.modal-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--primary-bg); color: var(--primary); border-radius: 8px; font-size: 13px; font-weight: 500; margin-right: 8px; margin-bottom: 8px; }
.coupon-card { padding: 10px 14px; background: rgba(196,133,60,0.06); border: 1px solid rgba(196,133,60,0.2); border-radius: 8px; margin-bottom: 8px; }
.coupon-code { font-weight: 700; font-size: 16px; color: var(--amber); }
.coupon-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* Pinned tab */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
.empty-state h3 { font-size: 16px; margin-bottom: 4px; color: var(--text); }

/* Floor plan */
.floor-plan-container { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.floor-plan-img { width: 100%; display: block; }
.floor-pin { position: absolute; transform: translate(-50%, -100%); background: var(--primary); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
.floor-pin::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 4px solid var(--primary); }

/* Hunt */
.hunt-banner { background: linear-gradient(135deg, var(--primary), #1a6b5f); color: #fff; border-radius: 12px; padding: 24px; text-align: center; }
.hunt-banner h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.hunt-banner p { font-size: 14px; opacity: 0.9; }
.hunt-progress { margin-top: 16px; }
.hunt-bar { height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; margin-top: 8px; }
.hunt-bar-fill { height: 100%; background: #fff; border-radius: 4px; transition: width 0.3s; }
.hunt-start-btn { margin-top: 16px; padding: 12px 24px; background: #fff; color: var(--primary); border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }

/* Coupons tab */
.coupon-list { display: grid; gap: 12px; }
.coupon-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.coupon-vendor { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
.coupon-item .coupon-code { font-size: 18px; }
.coupon-item .coupon-value { font-size: 14px; color: var(--amber); font-weight: 600; }
.coupon-save-btn { margin-top: 8px; padding: 6px 14px; font-size: 12px; border-radius: 6px; border: 1px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; font-weight: 500; }
.coupon-save-btn.saved { background: var(--primary); color: #fff; }

/* Header enhancements */
.show-header-inner { position: relative; }
.header-toggle { display: flex; align-items: center; gap: 4px; margin-top: 8px; background: none; border: none; color: var(--primary); font-size: 13px; cursor: pointer; font-weight: 500; }
.header-chevron { display: inline-block; transition: transform 0.2s; }
.header-chevron.expanded { transform: rotate(180deg); }
.header-details { margin-top: 12px; }
.header-details .show-desc { margin-bottom: 12px; }
.see-more-deals-btn { position: absolute; top: 0; right: 0; width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(196,133,60,0.3); background: rgba(196,133,60,0.1); color: var(--amber); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.see-more-deals-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Search + Sort row */
.search-sort-row { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; }
.search-wrapper { flex: 1; min-width: 0; position: relative; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 14px; pointer-events: none; }
.search-input.with-icon { padding-left: 34px; margin-bottom: 0; }
.sort-select { flex-shrink: 0; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--card); color: var(--text); cursor: pointer; }
.sort-select:focus { outline: none; border-color: var(--primary); }
.vendor-count { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.clear-filters-btn { background: none; border: none; color: var(--text-secondary); font-size: 12px; cursor: pointer; margin-bottom: 12px; }
.clear-filters-btn:hover { color: var(--text); }

/* Tag filters */
.tag-filters { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 12px; }
.tag-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
.tag-chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; background: var(--card); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.tag-chip:hover { border-color: var(--green); color: var(--green); }
.tag-chip.active { background: var(--green); border-color: var(--green); color: #fff; }

/* Enhanced vendor card */
.vendor-card-wrap { position: relative; }
.vendor-card { display: block; width: 100%; text-align: left; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: box-shadow 0.15s, transform 0.1s; padding: 0; font: inherit; color: inherit; }
.vendor-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.vendor-card-image { height: 160px; background: var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.vendor-card-image img { width: 100%; height: 100%; object-fit: cover; }
.vendor-card-image-placeholder { font-size: 48px; opacity: 0.2; }
.vendor-card-body { padding: 12px 16px 16px; }
.vendor-name { font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.vendor-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.vendor-category-badge { font-size: 11px; padding: 2px 8px; background: rgba(42,124,111,0.12); color: var(--primary); border-radius: 10px; font-weight: 500; }
.vendor-booth-ref { font-size: 11px; color: var(--text-secondary); }
.vendor-tag-overflow { font-size: 10px; color: var(--text-secondary); }
.vendor-deal-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 6px; font-size: 11px; padding: 2px 8px; background: rgba(16,185,129,0.08); color: var(--green); border-radius: 10px; font-weight: 600; }
.vendor-shop-badge { margin-top: 4px; font-size: 11px; color: var(--green); font-weight: 500; }
.vendor-pin-overlay { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.7); transition: all 0.15s; backdrop-filter: blur(4px); }
.vendor-pin-overlay.pinned { background: var(--amber); color: #fff; box-shadow: 0 2px 8px rgba(196,133,60,0.3); }

/* Enhanced vendor modal */
.modal-box { padding: 0; position: relative; }
.modal-drag-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
.modal-drag-bar { width: 40px; height: 4px; border-radius: 2px; background: var(--border); }
@media (min-width: 640px) { .modal-drag-handle { display: none; } }
.modal-sticky-header { position: sticky; top: 0; background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
.modal-sticky-header .modal-vendor-name { font-size: 18px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
.modal-header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.modal-pin-btn { width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; font-size: 14px; background: var(--border); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; }
.modal-pin-btn.pinned { background: var(--amber); color: #fff; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--border); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; position: static; }
.modal-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; }
.modal-tab-btn { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text-secondary); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
.modal-tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.modal-content { padding: 20px; }
.modal-vendor-image { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; }
.modal-vendor-medium { font-size: 13px; color: var(--text-secondary); font-style: italic; margin-bottom: 12px; }
.modal-vendor-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.modal-vendor-location { font-size: 12px; color: var(--text-secondary); }
.modal-vendor-booth { font-size: 13px; color: var(--text-secondary); }
.modal-vendor-bio { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }
.modal-vendor-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.modal-link { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; font-size: 13px; color: var(--primary); margin-bottom: 4px; transition: background 0.15s; }
.modal-link:hover { background: var(--primary-bg); text-decoration: none; }
.modal-link span:first-child { font-size: 16px; }
.modal-link span:last-child { overflow: hidden; text-overflow: ellipsis; }
.modal-find-map-btn { margin-top: 16px; width: 100%; padding: 14px; background: rgba(196,133,60,0.08); color: var(--amber); border: 1px solid rgba(196,133,60,0.2); border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.modal-deals-list { display: grid; gap: 12px; }
.modal-deal-card { background: var(--bg); border-radius: 10px; padding: 14px; }
.modal-deal-text { font-size: 13px; color: var(--green); font-weight: 500; margin-bottom: 8px; }
.modal-deal-code-row { display: flex; align-items: center; gap: 8px; }
.modal-deal-code { padding: 6px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-weight: 700; color: var(--primary); }
.modal-copy-btn { background: none; border: none; color: var(--primary); font-size: 12px; cursor: pointer; }
.modal-deal-message { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
.modal-shop-text { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; }
.modal-shop-btn { display: block; width: 100%; text-align: center; padding: 14px; background: var(--primary); color: #fff; border-radius: 10px; font-weight: 600; font-size: 14px; transition: background 0.15s; }
.modal-shop-btn:hover { background: #237065; text-decoration: none; }

/* View Pinned on Map button */
.view-pinned-map-btn { width: 100%; margin-bottom: 16px; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* Saved Coupons tab */
.coupons-hint { font-size: 12px; color: var(--text-secondary); text-align: center; margin-bottom: 16px; }
.saved-coupons-list { display: grid; gap: 16px; }
.saved-coupon-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-lg); }
.saved-coupon-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px 8px; }
.saved-coupon-logo { width: 56px; height: 56px; border-radius: 12px; object-fit: cover; border: 2px solid var(--border); }
.saved-coupon-logo-placeholder { width: 56px; height: 56px; border-radius: 12px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid var(--border); }
.saved-coupon-vendor-info { flex: 1; min-width: 0; }
.saved-coupon-vendor-name { font-size: 16px; font-weight: 700; line-height: 1.3; }
.saved-coupon-booth { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.saved-coupon-deal { margin: 12px 20px; padding: 20px; background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.15); border-radius: 12px; text-align: center; }
.saved-coupon-deal-text { font-size: 28px; font-weight: 900; color: var(--green); letter-spacing: -0.5px; margin-bottom: 4px; }
.saved-coupon-message { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
.saved-coupon-code-box { display: inline-block; background: var(--card); padding: 12px 24px; border-radius: 10px; border: 2px dashed rgba(16,185,129,0.3); }
