<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event — Show</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --card: #ffffff;
  --border: #e5e2dd;
  --text: #1a1a1a;
  --text-secondary: #6b6560;
  --primary: #2a7c6f;
  --primary-bg: rgba(42,124,111,0.08);
  --amber: #c4853c;
  --green: #10b981;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--primary); text-decoration: none; }
a:hover { text-decoration: underline; }

.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-page { text-align: center; padding: 80px 20px; }
.error-page h2 { font-size: 22px; margin-bottom: 8px; }
.error-page p { color: var(--text-secondary); }

/* Header */
.show-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 24px 20px; }
.show-header-inner { max-width: 960px; margin: 0 auto; }
.show-name { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
.show-meta { display: flex; flex-wrap: wrap; gap: 16px; color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
.show-meta span { display: flex; align-items: center; gap: 4px; }
.show-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.5; max-width: 700px; }
.show-notes { margin-top: 12px; padding: 12px 16px; background: var(--primary-bg); border-radius: 8px; font-size: 14px; line-height: 1.5; }
.show-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
.show-links a { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; background: var(--primary-bg); color: var(--primary); border-radius: 6px; font-size: 13px; font-weight: 500; }

/* Tabs */
.tabs { display: flex; gap: 0; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; }
.tabs-inner { max-width: 960px; margin: 0 auto; display: flex; width: 100%; }
.tab-btn { padding: 12px 20px; font-size: 14px; font-weight: 500; color: var(--text-secondary); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; background: var(--border); border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 6px; }
.tab-btn.active .tab-count { background: var(--primary-bg); color: var(--primary); }

/* Content */
.content { max-width: 960px; margin: 0 auto; padding: 20px; }

/* Filters */
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.filter-chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; background: var(--card); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.filter-chip:hover { border-color: var(--primary); color: var(--primary); }
.filter-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.search-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--card); color: var(--text); margin-bottom: 12px; }
.search-input:focus { outline: none; border-color: var(--primary); }

/* Vendor grid */
.vendor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.vendor-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: box-shadow 0.15s, transform 0.1s; }
.vendor-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.vendor-card-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
.vendor-logo { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: var(--border); flex-shrink: 0; }
.vendor-logo-placeholder { width: 48px; height: 48px; border-radius: 8px; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--primary); flex-shrink: 0; }
.vendor-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.vendor-category { font-size: 12px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.vendor-bio { font-size: 13px; color: var(--text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.vendor-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.vendor-tag { font-size: 11px; padding: 2px 8px; background: var(--primary-bg); color: var(--primary); border-radius: 10px; }
.vendor-booth-badge { font-size: 11px; padding: 2px 8px; background: #f0f0ed; color: var(--text-secondary); border-radius: 10px; }
.vendor-promo-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; padding: 2px 8px; background: rgba(196,133,60,0.1); color: var(--amber); border-radius: 10px; font-weight: 600; }
.pin-btn { padding: 4px 10px; font-size: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); cursor: pointer; color: var(--text-secondary); }
.pin-btn.pinned { background: var(--amber); border-color: var(--amber); color: #fff; }

/* Vendor detail modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; }
.modal-box { background: var(--card); border-radius: 16px 16px 0 0; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 24px; animation: slideUp 0.25s ease-out; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@media (min-width: 640px) {
  .modal-overlay { align-items: center; }
  .modal-box { border-radius: 16px; max-height: 80vh; }
}
.modal-close { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--border); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.modal-vendor-header { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
.modal-vendor-logo { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; }
.modal-vendor-name { font-size: 20px; font-weight: 700; }
.modal-vendor-category { font-size: 13px; color: var(--text-secondary); }
.modal-section { margin-top: 16px; }
.modal-section h4 { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.modal-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--primary-bg); color: var(--primary); border-radius: 8px; font-size: 13px; font-weight: 500; margin-right: 8px; margin-bottom: 8px; }
.coupon-card { padding: 10px 14px; background: rgba(196,133,60,0.06); border: 1px solid rgba(196,133,60,0.2); border-radius: 8px; margin-bottom: 8px; }
.coupon-code { font-weight: 700; font-size: 16px; color: var(--amber); }
.coupon-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* Pinned tab */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
.empty-state h3 { font-size: 16px; margin-bottom: 4px; color: var(--text); }

/* Floor plan */
.floor-plan-container { position: relative; background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.floor-plan-img { width: 100%; display: block; }
.floor-pin { position: absolute; transform: translate(-50%, -100%); background: var(--primary); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
.floor-pin::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 4px solid var(--primary); }

/* Hunt */
.hunt-banner { background: linear-gradient(135deg, var(--primary), #1a6b5f); color: #fff; border-radius: 12px; padding: 24px; text-align: center; }
.hunt-banner h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.hunt-banner p { font-size: 14px; opacity: 0.9; }
.hunt-progress { margin-top: 16px; }
.hunt-bar { height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; margin-top: 8px; }
.hunt-bar-fill { height: 100%; background: #fff; border-radius: 4px; transition: width 0.3s; }
.hunt-start-btn { margin-top: 16px; padding: 12px 24px; background: #fff; color: var(--primary); border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }

/* Coupons tab */
.coupon-list { display: grid; gap: 12px; }
.coupon-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.coupon-vendor { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
.coupon-item .coupon-code { font-size: 18px; }
.coupon-item .coupon-value { font-size: 14px; color: var(--amber); font-weight: 600; }
.coupon-save-btn { margin-top: 8px; padding: 6px 14px; font-size: 12px; border-radius: 6px; border: 1px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; font-weight: 500; }
.coupon-save-btn.saved { background: var(--primary); color: #fff; }

/* Responsive */
@media (max-width: 640px) {
  .show-name { font-size: 22px; }
  .vendor-grid { grid-template-columns: 1fr; }
  .tab-btn { padding: 10px 14px; font-size: 13px; }
}
</style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="../storefront-tenant.js"></script>
<script src="../tenant-brand.js?v=2"></script>
<script src="show.js"></script>
</body>
</html>
