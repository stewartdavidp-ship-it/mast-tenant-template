<script>
(function(){
  var B='https://firestore.googleapis.com/v1/projects/mast-platform-prod/databases/(default)/documents';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  function uv(v){if(v==null)return null;if('stringValue' in v)return v.stringValue;if('booleanValue' in v)return v.booleanValue;if('integerValue' in v)return Number(v.integerValue);if('doubleValue' in v)return v.doubleValue;if('nullValue' in v)return null;if('timestampValue' in v)return v.timestampValue;if('mapValue' in v){var o={};var f=v.mapValue.fields||{};for(var k in f)o[k]=uv(f[k]);return o;}if('arrayValue' in v)return(v.arrayValue.values||[]).map(uv);return null;}
  function uf(fields){var o={};for(var k in fields)o[k]=uv(fields[k]);return o;}
  function uw(d){if(d&&typeof d==='object'&&!Array.isArray(d)&&'_v' in d&&Object.keys(d).length===1)return d._v;return d;}
  window.__earlyTenant=fetch(B+'/platform_tenantsByDomain/'+ek).then(function(r){return r.ok?r.json():null}).then(function(doc){
    var tid=doc&&doc.fields?uw(uf(doc.fields)):null;
    if(typeof tid!=='string'||!tid)return null;
    return fetch(B+'/platform_tenantPublicConfigs/'+tid).then(function(r){return r.ok?r.json():null}).then(function(cdoc){
      if(!cdoc||!cdoc.fields)return null;
      var pc=uf(cdoc.fields);
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

<style>
.sv-container {
  max-width: 600px;
  margin: 0 auto;
  padding: 7rem 1.5rem 5rem;
}
.sv-header {
  text-align: center;
  margin-bottom: 1.75rem;
}
.sv-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin: 0 0 0.4rem;
  color: var(--text);
}
.sv-subtitle {
  font-size: 0.9rem;
  color: var(--warm-gray, #888);
  letter-spacing: 0.02em;
}
#svContent {
  background: var(--surface-card, #fff);
  border: 1px solid rgba(0,0,0,0.07);
  border-radius: 14px;
  padding: 2.5rem 2.5rem 2rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 6px rgba(0,0,0,0.04);
}
.sv-loading,
.sv-error,
.sv-complete {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--text);
}
.sv-loading {
  color: var(--warm-gray, #888);
  font-size: 0.9rem;
  letter-spacing: 0.04em;
  animation: sv-pulse 1.6s ease-in-out infinite;
}
@keyframes sv-pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
.sv-saving {
  text-align: center;
  padding: 2.5rem 1rem;
}
.sv-spinner {
  width: 44px;
  height: 44px;
  border: 3px solid color-mix(in srgb, var(--primary) 18%, transparent);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: sv-spin 0.75s linear infinite;
  margin: 0 auto 1.5rem;
}
@keyframes sv-spin { to { transform: rotate(360deg); } }
.sv-error p,
.sv-complete p {
  color: var(--warm-gray, #888);
}
.sv-progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  color: var(--warm-gray, #888);
  margin-bottom: 0.45rem;
  font-variant-numeric: tabular-nums;
}
.sv-progress-track {
  height: 5px;
  background: var(--cream-dark, #e5e0d8);
  border-radius: 3px;
  margin-bottom: 2rem;
  overflow: hidden;
}
.sv-progress-fill {
  height: 100%;
  background: var(--primary, #c8860a);
  border-radius: 3px;
  transition: width 0.35s ease;
}
.sv-question {
  margin-bottom: 1.75rem;
}
.sv-question > label {
  display: block;
  font-size: 1rem;
  font-weight: 500;
  line-height: 1.45;
  margin-bottom: 0.85rem;
  color: var(--text);
}
.sv-rating {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
}
.sv-rating button {
  min-width: 40px;
  height: 40px;
  padding: 0 4px;
  font-size: 0.92rem;
  font-weight: 500;
  background: none;
  border: 1.5px solid var(--cream-dark, #d0c9bc);
  border-radius: 7px;
  cursor: pointer;
  color: var(--text);
  transition: background 0.14s, border-color 0.14s, color 0.14s, transform 0.1s;
}
.sv-rating button.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  transform: scale(1.06);
}
.sv-rating button:hover:not(.active) {
  background: color-mix(in srgb, var(--primary) 10%, transparent);
  border-color: var(--primary);
}
.sv-rating-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.73rem;
  color: var(--warm-gray, #888);
  margin-top: 0.4rem;
  width: 100%;
}
.sv-input {
  width: 100%;
  padding: 0.7rem 0.9rem;
  border: 1.5px solid var(--cream-dark, #d0c9bc);
  border-radius: 7px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.95rem;
  box-sizing: border-box;
  transition: border-color 0.15s;
  outline: none;
}
.sv-input:focus { border-color: var(--primary); }
.sv-textarea {
  width: 100%;
  padding: 0.7rem 0.9rem;
  border: 1.5px solid var(--cream-dark, #d0c9bc);
  border-radius: 7px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.95rem;
  min-height: 110px;
  resize: vertical;
  box-sizing: border-box;
  font-family: inherit;
  line-height: 1.5;
  transition: border-color 0.15s;
  outline: none;
}
.sv-textarea:focus { border-color: var(--primary); }
.sv-mc-option {
  margin-bottom: 0.5rem;
}
.sv-mc-option label {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.65rem 0.9rem;
  border: 1.5px solid var(--cream-dark, #d0c9bc);
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.92rem;
  color: var(--text);
  transition: border-color 0.15s, background 0.15s;
}
.sv-mc-option label:hover { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 5%, transparent); }
.sv-mc-option input[type="radio"] { accent-color: var(--primary); width:15px;height:15px;flex-shrink:0; }
.sv-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.72rem 1.75rem;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  text-decoration: none;
  font-size: 0.95rem;
  font-weight: 500;
  letter-spacing: 0.01em;
  border: none;
  cursor: pointer;
  transition: background 0.18s, transform 0.1s;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}
.sv-btn:hover:not(:disabled) { background: var(--primary-light); transform: translateY(-1px); }
.sv-btn:active:not(:disabled) { transform: translateY(0); }
.sv-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.sv-btn-ghost {
  background: transparent;
  color: var(--text);
  border: 1.5px solid var(--cream-dark, #d0c9bc);
}
.sv-btn-ghost:hover:not(:disabled) { background: var(--cream-dark, #f0ece6); transform: translateY(-1px); }
.sv-followup {
  margin: 1.25rem 0 0;
  padding: 0.9rem 1rem;
  background: color-mix(in srgb, var(--primary) 6%, transparent);
  border: 1px solid color-mix(in srgb, var(--primary) 18%, transparent);
  border-radius: 8px;
}
.sv-followup label {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  font-size: 0.875rem;
  color: var(--text);
  cursor: pointer;
  line-height: 1.45;
}
.sv-followup input[type="checkbox"] { margin-top:2px;width:15px;height:15px;flex-shrink:0;accent-color:var(--primary); }
.sv-nav {
  display: flex;
  gap: 0.75rem;
  justify-content: flex-end;
  margin-top: 1.75rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--cream-dark, #e5e0d8);
}
.sv-nav.has-back { justify-content: space-between; }
@media (max-width: 600px) {
  .sv-container { padding: 5.5rem 0.85rem 3rem; }
  .sv-header h1 { font-size: 1.9rem; }
  #svContent { padding: 1.75rem 1.35rem 1.5rem; border-radius: 12px; }
  .sv-rating button { min-width: 36px; height: 36px; font-size: 0.85rem; }
  .sv-btn { padding: 0.7rem 1.25rem; font-size: 0.9rem; }
}
</style>
</head>
<body>
<nav id="mainNav"></nav>
<div class="nav-mobile-menu" id="mobileMenu"></div>

<div class="sv-container">
  <div class="sv-header">
    <h1 data-tenant="name">Survey</h1>
    <p class="sv-subtitle">Share your feedback</p>
  </div>
  <div id="svContent">
    <div class="sv-loading">Loading your survey...</div>
  </div>
</div>

<footer id="siteFooter"></footer>

<script src="storefront-tenant.js"></script>
<script src="storefront-theme.js"></script>
<script src="storefront-nav.js"></script>
<script src="tenant-brand.js?v=2"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
(function() {
  'use strict';

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  /* ---- Rate Limiting ---- */
  var RATE_KEY = 'sv_attempts';
  var RATE_MAX = 5;
  var RATE_WINDOW = 10 * 60 * 1000;

  function checkRateLimit() {
    try {
      var raw = sessionStorage.getItem(RATE_KEY);
      if (!raw) return true;
      var attempts = JSON.parse(raw);
      var now = Date.now();
      attempts = attempts.filter(function(t) { return now - t < RATE_WINDOW; });
      sessionStorage.setItem(RATE_KEY, JSON.stringify(attempts));
      return attempts.length < RATE_MAX;
    } catch (e) { return true; }
  }

  function recordAttempt() {
    try {
      var raw = sessionStorage.getItem(RATE_KEY);
      var attempts = raw ? JSON.parse(raw) : [];
      var now = Date.now();
      attempts = attempts.filter(function(t) { return now - t < RATE_WINDOW; });
      attempts.push(now);
      sessionStorage.setItem(RATE_KEY, JSON.stringify(attempts));
    } catch (e) { /* ignore */ }
  }

  var token = new URLSearchParams(window.location.search).get('t') || '';
  var surveyData = null;
  var resolvedTenantId = null;

  function cfBase() {
    return (TENANT_FIREBASE_CONFIG && TENANT_FIREBASE_CONFIG.cloudFunctionsBase)
      ? TENANT_FIREBASE_CONFIG.cloudFunctionsBase
      : 'https://us-central1-mast-platform-prod.cloudfunctions.net';
  }

  function callCF(name, body) {
    return fetch(cfBase() + '/' + name, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    }).then(function(r) { return r.json(); });
  }

  var answers = {};
  var currentQ = 0;

  function estimateMinutes(questions) {
    var totalSec = 0;
    var wps = 200 / 60;
    questions.forEach(function(q) {
      var words = (q.text || '').split(/\s+/).filter(Boolean).length;
      totalSec += words / wps;
      if (q.type === 'open_text') totalSec += 30;
      else if (q.type === 'multiple_choice') totalSec += 10;
      else totalSec += 5;
    });
    var halfMins = Math.max(1, Math.ceil(totalSec / 30));
    return halfMins * 0.5;
  }

  function renderNoToken() {
    document.getElementById('svContent').innerHTML =
      '<div class="sv-error">' +
        '<div style="width:60px;height:60px;border-radius:50%;background:color-mix(in srgb,var(--primary) 10%,transparent);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.75rem;">&#128203;</div>' +
        '<h3 style="font-family:\'Cormorant Garamond\',serif;font-size:1.55rem;font-weight:400;color:var(--text);margin:0 0 0.5rem;">No Survey Link</h3>' +
        '<p style="font-size:0.9rem;">This link doesn\'t contain a valid survey token.</p>' +
        '<a href="/" class="sv-btn" style="margin-top:1.25rem;">Return Home</a>' +
      '</div>';
  }

  function renderError(msg) {
    document.getElementById('svContent').innerHTML =
      '<div class="sv-error">' +
        '<div style="width:60px;height:60px;border-radius:50%;background:rgba(220,53,69,0.09);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.6rem;">&#10005;</div>' +
        '<h3 style="font-family:\'Cormorant Garamond\',serif;font-size:1.55rem;font-weight:400;color:var(--text);margin:0 0 0.5rem;">Something went wrong</h3>' +
        '<p style="font-size:0.9rem;">' + esc(msg || 'This survey link is invalid or has expired.') + '</p>' +
        '<a href="/" class="sv-btn" style="margin-top:1.25rem;">Return Home</a>' +
      '</div>';
  }

  function renderSummary(data) {
    surveyData = data;
    currentQ = 0;
    var n = data.questions.length;
    var mins = estimateMinutes(data.questions);
    var minsLabel = mins < 1 ? 'less than 1 min' : (mins === 1 ? '1 min' : mins + ' mins');
    var html = '<div style="text-align:center;padding:1.25rem 0.5rem 0.75rem;">';
    html += '<div style="font-size:2.75rem;margin-bottom:1.25rem;line-height:1;">&#128203;</div>';
    html += '<h2 style="font-family:\'Cormorant Garamond\',serif;font-size:2rem;font-weight:400;color:var(--text);margin:0 0 0.6rem;line-height:1.2;">' + esc(data.groupName || 'Feedback Survey') + '</h2>';
    html += '<p style="color:var(--warm-gray,#888);font-size:0.875rem;margin:0 0 0.35rem;">' + n + ' question' + (n === 1 ? '' : 's') + ' &nbsp;&middot;&nbsp; About ' + minsLabel + '</p>';
    html += '<p style="color:var(--warm-gray,#888);font-size:0.82rem;margin:0 0 2rem;">Your feedback helps us improve.</p>';
    html += '<button class="sv-btn" onclick="svStart()" style="font-size:1rem;padding:0.8rem 2.75rem;">Begin Survey</button>';
    html += '</div>';
    document.getElementById('svContent').innerHTML = html;
  }

  function renderQuestionInput(q) {
    var html = '';
    if (q.type === 'rating_1_5' || q.type === 'rating_1_10') {
      var max = q.type === 'rating_1_5' ? 5 : 10;
      var lowLabel = q.lowLabel || 'Poor';
      var highLabel = q.highLabel || 'Excellent';
      html += '<div class="sv-rating">';
      for (var n = 1; n <= max; n++) {
        var active = answers[q.id] === n ? ' active' : '';
        html += '<button type="button" class="' + active + '" data-qid="' + esc(q.id) + '" data-val="' + n + '" onclick="svRate(this)">' + n + '</button>';
      }
      html += '<div class="sv-rating-labels"><span>1 = ' + esc(lowLabel) + '</span><span>' + max + ' = ' + esc(highLabel) + '</span></div>';
      html += '</div>';
    } else if (q.type === 'nps') {
      html += '<div class="sv-rating">';
      for (var n = 0; n <= 10; n++) {
        var active = answers[q.id] === n ? ' active' : '';
        html += '<button type="button" class="' + active + '" data-qid="' + esc(q.id) + '" data-val="' + n + '" onclick="svRate(this)">' + n + '</button>';
      }
      html += '<div class="sv-rating-labels"><span>Not at all likely</span><span>Extremely likely</span></div>';
      html += '</div>';
    } else if (q.type === 'yes_no') {
      html += '<div class="sv-rating">';
      html += '<button type="button" ' + (answers[q.id] === 'yes' ? 'class="active"' : '') + ' data-qid="' + esc(q.id) + '" data-val="yes" onclick="svRate(this)" style="min-width:72px;">Yes</button>';
      html += '<button type="button" ' + (answers[q.id] === 'no' ? 'class="active"' : '') + ' data-qid="' + esc(q.id) + '" data-val="no" onclick="svRate(this)" style="min-width:72px;">No</button>';
      html += '</div>';
    } else if (q.type === 'multiple_choice' && q.options) {
      q.options.forEach(function(opt) {
        html += '<div class="sv-mc-option"><label>';
        html += '<input type="radio" name="q_' + esc(q.id) + '" value="' + esc(opt) + '"' + (answers[q.id] === opt ? ' checked' : '') + ' onchange="svPick(\'' + esc(q.id) + '\', this.value)">';
        html += esc(opt) + '</label></div>';
      });
    } else {
      html += '<textarea class="sv-textarea" placeholder="Your answer…" oninput="svText(\'' + esc(q.id) + '\', this.value)">' + esc(answers[q.id] || '') + '</textarea>';
    }
    return html;
  }

  function renderQuestion(idx) {
    var q = surveyData.questions[idx];
    var total = surveyData.questions.length;
    var isLast = idx === total - 1;
    var progress = Math.round(((idx + 1) / total) * 100);
    var html = '';
    html += '<div class="sv-progress-label"><span>Question ' + (idx + 1) + ' of ' + total + '</span><span>' + progress + '%</span></div>';
    html += '<div class="sv-progress-track"><div class="sv-progress-fill" style="width:' + progress + '%;"></div></div>';
    html += '<div class="sv-question" id="q_' + esc(q.id) + '">';
    html += '<label>' + esc(q.text) + (q.required === false ? ' <span style="font-size:0.8em;font-weight:400;color:var(--warm-gray,#888);">(optional)</span>' : '') + '</label>';
    html += renderQuestionInput(q);
    html += '</div>';
    if (isLast) {
      html += '<div class="sv-followup"><label><input type="checkbox" id="svFollowup"> I\'d like someone to follow up with me about this survey.</label></div>';
    }
    html += '<div id="svSubmitStatus" style="color:#DC3545;font-size:0.85rem;margin:0.75rem 0 0;display:none;"></div>';
    html += '<div class="sv-nav' + (idx > 0 ? ' has-back' : '') + '">';
    if (idx > 0) {
      html += '<button class="sv-btn sv-btn-ghost" onclick="svBack()">&#8592; Back</button>';
    }
    if (!isLast) {
      html += '<button class="sv-btn" onclick="svNext()">Next &#8594;</button>';
    } else {
      html += '<button class="sv-btn" onclick="svSubmit()">Submit Feedback</button>';
    }
    html += '</div>';
    document.getElementById('svContent').innerHTML = html;
  }

  window.svRate = function(btn) {
    var qid = btn.dataset.qid;
    var val = isNaN(btn.dataset.val) ? btn.dataset.val : Number(btn.dataset.val);
    answers[qid] = val;
    var siblings = btn.parentElement.querySelectorAll('button');
    siblings.forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  };

  window.svPick = function(qid, val) { answers[qid] = val; };
  window.svText = function(qid, val) { answers[qid] = val; };

  window.svStart = function() { currentQ = 0; renderQuestion(0); };

  window.svBack = function() {
    if (currentQ > 0) { currentQ--; renderQuestion(currentQ); }
  };

  window.svNext = function() {
    var q = surveyData.questions[currentQ];
    if (q.required !== false && (answers[q.id] === undefined || answers[q.id] === '')) {
      var el = document.getElementById('svSubmitStatus');
      if (el) { el.textContent = 'Please answer this question to continue.'; el.style.display = ''; }
      return;
    }
    currentQ++;
    renderQuestion(currentQ);
  };

  window.svSubmit = function() {
    if (!surveyData) return;
    var q = surveyData.questions[currentQ];
    if (q.required !== false && (answers[q.id] === undefined || answers[q.id] === '')) {
      var el = document.getElementById('svSubmitStatus');
      if (el) { el.textContent = 'Please answer this question before submitting.'; el.style.display = ''; }
      return;
    }
    var wantsFollowup = document.getElementById('svFollowup') && document.getElementById('svFollowup').checked;

    // Show saving state immediately — no frozen screen while CF processes
    document.getElementById('svContent').innerHTML =
      '<div class="sv-saving">' +
        '<div class="sv-spinner"></div>' +
        '<h3 style="font-family:\'Cormorant Garamond\',serif;font-size:1.7rem;font-weight:400;color:var(--text);margin:0 0 0.5rem;">Saving your responses…</h3>' +
        '<p style="color:var(--warm-gray,#888);font-size:0.875rem;margin:0;">Just a moment while we record your feedback.</p>' +
      '</div>';

    callCF('surveySubmit', {
      token: token,
      answers: Object.keys(answers).map(function(qid) {
        return { questionId: qid, answer: answers[qid] };
      }),
      wantsFollowup: !!wantsFollowup,
      tenantId: resolvedTenantId || undefined
    }).then(function(resp) {
      if (resp.error) { renderError(resp.error); return; }
      renderComplete(resp);
    }).catch(function() {
      renderError('Something went wrong. Please try again.');
    });
  };

  function renderComplete(resp) {
    var html = '<div class="sv-complete">';
    html += '<div style="width:64px;height:64px;border-radius:50%;background:color-mix(in srgb,var(--primary) 12%,transparent);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.75rem;color:var(--primary);">&#10003;</div>';
    html += '<h2 style="font-family:\'Cormorant Garamond\',serif;font-size:2rem;font-weight:400;color:var(--text);margin:0 0 0.5rem;">Thank you!</h2>';
    html += '<p style="font-size:0.9rem;margin:0 0 1.5rem;">' + esc(resp.message || 'Your feedback has been received.') + '</p>';
    if (resp.couponCode) {
      html += '<div style="margin:0 auto 1.5rem;max-width:300px;border:1.5px dashed color-mix(in srgb,var(--primary) 40%,transparent);border-radius:10px;padding:1.25rem 1.5rem;background:color-mix(in srgb,var(--primary) 5%,transparent);">';
      html += '<p style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--warm-gray,#888);margin:0 0 0.5rem;">Your reward code</p>';
      html += '<div style="font-family:\'DM Sans\',monospace;font-size:1.5rem;font-weight:700;letter-spacing:0.12em;color:var(--primary);">' + esc(resp.couponCode) + '</div>';
      if (resp.couponDescription) html += '<p style="font-size:0.82rem;color:var(--text);margin:0.5rem 0 0;">' + esc(resp.couponDescription) + '</p>';
      html += '</div>';
    }
    html += '<a href="/" class="sv-btn">Return Home</a>';
    html += '</div>';
    document.getElementById('svContent').innerHTML = html;
  }

  function boot() {
    if (!token) { renderNoToken(); return; }
    if (!checkRateLimit()) { renderError('Too many attempts. Please try again later.'); return; }
    recordAttempt();
    callCF('surveyLoad', { token: token })
      .then(function(resp) {
        if (resp.error) { renderError(resp.error); return; }
        if (resp.tenantId) resolvedTenantId = resp.tenantId;
        renderSummary(resp);
      }).catch(function() {
        renderError('Could not load survey. Please try again.');
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
