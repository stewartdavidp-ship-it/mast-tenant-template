<head>

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://*.firebaseio.com https://apis.google.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://us-central1-mast-platform-prod.cloudfunctions.net https://*.firebaseio.com wss://*.firebaseio.com https://*.firebasestorage.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api.ipify.org; img-src 'self' data: blob: https:; frame-src 'self' https://*.firebaseapp.com https://*.firebaseio.com; frame-ancestors 'none';">
<title>Manage Seats</title>
<link rel="preconnect" href="https://mast-platform-prod-default-rtdb.firebaseio.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<script>
(function(){
  var P='https://mast-platform-prod-default-rtdb.firebaseio.com/mast-platform';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  window.__earlyTenant=fetch(P+'/tenantsByDomain/'+ek+'.json').then(function(r){return r.ok?r.json():null}).then(function(tid){
    if(!tid)return null;
    return fetch(P+'/tenants/'+tid+'/publicConfig.json').then(function(r){return r.ok?r.json():null}).then(function(pc){
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="storefront.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
.ms-container {
  max-width: 560px;
  margin: 0 auto;
  padding: 7rem 2rem 4rem;
}
.ms-header {
  text-align: center;
  margin-bottom: 2rem;
}
.ms-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin: 0 0 0.5rem;
  color: var(--text);
}
.ms-header p {
  font-size: 0.95rem;
  color: var(--warm-gray, #888);
}
.ms-card {
  background: var(--surface-card, #FAF6F0);
  border-radius: 12px;
  padding: 2rem;
  border: 1px solid var(--border-subtle, #E8E0D4);
}
.ms-class-info {
  margin: 0 0 1.5rem;
  padding: 16px 20px;
  background: var(--bg, #fff);
  border-radius: 8px;
  border: 1px solid var(--border-subtle, #E8E0D4);
}
.ms-class-name {
  margin: 0 0 8px;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text, #1A1A1A);
}
.ms-class-detail {
  font-size: 0.85rem;
  color: var(--warm-gray, #666);
  margin: 0;
}
.ms-seat {
  margin: 0 0 1.25rem;
  padding: 16px 20px;
  background: var(--bg, #fff);
  border-radius: 8px;
  border: 1px solid var(--border-subtle, #E8E0D4);
}
.ms-seat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.ms-seat-label {
  font-size: 0.82rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--primary, #C4853C);
}
.ms-seat-badge {
  font-size: 0.72rem;
  padding: 2px 10px;
  border-radius: 12px;
  background: rgba(42, 124, 111, 0.1);
  color: var(--teal, #2A7C6F);
}
.ms-seat-badge--locked {
  background: rgba(136, 136, 136, 0.1);
  color: var(--warm-gray, #888);
}
.ms-field {
  margin-bottom: 0.75rem;
}
.ms-field label {
  display: block;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--warm-gray, #888);
  margin-bottom: 4px;
}
.ms-field input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border-subtle, #E8E0D4);
  border-radius: 6px;
  font-size: 0.95rem;
  background: var(--bg, #fff);
  color: var(--text, #1A1A1A);
  box-sizing: border-box;
  font-family: inherit;
}
.ms-field input:focus {
  outline: none;
  border-color: var(--primary, #C4853C);
  box-shadow: 0 0 0 2px rgba(196,133,60,0.15);
}
.ms-field input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: var(--surface-dark, #F0EBE3);
}
.ms-btn {
  display: block;
  width: 100%;
  padding: 12px;

  font-size: 0.95rem;

  background: var(--teal, #2A7C6F);
  color: #fff;
  transition: background 0.2s;
  margin-top: 1.5rem;
}
.ms-btn:hover { background: #237063; }
.ms-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.ms-msg {
  text-align: center;
  padding: 2rem;
  font-size: 0.95rem;
  color: var(--warm-gray, #888);
}
.ms-success {
  text-align: center;
  padding: 2rem 0;
}
.ms-success-icon {
  font-size: 3rem;
  color: var(--teal, #2A7C6F);

}
.ms-success h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 1.5rem;
  margin: 0 0 0.75rem;
  color: var(--text);
}
.ms-success p {
  font-size: 0.88rem;
  color: var(--warm-gray, #888);
  line-height: 1.6;
}
.ms-error {
  text-align: center;
  padding: 2rem 0;
}
.ms-error-icon {
  font-size: 3rem;
  color: #CC5500;
  margin-bottom: 1rem;
}
.ms-error h2 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: 1.5rem;
  margin: 0 0 0.75rem;
  color: var(--text);
}
.ms-error p {
  font-size: 0.88rem;
  color: var(--warm-gray, #888);
  line-height: 1.6;
}
.ms-link {
  display: inline-block;
  margin-top: 1.5rem;
  padding: 10px 24px;
  border-radius: 6px;
  background: var(--primary, #C4853C);
  color: #fff;
  text-decoration: none;
  font-size: 0.88rem;
}
.ms-inline-msg {
  margin-top: 1rem;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 0.85rem;
  text-align: center;
}
.ms-inline-msg--success {
  background: rgba(42, 124, 111, 0.1);
  color: var(--teal, #2A7C6F);
}
.ms-inline-msg--error {
  background: rgba(204, 85, 0, 0.1);
  color: #CC5500;
}
@media (max-width: 768px) {
  .ms-container { padding: 6rem 1.25rem 3rem; }
  .ms-header h1 { font-size: 1.6rem; }
}
</style>
</head>
<body>
<nav id="mainNav"></nav>
<div class="nav-mobile-menu" id="mobileMenu"></div>

<div class="ms-container">
  <div class="ms-header">
    <h1>Manage Seats</h1>
    <p>Update attendee names and email addresses</p>
  </div>
  <div id="msContent">
    <div class="ms-msg">Loading...</div>
  </div>
</div>

<footer id="siteFooter"></footer>

<script src="storefront-tenant.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="storefront-theme.js"></script>
<script src="storefront-nav.js"></script>
<script src="tenant-brand.js?v=2"></script>

<script>
(function() {
  'use strict';

  var TENANT_ID = null;
  var FUNCTION_BASE = 'https://us-central1-mast-platform-prod.cloudfunctions.net/';

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function getOrderId() {
    var params = new URLSearchParams(window.location.search);
    return params.get('order') || '';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      var d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    } catch (_) { return dateStr; }
  }

  function formatTime(timeStr) {
    if (!timeStr || !timeStr.includes(':')) return timeStr || '';
    var parts = timeStr.split(':').map(Number);
    var h = parts[0]; var m = parts[1];
    var ampm = h >= 12 ? 'PM' : 'AM';
    return ((h % 12) || 12) + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }

  function showMessage(msg) {
    document.getElementById('msContent').innerHTML = '<div class="ms-msg">' + esc(msg) + '</div>';
  }

  function showError(message) {
    var el = document.getElementById('msContent');
    el.innerHTML = '<div class="ms-error">' +
      '<div class="ms-error-icon">&#9888;</div>' +
      '<h2>Unable to Load</h2>' +
      '<p>' + esc(message) + '</p>' +
      '<a href="/classes.html" class="ms-link">Browse Classes</a>' +
    '</div>';
  }

  function init() {
    var orderId = getOrderId();
    if (!orderId) {
      showError('Invalid link. No order ID found.');
      return;
    }

    window.TENANT_READY.then(function() {
      TENANT_ID = window.TENANT_ID;
      loadSeats(orderId);
    });
  }

  function loadSeats(orderId) {
    fetch(FUNCTION_BASE + 'getOrderSeats', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { tenantId: TENANT_ID, orderId: orderId } })
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      var result = data.result || data;
      if (!result.success) {
        showError(result.error || 'Unable to load seat information.');
        return;
      }
      renderSeats(orderId, result);
    })
    .catch(function() {
      showError('Unable to load seat information. Please try again.');
    });
  }

  function renderSeats(orderId, info) {
    var el = document.getElementById('msContent');
    var seats = info.seats || [];
    var anyEditable = seats.some(function(s) { return s.editable; });

    // Group seats by class name for display
    var className = seats.length > 0 ? seats[0].className : '';
    var sessionDate = seats.length > 0 ? seats[0].sessionDate : '';
    var sessionTime = seats.length > 0 ? seats[0].sessionTime : '';

    var html = '<div class="ms-card">';

    // Class info
    html += '<div class="ms-class-info">' +
      '<div class="ms-class-name">' + esc(className) + '</div>' +
      '<p class="ms-class-detail">' + esc(formatDate(sessionDate));
    if (sessionTime) html += ' at ' + esc(formatTime(sessionTime));
    html += '</p>';
    html += '<p class="ms-class-detail" style="margin-top:4px;">' + seats.length + ' seat' + (seats.length !== 1 ? 's' : '') + '</p>';
    html += '</div>';

    // Seat cards
    seats.forEach(function(seat, idx) {
      var seatNum = seat.seatNumber || (idx + 1);
      var total = seat.totalSeats || seats.length;
      html += '<div class="ms-seat" data-enrollment-id="' + esc(seat.enrollmentId) + '">';
      html += '<div class="ms-seat-header">';
      html += '<span class="ms-seat-label">Seat ' + seatNum + ' of ' + total + '</span>';
      if (seat.editable) {
        html += '<span class="ms-seat-badge">Editable</span>';
      } else {
        html += '<span class="ms-seat-badge ms-seat-badge--locked">Locked</span>';
      }
      html += '</div>';

      html += '<div class="ms-field">';
      html += '<label for="seatName' + idx + '">Attendee Name</label>';
      html += '<input type="text" id="seatName' + idx + '" value="' + esc(seat.studentName) + '"' + (seat.editable ? '' : ' disabled') + ' placeholder="Enter name">';
      html += '</div>';

      html += '<div class="ms-field">';
      html += '<label for="seatEmail' + idx + '">Email Address</label>';
      html += '<input type="email" id="seatEmail' + idx + '" value="' + esc(seat.studentEmail) + '"' + (seat.editable ? '' : ' disabled') + ' placeholder="Enter email">';
      html += '</div>';

      html += '</div>';
    });

    if (!anyEditable) {
      html += '<div class="ms-inline-msg ms-inline-msg--error">This class session has already started. Seat details can no longer be edited.</div>';
    } else {
      html += '<button class="ms-btn" id="msSaveBtn" onclick="window._msSave()">Save Changes</button>';
    }

    html += '<div id="msFeedback"></div>';
    html += '</div>';

    el.innerHTML = html;

    // Store data for save handler
    window._msSeats = seats;
    window._msOrderId = orderId;
  }

  window._msSave = function() {
    var seats = window._msSeats || [];
    var orderId = window._msOrderId;
    var btn = document.getElementById('msSaveBtn');
    var feedback = document.getElementById('msFeedback');
    if (!btn || !orderId) return;

    // Collect updated values
    var updates = [];
    var hasChanges = false;
    seats.forEach(function(seat, idx) {
      if (!seat.editable) return;
      var nameInput = document.getElementById('seatName' + idx);
      var emailInput = document.getElementById('seatEmail' + idx);
      if (!nameInput || !emailInput) return;
      var newName = nameInput.value.trim();
      var newEmail = emailInput.value.trim();
      if (newName !== seat.studentName || newEmail !== seat.studentEmail) {
        hasChanges = true;
      }
      updates.push({
        enrollmentId: seat.enrollmentId,
        studentName: newName,
        studentEmail: newEmail
      });
    });

    if (!hasChanges) {
      feedback.innerHTML = '<div class="ms-inline-msg ms-inline-msg--error">No changes to save.</div>';
      return;
    }

    // Validate emails
    for (var i = 0; i < updates.length; i++) {
      if (updates[i].studentEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(updates[i].studentEmail)) {
        feedback.innerHTML = '<div class="ms-inline-msg ms-inline-msg--error">Please enter a valid email address for all seats.</div>';
        return;
      }
    }

    btn.disabled = true;
    btn.textContent = 'Saving...';
    feedback.innerHTML = '';

    fetch(FUNCTION_BASE + 'updateSeatInfo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: { tenantId: TENANT_ID, orderId: orderId, seats: updates } })
    })
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      var result = data.result || data;
      if (result.success) {
        var el = document.getElementById('msContent');
        el.innerHTML = '<div class="ms-card"><div class="ms-success">' +
          '<div class="ms-success-icon">&#10003;</div>' +
          '<h2>Seats Updated</h2>' +
          '<p>Attendee information has been saved successfully. Each attendee will receive class details at their updated email address.</p>' +
          '<a href="/classes.html" class="ms-link">Browse Classes</a>' +
        '</div></div>';
      } else {
        btn.disabled = false;
        btn.textContent = 'Save Changes';
        var failedSeats = (result.results || []).filter(function(r) { return !r.success; });
        var errMsg = failedSeats.length > 0 ? failedSeats[0].error : (result.error || 'Unable to save changes.');
        feedback.innerHTML = '<div class="ms-inline-msg ms-inline-msg--error">' + esc(errMsg) + '</div>';
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
      feedback.innerHTML = '<div class="ms-inline-msg ms-inline-msg--error">Unable to save changes. Please try again.</div>';
    });
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
