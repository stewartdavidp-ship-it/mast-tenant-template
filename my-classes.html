<script>
(function(){
  var B='https://firestore.googleapis.com/v1/projects/mast-platform-prod/databases/(default)/documents';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  function uv(v){if(v==null)return null;if('stringValue' in v)return v.stringValue;if('booleanValue' in v)return v.booleanValue;if('integerValue' in v)return Number(v.integerValue);if('doubleValue' in v)return v.doubleValue;if('nullValue' in v)return null;if('timestampValue' in v)return v.timestampValue;if('mapValue' in v){var o={};var f=v.mapValue.fields||{};for(var k in f)o[k]=uv(f[k]);return o;}if('arrayValue' in v)return(v.arrayValue.values||[]).map(uv);return null;}
  function uf(fields){var o={};for(var k in fields)o[k]=uv(fields[k]);return o;}
  function uw(d){if(d&&typeof d==='object'&&!Array.isArray(d)&&'_v' in d&&Object.keys(d).length===1)return d._v;return d;}
  window.__earlyTenant=fetch(B+'/platform_tenantsByDomain/'+ek).then(function(r){return r.ok?r.json():null}).then(function(doc){
    var tid=doc&&doc.fields?uw(uf(doc.fields)):null;
    if(typeof tid!=='string'||!tid)return null;
    return fetch(B+'/platform_tenantPublicConfigs/'+tid).then(function(r){return r.ok?r.json():null}).then(function(cdoc){
      if(!cdoc||!cdoc.fields)return null;
      var pc=uf(cdoc.fields);
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>

<style>
.mc-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 7rem 2rem 4rem;
}
.mc-header {
  text-align: center;
  margin-bottom: 2.5rem;
}
.mc-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin: 0 0 0.5rem;
  color: var(--text);
}
.mc-header p {
  font-size: 0.95rem;
  color: var(--warm-gray, #888);
}

/* Credit banner */
.mc-credit-banner {
  text-align: center;
  padding: 12px 20px;
  margin-bottom: 1.5rem;
  border-radius: 8px;
  background: rgba(6,95,70,0.15);
  border: 1px solid rgba(6,95,70,0.3);
  color: #4DB6AC;
  font-size: 0.9rem;
  font-weight: 500;
}

/* Sign-in prompt */
.mc-signin {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--warm-gray, #888);
}
.mc-signin-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-radius: 6px;
  border: 1px solid var(--border, #444);
  background: #fff;
  color: #333;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  margin-top: 1rem;
  transition: background 0.2s;
}
.mc-signin-btn:hover { background: #f5f5f5; }

/* Filter tabs */
.mc-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 1.5rem;
  justify-content: center;
}
.mc-tab {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.mc-tab:hover { border-color: var(--primary); color: var(--primary); }
.mc-tab:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.mc-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Enrollment cards */
.mc-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.mc-card {
  background: var(--surface-card);
  border: 1px solid var(--surface-card-border);
  border-radius: 10px;
  padding: 1.5rem;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 1rem;
  align-items: center;
}
.mc-card.past { opacity: 0.55; }
.mc-card-info h3 {
  margin: 0 0 4px;
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
}
.mc-card-info h3 a {
  color: inherit;
  text-decoration: none;
}
.mc-card-info h3 a:hover { color: var(--primary); }
.mc-card-meta {
  font-size: 0.85rem;
  color: var(--warm-gray, #888);
  line-height: 1.6;
}
.mc-card-right {
  text-align: right;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}

/* Status badges */
.mc-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.mc-badge-series { background: rgba(6,95,70,0.25); color: #4DB6AC; }
.mc-badge-dropin { background: rgba(33,150,243,0.2); color: #90CAF9; }
.mc-status-confirmed { background: rgba(6,95,70,0.25); color: #4DB6AC; }
.mc-status-waitlisted { background: rgba(200,150,50,0.2); color: #FFD54F; }
.mc-status-cancelled, .mc-status-cancelled_insufficient_enrollment { background: rgba(200,60,60,0.2); color: #EF9A9A; }
.mc-status-completed { background: rgba(33,150,243,0.2); color: #90CAF9; }
.mc-status-no-show { background: rgba(200,60,60,0.2); color: #EF9A9A; }

/* Swap button */
.mc-swap-btn {
  padding: 5px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 44px;
  min-width: 44px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.mc-swap-btn:hover { border-color: var(--primary); color: var(--primary); }
.mc-swap-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

/* Swap modal */
.mc-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.mc-modal {
  background: var(--surface-card, #1a1a2e);
  border: 1px solid var(--surface-card-border, #333);
  border-radius: 12px;
  max-width: 500px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 2rem;
}
.mc-modal h2 {
  margin: 0 0 4px;
  font-size: 1.3rem;
  font-weight: 500;
  color: var(--text);
}
.mc-modal-subtitle {
  font-size: 0.9rem;
  color: var(--warm-gray, #888);
  margin-bottom: 1.5rem;
}
.mc-modal-sessions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 1.5rem;
}
.mc-modal-session {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border: 1px solid var(--border, #444);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.mc-modal-session:hover { border-color: var(--primary); }
.mc-modal-session:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.mc-modal-session-info {
  font-size: 0.9rem;
  color: var(--text);
}
.mc-modal-session-spots {
  font-size: 0.8rem;
  color: var(--warm-gray, #888);
}
.mc-modal-close {
  display: block;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}
.mc-modal-close:hover { border-color: var(--primary); }
.mc-modal-loading {
  text-align: center;
  padding: 2rem;
  color: var(--warm-gray, #888);
}
.mc-modal-empty {
  text-align: center;
  padding: 1.5rem;
  color: var(--warm-gray, #888);
  font-size: 0.9rem;
}

/* Toast */
.mc-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  border-radius: 8px;
  background: rgba(6,95,70,0.9);
  color: #fff;
  font-size: 0.9rem;
  z-index: 10000;
  transition: opacity 0.3s;
}
.mc-toast.error { background: rgba(183,28,28,0.9); }

.mc-empty {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--warm-gray, #888);
}
.mc-browse-btn {
  display: inline-block;
  margin-top: 1rem;
  padding: 10px 24px;
  border-radius: 6px;
  background: var(--primary);
  color: #fff;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: opacity 0.2s;
}
.mc-browse-btn:hover { opacity: 0.85; }

.mc-loading {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--warm-gray, #888);
}

/* Mini calendar */
.mc-mini-cal { margin-bottom: 1.5rem; }
.mc-mini-cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.mc-mini-cal-header h3 { margin:0; font-size:1rem; font-weight:500; color:var(--text); }
.mc-mini-cal-nav { background:transparent; border:1px solid var(--border); color:var(--text); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:0.85rem; min-width:44px; min-height:36px; }
.mc-mini-cal-nav:hover { border-color: var(--primary); color: var(--primary); }
.mc-mini-cal-nav:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.mc-mini-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; text-align:center; }
.mc-mini-cal-dow { font-size:0.7rem; color:var(--warm-gray,#888); padding:4px; text-transform:uppercase; }
.mc-mini-cal-day { padding:6px 4px; font-size:0.8rem; color:var(--text); border-radius:6px; cursor:pointer; position:relative; min-height:32px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.mc-mini-cal-day:hover { background:rgba(196,133,60,0.1); }
.mc-mini-cal-day:focus-visible { outline: 2px solid var(--primary); outline-offset: -2px; }
.mc-mini-cal-day.empty { cursor:default; }
.mc-mini-cal-day.today { border:1px solid var(--primary); font-weight:700; }
.mc-mini-cal-day.has-session::after { content:''; display:block; width:6px; height:6px; background:var(--primary); border-radius:50%; margin:2px auto 0; }
.mc-mini-cal-day.selected { background:rgba(196,133,60,0.15); }

/* Stats dashboard */
.mc-stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(120px, 1fr)); gap:12px; margin-bottom:1.5rem; }
.mc-stat { background:var(--surface-card); border:1px solid var(--surface-card-border); border-radius:10px; padding:1rem; text-align:center; }
.mc-stat-value { display:block; font-size:1.8rem; font-weight:700; color:var(--primary); line-height:1.2; }
.mc-stat-label { font-size:0.7rem; color:var(--warm-gray,#888); text-transform:uppercase; letter-spacing:0.05em; margin-top:4px; }

/* Better empty state */
.mc-empty { text-align:center; padding:3rem 2rem; }
.mc-empty-icon { display:inline-block; width:64px; height:64px; margin-bottom:1rem; color:var(--warm-gray,#888); }
.mc-empty p { color:var(--warm-gray,#888); margin-bottom:1rem; }
.mc-browse-btn { display:inline-block; padding:10px 24px; background:var(--primary); color:#fff; border-radius:6px; text-decoration:none; font-weight:500; }
.mc-browse-btn:hover { opacity:0.85; }

@media (max-width: 768px) {
  .mc-container { padding: 6rem 1.5rem 3rem; }
  .mc-header h1 { font-size: 1.8rem; }
  .mc-card { grid-template-columns: 1fr; }
  .mc-card-right { text-align: left; flex-direction: row; align-items: center; gap: 8px; flex-wrap: wrap; }
  .mc-stats { grid-template-columns: repeat(2, 1fr); }
}

/* Class review prompt */
.mc-review-prompt {
  margin: -10px 0 0;
  padding: 12px 16px 14px;
  background: var(--surface-card);
  border: 1px solid var(--surface-card-border);
  border-top: none;
  border-radius: 0 0 10px 10px;
}
.mc-review-prompt-heading {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.mc-review-stars {
  display: flex;
  gap: 2px;
  margin-bottom: 6px;
}
.mc-review-star {
  background: none;
  border: none;
  font-size: 1.45rem;
  line-height: 1;
  cursor: pointer;
  color: var(--surface-card-border, #D8D0C4);
  padding: 0;
  min-width: 40px;
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: color 0.12s;
  border-radius: 4px;
}
.mc-review-star:hover, .mc-review-star.selected { color: var(--primary, #C6A96C); }
.mc-review-star:disabled { cursor: default; }
.mc-review-body {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.82rem;
  padding: 8px 10px;
  resize: none;
  margin-bottom: 8px;
  display: none;
}
.mc-review-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.mc-review-submit {
  padding: 7px 18px;
  border-radius: 6px;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  display: none;
  transition: opacity 0.2s;
}
.mc-review-submit:hover { opacity: 0.85; }
.mc-review-submit:disabled { opacity: 0.6; cursor: default; }
.mc-review-dismiss {
  background: none;
  border: none;
  font-size: 0.78rem;
  color: var(--warm-gray, #888);
  cursor: pointer;
  padding: 0;
  text-decoration: underline;
}
.mc-review-dismiss:hover { color: var(--text); }
.mc-review-thanks { font-size: 0.82rem; color: var(--accent, #7BAE8A); padding: 4px 0; }
.mc-review-error { font-size: 0.78rem; color: #EF9A9A; margin-top: 4px; display: none; }
</style>
</head>
<body>
<nav id="mainNav"></nav>
<div class="nav-mobile-menu" id="mobileMenu"></div>

<div class="mc-container">
  <div class="mc-header">
    <h1>My Classes</h1>
    <p>View your class enrollments and upcoming sessions</p>
  </div>
  <div id="mcMiniCalendar"></div>
  <div id="mcStatsDashboard"></div>
  <div id="mcContent">
    <div class="mc-loading">Loading...</div>
  </div>
</div>
<div id="mcModalRoot"></div>

<footer id="siteFooter"></footer>

<script src="storefront-tenant.js"></script>
<script src="storefront-theme.js"></script>
<script src="storefront-nav.js"></script>
<script src="tenant-brand.js?v=2"></script>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="shared/mastdb.js?v=1"></script>

<script>
(function() {
  'use strict';

  var allEnrollments = [];
  var classesMap = {};
  var sessionsMap = {};
  var allPasses = [];
  var currentFilter = 'upcoming';
  var currentUser = null;
  var db = null;

  // Mini calendar state
  var miniCalYear = new Date().getFullYear();
  var miniCalMonth = new Date().getMonth();
  var selectedMiniCalDay = null;

  var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var MONTH_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatSessionDate(dateStr, timeStr) {
    if (!dateStr) return '—';
    var parts = dateStr.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var day = DAYS[d.getDay()];
    var month = MONTHS[d.getMonth()];
    var dom = d.getDate();
    var time = '';
    if (timeStr) {
      var tp = timeStr.split(':');
      var h = parseInt(tp[0]);
      var m = tp[1] || '00';
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      time = ' at ' + h + ':' + m + ' ' + ampm;
    }
    return day + ', ' + month + ' ' + dom + time;
  }

  function formatPrice(cents) {
    if (!cents && cents !== 0) return '';
    return '$' + (cents / 100).toFixed(2);
  }

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function showToast(msg, isError) {
    var existing = document.querySelector('.mc-toast');
    if (existing) existing.remove();
    var t = document.createElement('div');
    t.className = 'mc-toast' + (isError ? ' error' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 3000);
  }

  // ── Mini Calendar ──
  function renderMiniCalendar() {
    var container = document.getElementById('mcMiniCalendar');
    if (!container || allEnrollments.length === 0) { if (container) container.innerHTML = ''; return; }

    var firstDay = new Date(miniCalYear, miniCalMonth, 1).getDay();
    var daysInMonth = new Date(miniCalYear, miniCalMonth + 1, 0).getDate();
    var today = todayStr();

    // Build set of dates that have sessions
    var sessionDates = {};
    allEnrollments.forEach(function(e) {
      if (e.status === 'cancelled' || e.status === 'cancelled_insufficient_enrollment') return;
      var session = sessionsMap[e.sessionId];
      if (session && session.date) sessionDates[session.date] = true;
    });

    var html = '<div class="mc-mini-cal">';
    html += '<div class="mc-mini-cal-header">';
    html += '<button class="mc-mini-cal-nav" onclick="window._mcCalPrev()" aria-label="Previous month">&larr;</button>';
    html += '<h3>' + MONTH_FULL[miniCalMonth] + ' ' + miniCalYear + '</h3>';
    html += '<button class="mc-mini-cal-nav" onclick="window._mcCalNext()" aria-label="Next month">&rarr;</button>';
    html += '</div>';

    html += '<div class="mc-mini-cal-grid">';
    DAYS.forEach(function(d) { html += '<div class="mc-mini-cal-dow">' + d + '</div>'; });

    for (var b = 0; b < firstDay; b++) {
      html += '<div class="mc-mini-cal-day empty"></div>';
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var dateStr = miniCalYear + '-' + String(miniCalMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      var classes = 'mc-mini-cal-day';
      if (dateStr === today) classes += ' today';
      if (sessionDates[dateStr]) classes += ' has-session';
      if (dateStr === selectedMiniCalDay) classes += ' selected';
      html += '<div class="' + classes + '" onclick="window._mcCalSelect(\'' + dateStr + '\')" role="button" tabindex="0" onkeydown="if(event.key===\'Enter\')window._mcCalSelect(\'' + dateStr + '\')">' + d + '</div>';
    }

    html += '</div></div>';
    container.innerHTML = html;
  }

  window._mcCalPrev = function() { miniCalMonth--; if (miniCalMonth < 0) { miniCalMonth = 11; miniCalYear--; } selectedMiniCalDay = null; renderMiniCalendar(); };
  window._mcCalNext = function() { miniCalMonth++; if (miniCalMonth > 11) { miniCalMonth = 0; miniCalYear++; } selectedMiniCalDay = null; renderMiniCalendar(); };
  window._mcCalSelect = function(dateStr) {
    selectedMiniCalDay = dateStr;
    renderMiniCalendar();
    // Scroll to matching enrollment card
    var cards = document.querySelectorAll('.mc-card');
    for (var i = 0; i < cards.length; i++) {
      var card = cards[i];
      var meta = card.querySelector('.mc-card-meta');
      if (meta && meta.textContent.indexOf(formatSessionDate(dateStr, null).replace(/ at.*/, '')) !== -1) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.boxShadow = '0 0 0 2px var(--primary)';
        setTimeout(function(c) { return function() { c.style.boxShadow = ''; }; }(card), 2000);
        break;
      }
    }
  };

  // ── Stats Dashboard ──
  function renderStatsDashboard() {
    var container = document.getElementById('mcStatsDashboard');
    if (!container) return;
    if (allEnrollments.length === 0 && allPasses.length === 0) { container.innerHTML = ''; return; }

    var today = todayStr();
    var activePasses = allPasses.filter(function(p) { return p.status === 'active'; });

    var classesTaken = allEnrollments.filter(function(e) { return e.status === 'completed'; }).length;
    var upcoming = allEnrollments.filter(function(e) {
      var session = sessionsMap[e.sessionId] || {};
      return session.date >= today && e.status === 'confirmed';
    }).length;

    var html = '<div class="mc-stats">';
    html += '<div class="mc-stat"><span class="mc-stat-value">' + activePasses.length + '</span><span class="mc-stat-label">Active Passes</span></div>';
    html += '<div class="mc-stat"><span class="mc-stat-value">' + (visitsRemaining || '&infin;') + '</span><span class="mc-stat-label">Visits Left</span></div>';
    html += '<div class="mc-stat"><span class="mc-stat-value">' + classesTaken + '</span><span class="mc-stat-label">Classes Taken</span></div>';
    html += '<div class="mc-stat"><span class="mc-stat-value">' + upcoming + '</span><span class="mc-stat-label">Upcoming</span></div>';
    html += '</div>';
    container.innerHTML = html;

  // ── Render enrollments ──
  function renderEnrollments() {
    var content = document.getElementById('mcContent');
    var today = todayStr();

    var enrollments = allEnrollments.map(function(e) {
      var session = sessionsMap[e.sessionId] || {};
      e._sessionDate = session.date || '';
      e._isPast = e._sessionDate < today ||
        e.status === 'completed' || e.status === 'cancelled' ||
        e.status === 'no-show' || e.status === 'cancelled_insufficient_enrollment';
      return e;
    });

    var filtered = enrollments.filter(function(e) {
      if (currentFilter === 'upcoming') return !e._isPast;
      if (currentFilter === 'past') return e._isPast;
      return true;
    });

    // Sort: upcoming ascending by date, past descending by date
    filtered.sort(function(a, b) {
      if (currentFilter === 'past') return (b._sessionDate || '').localeCompare(a._sessionDate || '');
      return (a._sessionDate || '').localeCompare(b._sessionDate || '');
    });

    var upcomingCount = enrollments.filter(function(e) { return !e._isPast; }).length;
    var pastCount = enrollments.filter(function(e) { return e._isPast; }).length;

    var html = '';

    // Wallet credit banner (loaded separately)
    html += '<div id="mcCreditBanner"></div>';

    // Tabs
    html += '<div class="mc-tabs" role="tablist">' +
      '<button class="mc-tab' + (currentFilter === 'upcoming' ? ' active' : '') + '" role="tab" aria-selected="' + (currentFilter === 'upcoming') + '" onclick="window._mcFilter(\'upcoming\')">Upcoming (' + upcomingCount + ')</button>' +
      '<button class="mc-tab' + (currentFilter === 'past' ? ' active' : '') + '" role="tab" aria-selected="' + (currentFilter === 'past') + '" onclick="window._mcFilter(\'past\')">Past (' + pastCount + ')</button>' +
      '<button class="mc-tab' + (currentFilter === 'all' ? ' active' : '') + '" role="tab" aria-selected="' + (currentFilter === 'all') + '" onclick="window._mcFilter(\'all\')">All (' + enrollments.length + ')</button>' +
      '</div>';

    if (filtered.length === 0) {
      if (enrollments.length === 0) {
        var emptyMsg = allPasses.length > 0
          ? 'You have active passes! Browse classes to use them.'
          : 'Browse our upcoming classes to get started.';
        html += '<div class="mc-empty">' +
          '<svg class="mc-empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="12" width="48" height="44" rx="4"/><path d="M8 24h48"/><circle cx="24" cy="36" r="4"/><circle cx="40" cy="36" r="4"/><circle cx="24" cy="48" r="4"/><path d="M20 8v8M44 8v8"/></svg>' +
          '<p>' + emptyMsg + '</p>' +
          '<a href="classes.html" class="mc-browse-btn">Browse Classes</a>' +
          '</div>';
      } else {
        html += '<div class="mc-empty"><p>No classes match this filter.</p></div>';
      }
    } else {
      html += '<div class="mc-list">';
      filtered.forEach(function(e) {
        var cls = classesMap[e.classId] || {};
        var session = sessionsMap[e.sessionId] || {};
        var isPast = e._isPast;

        // Enrollment type badge
        var typeBadge = e.enrollmentType === 'series'
          ? '<span class="mc-badge mc-badge-series">Series</span>'
          : '<span class="mc-badge mc-badge-dropin">Drop-in</span>';

        // Status badge
        var statusKey = (e.status || 'confirmed').replace(/-/g, '_');
        var statusLabel = e.status === 'cancelled_insufficient_enrollment' ? 'Cancelled' :
          e.status === 'waitlisted' ? 'Waitlist #' + (e.waitlistPosition || '?') :
          (e.status || 'confirmed').replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        var statusBadge = '<span class="mc-badge mc-status-' + esc(statusKey) + '">' + esc(statusLabel) + '</span>';

        // Swap button: series + allowDropIn + future + confirmed
        var showSwap = e.enrollmentType === 'series' &&
          cls.seriesInfo && cls.seriesInfo.allowDropIn === true &&
          session.date >= today &&
          e.status === 'confirmed';

        var swapBtn = showSwap
          ? ' <button class="mc-swap-btn" onclick="window._mcSwap(\'' + esc(e._id) + '\')" aria-label="Swap session for ' + esc(cls.name || 'class') + '">&#8644; Swap</button>'
          : '';

        // Meta info
        var meta = formatSessionDate(session.date, session.startTime);
        if (cls.instructorName) meta += '<br>Instructor: ' + esc(cls.instructorName);
        if (e.paymentMethod === 'pass') meta += '<br>Paid with pass';
        else if (e.pricePaid) meta += '<br>Paid: ' + formatPrice(e.pricePaid);

        var isReviewable = (e.status === 'completed') ||
          (e.status === 'confirmed' && e._sessionDate && e._sessionDate < today);

        html += '<article class="mc-card' + (isPast ? ' past' : '') + '"' +
          ' data-class-id="' + esc(e.classId) + '"' +
          ' data-class-name="' + esc(cls.name || 'Class') + '"' +
          (isReviewable ? ' data-reviewable="1"' : '') + '>' +
          '<div class="mc-card-info">' +
            '<h3><a href="class-detail.html?id=' + esc(e.classId) + '">' + esc(cls.name || 'Class') + '</a></h3>' +
            '<div class="mc-card-meta">' + meta + '</div>' +
          '</div>' +
          '<div class="mc-card-right">' +
            typeBadge + ' ' + statusBadge + swapBtn +
          '</div>' +
          '</article>';
      });
      html += '</div>';
    }

    content.innerHTML = html;

    // Load wallet credits
    loadWalletCredits();
    // Load class review prompts for completed enrollments
    loadClassReviewPrompts();
  }

  // ── Class review prompts ──
  function loadClassReviewPrompts() {
    if (!currentUser) return;
    var userEmail = currentUser.email || '';
    if (!userEmail) return;

    var articles = document.querySelectorAll('#mcContent .mc-card[data-reviewable="1"]');
    if (!articles.length) return;

    var db;
    try { db = firebase.app().firestore(); } catch (e) { return; }

    var seenClassIds = {};
    articles.forEach(function(article) {
      var classId = article.getAttribute('data-class-id');
      var className = article.getAttribute('data-class-name') || 'this class';
      if (!classId || seenClassIds[classId]) return;
      seenClassIds[classId] = true;

      if (sessionStorage.getItem('mast_class_review_dismissed_' + classId)) return;
      if (sessionStorage.getItem('mast_class_review_submitted_' + classId)) return;

      db.collection('tenants/' + TENANT_ID + '/cs_reviews')
        .where('productId', '==', classId)
        .where('authorEmail', '==', userEmail)
        .limit(1)
        .get()
        .then(function(snap) {
          if (!snap.empty) return;
          if (!article.parentNode) return;
          if (article.nextSibling && article.nextSibling.classList &&
              article.nextSibling.classList.contains('mc-review-prompt')) return;
          var wrapper = document.createElement('div');
          wrapper.innerHTML = renderClassReviewPrompt(classId, className);
          article.parentNode.insertBefore(wrapper.firstChild, article.nextSibling);
        })
        .catch(function() { /* silent — dedup is best-effort */ });
    });
  }

  function renderClassReviewPrompt(classId, className) {
    var cid = esc(classId);
    var cn = esc(className);
    var html = '<div class="mc-review-prompt" id="mc-review-prompt-' + cid + '" role="region" aria-label="Rate ' + cn + '">';
    html += '<div class="mc-review-prompt-heading">How was ' + cn + '?</div>';
    html += '<div class="mc-review-stars" id="mc-review-stars-' + cid + '">';
    for (var s = 1; s <= 5; s++) {
      html += '<button type="button" class="mc-review-star" data-rating="' + s + '"' +
        ' aria-label="' + s + ' star' + (s > 1 ? 's' : '') + '"' +
        ' onclick="window._mcRateClass(\'' + cid + '\',' + s + ')">&#9733;</button>';
    }
    html += '</div>';
    html += '<textarea class="mc-review-body" id="mc-review-body-' + cid + '" rows="2"' +
      ' placeholder="Tell us about your experience (optional)"></textarea>';
    html += '<div class="mc-review-footer">';
    html += '<button type="button" class="mc-review-submit" id="mc-review-submit-' + cid + '"' +
      ' onclick="window._mcSubmitClassReview(\'' + cid + '\')">Submit</button>';
    html += '<button type="button" class="mc-review-dismiss"' +
      ' onclick="window._mcDismissClassReview(\'' + cid + '\')">No thanks</button>';
    html += '</div>';
    html += '<div class="mc-review-error" id="mc-review-err-' + cid + '"></div>';
    html += '</div>';
    return html;

  window._mcRateClass = function(classId, rating) {
    var starsEl = document.getElementById('mc-review-stars-' + classId);
    if (!starsEl) return;
    var stars = starsEl.querySelectorAll('.mc-review-star');
    stars.forEach(function(star, i) { star.classList.toggle('selected', (i + 1) <= rating); });
    starsEl.setAttribute('data-selected', rating);
    var body = document.getElementById('mc-review-body-' + classId);
    var submit = document.getElementById('mc-review-submit-' + classId);
    if (body) body.style.display = '';
    if (submit) submit.style.display = '';
  };

  window._mcSubmitClassReview = function(classId) {
    var starsEl = document.getElementById('mc-review-stars-' + classId);
    var rating = starsEl ? parseInt(starsEl.getAttribute('data-selected'), 10) : 0;
    if (!rating) return;

    var bodyEl = document.getElementById('mc-review-body-' + classId);
    var submitBtn = document.getElementById('mc-review-submit-' + classId);
    var errEl = document.getElementById('mc-review-err-' + classId);
    var promptEl = document.getElementById('mc-review-prompt-' + classId);
    var reviewBody = bodyEl ? (bodyEl.value || '').trim() : '';

    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Submitting…'; }
    if (errEl) { errEl.textContent = ''; errEl.style.display = 'none'; }
    if (starsEl) starsEl.querySelectorAll('.mc-review-star').forEach(function(s) { s.disabled = true; });

    var authorName = (currentUser && currentUser.displayName) ? currentUser.displayName : 'Anonymous';
    var authorEmail = (currentUser && currentUser.email) ? currentUser.email : '';

    var cfUrl;
    try {
      var app = firebase.app();
      var base = (typeof TENANT_FIREBASE_CONFIG !== 'undefined' && TENANT_FIREBASE_CONFIG.cloudFunctionsBase)
        ? TENANT_FIREBASE_CONFIG.cloudFunctionsBase
        : 'https://us-central1-' + (app.options ? app.options.projectId : 'mast-platform-prod') + '.cloudfunctions.net';
      cfUrl = base + '/submitReview';
    } catch (e) {
      cfUrl = 'https://us-central1-mast-platform-prod.cloudfunctions.net/submitReview';
    }

    var getToken = currentUser ? currentUser.getIdToken() : Promise.resolve(null);

    getToken.then(function(idToken) {
      return fetch(cfUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Tenant-ID': typeof TENANT_ID !== 'undefined' ? TENANT_ID : ''
        },
        body: JSON.stringify({
          productId: classId,
          subjectType: 'class',
          rating: rating,
          title: '',
          body: reviewBody,
          authorName: authorName,
          authorEmail: authorEmail,
          idToken: idToken || undefined,
          source: 'post_class_my_classes'
        })
      });
    }).then(function(r) { return r.json(); })
    .then(function() {
      sessionStorage.setItem('mast_class_review_submitted_' + classId, '1');
      if (promptEl) {
        promptEl.innerHTML = '<div class="mc-review-thanks">Thanks for your feedback!</div>';
        setTimeout(function() {
          if (!promptEl || !promptEl.parentNode) return;
          promptEl.style.transition = 'opacity 0.4s ease';
          promptEl.style.opacity = '0';
          setTimeout(function() {
            if (promptEl && promptEl.parentNode) promptEl.parentNode.removeChild(promptEl);
          }, 400);
        }, 1800);
      }
    })
    .catch(function() {
      if (errEl) { errEl.textContent = 'Something went wrong. Please try again.'; errEl.style.display = ''; }
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Submit'; }
      if (starsEl) starsEl.querySelectorAll('.mc-review-star').forEach(function(s) { s.disabled = false; });
    });
  };

  window._mcDismissClassReview = function(classId) {
    sessionStorage.setItem('mast_class_review_dismissed_' + classId, '1');
    var promptEl = document.getElementById('mc-review-prompt-' + classId);
    if (!promptEl || !promptEl.parentNode) return;
    promptEl.style.transition = 'opacity 0.3s ease';
    promptEl.style.opacity = '0';
    setTimeout(function() {
      if (promptEl && promptEl.parentNode) promptEl.parentNode.removeChild(promptEl);
    }, 300);
  };

  // ── Wallet credit banner ──
  function loadWalletCredits() {
    if (!currentUser || !MastDB.tenantId()) return;
    var banner = document.getElementById('mcCreditBanner');
    if (!banner) return;

    MastDB.query('public/accounts/' + currentUser.uid + '/wallet/credits')
      .orderByChild('status').equalTo('active').once()
      .then(function(data) {
        data = data || {};
        var now = new Date().toISOString();
        var totalCents = 0;
        Object.keys(data).forEach(function(id) {
          var c = data[id];
          if (c.expiresAt && c.expiresAt < now) return; // skip expired
          totalCents += (c.amountCents || 0);
        });
        if (totalCents > 0) {
          banner.innerHTML = '<div class="mc-credit-banner">You have ' + formatPrice(totalCents) + ' in wallet credits available at checkout.</div>';
        }
      })
      .catch(function() { /* silent */ });
  }

  // ── Session swap ──
  window._mcSwap = function(enrollmentId) {
    var enrollment = allEnrollments.find(function(e) { return e._id === enrollmentId; });
    if (!enrollment) return;

    var cls = classesMap[enrollment.classId] || {};
    var modalRoot = document.getElementById('mcModalRoot');

    modalRoot.innerHTML =
      '<div class="mc-modal-overlay" onclick="if(event.target===this)window._mcCloseSwap()">' +
        '<div class="mc-modal" role="dialog" aria-label="Swap Session">' +
          '<h2>Swap Session</h2>' +
          '<div class="mc-modal-subtitle">' + esc(cls.name || 'Class') + '</div>' +
          '<div id="mcSwapSessions"><div class="mc-modal-loading">Loading available sessions...</div></div>' +
          '<button class="mc-modal-close" onclick="window._mcCloseSwap()">Cancel</button>' +
        '</div>' +
      '</div>';

    // Focus trap — focus the modal
    var modal = modalRoot.querySelector('.mc-modal');
    if (modal) modal.focus();

    // Escape key closes modal
    modalRoot._escHandler = function(ev) { if (ev.key === 'Escape') window._mcCloseSwap(); };
    document.addEventListener('keydown', modalRoot._escHandler);

    // Load available sessions
    var today = todayStr();
    MastDB.query('public/classSessions').orderByChild('classId').equalTo(enrollment.classId).once()
      .then(function(sessData) {
        sessData = sessData || {};
        var seriesEnrolled = cls.seriesEnrolled || 0;

        // Also check which sessions this student already has enrollments for
        var studentSessionIds = {};
        allEnrollments.forEach(function(e) {
          if (e.classId === enrollment.classId && e.status === 'confirmed') {
            studentSessionIds[e.sessionId] = true;
          }
        });

        var available = Object.keys(sessData).filter(function(sid) {
          var s = sessData[sid];
          if (sid === enrollment.sessionId) return false; // exclude current
          if (s.status !== 'scheduled') return false;
          if (s.date < today) return false;
          if (studentSessionIds[sid]) return false; // already enrolled
          var spotsLeft = (s.capacity || cls.capacity || 0) - seriesEnrolled - (s.enrolled || 0);
          return spotsLeft > 0;
        }).map(function(sid) {
          var s = sessData[sid];
          var spotsLeft = (s.capacity || cls.capacity || 0) - seriesEnrolled - (s.enrolled || 0);
          return { id: sid, date: s.date, startTime: s.startTime, spotsLeft: spotsLeft };
        }).sort(function(a, b) {
          return (a.date + (a.startTime || '')).localeCompare(b.date + (b.startTime || ''));
        });

        var container = document.getElementById('mcSwapSessions');
        if (!container) return;

        if (available.length === 0) {
          container.innerHTML = '<div class="mc-modal-empty">No other sessions available for swap.</div>';
          return;
        }

        var html = '<div class="mc-modal-sessions">';
        available.forEach(function(s) {
          html += '<div class="mc-modal-session" tabindex="0" role="button" onclick="window._mcExecSwap(\'' + esc(enrollmentId) + '\',\'' + esc(s.id) + '\')" onkeydown="if(event.key===\'Enter\')this.click()">' +
            '<div class="mc-modal-session-info">' + formatSessionDate(s.date, s.startTime) + '</div>' +
            '<div class="mc-modal-session-spots">' + s.spotsLeft + ' spot' + (s.spotsLeft !== 1 ? 's' : '') + ' left</div>' +
            '</div>';
        });
        html += '</div>';
        container.innerHTML = html;
      })
      .catch(function(err) {
        console.error('[my-classes] Swap load failed:', err);
        var container = document.getElementById('mcSwapSessions');
        if (container) container.innerHTML = '<div class="mc-modal-empty">Failed to load sessions. Please try again.</div>';
      });
  };

  window._mcExecSwap = function(enrollmentId, newSessionId) {
    var enrollment = allEnrollments.find(function(e) { return e._id === enrollmentId; });
    if (!enrollment || !currentUser) return;

    // Verify ownership
    if (enrollment.studentUid !== currentUser.uid) {
      showToast('Cannot swap: enrollment does not belong to you.', true);
      return;
    }

    var oldSessionId = enrollment.sessionId;
    var updates = {};

    // Update enrollment record
    updates['public/enrollments/' + enrollmentId + '/sessionId'] = newSessionId;
    updates['public/enrollments/' + enrollmentId + '/swappedAt'] = new Date().toISOString();
    updates['public/enrollments/' + enrollmentId + '/previousSessionId'] = oldSessionId;

    MastDB.multiUpdate(updates).then(function() {
      // Decrement old session enrolled counter
      return MastDB.transaction('public/classSessions/' + oldSessionId + '/enrolled',
        function(current) { return Math.max(0, (current || 0) - 1); });
    }).then(function() {
      // Increment new session enrolled counter
      return MastDB.transaction('public/classSessions/' + newSessionId + '/enrolled',
        function(current) { return (current || 0) + 1; });
    }).then(function() {
      window._mcCloseSwap();
      showToast('Session swapped successfully!');
      // Reload data
      loadEnrollments(currentUser);
    }).catch(function(err) {
      console.error('[my-classes] Swap failed:', err);
      showToast('Swap failed: ' + err.message, true);
    });
  };

  window._mcCloseSwap = function() {
    var modalRoot = document.getElementById('mcModalRoot');
    if (modalRoot._escHandler) {
      document.removeEventListener('keydown', modalRoot._escHandler);
      delete modalRoot._escHandler;
    }
    modalRoot.innerHTML = '';
  };

  // ── Filter ──
  window._mcFilter = function(filter) {
    currentFilter = filter;
    renderEnrollments();
  };

  // ── Data loading ──
  function loadEnrollments(user) {
    MastDB.query('public/enrollments').orderByChild('studentUid').equalTo(user.uid).once()
      .then(function(data) {
        data = data || {};
        var enrollments = Object.keys(data).map(function(id) {
          var e = data[id];
          e._id = id;
          return e;
        });

        if (enrollments.length === 0) {
          allEnrollments = [];
          classesMap = {};
          sessionsMap = {};
          renderEnrollments();
          return;
        }

        // Collect unique classIds and sessionIds
        var classIds = {};
        var sessionIds = {};
        enrollments.forEach(function(e) {
          if (e.classId) classIds[e.classId] = true;
          if (e.sessionId) sessionIds[e.sessionId] = true;
        });

        // Fetch class and session data in parallel
        var classPromises = Object.keys(classIds).map(function(cid) {
          return MastDB.get('public/classes/' + cid).then(function(d) {
            return { id: cid, data: d };
          });
        });
        var sessionPromises = Object.keys(sessionIds).map(function(sid) {
          return MastDB.get('public/classSessions/' + sid).then(function(d) {
            return { id: sid, data: d };
          });
        });

        // Also fetch passes
        var passesPromise = MastDB.get('public/accounts/' + user.uid + '/wallet/passes').then(function(pd) {
          pd = pd || {};
          return Object.keys(pd).map(function(id) { var p = pd[id]; p._id = id; return p; });
        }).catch(function() { return []; });

        return Promise.all([Promise.all(classPromises), Promise.all(sessionPromises), passesPromise])
          .then(function(results) {
            classesMap = {};
            results[0].forEach(function(r) { if (r.data) classesMap[r.id] = r.data; });
            sessionsMap = {};
            results[1].forEach(function(r) { if (r.data) sessionsMap[r.id] = r.data; });
            allPasses = results[2] || [];
            allEnrollments = enrollments;
            renderMiniCalendar();
            renderStatsDashboard();
            renderEnrollments();
          });
      })
      .catch(function(err) {
        console.error('[my-classes] Load failed:', err);
        document.getElementById('mcContent').innerHTML =
          '<div class="mc-empty"><p>Unable to load your classes. Please try again.</p></div>';
      });
  }

  // ── Init ──
  window.TENANT_READY.then(function() {
    document.title = 'My Classes \u2014 ' + (window.TENANT_TITLE_SUFFIX ? TENANT_TITLE_SUFFIX() : 'Studio');

    var app;
    try { app = firebase.app(); } catch (e) { app = firebase.initializeApp(TENANT_FIREBASE_CONFIG); }
    MastDB.init({ firestore: app.firestore(), tenantId: TENANT_ID });
    var auth = app.auth();

    auth.onAuthStateChanged(function(user) {
      if (user && !user.isAnonymous) {
        currentUser = user;
        loadEnrollments(user);
      } else {
        currentUser = null;
        allPasses = [];
        allEnrollments = [];
        document.getElementById('mcMiniCalendar').innerHTML = '';
        document.getElementById('mcStatsDashboard').innerHTML = '';
        renderSignIn();
      }
    });
  }).catch(function(err) {
    console.error('[my-classes] Tenant failed:', err);
  });
})();
</script>
<script src="cart.js"></script>
<script defer src="feedback-widget.js"></script>
<script defer src="share-widget.js"></script>

</body>
</html>
