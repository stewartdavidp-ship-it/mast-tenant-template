// ============================================================
// Save Sale
// ============================================================
// ============================================================
// W2.5: IndexedDB outbox for offline-queued sales
// ============================================================
var OUTBOX_DB_NAME = 'mast-pos';
var OUTBOX_DB_VERSION = 1;
var OUTBOX_STORE = 'pos_outbox';
var OUTBOX_MAX_ATTEMPTS = 5;

function _openOutboxDb() {
  return new Promise(function(resolve, reject) {
    if (!('indexedDB' in window)) { reject(new Error('IndexedDB not supported')); return; }
    var req = indexedDB.open(OUTBOX_DB_NAME, OUTBOX_DB_VERSION);
    req.onupgradeneeded = function() {
      var db = req.result;
      if (!db.objectStoreNames.contains(OUTBOX_STORE)) {
        var store = db.createObjectStore(OUTBOX_STORE, { keyPath: 'localId' });
        store.createIndex('syncedAt', 'syncedAt', { unique: false });
      }
    };
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

function _uuid() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'pos-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
}

function _writeSaleToOutbox(saleRecord) {
  return _openOutboxDb().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(OUTBOX_STORE, 'readwrite');
      var row = {
        localId: _uuid(),
        saleRecord: saleRecord,
        queuedAt: new Date().toISOString(),
        attemptCount: 0,
        lastAttemptError: null,
        syncedAt: null,
        serverSaleId: null
      };
      tx.objectStore(OUTBOX_STORE).put(row);
      tx.oncomplete = function() { resolve(row); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}

function _listOutbox() {
  return _openOutboxDb().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(OUTBOX_STORE, 'readonly');
      var req = tx.objectStore(OUTBOX_STORE).getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = function() { reject(req.error); };
    });
  });
}

function _updateOutboxRow(localId, patch) {
  return _openOutboxDb().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(OUTBOX_STORE, 'readwrite');
      var store = tx.objectStore(OUTBOX_STORE);
      var getReq = store.get(localId);
      getReq.onsuccess = function() {
        var row = getReq.result;
        if (!row) { resolve(null); return; }
        Object.keys(patch).forEach(function(k) { row[k] = patch[k]; });
        store.put(row);
      };
      tx.oncomplete = function() { resolve(true); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}

function _flushOutbox() {
  if (!navigator.onLine) return Promise.resolve({ flushed: 0, pending: 0, errors: 0 });
  return _listOutbox().then(function(rows) {
    var pending = rows.filter(function(r) {
      return !r.syncedAt && (r.attemptCount || 0) < OUTBOX_MAX_ATTEMPTS;
    });
    if (pending.length === 0) {
      _renderOutboxBadge(0);
      return { flushed: 0, pending: 0, errors: 0 };
    }
    var flushed = 0, errors = 0;
    return pending.reduce(function(p, row) {
      return p.then(function() {
        return _writeSaleToServer(row.saleRecord).then(function() {
          flushed++;
          return _updateOutboxRow(row.localId, {
            syncedAt: new Date().toISOString(),
            serverSaleId: row.saleRecord.saleId
          });
        }).catch(function(err) {
          errors++;
          return _updateOutboxRow(row.localId, {
            attemptCount: (row.attemptCount || 0) + 1,
            lastAttemptError: (err && err.message) || String(err)
          });
        });
      });
    }, Promise.resolve()).then(function() {
      return _listOutbox().then(function(rows2) {
        var still = rows2.filter(function(r) { return !r.syncedAt; }).length;
        _renderOutboxBadge(still);
        if (flushed > 0) showToast('Synced ' + flushed + ' queued sale' + (flushed === 1 ? '' : 's'));
        return { flushed: flushed, pending: still, errors: errors };
      });
    });
  }).catch(function(err) {
    console.warn('[pos-outbox] flush failed', err);
    return { flushed: 0, pending: 0, errors: 1 };
  });
}

function _renderOutboxBadge(count) {
  var el = document.getElementById('outboxBadge');
  if (!el) return;
  if (!count || count <= 0) { el.style.display = 'none'; return; }
  el.style.display = 'inline-flex';
  el.textContent = 'Outbox: ' + count + ' pending';
}

function _refreshOutboxBadge() {
  _listOutbox().then(function(rows) {
    var pending = rows.filter(function(r) { return !r.syncedAt; }).length;
    _renderOutboxBadge(pending);
  }).catch(function() {});
}

// ============================================================
// W2.5: Network-write half of saveSale (extracted)
// Resolves on Firestore write success; rejects on any network failure.
// ============================================================
function _writeSaleToServer(saleRecord) {
  var saleId = saleRecord.saleId;
  var now = saleRecord.createdAt || saleRecord.timestamp;
  var items = saleRecord.items || [];
  var imagePromise;
  if (saleRecord.__capturedImageBase64 && saleRecord.__authToken) {
    imagePromise = fetch(UPLOAD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + saleRecord.__authToken },
      body: JSON.stringify({ image: saleRecord.__capturedImageBase64, tags: ['pos', 'sale'], source: 'pos' })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.imageId) saleRecord.imageId = data.imageId;
    })
    .catch(function() { /* Image save failed — continue without */ });
  } else {
    imagePromise = Promise.resolve();
  }

  return imagePromise.then(function() {
    // Create the REAL order through the shop pipeline (submitOrder POS mode).
    // The order draws down physical onHand itself (server-side), so the client
    // does NOT decrement inventory — that would double-count stock.
    return _createPosOrder(saleRecord);
  }).then(function(orderResult) {
    saleRecord.orderId = orderResult.orderId || null;
    saleRecord.orderNumber = orderResult.orderNumber || null;
    // The server reprices authoritatively (sales + coupon). Mirror its true total
    // into admin/sales so reports match the order, and keep the coupon discount.
    if (typeof orderResult.totalCents === 'number') saleRecord.amount = orderResult.totalCents;
    if (typeof orderResult.couponDiscountCents === 'number') saleRecord.couponDiscountCents = orderResult.couponDiscountCents;
    // Persist the admin/sales mirror (kept for existing reports + Fair mode),
    // now linked to the order. Strip transient __ fields first.
    var persisted = {};
    Object.keys(saleRecord).forEach(function(k) {
      if (k.indexOf('__') !== 0) persisted[k] = saleRecord[k];
    });
    return MastDB.set(SALES_PATH + '/' + saleId, persisted);
  }).then(function() {
    // Inventory is owned by the order now — no client-side decrement here.
    if (saleRecord.eventId && eventData && eventData.allocations) {
      return updateEventAllocations(items);
    }
  }).then(function() {
    autoReconcileSquare(saleId, now);
    return saleId;
  });
}

// Create a real in-person order via submitOrder's POS mode. Server reprices
// from the catalog and finalizes the order as paid + delivered (no hosted
// checkout — the seller charges on their own method). Resolves to the order
// result; rejects (non-network) on a server rejection e.g. insufficient stock.
// ============================================================
// Inline Square card capture (Square Point of Sale API app-switch) — flag-gated.
//   real: hand off to the Square POS app via the square-commerce-v1:// deep link.
//   sim:  round-trip through the SAME callback path with a chosen outcome, so the
//         whole Mast-side flow (persist → leave → return → restore → finalize with
//         the transaction ref) is testable without a device.
// Toggle on dev with ?inlinepay=1 and ?paysim=1 (persisted to localStorage; =0 clears).
// ============================================================
function _payFlag(key, param) {
  try {
    var p = new URLSearchParams(location.search);
    if (p.get(param) === '1') { localStorage.setItem(key, '1'); return true; }
    if (p.get(param) === '0') { localStorage.removeItem(key); return false; }
    return localStorage.getItem(key) === '1';
  } catch (e) { return false; }
}
function posInlinePay() { return _payFlag('mast_pos_inlinepay', 'inlinepay'); }
function posPaySim() { return _payFlag('mast_pos_paysim', 'paysim'); }

function _startSquareCharge(amountCents) {
  try {
    localStorage.setItem('mast_pos_pending_sq', JSON.stringify({
      items: saleItems,
      amount: amountCents,
      contact: (document.getElementById('posContact').value || ''),
      notes: (document.getElementById('saleNotes').value || ''),
      coupon: appliedCoupon || null
    }));
  } catch (e) {}
  if (posPaySim()) { _showSquareSim(amountCents); return; }
  // Real device: app-switch to the Square POS app (app id from config/square).
  MastDB.get('config/square').then(function(sq) {
    var appId = sq && (sq.applicationId || sq.appId || sq.clientId);
    var data = {
      amount_money: { amount: amountCents, currency_code: 'USD' },
      callback_url: location.origin + '/pos/?sqreturn=1',
      client_id: appId, version: '1.3',
      options: { supported_tender_types: ['CREDIT_CARD', 'CARD_ON_FILE'] },
      state: 'mastpos'
    };
    location.href = 'square-commerce-v1://payment/create?data=' + encodeURIComponent(JSON.stringify(data));
  }).catch(function() { showToast('Square config unavailable', true); });
}

// Simulator: a themed chooser that navigates to the same callback URL Square would
// return to — exercising the real persist/restore/finalize round-trip on desktop.
function _showSquareSim(amountCents) {
  var amt = fmtCents(amountCents);
  window.__sqSimGo = function(outcome, txn) {
    location.href = location.origin + '/pos/?sqreturn=1&sqsim=' + outcome + (txn ? '&txn=' + encodeURIComponent(txn) : '');
  };
  var ov = document.createElement('div');
  ov.id = 'sqSim';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;';
  ov.innerHTML =
    '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:340px;width:100%;text-align:center;">' +
      '<div style="font-size:13px;color:var(--muted);margin-bottom:4px;">Square (simulated)</div>' +
      '<div style="font-size:24px;font-weight:700;color:var(--text);margin-bottom:16px;">' + amt + '</div>' +
      '<div style="display:flex;flex-direction:column;gap:8px;">' +
        '<button onclick="__sqSimGo(\'approved\', \'SIM-\' + Date.now())" style="padding:14px;border-radius:8px;border:none;background:var(--green);color:#fff;font-weight:600;font-size:15px;cursor:pointer;">Approve ' + amt + '</button>' +
        '<button onclick="__sqSimGo(\'declined\')" style="padding:12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;">Decline</button>' +
        '<button onclick="__sqSimGo(\'cancelled\')" style="padding:12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:14px;cursor:pointer;">Cancel</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(ov);
}

// On launch: if we returned from a Square charge, restore the cart + finalize.
function _resumeSquareCharge() {
  var p;
  try { p = new URLSearchParams(location.search); } catch (e) { return; }
  if (!p.get('sqreturn')) return;
  try { history.replaceState(null, '', location.pathname); } catch (e) {}  // don't re-trigger on reload
  var raw = null;
  try { raw = JSON.parse(localStorage.getItem('mast_pos_pending_sq') || 'null'); } catch (e) {}
  try { localStorage.removeItem('mast_pos_pending_sq'); } catch (e) {}
  if (!raw || !raw.items || !raw.items.length) return;
  // Restore the register exactly as it was before the handoff.
  saleItems = raw.items;
  appliedCoupon = raw.coupon || null;
  var contactEl = document.getElementById('posContact'); if (contactEl) contactEl.value = raw.contact || '';
  var notesEl = document.getElementById('saleNotes'); if (notesEl) notesEl.value = raw.notes || '';
  paymentType = 'square';
  document.getElementById('cashBtn').classList.remove('selected');
  document.getElementById('squareBtn').classList.add('selected');
  showScreen('resultScreen');
  refreshCartUI();
  // Outcome — sim: sqsim+txn; real: data={status, transaction_id, ...}.
  var outcome, txn;
  if (p.get('sqsim')) { outcome = p.get('sqsim'); txn = p.get('txn'); }
  else if (p.get('data')) {
    try { var d = JSON.parse(p.get('data')); txn = d.transaction_id || d.client_transaction_id; outcome = d.error_code ? 'declined' : (txn ? 'approved' : 'cancelled'); }
    catch (e) { outcome = 'declined'; }
  }
  if (outcome === 'approved') {
    window._pendingSquareRef = txn || 'square';
    saveSale();  // handoff guard is skipped (ref set) → finalizes with the ref
  } else {
    showToast(outcome === 'cancelled' ? 'Card payment cancelled' : 'Card declined — try again or take Cash', true);
  }
}

function _createPosOrder(saleRecord) {
  var token = authToken || saleRecord.__authToken; // prefer the live token (fresher on outbox flush)
  var orderItems = (saleRecord.items || []).map(function(it) {
    // Pass the variant-aware display name (e.g. "Hollow Bird — Blue"); submitOrder
    // stores item.name verbatim and doesn't backfill it from the catalog, so without
    // this the order/receipt line label is blank. Price is still server-repriced.
    var o = { pid: it.productId, variantId: it.variantId || null, qty: it.quantity, name: it.productName || '', skipSale: it.skipSale === true };
    if (it.overridePriceCents != null) o.overridePriceCents = it.overridePriceCents;
    if (it.pricingRuleId) o.pricingRuleId = it.pricingRuleId;
    return o;
  });
  var payload = { data: {
    channel: 'pos',
    // Origin jurisdiction for sales-tax + nexus (server persists it as order.taxState).
    taxState: saleRecord.taxState || '',
    items: orderItems,
    couponCode: saleRecord.couponCode || null,
    posPayment: { method: saleRecord.paymentType || 'cash', tenderedCents: saleRecord.amount || 0, ref: saleRecord.squareRef || undefined },
    customerContact: saleRecord.customerContact || null
  } };
  return fetch(TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/submitOrder', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'X-Tenant-ID': TENANT_ID },
    body: JSON.stringify(payload)
  }).then(function(r) { return r.json(); }).then(function(resp) {
    var result = resp && resp.result;
    if (!result || !result.success) {
      throw new Error((result && result.error) || 'Order could not be created');
    }
    return result; // { orderId, orderNumber, paid, paymentMethod }
  });
}

function saveSale() {
  if (saleItems.length === 0) { showToast('No items in sale', true); return; }

  var amountStr = document.getElementById('amountInput').value.replace(/[^0-9.]/g, '');
  var amountCents = Math.round(parseFloat(amountStr) * 100);
  if (isNaN(amountCents) || amountCents <= 0) { showToast('Enter a valid amount', true); return; }

  // Inline Square capture (flag-gated): hand a card sale to Square (device) or the
  // simulator, then resume here with a confirmed transaction ref. Card needs a
  // connection; cash still records offline.
  if (posInlinePay() && paymentType === 'square' && !window._pendingSquareRef) {
    if (!navigator.onLine) { showToast('Card needs a connection — take Cash offline', true); return; }
    _startSquareCharge(amountCents);
    return;
  }

  var btn = document.getElementById('saveSaleBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  var saleId = MastDB.newKey(SALES_PATH);
  var now = new Date().toISOString();

  // Optional receipt contact, asked at the register (email or phone).
  var contactVal = (document.getElementById('posContact').value || '').trim();
  var customerContact = null;
  if (contactVal) {
    customerContact = contactVal.indexOf('@') >= 0 ? { email: contactVal } : { phone: contactVal };
  }

  var saleRecord = {
    saleId: saleId,
    timestamp: now,
    createdAt: now,
    paymentType: paymentType,
    amount: amountCents,
    squareRef: window._pendingSquareRef || null,
    items: saleItems.map(function(item) {
      return { productId: item.productId, variantId: item.variantId || null, productName: item.productName, quantity: item.quantity, priceCents: item.priceCents || 0, skipSale: item.skipSale === true, overridePriceCents: (item.overridePriceCents != null ? item.overridePriceCents : null), pricingRuleId: item.pricingRuleId || null, confidence: item.confidence };
    }),
    couponCode: appliedCoupon ? appliedCoupon.code : null,
    imageId: null,
    receiptSent: false,
    customerContact: customerContact,
    squarePaymentId: null,
    eventId: eventId || null,
    status: 'captured',
    notes: document.getElementById('saleNotes').value || null,
    recordedBy: currentUser ? currentUser.uid : null,
    // Origin tax jurisdiction (studio GPS → seller home state). Stamped at sale
    // time so it survives offline queueing; submitOrder persists it on the order.
    taxState: resolvePosTaxState(posStudioState, posHomeState),
    // Transient fields stripped before persist:
    __capturedImageBase64: capturedImageBase64 || null,
    __authToken: authToken || null
  };

  function _onSaved(label) {
    window._pendingSquareRef = null;   // consumed by this sale
    lastSaleId = saleId;
    // saleRecord.amount is the server-authoritative total post sales+coupon
    // (set in _writeSaleToServer); fall back to the entered amount offline.
    lastSaleAmount = saleRecord.amount;
    lastSaleItems = saleItems.slice();
    btn.disabled = false;
    btn.textContent = 'Complete Sale';
    var totalStr = fmtCents(saleRecord.amount);
    var itemNames = saleItems.map(function(i) { return i.productName; }).join(', ');
    var orderTag = saleRecord.orderNumber ? ('Order ' + saleRecord.orderNumber + ' · ') : '';
    document.getElementById('successSummary').textContent = orderTag + totalStr + ' ' + paymentType + ' — ' + itemNames;
    document.getElementById('receiptForm').style.display = 'none';
    document.getElementById('receiptEmail').value = '';
    document.getElementById('receiptOptIn').checked = true;
    document.getElementById('receiptStatus').textContent = '';
    showScreen('successScreen');
    checkSculptureCommission(saleItems);
    if (label) showToast(label);
  }

  // Offline at submit time → queue directly
  if (!navigator.onLine) {
    _writeSaleToOutbox(saleRecord).then(function() {
      _refreshOutboxBadge();
      _onSaved('Offline — sale queued');
    }).catch(function(err) {
      btn.disabled = false;
      btn.textContent = 'Complete Sale';
      showToast('Could not queue sale: ' + (err.message || err), true);
    });
    return;
  }

  // Online: try server; on network failure, fall back to outbox
  _writeSaleToServer(saleRecord).then(function() {
    _onSaved();
  }).catch(function(err) {
    var isNetwork = err && (err.code === 'unavailable' ||
      /network|offline|failed to fetch|fetch/i.test(err.message || ''));
    if (isNetwork) {
      _writeSaleToOutbox(saleRecord).then(function() {
        _refreshOutboxBadge();
        _onSaved('Network down — sale queued');
      }).catch(function(qErr) {
        btn.disabled = false;
        btn.textContent = 'Complete Sale';
        showToast('Save failed and queue failed: ' + (qErr.message || qErr), true);
      });
    } else {
      btn.disabled = false;
      btn.textContent = 'Complete Sale';
      showToast('Error saving sale: ' + (err.message || err), true);
    }
  });
}

function updateEventAllocations(items) {
  if (!eventId) return Promise.resolve();
  var promises = [];
  items.forEach(function(item) {
    if (!item.productId) return;
    var soldPath = SALES_EVENTS_PATH + '/' + eventId + '/allocations/' + item.productId + '/sold';
    promises.push(
      MastDB.get(soldPath).then(function(current) {
        return MastDB.set(soldPath, (current || 0) + (item.quantity || 1));
      })
    );
  });
  return Promise.all(promises);
}

// ============================================================
// Catalog (home grid) + category strip
// ============================================================
// Normalize a category for de-duplication + matching: lowercase, treat
// hyphens/underscores as spaces, collapse whitespace. Merges the messy
// real-world variants a catalog accumulates — "Bowls"/"bowls",
// "Home Decor"/"home-decor" — into one browse chip.
function catKey(c) {
  return String(c || '').toLowerCase().replace(/[-_]+/g, ' ').replace(/\s+/g, ' ').trim();
}
function titleCase(s) {
  return String(s || '').replace(/\b\w/g, function(m) { return m.toUpperCase(); });
}

// Derive the category list from the catalog (normalized key -> Title-Case label),
// deduping "Bowls"/"bowls"/"home-decor" into one button. No DOM — the categories
// render as their own grid of buttons in renderCatalog (level 1).
function buildCategoryList() {
  var seen = {};
  function add(c) {
    var k = catKey(c);
    if (k && !(k in seen)) seen[k] = titleCase(k);
  }
  productsList.forEach(function(p) {
    add(p.category);
    if (Array.isArray(p.categories)) p.categories.forEach(add);
  });
  _catList = Object.keys(seen).sort().map(function(k) { return seen[k]; });
}

// Tap a category button → drill into that category's products. -1 = "All products".
function selectCategory(i) {
  currentCategory = i < 0 ? 'all' : _catList[i];
  variantParent = null;
  currentFilter = '';
  var sb = document.getElementById('catalogSearch');
  if (sb) sb.value = '';
  updateCatalogChrome();
  renderCatalog();
}

function productInCategory(p, cat) {
  if (cat === 'all') return true;
  var k = catKey(cat);
  if (catKey(p.category) === k) return true;
  if (Array.isArray(p.categories)) {
    for (var i = 0; i < p.categories.length; i++) {
      if (catKey(p.categories[i]) === k) return true;
    }
  }
  return false;
}

// ============================================================
// Variant resolution helpers — POS reimplements the small subset of
// products-v2 logic it needs (the admin module isn't loaded here).
// A variant inherits the product's base price/image unless it overrides.
// ============================================================
function productVariants(p) { return p && Array.isArray(p.variants) ? p.variants : []; }
function hasVariants(p) { return productVariants(p).length > 0; }

function variantLabel(v) {
  if (!v) return 'Variant';
  if (v.name) return v.name;                       // explicit name wins
  if (v.combo) {                                   // else the option combo, e.g. {color:'Red'}
    var parts = Object.keys(v.combo).map(function(k) { return v.combo[k]; }).filter(Boolean);
    if (parts.length) return parts.join(' / ');
  }
  return 'Variant';
}
function productImg(p) {
  var imgs = p && p.images;
  if (imgs && imgs.length) return typeof imgs[0] === 'string' ? imgs[0] : (imgs[0].url || '');
  return '';
}
function variantImg(p, v) {
  var imgs = (p && p.images) || [];
  if (v && typeof v.imageIndex === 'number' && v.imageIndex >= 0 && v.imageIndex < imgs.length) {
    var im = imgs[v.imageIndex];
    return typeof im === 'string' ? im : (im.url || '');
  }
  return productImg(p);                            // inherit base image
}
function variantPriceCents(p, v) {
  return (v && typeof v.priceCents === 'number') ? v.priceCents : (p.priceCents || 0);
}
// Lowest variant price — drives the "from $X" label on a parent tile.
function minVariantPriceCents(p) {
  var vs = productVariants(p), min = Infinity;
  vs.forEach(function(v) { var c = variantPriceCents(p, v); if (c > 0 && c < min) min = c; });
  return min === Infinity ? (p.priceCents || 0) : min;
}

// ============================================================
// Discount layer — sales + coupon. Mirrors submitOrder's computeOrderBreakdown
// so the register shows the same numbers the server will charge.
// ============================================================
function buildSaleLookup(salesData) {
  saleLookup = {}; tierRules = {};
  var data = salesData || {};
  var now = new Date().toISOString();
  Object.keys(data).forEach(function(sid) {
    var sale = data[sid];
    if (!sale || sale.archived) return;
    if (sale.startDate && sale.startDate > now) return;
    if (sale.endDate && sale.endDate < now) return;
    if (sale.channels && sale.channels.length && sale.channels.indexOf('pos') === -1) return;   // channel-scoped, not for POS
    (sale.products || []).forEach(function(entry) {
      var pid = typeof entry === 'string' ? entry : (entry && entry.pid);
      if (!pid) return;
      var variants = (entry && typeof entry === 'object' && entry.variants) ? entry.variants : null;
      if (sale.discountType === 'quantity-tier') {
        // Manual "X for $Y" deal — surfaced as a badge, not auto-applied.
        if (!Array.isArray(sale.tiers) || !sale.tiers.length) return;
        (tierRules[pid] = tierRules[pid] || []).push({ saleId: sid, name: sale.name || 'Deal', tiers: sale.tiers, variants: variants });
      } else {
        saleLookup[pid] = {
          saleName: sale.name || 'Sale',
          discountType: sale.discountType,
          discountValue: sale.discountValue,
          variants: variants
        };
      }
    });
  });
}
function _saleCents(originalCents, sale) {
  if (!sale || !(originalCents > 0)) return null;
  var c = sale.discountType === 'percent'
    ? Math.round(originalCents * (1 - (sale.discountValue || 0) / 100))
    : Math.max(0, originalCents - Math.round(sale.discountValue || 0));
  return (c < originalCents) ? c : null;        // only a "sale" if it actually reduces
}
// Active sale for a product/variant at its full price, or null. A variant-targeted
// sale only applies to a matching variant id (mirrors the server's check).
function lineSale(productId, variantId, fullCents) {
  var sale = saleLookup[productId];
  if (!sale) return null;
  if (sale.variants && variantId && sale.variants.indexOf(String(variantId)) === -1) return null;
  var sc = _saleCents(fullCents, sale);
  return sc == null ? null : { saleName: sale.saleName, saleCents: sc };
}
// Whether a cart line is currently being charged at its sale price.
function lineOnSale(it) { return !!(it && it.saleCents != null && !it.skipSale); }

// ── Quantity-tier deals ("X for $Y") — manual, badge-applied, priced on-device.
// Group total for n units, cycling beyond the top tier ("3 for $50" → 4 = $75).
// Mirrors the server's computeOrderBreakdown tier pass.
function bundleTotalCents(tiers, n) {
  if (!tiers || !tiers.length || n <= 0) return 0;
  var sorted = tiers.slice().sort(function(a, b) { return a.qty - b.qty; });
  var top = sorted[sorted.length - 1];
  var cycles = Math.floor(n / top.qty), rem = n % top.qty, remTotal = 0;
  if (rem > 0) {
    var exact = null, below = null;
    sorted.forEach(function(t) { if (t.qty === rem) exact = t; if (t.qty <= rem) below = t; });
    remTotal = exact ? exact.totalCents : (below ? below.totalCents : sorted[0].totalCents);
  }
  return cycles * top.totalCents + remTotal;
}
// Active tier rules for a product/variant (drives the badges).
function tierRulesFor(productId, variantId) {
  var rules = tierRules[productId];
  if (!rules) return [];
  return rules.filter(function(r) { return !(r.variants && variantId && r.variants.indexOf(String(variantId)) === -1); });
}
// Reprice every tier-tagged line: each rule's lines (in cart order) get the
// marginal price = bundle(units so far) − bundle(units before).
function recomputeTierGroups() {
  var counts = {};
  saleItems.forEach(function(it) {
    if (!it.pricingRuleId || !it._tierDef) return;
    var prev = counts[it.pricingRuleId] || 0;
    var nowN = prev + (it.quantity || 1);
    counts[it.pricingRuleId] = nowN;
    it.priceCents = bundleTotalCents(it._tierDef.tiers, nowN) - bundleTotalCents(it._tierDef.tiers, prev);
  });
}
function tierBadges(productId, variantId) {
  var rules = tierRulesFor(productId, variantId);
  if (!rules.length) return '';
  return '<div class="tier-badges">' + rules.map(function(r) {
    return '<button class="tier-badge" onclick="event.stopPropagation();addTierItem(\'' + productId + '\',' +
      (variantId ? '\'' + esc(String(variantId)) + '\'' : 'null') + ',\'' + esc(String(r.saleId)) + '\')">🏷️ ' + esc(r.name) + '</button>';
  }).join('') + '</div>';
}
// Add one unit of a product/variant under a tier rule (each tap = a unit).
function addTierItem(productId, variantId, saleId) {
  var prod = products[productId]; if (!prod) return;
  var rule = (tierRules[productId] || []).filter(function(r) { return String(r.saleId) === String(saleId); })[0];
  if (!rule) return;
  var name = prod.name, img = productImg(prod), full = prod.priceCents || 0;
  if (variantId) {
    var v = productVariants(prod).filter(function(x) { return String(x.id) === String(variantId); })[0];
    if (v) { name = prod.name + ' — ' + variantLabel(v); img = variantImg(prod, v); full = variantPriceCents(prod, v); }
  }
  saleItems.push({
    productId: productId, variantId: variantId || null, productName: name, imageUrl: img,
    quantity: 1, confidence: 100, fullPriceCents: full,
    saleName: null, saleCents: null, skipSale: false, overridePriceCents: null,
    pricingRuleId: saleId, pricingRuleName: rule.name, _tierDef: rule, priceCents: 0
  });
  refreshCartUI();   // recomputeTierGroups prices the new unit
  showToast('Added: ' + name + ' (' + rule.name + ')');
}

function tileHtml(onclickAttr, imgUrl, name, priceHtml, badge) {
  if (imgUrl) {
    return '<div class="picker-card" ' + onclickAttr + '>' +
      '<img src="' + imgUrl + '" alt="" loading="lazy">' + (badge || '') +
      '<div class="picker-card-info">' +
        '<div class="picker-card-name">' + esc(name) + '</div>' +
        '<div class="picker-card-price">' + priceHtml + '</div>' +
      '</div>' +
    '</div>';
  }
  // Photo-less product: name fills the tile face, price below (no duplicate name).
  return '<div class="picker-card" ' + onclickAttr + '>' +
    '<div class="picker-card-noimg"><span>' + esc(name) + '</span></div>' + (badge || '') +
    '<div class="picker-card-info">' +
      '<div class="picker-card-price">' + priceHtml + '</div>' +
    '</div>' +
  '</div>';
}

// The catalog is a 3-level button drill-down: categories → products → variants.
// All three render as the same large tiles into #catalogGrid.
function renderCatalog() {
  var grid = document.getElementById('catalogGrid');
  var f = (currentFilter || '').toLowerCase();

  // Level 3 — variants of the tapped product. Checked BEFORE search so tapping a
  // search result drills into its variants; the search term stays active so the
  // back bar returns to the results.
  if (variantParent) {
    var parent = products[variantParent];
    if (parent && hasVariants(parent)) {
      var vhtml = '';
      productVariants(parent).forEach(function(v) {
        var price = variantPriceCents(parent, v);
        vhtml += tileHtml(
          'onclick="pickVariant(\'' + parent.pid + '\',\'' + esc(String(v.id)) + '\')"',
          variantImg(parent, v), variantLabel(v), price > 0 ? fmtCents(price) : '', tierBadges(parent.pid, v.id));
      });
      grid.innerHTML = vhtml ||
        '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;">No variants</div>';
      return;
    }
    variantParent = null;                            // stale parent — fall through
  }

  // Search overrides the drill — show matching products across every category.
  if (f) {
    grid.innerHTML = productTilesHtml(productsList.filter(function(p) {
      return (p.name || '').toLowerCase().indexOf(f) !== -1;
    }));
    return;
  }

  // Level 1 — categories as buttons (the landing). Skipped when none exist.
  if (_catList.length && currentCategory == null) {
    var chtml = tileHtml('onclick="selectCategory(-1)"', '', 'All products', productsList.length + ' items', '');
    _catList.forEach(function(label, i) {
      var inCat = productsList.filter(function(p) { return productInCategory(p, label); });
      var img = '';
      for (var k = 0; k < inCat.length; k++) { var im = productImg(inCat[k]); if (im) { img = im; break; } }
      chtml += tileHtml('onclick="selectCategory(' + i + ')"', img, label,
        inCat.length + ' item' + (inCat.length !== 1 ? 's' : ''), '');
    });
    grid.innerHTML = chtml;
    return;
  }

  // Level 2 — products in the selected category (or all products).
  var list = (currentCategory && currentCategory !== 'all')
    ? productsList.filter(function(p) { return productInCategory(p, currentCategory); })
    : productsList;
  grid.innerHTML = productTilesHtml(list);
}

// Product tiles (shared by the category drill + search). A variant product shows
// "from $X" + an options badge and drills into its variants on tap.
function productTilesHtml(list) {
  if (!list.length) {
    return '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;">No products found</div>';
  }
  var html = '';
  list.forEach(function(p) {
    var priceHtml, badge = '';
    if (hasVariants(p)) {
      var min = minVariantPriceCents(p);
      priceHtml = min > 0 ? 'from ' + fmtCents(min) : '';
      badge = '<span class="variant-badge">' + productVariants(p).length + ' options ›</span>';
    } else {
      priceHtml = (typeof p.priceCents === 'number' && p.priceCents > 0) ? fmtCents(p.priceCents) : '';
    }
    if (!hasVariants(p)) badge += tierBadges(p.pid, null);   // deal badges on add-to-cart tiles
    html += tileHtml('onclick="onProductTap(\'' + p.pid + '\')"', productImg(p), p.name || '', priceHtml, badge);
  });
  return html;
}

function filterCatalog(val) {
  currentFilter = val || '';
  variantParent = null;                            // searching returns to the product list
  updateCatalogChrome();
  renderCatalog();
}

// Tap a product tile → drill into variants (2-step) or add directly (1-step).
function onProductTap(pid) {
  var prod = products[pid];
  if (!prod) return;
  if (hasVariants(prod)) {
    variantParent = pid;
    updateCatalogChrome();
    renderCatalog();
  } else {
    pickProduct(pid);
  }
}

function exitVariants() {
  variantParent = null;
  updateCatalogChrome();
  renderCatalog();
}

// Drill-up nav. The breadcrumb (toolbar) jumps to any level; onBackBar() steps up
// ONE level and drives the big bottom Back button (tablet) + the phone back chip.
function onBackBar() {
  if (variantParent) { exitVariants(); return; }   // variant -> product list (search stays active if set)
  if (currentFilter) {                              // search results -> landing
    var sb = document.getElementById('catalogSearch'); if (sb) sb.value = '';
    currentFilter = '';
    updateCatalogChrome(); renderCatalog();
    return;
  }
  exitToCategories();                               // category products -> categories landing
}
function exitToCategories() {
  currentCategory = null;
  variantParent = null;
  updateCatalogChrome();
  renderCatalog();
}
// Breadcrumb trail for the current drill state. Landing = just [All].
function buildCrumbs() {
  var crumbs = [{ label: 'All', target: 'home' }];
  if (currentFilter) {
    crumbs.push({ label: 'Search', target: 'search' });
  } else if (currentCategory && currentCategory !== 'all') {
    crumbs.push({ label: currentCategory, target: 'category' });
  }
  if (variantParent && products[variantParent]) {
    crumbs.push({ label: products[variantParent].name || 'Product', target: 'category' });
  }
  crumbs[crumbs.length - 1].current = true;
  return crumbs;
}
// Tap a crumb to jump straight to that level.
function crumbTo(target) {
  var sb = document.getElementById('catalogSearch');
  if (target === 'home') {
    if (currentFilter) { if (sb) sb.value = ''; currentFilter = ''; }
    exitToCategories();
  } else if (target === 'category') {
    if (currentFilter) { if (sb) sb.value = ''; currentFilter = ''; }
    variantParent = null;
    updateCatalogChrome(); renderCatalog();
  } else if (target === 'search') {
    variantParent = null;
    updateCatalogChrome(); renderCatalog();
  }
}
function renderBreadcrumb(crumbs) {
  var el = document.getElementById('breadcrumb');
  if (!el) return;
  var html = '';
  if (crumbs.length > 1) {
    html += '<button class="crumb crumb-back" onclick="onBackBar()"><span class="crumb-arrow">‹</span> Back</button>';
  }
  crumbs.forEach(function (c, i) {
    if (i > 0) html += '<span class="crumb-sep">›</span>';
    var cls = 'crumb' + (c.current ? ' current' : '');
    var click = c.current ? '' : ' onclick="crumbTo(\'' + c.target + '\')"';
    html += '<button class="' + cls + '"' + click + '>' + esc(c.label) + '</button>';
  });
  el.innerHTML = html;
}
function updateCatalogChrome() {
  var crumbs = buildCrumbs();
  renderBreadcrumb(crumbs);
  var main = document.querySelector('#catalogScreen .catalog-main');
  if (main) main.classList.toggle('has-back', crumbs.length > 1);
}

function pickProduct(pid) {
  var prod = products[pid];
  if (!prod) return;
  addToCart({ productId: pid, variantId: null, productName: prod.name, priceCents: prod.priceCents || 0, imageUrl: productImg(prod) });
  _afterAddReturn();
  showToast('Added: ' + prod.name);
}

function pickVariant(pid, vid) {
  var prod = products[pid];
  if (!prod) return;
  var v = productVariants(prod).filter(function(x) { return String(x.id) === String(vid); })[0];
  if (!v) return;
  var label = variantLabel(v);
  addToCart({ productId: pid, variantId: vid, productName: prod.name + ' — ' + label, priceCents: variantPriceCents(prod, v), imageUrl: variantImg(prod, v) });
  _afterAddReturn();                               // clear search + return, ready for the next item
  showToast('Added: ' + prod.name + ' — ' + label);
}

// After adding to cart, reset the browse state so the next item is one tap: drop out
// of variants, and if a search was active clear it (back to the landing or category).
function _afterAddReturn() {
  variantParent = null;
  if (currentFilter) {
    currentFilter = '';
    var sb = document.getElementById('catalogSearch'); if (sb) sb.value = '';
  }
  updateCatalogChrome();
  renderCatalog();
}

// Shared add/increment — dedup on product + variant.
function addToCart(item) {
  var existing = saleItems.findIndex(function(i) {
    return i.productId === item.productId && (i.variantId || null) === (item.variantId || null);
  });
  if (existing >= 0) {
    saleItems[existing].quantity++;
  } else {
    item.quantity = 1;
    item.confidence = 100;                         // manual pick
    // Discount layer: keep the full price, detect an active sale, default to the
    // sale price (staff can override the line to full price via toggleLineSale).
    item.fullPriceCents = (item.fullPriceCents != null) ? item.fullPriceCents : (item.priceCents || 0);
    var s = lineSale(item.productId, item.variantId, item.fullPriceCents);
    item.saleName = s ? s.saleName : null;
    item.saleCents = s ? s.saleCents : null;
    item.skipSale = false;
    item.overridePriceCents = null;
    recomputeLinePrice(item);
    saleItems.push(item);
  }
  refreshCartUI();
}

// Staff toggle on a line: charge full price vs the active sale price.
function toggleLineSale(idx) {
  var it = saleItems[idx];
  if (!it || it.saleCents == null || it.overridePriceCents != null) return;
  it.skipSale = !it.skipSale;
  recomputeLinePrice(it);
  refreshCartUI();
}

// Resolve a line's charged price: a manual override wins, else the sale price
// (unless the staff toggled full price), else the full catalog price.
function recomputeLinePrice(it) {
  if (it.pricingRuleId) return;   // tier-rule lines are priced by recomputeTierGroups
  if (it.overridePriceCents != null) it.priceCents = it.overridePriceCents;
  else if (it.saleCents != null && !it.skipSale) it.priceCents = it.saleCents;
  else it.priceCents = it.fullPriceCents;
}

// ── Manual price override (gated by the pos.overridePrice permission) ──
// Resolve the signed-in user's permission, mirroring the admin app's
// hasPermission() and the server's resolveSensitivePermission().
function loadPermissions() {
  canOverridePrice = false;
  if (!currentUser) return;
  var key = 'pos.overridePrice';
  MastDB.get('admin/users/' + currentUser.uid).then(function(u) {
    if (!u) return;
    var role = u.role || 'guest';
    var apply = function(val) { canOverridePrice = !!val; refreshCartUI(); };
    if (role === 'admin') { apply(true); return; }
    var ov = u.permissionOverrides || {};
    if (ov[key] !== undefined) { apply(ov[key] === true); return; }
    MastDB.get('admin/roles/' + role).then(function(r) {
      var sa = r && r.sensitiveActions;
      if (sa && sa[key] !== undefined) apply(sa[key] === true);
      else apply(role === 'manager');   // default mirrors server (admin + manager)
    }).catch(function() { apply(role === 'manager'); });
  }).catch(function() {});
}
// Themed in-app input dialog. Replaces window.prompt (which renders in the OS
// light style and ignores the POS theme). Mirrors the existing POS modal pattern
// (commission / event modals): var(--card) surface, var(--bg) field, var(--text)
// / var(--border) — so it tracks the active theme in both dark and light mode.
// Input dialogs use the shared UI engine: MastUI.prompt (shared/mast-ui.js) —
// a themed, var-token dialog that replaces window.prompt and renders correctly
// in both light and dark (POS tokens are aliased to the engine's in :root).
function overrideLinePrice(idx) {
  if (!canOverridePrice) { showToast('You don’t have permission to override prices', true); return; }
  var it = saleItems[idx];
  if (!it) return;
  MastUI.prompt({
    title: 'Override price for “' + it.productName + '” (per item)',
    value: (window.MastUI && MastUI.Num) ? MastUI.Num.moneyRaw(it.priceCents || 0, { cents: true }) : ((it.priceCents || 0) / 100).toFixed(2),
    inputmode: 'decimal',
    confirmLabel: 'Set price'
  }).then(function(input) {
    if (input == null) return;
    var v = parseFloat(String(input).replace(/[^0-9.]/g, ''));
    if (isNaN(v) || v < 0) { showToast('Enter a valid price', true); return; }
    it.overridePriceCents = Math.round(v * 100);
    recomputeLinePrice(it);
    refreshCartUI();
  });
}
function clearLineOverride(idx) {
  var it = saleItems[idx];
  if (!it) return;
  it.overridePriceCents = null;
  recomputeLinePrice(it);
  refreshCartUI();
}

// ── Coupon ──
// Subtotal eligible for the coupon: active line prices, optionally excluding
// lines currently being charged at a sale price (mirrors the server).
function couponEligibleCents() {
  var c = 0;
  saleItems.forEach(function(it) {
    if (appliedCoupon && appliedCoupon.excludeSaleItems && lineOnSale(it)) return;
    c += (it.priceCents || 0) * it.quantity;
  });
  return c;
}
function couponDiscountCents() {
  if (!appliedCoupon) return 0;
  var eligible = couponEligibleCents();
  if (eligible <= 0) return 0;
  var d = appliedCoupon.type === 'percent'
    ? Math.round(eligible * (appliedCoupon.value || 0) / 100)
    : Math.min(Math.round((appliedCoupon.value || 0) * 100), eligible);
  return Math.max(0, d);
}
function openCoupon() {
  if (appliedCoupon) { removeCoupon(); return; }
  MastUI.prompt({ title: 'Add coupon', placeholder: 'Coupon code', confirmLabel: 'Apply' })
    .then(function(code) {
      code = String(code || '').trim();
      if (code) applyCoupon(code);
    });
}
function applyCoupon(code) {
  if (!navigator.onLine) { showToast('Coupon needs a connection', true); return; }
  showToast('Checking coupon…');
  fetch(TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/validateCoupon', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken, 'X-Tenant-ID': TENANT_ID },
    body: JSON.stringify({ data: {
      code: code,
      subtotal: cartSubtotalCents() / 100,
      items: saleItems.map(function(it) { return { pid: it.productId, priceCents: it.priceCents || 0, qty: it.quantity }; })
    } })
  }).then(function(r) { return r.json(); }).then(function(resp) {
    var result = resp && resp.result;
    if (!result || !result.valid) { showToast((result && result.reason) || 'Coupon not valid', true); return; }
    appliedCoupon = { code: code.toUpperCase(), type: result.type, value: result.value, excludeSaleItems: !!result.excludeSaleItems };
    refreshCartUI();
    showToast('Coupon applied');
  }).catch(function(err) {
    showToast('Coupon check failed: ' + (err.message || err), true);
  });
}
function removeCoupon() {
  appliedCoupon = null;
  refreshCartUI();
}

// ============================================================
// Persistent cart panel
// ============================================================
// Post-sale subtotal (sum of each line's active price).
function cartSubtotalCents() {
  var total = 0;
  saleItems.forEach(function(it) { total += (it.priceCents || 0) * it.quantity; });
  return total;
}
// What the customer pays: subtotal minus the coupon.
function cartTotalCents() {
  return Math.max(0, cartSubtotalCents() - couponDiscountCents());
}

function fmtCents(c) {
  // Reuse the shared money formatter (separators + locale) instead of hand-rolling.
  return (window.MastUI && MastUI.Num) ? MastUI.Num.money(c, { cents: true }) : '$' + (c / 100).toFixed(2);
}

function renderCart() {
  var count = 0;
  saleItems.forEach(function(it) { count += it.quantity; });
  var subtotal = cartSubtotalCents();
  var coupon = couponDiscountCents();
  var total = Math.max(0, subtotal - coupon);
  var saleSavings = 0;
  saleItems.forEach(function(it) { if (lineOnSale(it)) saleSavings += (it.fullPriceCents - it.saleCents) * it.quantity; });

  document.getElementById('cartSummary').innerHTML = count > 0
    ? '<strong>' + count + ' item' + (count !== 1 ? 's' : '') + '</strong> <span class="muted">· ' + fmtCents(total) + '</span>'
    : '<span class="muted">Cart is empty</span>';

  var container = document.getElementById('cartItems');
  if (!saleItems.length) {
    container.innerHTML = '<div class="cart-empty">Tap a product to add it to the cart</div>';
  } else {
    var html = '';
    saleItems.forEach(function(item, idx) { html += cartItemHtml(item, idx); });
    container.innerHTML = html;
  }

  // Totals breakdown — shown only when a discount is in play.
  var totalsEl = document.getElementById('cartTotals');
  if (totalsEl) {
    var rows = '';
    if (saleSavings > 0 || coupon > 0) {
      rows += '<div class="row"><span>Subtotal</span><span>' + fmtCents(subtotal + saleSavings) + '</span></div>';
      if (saleSavings > 0) rows += '<div class="row discount"><span>Sale savings</span><span>−' + fmtCents(saleSavings) + '</span></div>';
      if (coupon > 0) rows += '<div class="row discount"><span>Coupon ' + esc(appliedCoupon.code) + '</span><span>−' + fmtCents(coupon) + '</span></div>';
      rows += '<div class="row" style="color:var(--text);font-weight:700;"><span>Total</span><span>' + fmtCents(total) + '</span></div>';
    }
    totalsEl.innerHTML = rows;
    totalsEl.style.display = rows ? 'block' : 'none';
  }

  // Coupon bar — apply button, or the applied chip with a remove control.
  var couponBar = document.getElementById('couponBar');
  if (couponBar) {
    if (appliedCoupon) {
      couponBar.innerHTML = '<div class="coupon-applied"><span>🏷️ ' + esc(appliedCoupon.code) +
        (coupon > 0 ? ' · −' + fmtCents(coupon) : ' · no discount') +
        '</span><span class="x" onclick="removeCoupon()">×</span></div>';
    } else {
      couponBar.innerHTML = '<button class="coupon-btn" onclick="openCoupon()">＋ Add coupon</button>';
    }
    couponBar.style.display = saleItems.length ? 'block' : 'none';
  }

  var chargeBtn = document.getElementById('cartChargeBtn');
  chargeBtn.disabled = saleItems.length === 0;
  chargeBtn.textContent = total > 0 ? 'Charge ' + fmtCents(total) : 'Charge';
}

// Keep every cart surface (panel, checkout list, amount field) in sync
function refreshCartUI() {
  recomputeTierGroups();   // tier-rule lines reprice on any cart change
  renderCart();
  if (document.getElementById('resultScreen').classList.contains('active')) {
    renderItems();
  }
  autoFillAmount();
}

function toggleCart() {
  if (window.innerWidth >= 768) return; // always-expanded rail on tablet
  document.getElementById('cartPanel').classList.toggle('expanded');
}

function goToCheckout() {
  if (saleItems.length === 0) { showToast('Cart is empty', true); return; }
  renderItems();
  autoFillAmount();
  showScreen('resultScreen');
}

// ============================================================
// Receipt Flow
// ============================================================

var lastSaleId = null;
var lastSaleAmount = 0;
var lastSaleItems = [];

function showReceiptForm() {
  document.getElementById('receiptForm').style.display = '';
  document.getElementById('receiptEmail').focus();
}

function skipReceipt() {
  document.getElementById('receiptForm').style.display = 'none';
}

async function sendReceipt() {
  var email = document.getElementById('receiptEmail').value.trim();
  var optIn = document.getElementById('receiptOptIn').checked;

  if (!email) { showToast('Enter email', true); return; }

  var btn = document.getElementById('sendReceiptBtn');
  var statusEl = document.getElementById('receiptStatus');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  statusEl.textContent = '';

  var token = authToken;
  var base = TENANT_FIREBASE_CONFIG.cloudFunctionsBase;
  var results = [];

  try {
    var receiptData = {
      items: lastSaleItems.map(function(i) { return { productName: i.productName, quantity: i.quantity }; }),
      amount: lastSaleAmount,
      date: new Date().toISOString().split('T')[0],
      saleId: lastSaleId
    };

    if (email) {
      var emailResp = await fetch(base + '/sendReceipt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'X-Tenant-ID': TENANT_ID },
        body: JSON.stringify(Object.assign({}, receiptData, { email: email }))
      });
      var emailResult = await emailResp.json();
      results.push(emailResult.success ? '📧 Email sent' : '❌ Email failed');
    }

    // Update sale record with customer contact
    if (lastSaleId) {
      var contactUpdate = { receiptSent: true, customerContact: {} };
      if (email) contactUpdate.customerContact.email = email;
      contactUpdate.customerContact.optIn = optIn;
      MastDB.update(SALES_PATH + '/' + lastSaleId, contactUpdate);
    }

    statusEl.innerHTML = '<span style="color:var(--green);">' + results.join(' · ') + '</span>';
    showToast(results.join(', '));
  } catch (err) {
    statusEl.innerHTML = '<span style="color:#f44336;">Error: ' + esc(err.message) + '</span>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send';
  }
}

// Auto-reconcile Square payment after PoS sale
async function autoReconcileSquare(saleId, saleTimestamp) {
  if (paymentType !== 'square') return;
  try {
    var token = authToken;
    var resp = await fetch(TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/reconcileSquarePayment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'X-Tenant-ID': TENANT_ID },
      body: JSON.stringify({ saleId: saleId, saleTimestamp: saleTimestamp, toleranceMinutes: 5 })
    });
    var result = await resp.json();
    if (result.matched) {
      console.log('Square reconciled: payment ' + result.paymentId + ', delta ' + result.deltaSeconds + 's');
    }
  } catch (err) {
    console.log('Square reconciliation skipped:', err.message);
  }
}

// ============================================================
// Sculpture Commission Prompt
// ============================================================
function checkSculptureCommission(items) {
  var sculptureItems = items.filter(function(item) {
    var prod = products[item.productId];
    return prod && prod.businessLine === 'sculpture';
  });
  if (sculptureItems.length === 0) return;

  var piece = sculptureItems[0];
  var prod = products[piece.productId];
  setTimeout(function() {
    showCommissionPrompt(piece.productId, prod.name);
  }, 500);
}

function showCommissionPrompt(pid, pieceName) {
  var modal = document.createElement('div');
  modal.id = 'commissionModal';
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.innerHTML =
    '<div style="background:var(--card);border-radius:12px;padding:24px;max-width:400px;width:100%;">' +
      '<h3 style="margin:0 0 8px 0;color:var(--text);font-size:1.1rem;">Commission Opportunity</h3>' +
      '<p style="margin:0 0 16px 0;color:var(--muted);font-size:0.88rem;">This piece has sold. Would you like to offer the customer a commission for a similar work?</p>' +
      '<div style="display:flex;gap:8px;">' +
        '<button onclick="openCommissionForm(\'' + pid.replace(/'/g, "\\'") + '\', \'' + (pieceName || '').replace(/'/g, "\\'") + '\')" style="flex:1;padding:12px;border-radius:6px;border:none;background:var(--gold);color:white;font-weight:600;font-size:0.88rem;cursor:pointer;">Yes — Log Inquiry</button>' +
        '<button onclick="dismissCommissionModal()" style="flex:1;padding:12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.88rem;cursor:pointer;">Skip</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
}

function dismissCommissionModal() {
  var modal = document.getElementById('commissionModal');
  if (modal) modal.remove();
}

function openCommissionForm(pid, pieceName) {
  var modal = document.getElementById('commissionModal');
  if (!modal) return;
  var inner = modal.querySelector('div');
  inner.innerHTML =
    '<h3 style="margin:0 0 12px 0;color:var(--text);font-size:1.1rem;">Log Commission Inquiry</h3>' +
    '<p style="margin:0 0 12px 0;color:var(--muted);font-size:0.82rem;">For: ' + (pieceName || 'Unknown piece') + '</p>' +
    '<div style="margin-bottom:12px;"><label style="display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;">Customer Name</label>' +
      '<input type="text" id="commName" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.88rem;box-sizing:border-box;"></div>' +
    '<div style="margin-bottom:12px;"><label style="display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;">Email</label>' +
      '<input type="text" id="commContact" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.88rem;box-sizing:border-box;"></div>' +
    '<div style="margin-bottom:16px;"><label style="display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;">Notes (optional)</label>' +
      '<textarea id="commNotes" rows="2" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.88rem;resize:vertical;box-sizing:border-box;"></textarea></div>' +
    '<div style="display:flex;gap:8px;">' +
      '<button id="commSubmitBtn" onclick="submitCommission(\'' + pid.replace(/'/g, "\\'") + '\', \'' + (pieceName || '').replace(/'/g, "\\'") + '\')" style="flex:1;padding:12px;border-radius:6px;border:none;background:var(--gold);color:white;font-weight:600;font-size:0.88rem;cursor:pointer;">Save Inquiry</button>' +
      '<button onclick="dismissCommissionModal()" style="flex:1;padding:12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.88rem;cursor:pointer;">Cancel</button>' +
    '</div>';
}

async function submitCommission(pid, pieceName) {
  var name = document.getElementById('commName').value.trim();
  var contact = document.getElementById('commContact').value.trim();
  var notes = document.getElementById('commNotes').value.trim();

  if (!name && !contact) {
    showToast('Enter at least a name or contact', true);
    return;
  }

  var btn = document.getElementById('commSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    var commId = MastDB.newKey('admin/commissions');
    var record = {
      sourcePieceId: pid,
      sourcePieceName: pieceName,
      customerName: name || null,
      customerContact: contact || null,
      notes: notes || null,
      status: 'new',
      channel: 'pos',
      createdAt: new Date().toISOString()
    };
    await MastDB.set('admin/commissions/' + commId, record);

    // Trigger SendGrid notification via Cloud Function
    try {
      var token = currentUser ? await currentUser.getIdToken() : null;
      if (token) {
        fetch(TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/commissionNotify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'X-Tenant-ID': TENANT_ID },
          body: JSON.stringify({ commissionId: commId, pieceName: pieceName, customerName: name, customerContact: contact, notes: notes, channel: 'pos' })
        }).catch(function() { /* notification failed silently */ });
      }
    } catch (e) { /* notification send failed — non-blocking */ }

    dismissCommissionModal();
    showToast('Commission inquiry saved');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Save Inquiry';
    showToast('Error: ' + err.message, true);
  }
}

// ============================================================
// New Sale (reset)
// ============================================================
function newSale() {
  saleItems = [];
  appliedCoupon = null;
  capturedImageBase64 = null;
  capturedPreviewUrl = null;
  paymentType = 'cash';
  lastSaleId = null;
  lastSaleAmount = 0;
  lastSaleItems = [];
  document.getElementById('amountInput').value = '';
  document.getElementById('saleNotes').value = '';
  document.getElementById('posContact').value = '';
  document.getElementById('cashBtn').classList.add('selected');
  document.getElementById('squareBtn').classList.remove('selected');
  // Reset catalog browse state and return to the category grid (landing)
  currentCategory = null;
  currentFilter = '';
  variantParent = null;
  var search = document.getElementById('catalogSearch');
  if (search) search.value = '';
  if (camera && camera.isActive()) camera.stop();
  buildCategoryList();
  updateCatalogChrome();
  renderCatalog();
  refreshCartUI();
  document.getElementById('cartPanel').classList.remove('expanded');
  showScreen('catalogScreen');
}

// ============================================================
// Screen Management
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Loading...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function showToast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// W2.5: outbox auto-flush triggers
window.addEventListener('online', function() {
  console.log('[pos-outbox] online — flushing');
  _flushOutbox();
});
window.addEventListener('load', function() {
  _refreshOutboxBadge();
  if (navigator.onLine) {
    setTimeout(_flushOutbox, 1500);
  }
});
