<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>My Shop — Point of Sale</title><!-- TENANT: brand -->
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/pos/manifest.json">
<link rel="apple-touch-icon" href="/pos/icons/icon-192.png">
<script>
// Theme: follow the operator's saved preference (shared same-origin localStorage
// 'mast-theme', set by the storefront/admin) else the OS color scheme. Runs before
// the stylesheet so there is no flash; the CSS provides a light :root, an OS-dark
// fallback, and explicit html.dark / html.light overrides.
(function(){try{var s=localStorage.getItem('mast-theme');var d=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='dark'||(s!=='light'&&d))document.documentElement.classList.add('dark');else document.documentElement.classList.add('light');}catch(e){document.documentElement.classList.add('dark');}})();
// Catalog tile density (Large/Medium/Small) — set before paint so the grid never reflows.
(function(){try{var s=localStorage.getItem('pos-tile-size');document.documentElement.setAttribute('data-tile-size',(s==='medium'||s==='small')?s:'large');}catch(e){document.documentElement.setAttribute('data-tile-size','large');}})();
</script>
<style>
:root {
  /* Light theme (default) — mirrors the storefront palette. */
  --bg: #faf6f0;
  --card: #ffffff;
  --border: #e6ddcf;
  --text: #1a1a1a;
  --muted: #6b6560;
  /* Accents — shared across themes (used on buttons/badges with #fff/#000 text). */
  --gold: #c4944a;
  --green: #4caf50;
  --yellow: #ffc107;
  --red: #f44336;
  --blue: #42a5f5;
  /* Shared UI engine (MastUI) token aliases → map the engine's token names onto
     the POS palette so MastUI components (e.g. MastUI.prompt) theme correctly here.
     These reference the POS tokens above, so they flip with light/dark automatically. */
  --surface-card: var(--card);
  --text-primary: var(--text);
  --warm-gray: var(--muted);
  --bg-secondary: var(--bg);
  --amber: var(--gold);
  --amber-ink: #000;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
/* Dark theme — the original POS palette. Applied for OS dark with no explicit
   choice, and for an explicit html.dark. html.light forces light over OS dark. */
@media (prefers-color-scheme: dark) {
  :root { --bg: #1a1a1a; --card: #242424; --border: #333; --text: #e8e0d4; --muted: #9a9089; }
}
html.dark  { --bg: #1a1a1a; --card: #242424; --border: #333; --text: #e8e0d4; --muted: #9a9089; }
html.light { --bg: #faf6f0; --card: #ffffff; --border: #e6ddcf; --text: #1a1a1a; --muted: #6b6560; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: -webkit-fill-available;
  -webkit-user-select: none; user-select: none;
  padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
}

/* Top bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border);
}
.top-bar h1 { font-size: 16px; font-weight: 600; }
.top-bar .mode-badge { font-size: 11px; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 600; }

/* Screens */
.screen { display: none; height: calc(100vh - 50px - var(--safe-top) - var(--safe-bottom)); overflow-y: auto; }
.screen.active { display: flex; flex-direction: column; }

/* Camera screen */
#cameraScreen { position: relative; background: #000; overflow: hidden; }
#cameraScreen video { width: 100%; height: 100%; object-fit: cover; }
.capture-btn {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff;
  background: rgba(255,255,255,0.3); cursor: pointer; z-index: 10;
  -webkit-tap-highlight-color: transparent;
}
.capture-btn:active { background: rgba(255,255,255,0.6); }
.capture-btn.processing { opacity: 0.5; pointer-events: none; }
.camera-denied {
  display: none; position: absolute; inset: 0; background: var(--bg);
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  padding: 24px; text-align: center;
}
.camera-denied p { color: var(--muted); }
.manual-btn {
  position: absolute; bottom: 36px; right: 24px; z-index: 10;
  background: var(--card); color: var(--text); border: 1px solid var(--border);
  padding: 10px 16px; border-radius: 8px; font-size: 14px; cursor: pointer;
}

/* Result screen */
#resultScreen { padding: 0; }
.result-header { display: flex; gap: 12px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
.result-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }
.result-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.result-name { font-size: 18px; font-weight: 600; }
.result-confidence { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; margin-top: 4px; }
.conf-high { color: var(--green); }
.conf-med { color: var(--yellow); }
.conf-low { color: var(--red); }

/* Items list */
.items-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.sale-item {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  background: var(--card); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border);
}
.sale-item img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
.sale-item-info { flex: 1; }
.sale-item-name { font-weight: 600; font-size: 15px; }
.sale-item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.sale-item-qty { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-val { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }
.remove-btn { color: var(--red); font-size: 20px; cursor: pointer; padding: 4px 8px; }

/* Add more items button */
.add-more-btn {
  display: block; width: 100%; padding: 12px; margin-top: 4px;
  background: transparent; border: 2px dashed var(--border); border-radius: 8px;
  color: var(--muted); font-size: 14px; cursor: pointer; text-align: center;
}
.add-more-btn:active { background: var(--card); }

/* Payment section */
.payment-section { padding: 16px; border-top: 1px solid var(--border); background: var(--card); }
.payment-row { display: flex; gap: 8px; margin-bottom: 12px; }
.payment-type-btn {
  flex: 1; padding: 14px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--card); color: var(--text); font-size: 16px; font-weight: 600;
  cursor: pointer; text-align: center;
}
.payment-type-btn.selected { border-color: var(--gold); background: rgba(196,148,74,0.15); }
.amount-input {
  width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 24px; font-weight: 600;
  text-align: center; margin-bottom: 12px;
}
.amount-input::placeholder { color: var(--muted); }
.save-sale-btn {
  width: 100%; padding: 16px; border-radius: 8px; border: none;
  background: var(--green); color: #fff; font-size: 18px; font-weight: 700;
  cursor: pointer;
}
.save-sale-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.save-sale-btn:active:not(:disabled) { opacity: 0.8; }

/* Product tiles (shared by the catalog grid) — large, image-forward, price prominent */
.picker-card {
  background: var(--card); border-radius: 10px; border: 1px solid var(--border);
  overflow: hidden; cursor: pointer; transition: border-color 0.1s, transform 0.05s;
}
.picker-card { position: relative; }
.picker-card:active { border-color: var(--gold); transform: scale(0.98); }
/* Square tiles: image height = column width (no max-height cap), so each row
   is at least 1x the column. object-fit: contain shows the ENTIRE product
   (no cropping), letterboxed on a dark backdrop for non-square photos. */
.picker-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; background: var(--bg); display: block; }
/* Photo-less products: show the name on the tile face instead of a blank box. */
.picker-card-noimg { width: 100%; aspect-ratio: 1 / 1; background: linear-gradient(135deg, var(--card), var(--bg)); display: flex; align-items: center; justify-content: center; padding: 12px; box-sizing: border-box; }
.picker-card-noimg span { font-size: 16px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.3; max-height: 100%; overflow: hidden; }
.picker-card-info { padding: 10px 12px; }
.picker-card-name { font-size: 16px; font-weight: 600; line-height: 1.25; }
.picker-card-price { font-size: 18px; font-weight: 700; color: var(--gold); margin-top: 4px; }
/* "N options ›" badge on a product that drills into variants */
.variant-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: var(--text); font-size: 12px; font-weight: 600; padding: 4px 9px; border-radius: 999px; backdrop-filter: blur(2px); }
/* (Drill-up nav is the breadcrumb toolbar + bottom Back button — see .breadcrumb / .catalog-backbar.) */

/* Success screen */
#successScreen { align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 16px; }
#successScreen .checkmark { font-size: 72px; }
#successScreen h2 { font-size: 24px; }
#successScreen p { color: var(--muted); font-size: 16px; }
.new-sale-btn {
  margin-top: 16px; padding: 16px 40px; border-radius: 8px; border: none;
  background: var(--gold); color: #000; font-size: 18px; font-weight: 700; cursor: pointer;
}

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--card); color: var(--text); padding: 10px 20px; border-radius: 8px;
  font-size: 14px; z-index: 100; border: 1px solid var(--border);
  opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
.toast.error { border-color: var(--red); }

/* Loading overlay */
.loading-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  z-index: 50;
}
.loading-overlay.show { display: flex; }
.loading-overlay .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { color: var(--text); font-size: 14px; }

/* Auth screen */
#authScreen { align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 16px; }
#authScreen h2 { font-size: 20px; }
#authScreen p { color: var(--muted); }
.sign-in-btn {
  padding: 14px 32px; border-radius: 8px; border: none;
  background: var(--gold); color: #000; font-size: 16px; font-weight: 600; cursor: pointer;
}

/* ============================================================
   Catalog-first POS: home grid + category strip + persistent cart
   ============================================================ */

/* Catalog screen (home) */
#catalogScreen { padding: 0; }
#catalogScreen.active { display: flex; flex-direction: column; }
.catalog-main { flex: 1; display: flex; flex-direction: column; min-height: 0; min-width: 0; }
/* Catalog toolbar: search/scan + breadcrumb. Stacked on phone; one row on tablet (see @media 768). */
.catalog-toolbar { display: flex; flex-direction: column; gap: 8px; padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
.catalog-search-row { display: flex; gap: 8px; align-items: center; }
.catalog-search-row input { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; }
.scan-btn { flex: 0 0 auto; display: flex; align-items: center; gap: 6px; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; }
.scan-btn:active { border-color: var(--gold); }
/* Breadcrumb — tappable crumbs that jump to any drill level (replaces the old gray back strip). */
.breadcrumb { display: flex; align-items: center; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.breadcrumb:empty { display: none; }
.crumb { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 5px; padding: 9px 13px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; }
.crumb:active { transform: scale(0.97); }
.crumb.current { border-color: var(--gold); background: rgba(196,148,74,0.15); cursor: default; }
.crumb-sep { flex: 0 0 auto; color: var(--muted); font-size: 15px; }
.crumb-arrow, .pos-back-arrow { font-size: 19px; line-height: 1; }
/* Big thumb-zone Back button below the product area (tablet only; phone uses the crumbs). */
.catalog-backbar { display: none; padding: 10px 14px; border-top: 1px solid var(--border); background: var(--card); }
.pos-back-btn { display: inline-flex; align-items: center; gap: 7px; padding: 13px 22px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; }
.pos-back-btn:active { border-color: var(--gold); transform: scale(0.98); }

/* Category strip */
.category-strip { display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
.cat-chip { flex: 0 0 auto; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.cat-chip.active { border-color: var(--gold); background: rgba(196,148,74,0.15); color: var(--text); }

/* Catalog grid scroll area (reuses .picker-card tile styles).
   Fixed 3 columns — large square tiles, scroll for more.
   grid-auto-rows: max-content is REQUIRED: with the default `auto`, rows size to
   min-content and an aspect-ratio image's derived height isn't counted, so each
   row collapsed to just the name/price strip and the square image overflowed
   (clipped by .picker-card's overflow:hidden). max-content sizes each row to the
   full square tile. */
#catalogGrid { flex: 1; overflow-y: auto; padding: 14px; padding-bottom: 96px; display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: max-content; gap: 14px; align-content: start; }
/* Tile density — Large(3) is the default above; Medium(4)/Small(5) re-flow the grid + scale tile text proportionally. */
html[data-tile-size="medium"] #catalogGrid { grid-template-columns: repeat(4, 1fr); }
html[data-tile-size="small"] #catalogGrid { grid-template-columns: repeat(5, 1fr); }
html[data-tile-size="medium"] .picker-card-name { font-size: 15px; }
html[data-tile-size="medium"] .picker-card-price { font-size: 16px; }
html[data-tile-size="small"] .picker-card-name { font-size: 14px; }
html[data-tile-size="small"] .picker-card-price { font-size: 15px; }
html[data-tile-size="small"] .picker-card-info { padding: 8px 10px; }
html[data-tile-size="small"] .picker-card-noimg span { font-size: 14px; }
/* Small-format override: on phones (<768px, the single-column layout) cap each
   density one step down so the denser options stay tappable. The 3/4/5 spec above
   holds on tablet+ (>=768px, the side-by-side layout). */
@media (max-width: 767px) {
  html[data-tile-size="large"] #catalogGrid { grid-template-columns: repeat(2, 1fr); }
  html[data-tile-size="medium"] #catalogGrid { grid-template-columns: repeat(3, 1fr); }
  html[data-tile-size="small"] #catalogGrid { grid-template-columns: repeat(4, 1fr); }
}

/* Cart panel — bottom sheet on phone, right rail on tablet */
.cart-panel { position: fixed; left: 0; right: 0; bottom: 0; background: var(--card); border-top: 1px solid var(--border); z-index: 40; display: flex; flex-direction: column; max-height: 78vh; padding-bottom: var(--safe-bottom); box-shadow: 0 -4px 16px rgba(0,0,0,0.3); }
.cart-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; gap: 12px; }
.cart-summary { font-size: 16px; }
.cart-summary .muted { color: var(--muted); font-weight: 400; font-size: 14px; }
.cart-header .chevron { color: var(--muted); transition: transform 0.2s; font-size: 14px; }
.cart-panel.expanded .cart-header .chevron { transform: rotate(180deg); }
.cart-body { display: none; flex-direction: column; min-height: 0; border-top: 1px solid var(--border); }
.cart-panel.expanded .cart-body { display: flex; }
.cart-items { overflow-y: auto; padding: 8px 12px; max-height: 42vh; }
.cart-empty { text-align: center; color: var(--muted); padding: 24px; font-size: 14px; }
.cart-charge-btn { margin: 12px 16px 16px; padding: 16px; border-radius: 8px; border: none; background: var(--green); color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; }
.cart-charge-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.cart-charge-btn:active:not(:disabled) { opacity: 0.85; }
/* Discount layer — sales + coupon */
.sale-badge { position: absolute; top: 8px; left: 8px; background: var(--red); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; }
.tile-orig { color: var(--muted); text-decoration: line-through; font-weight: 600; font-size: 14px; margin-right: 6px; }
.cart-line-orig { color: var(--muted); text-decoration: line-through; margin-right: 6px; }
.cart-line-sale { color: var(--red); font-weight: 700; }
.line-sale-toggle { margin-top: 4px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 2px 8px; border-radius: 999px; cursor: pointer; }
.line-sale-toggle:active { background: var(--card); }
.cart-totals { padding: 4px 16px 0; font-size: 14px; }
.cart-totals .row { display: flex; justify-content: space-between; margin-bottom: 4px; color: var(--muted); }
.cart-totals .row.discount { color: var(--red); }
.coupon-bar { padding: 8px 16px 0; }
.coupon-btn { width: 100%; background: transparent; border: 1px dashed var(--border); color: var(--muted); font-size: 14px; padding: 10px; border-radius: 8px; cursor: pointer; }
.coupon-btn:active { background: var(--card); }
.coupon-applied { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: rgba(76,175,80,0.12); border: 1px solid var(--green); border-radius: 8px; padding: 8px 12px; font-size: 14px; }
.coupon-applied .x { color: var(--red); cursor: pointer; font-size: 18px; padding: 0 4px; }
/* Account menu — mirrors the admin avatar dropdown (app/index.html), POS-tokenized. */
.avatar-menu-trigger { display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 2px 4px; border-radius: 6px; user-select: none; }
.avatar-menu-trigger:hover { background: rgba(127,127,127,0.12); }
.header-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; display: block; }
.header-avatar-initials { display: flex; align-items: center; justify-content: center; background: var(--gold); color: #000; font-size: 13px; font-weight: 700; }
.avatar-menu-chevron { font-size: 0.72rem; color: var(--muted); transition: transform 0.15s; line-height: 1; }
.avatar-menu-trigger[aria-expanded="true"] .avatar-menu-chevron { transform: rotate(180deg); }
.avatar-menu { position: fixed; top: 50px; right: 12px; min-width: 240px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 1100; display: none; overflow: hidden; }
.avatar-menu.open { display: block; }
.avatar-menu-header { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); }
.avatar-menu-header-name { font-size: 0.9rem; font-weight: 600; color: var(--text); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.avatar-menu-header-email { font-size: 0.78rem; color: var(--muted); margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.avatar-menu-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 16px; font-size: 0.9rem; color: var(--text); cursor: pointer; background: none; border: none; text-align: left; width: 100%; font-family: inherit; }
.avatar-menu-item:hover, .avatar-menu-item:focus { background: rgba(196,148,74,0.12); outline: none; }
.avatar-menu-item-suffix { color: var(--muted); font-size: 0.78rem; }
.avatar-menu-item-toggle { display: inline-block; position: relative; width: 32px; height: 18px; border-radius: 18px; background: rgba(120,120,120,0.7); transition: background 0.2s; flex-shrink: 0; }
.avatar-menu-item-toggle.on { background: var(--gold); }
.avatar-menu-item-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: left 0.2s; }
.avatar-menu-item-toggle.on::after { left: 16px; }
.avatar-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }
.avatar-menu-item-signout { color: var(--red); }
/* Feedback dialog — mirrors the admin (app/index.html .feedback-*), POS-tokenized. */
.feedback-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
.feedback-overlay.open { display: flex; }
.feedback-dialog { background: var(--card); border: 1px solid var(--border); border-radius: 10px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
.feedback-dialog-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.feedback-dialog-header h3 { font-size: 1.15rem; font-weight: 600; margin: 0; color: var(--text); }
.feedback-dialog-body { padding: 16px 24px 20px; }
.feedback-screen-badge { background: rgba(196,148,74,0.15); color: var(--gold); padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; margin-bottom: 16px; display: inline-block; }
.feedback-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

<!-- Success Screen -->
<div id="successScreen" class="screen">
  <div class="checkmark">&#10003;</div>

<!-- Firebase + Camera -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="../shared/mast-error.js?v=1"></script>
<script src="../shared/mastdb.js?v=1"></script>
<script src="../shared/mast-ui.js?v=1"></script>
<script src="../shared/camera.js"></script>
<script src="../pod-config.js"></script>
<script src="../storefront-tenant.js?v=3"></script>
<script src="../tenant-brand.js?v=3"></script>
<script>
// ============================================================
// Firebase Init — deferred until tenant config resolves
// ============================================================
var firebaseApp, db, auth;
var eventContextUnsub = null;
var CLASSIFY_URL, UPLOAD_URL, PRODUCTS_PATH, SALES_PATH, SALES_EVENTS_PATH, STUDIO_LOCATIONS_PATH, SALES_PROMOS_PATH;

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// W2.5: register service worker scoped to /pos/ ONLY (must not register at root —
// would steal admin/storefront fetches).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/pos/sw.js', { scope: '/pos/' })
      .then(function(reg) { console.log('[pos] SW registered scope=' + reg.scope); })
      .catch(function(err) { console.error('[pos] SW registration failed', err); });
  });
}
var STUDIO_RADIUS_METERS = 500;

// ============================================================
// State
// ============================================================
var products = {};
var productsList = [];
var camera = null;
var currentUser = null;
var authToken = null;
var saleItems = [];       // [{ productId, productName, quantity, confidence, price }]
var capturedImageBase64 = null;
var capturedPreviewUrl = null;
var paymentType = 'cash';

// Catalog browse state
var currentCategory = null;  // null = at the category grid (landing); 'all' or a label = product view
var currentFilter = '';
var _catList = [];
var variantParent = null; // pid whose variants are currently shown (2-step drill-in), else null

// Discount layer — active sales (read from public/sales-promotions) + an optional
// order-level coupon. The server (submitOrder) is authoritative; these only drive
// the register display and the per-line flags / coupon code sent at checkout.
var saleLookup = {};       // pid -> { saleName, discountType, discountValue, variants|null } (auto %/$ sales)
var tierRules = {};        // pid -> [{ saleId, name, tiers, variants|null }] (manual "X for $Y" deals)
var appliedCoupon = null;  // { code, type, value, excludeSaleItems } once validated
var canOverridePrice = false; // pos.overridePrice — resolved from the signed-in user's role

// Event context (from URL param or GPS detection)
var eventId = null;
var eventData = null;
var isRemote = false;

// Parse eventId from URL
(function() {
  var params = new URLSearchParams(window.location.search);
  eventId = params.get('eventId') || null;
})();

// Haversine distance in meters
function haversineDistance(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ── Tax jurisdiction (origin-based sourcing for in-person sales) ──
// In-person POS sales have no shipping address, so without this they reach
// submitOrder with no taxState and get silently dropped from sales-tax + nexus
// reporting. posStudioState is set when GPS places the register inside a
// configured studio location; posHomeState is the seller's registered state
// (config/tax.state), used as the fallback. Resolved into the order's taxState.
var posStudioState = '';
var posHomeState = '';
// Pure + single-line so the test harness can extract it (test/pos-tax-jurisdiction.test.js).
function resolvePosTaxState(locState, homeState) { var s = String(locState || homeState || '').trim().toUpperCase(); return /^[A-Z]{2}$/.test(s) ? s : ''; }

function detectLocation() {
  if (eventId) return; // Already linked via URL param

  // Fetch active events first (needed for all scenarios)
  MastDB.query(SALES_EVENTS_PATH).orderByChild('status').equalTo('active').once().then(function(activeEvents) {
    activeEvents = activeEvents || {};
    var eventKeys = Object.keys(activeEvents);

    // Show gear icon now that detection is running
    showAccountBtn();

    if (!navigator.geolocation) {
      // No geolocation — show event picker if events exist, else skip
      if (eventKeys.length > 0) showEventModal(activeEvents, null);
      return;
    }

    MastDB.get(STUDIO_LOCATIONS_PATH).then(function(locations) {
      if (!locations || Object.keys(locations).length === 0) {
        // No studios configured — show modal if events exist
        if (eventKeys.length > 0) showEventModal(activeEvents, null);
        return;
      }

      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        var nearStudio = false;

        Object.keys(locations).forEach(function(k) {
          var loc = locations[k];
          var dist = haversineDistance(lat, lng, loc.lat, loc.lng);
          if (dist <= (loc.radius || STUDIO_RADIUS_METERS)) {
            nearStudio = true;
            // Capture the jurisdiction of the studio we're standing in (first match wins).
            if (loc.state && !posStudioState) posStudioState = resolvePosTaxState(loc.state, '');
          }
        });

        if (!nearStudio) {
          isRemote = true;
          if (eventKeys.length === 1) {
            // Single active event — suggest it
            showEventModal(activeEvents, eventKeys[0]);
          } else if (eventKeys.length > 1) {
            // Multiple — let user pick
            showEventModal(activeEvents, null);
          } else {
            // Away from studio, no events
            showEventModal({}, null);
          }
        }
        // At studio — no modal, POS opens normally
      }, function() {
        // GPS failed — show event picker if events exist, else show away notice
        if (eventKeys.length > 0) showEventModal(activeEvents, null);
        else showEventModal({}, null);
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
    });
  });
}

function showEventModal(activeEvents, suggestedEventId) {
  var existing = document.getElementById('eventModeModal');
  if (existing) existing.remove();

  var eventKeys = Object.keys(activeEvents);
  var html = '<div id="eventModeModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;">' +
    '<div style="background:var(--card);border-radius:12px;padding:24px;max-width:380px;width:100%;text-align:center;">';

  if (eventKeys.length === 0) {
    // Scenario C: No active events
    html += '<div style="font-size:2.5rem;margin-bottom:12px;">📍</div>' +
      '<h3 style="margin:0 0 8px;font-size:16px;">You\u2019re away from the studio</h3>' +
      '<p style="color:var(--muted);font-size:14px;margin-bottom:20px;">No active events found. Sales will record without an event link.</p>' +
      '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
        '<button onclick="dismissEventModal()" style="padding:12px 24px;border-radius:8px;border:none;background:var(--green);color:white;font-size:14px;font-weight:600;cursor:pointer;">Continue</button>' +
      '</div>';
  } else if (suggestedEventId && activeEvents[suggestedEventId]) {
    // Scenario A: Single suggested event
    var ev = activeEvents[suggestedEventId];
    var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
    var evInfo = esc(ev.name || 'Active Event');
    if (evDate) evInfo += ' \u00b7 ' + esc(evDate);
    if (ev.location) evInfo += ' \u00b7 ' + esc(ev.location);

    html += '<div style="font-size:2.5rem;margin-bottom:12px;">🎪</div>' +
      '<h3 style="margin:0 0 8px;font-size:16px;">Craft Fair Mode</h3>' +
      '<p style="color:var(--muted);font-size:14px;margin-bottom:20px;">Detected: <strong>' + evInfo + '</strong></p>' +
      '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
        '<button onclick="linkToEvent(\'' + suggestedEventId + '\')" style="padding:12px 24px;border-radius:8px;border:none;background:var(--green);color:white;font-size:14px;font-weight:600;cursor:pointer;">\u2713 Yes, that\u2019s right</button>' +
        (eventKeys.length > 1 ? '<button onclick="expandEventList()" style="padding:12px 24px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;">Pick different \u25be</button>' : '') +
        '<button onclick="dismissEventModal()" style="padding:12px 24px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;">No event</button>' +
      '</div>' +
      '<div id="eventListExpanded" style="display:none;margin-top:16px;"></div>';
  } else {
    // Scenario B: Multiple events, no suggestion
    html += '<div style="font-size:2.5rem;margin-bottom:12px;">🎪</div>' +
      '<h3 style="margin:0 0 8px;font-size:16px;">Which event are you at?</h3>' +
      '<div style="margin-top:12px;text-align:left;">';
    eventKeys.forEach(function(eid) {
      var ev = activeEvents[eid];
      var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
      html += '<button onclick="linkToEvent(\'' + eid + '\')" style="display:block;width:100%;padding:12px 16px;margin-bottom:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;text-align:left;">' +
        '<strong>' + esc(ev.name || 'Event') + '</strong>' + (evDate ? ' <span style="color:var(--muted);">\u00b7 ' + esc(evDate) + '</span>' : '') +
        '</button>';
    });
    html += '<button onclick="dismissEventModal()" style="display:block;width:100%;padding:12px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:14px;cursor:pointer;text-align:center;">No event \u2014 just record sales</button>';
    html += '</div>';
  }

  html += '</div></div>';

  // Store active events for expandEventList / event settings
  window._activeEvents = activeEvents;

  document.body.insertAdjacentHTML('beforeend', html);
}

function expandEventList() {
  var container = document.getElementById('eventListExpanded');
  if (!container) return;
  var activeEvents = window._activeEvents || {};
  var html = '';
  Object.keys(activeEvents).forEach(function(eid) {
    var ev = activeEvents[eid];
    var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
    html += '<button onclick="linkToEvent(\'' + eid + '\')" style="display:block;width:100%;padding:10px 14px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;text-align:left;">' +
      '<strong>' + esc(ev.name || 'Event') + '</strong>' + (evDate ? ' <span style="color:var(--muted);">\u00b7 ' + esc(evDate) + '</span>' : '') +
      '</button>';
  });
  container.innerHTML = html;
  container.style.display = 'block';
}

function linkToEvent(evId) {
  eventId = evId;
  loadEventContext();
  dismissEventModal();
  showAccountBtn();
  showToast('Linked to event!');
}

function dismissEventModal() {
  var el = document.getElementById('eventModeModal');
  if (el) el.remove();
}

// Show + populate the top-bar account button (initials avatar) once signed in.
// ============================================================
// Account menu — mirrors the admin avatar dropdown (app/index.html): an
// avatar+chevron trigger opening a themed dropdown (identity, theme toggle,
// event/fair, feedback, sign out). Themed via the POS var tokens (light/dark).
// ============================================================
var _acctMenuOpen = false;

function _acctInitials() {
  var label = (currentUser && (currentUser.displayName || currentUser.email)) || '';
  return label ? label.trim().split(' ').filter(Boolean).map(function (w) { return w[0]; }).slice(0, 2).join('').toUpperCase() : '';
}
function _avatarFallback(img) {
  if (img && img.parentNode) img.parentNode.innerHTML = '<span class="header-avatar header-avatar-initials">' + esc(_acctInitials()) + '</span>';
}
// Show + populate the avatar trigger once signed in (photo, else initials).
function showAccountBtn() {

// Feedback — full dialog mirroring the admin (app/index.html openFeedbackDialog):
// type + severity chips, description, optional screenshot (html2canvas -> Storage).
// Writes the SAME feedbackReports schema so it renders in the admin inbox / My Feedback.
// ============================================================
// Auto error-capture — diagnostics L1 for the POS. Mirrors the admin's
// auto-report sink (app/index.html fireAutoReport): unhandled errors + promise
// rejections push a scrubbed source:'auto' feedbackReports doc, so POS failures
// surface in #diagnostics. Silent by design (no operator-facing toast mid-sale).
// Scrub + ring come from shared/mast-error.js (loaded first).
// ============================================================
var _posAutoCount = 0;
var _POS_AUTO_CAP = 10;        // per session — never flood the inbox
var _posAutoSeen = {};         // fingerprint -> expiry ts (dedup window)

function _posAutoIgnore(msg) {
  msg = String(msg || '');
  // Opaque cross-origin "Script error." and the benign ResizeObserver loop warning.
  return !msg || /^Script error\.?$/i.test(msg) || /ResizeObserver loop/i.test(msg);
}

function posAutoReport(type, message, detail) {
  try {
    if (!currentUser) return;                    // need auth to write
    if (_posAutoCount >= _POS_AUTO_CAP) return;
    if (_posAutoIgnore(message)) return;
    var fp = type + '::' + String(message || '').slice(0, 120);
    var now = Date.now();
    if (_posAutoSeen[fp] && _posAutoSeen[fp] > now) return;
    _posAutoSeen[fp] = now + 5 * 60 * 1000;       // 5-min dedup
    _posAutoCount++;
    var detailStr = detail ? String(detail).slice(0, 2000) : '';
    var report = {
      appId: (MastDB.tenantId && MastDB.tenantId()) || TENANT_ID,
      source: 'auto',
      screen: 'pos',
      screenLabel: (typeof getScreenLabel === 'function') ? getScreenLabel() : 'POS',
      type: 'bug',
      severity: 'medium',
      description: '[Auto-detected] ' + type + ' in POS | ' + String(message || '').slice(0, 200) + (detailStr ? ' | ' + detailStr : ''),
      detail: detailStr,
      email: null,
      userId: currentUser ? currentUser.uid : null,
      userName: currentUser ? (currentUser.displayName || currentUser.email || '') : null,
      deviceInfo: { userAgent: navigator.userAgent, viewport: { width: window.innerWidth, height: window.innerHeight } },
      appVersion: null,
      timestamp: new Date().toISOString(),
      status: 'open',
      jobId: null,
      createdAt: MastDB.serverTimestamp ? MastDB.serverTimestamp() : new Date().toISOString()
    };
    MastDB.push('feedbackReports', window.MastError ? MastError.scrubReport(report) : report)
      .catch(function (e) { try { console.warn('[posAutoReport] failed:', e); } catch (_) {} });
  } catch (e) { /* capture must NEVER throw — it stands in for a swallow */ }
}

// Install global handlers once (after MastDB is ready). posAutoReport guards on
// currentUser, so errors before sign-in are caught but not persisted.
function installPosAutoDetection() {
  if (window._posAutoInstalled) return;
  window._posAutoInstalled = true;
  var prev = window.onerror;
  window.onerror = function (msg, src, line, col, err) {
    try {
      var detail = (src || '') + ':' + (line || '') + ':' + (col || '') + (err && err.stack ? ' | ' + err.stack : '');
      posAutoReport('unhandled-error', msg, detail);
    } catch (e) {}
    return prev ? prev.apply(this, arguments) : false;
  };
  window.addEventListener('unhandledrejection', function (e) {
    try {
      var msg = (e.reason && (e.reason.message || String(e.reason))) || 'Unhandled promise rejection';
      posAutoReport('unhandled-rejection', msg, e.reason && e.reason.stack);
    } catch (_) {}
  });
}

function submitFeedback() {
  var desc = document.getElementById('fbDescription');
  if (!desc || !desc.value.trim()) return;
  var typeEl = document.getElementById('fbTypeVal');
  var sevEl = document.getElementById('fbSeverityVal');
  var wantScreenshot = !!(document.getElementById('fbScreenshot') && document.getElementById('fbScreenshot').checked);
  var btn = document.getElementById('fbSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; btn.style.opacity = '0.7'; }
  var descValue = desc.value.trim();
  var fbType = typeEl ? typeEl.value : 'bug';
  var fbSeverity = sevEl ? sevEl.value : 'medium';
  var screenLabel = getScreenLabel();
  closeFeedbackDialog();   // close first so a screenshot captures the underlying screen

  function buildReport(shotUrl, shotPath) {
    return {
      appId: (MastDB.tenantId && MastDB.tenantId()) || TENANT_ID,
      source: 'pos',
      screen: 'pos',
      screenLabel: screenLabel,
      type: fbType,
      severity: fbSeverity,
      description: descValue,
      email: (currentUser && currentUser.email) || null,
      userId: currentUser ? currentUser.uid : null,
      userName: currentUser ? (currentUser.displayName || currentUser.email || '') : null,
      deviceInfo: { userAgent: navigator.userAgent, viewport: { width: window.innerWidth, height: window.innerHeight } },
      appVersion: null,
      screenshotUrl: shotUrl || null,
      screenshotStoragePath: shotPath || null,
      timestamp: new Date().toISOString(),
      status: 'open',
      jobId: null,
      createdAt: MastDB.serverTimestamp ? MastDB.serverTimestamp() : new Date().toISOString()
    };
  }

  function pushReport(report) {
    return MastDB.push('feedbackReports', window.MastError ? MastError.scrubReport(report) : report).then(function () {
      showToast('Feedback submitted — thanks!');
    }).catch(function (e) {
      showToast('Error submitting feedback: ' + (e.message || e), true);
    });
  }

  if (!wantScreenshot) { pushReport(buildReport(null, null)); return; }

  // Capture the screenshot first (with a timeout), then push with the URL. A
  // failed/slow capture must never lose the report — fall back to no screenshot.
  var timeout = new Promise(function (_, rej) { setTimeout(function () { rej(new Error('screenshot timeout')); }, 8000); });
  Promise.race([captureFeedbackScreenshot(), timeout]).then(function (res) {
    pushReport(buildReport(res.url, res.storagePath));
  }).catch(function () {
    pushReport(buildReport(null, null));
  });
}

async function captureFeedbackScreenshot() {
  if (!window.html2canvas) {
    await new Promise(function (resolve, reject) {
      var sc = document.createElement('script');
      sc.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      sc.onload = resolve; sc.onerror = reject;
      document.head.appendChild(sc);
    });
  }
  var canvas = await window.html2canvas(document.body, {
    scale: 0.75, useCORS: true, logging: false, allowTaint: false, imageTimeout: 2000,
    foreignObjectRendering: false,
    width: window.innerWidth, height: window.innerHeight,
    x: window.scrollX || window.pageXOffset, y: window.scrollY || window.pageYOffset,
    ignoreElements: function (el) {
      if (el.tagName === 'IMG' && el.src) {
        try { var o = new URL(el.src, location.href).origin; if (o !== location.origin && !el.crossOrigin) return true; } catch (e) {}
      }
      if (el.tagName === 'IFRAME') return true;
      return false;
    }
  });
  return new Promise(function (resolve, reject) {
    canvas.toBlob(function (blob) {
      if (!blob) { reject(new Error('toBlob returned null')); return; }
      var tenantId = (MastDB.tenantId && MastDB.tenantId()) || TENANT_ID;
      var suffix = Math.random().toString(36).slice(2, 8);
      var storagePath = tenantId + '/feedback-screenshots/' + Date.now() + '-' + suffix + '.jpg';
      var ref = firebase.storage().ref(storagePath);
      ref.put(blob, { contentType: 'image/jpeg' }).then(function () {
        return ref.getDownloadURL();
      }).then(function (url) {
        resolve({ url: url, storagePath: storagePath });
      }).catch(reject);
    }, 'image/jpeg', 0.65);
  });
}

// Build a tenant-branded PWA manifest at runtime (the static /pos/manifest.json is
// generic + shared across tenants). Uses the tenant brand name so the installed
// home-screen app reads e.g. "Shir Glassworks POS".
function applyBrandedManifest() {
  try {
    var brand = (window.TENANT_BRAND && TENANT_BRAND.name) ||
      (document.title || '').split('—')[0].trim() || 'Shop';
    var manifest = {
      name: brand + ' POS',
      short_name: brand || 'POS',  // full brand; the OS ellipsizes the label (no mid-word cut)
      start_url: '/pos/', scope: '/pos/', display: 'standalone', orientation: 'portrait',
      background_color: '#1a1a1a', theme_color: '#1a1a1a',
      icons: [
        { src: '/pos/icons/icon-192.png', sizes: '192x192', type: 'image/png' },
        { src: '/pos/icons/icon-512.png', sizes: '512x512', type: 'image/png' }
      ]
    };
    var url = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }));
    var link = document.querySelector('link[rel="manifest"]');
    if (link) link.setAttribute('href', url);
  } catch (e) { /* keep the static manifest on any failure */ }
}

function loadEventContext() {
  if (!eventId) return;
  if (eventContextUnsub) { eventContextUnsub(); eventContextUnsub = null; }
  eventContextUnsub = MastDB.subscribe(SALES_EVENTS_PATH + '/' + eventId, function(val) {
    eventData = val;
    if (eventData) {
      document.getElementById('modeBadge').textContent = 'FAIR';
      document.getElementById('modeBadge').style.background = 'var(--green)';
      var banner = document.getElementById('eventBanner');
      banner.style.display = 'flex';
      document.getElementById('eventBannerName').textContent = eventData.name || 'Event';
      // Calculate stats
      var totalPacked = 0, totalSold = 0;
      if (eventData.allocations) {
        Object.keys(eventData.allocations).forEach(function(pid) {
          totalPacked += (eventData.allocations[pid].quantity || 0);
          totalSold += (eventData.allocations[pid].sold || 0);
        });
      }
      document.getElementById('eventBannerStats').textContent = totalPacked + ' packed, ' + totalSold + ' sold, ' + (totalPacked - totalSold) + ' remaining';
    }
  });
}

function loadProducts() {
  Promise.all([
    MastDB.get(PRODUCTS_PATH),
    MastDB.get(SALES_PROMOS_PATH).catch(function() { return null; })
  ]).then(function(res) {
    products = res[0] || {};
    buildSaleLookup(res[1]);
    productsList = Object.values(products)
      .filter(function(p) { return !p.availability || p.availability === 'available'; })
      .sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
    buildCategoryList();
    updateCatalogChrome();
    renderCatalog();
    refreshCartUI();
  });
}

function initCamera() {
  var video = document.getElementById('cameraVideo');
  camera = new MastCamera({
    videoElement: video,
    onCapture: handleCapture,
    onError: function(err) {
      if (err.type === 'permission') {
        document.getElementById('cameraDenied').style.display = 'flex';
      } else {
        showToast('Camera error: ' + err.message, true);
      }
    },
    onReady: function() {}
  });
  camera.start();
}

// Scanner is opt-in: launched from the catalog "Scan" button.
function openScanner() {
  document.getElementById('cameraDenied').style.display = 'none';
  showScreen('cameraScreen');
  if (!camera) { initCamera(); }
  else if (!camera.isActive()) { camera.start(); }
}

function closeScanner() {
  if (camera && camera.isActive()) camera.stop();
  showScreen('catalogScreen');
}

function capturePhoto() {
  if (!camera || !camera.isActive()) return;
  var btn = document.getElementById('captureBtn');
  btn.classList.add('processing');
  camera.capture().then(function() {
    btn.classList.remove('processing');
  }).catch(function() {
    btn.classList.remove('processing');
  });
}

function handleCapture(result) {
  capturedImageBase64 = result.base64;
  capturedPreviewUrl = result.previewUrl;
  camera.stop();

  // Show loading, call classify
  showLoading('Identifying product...');

  fetch(CLASSIFY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
    body: JSON.stringify({ image: result.base64, context: 'pos' })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    hideLoading();
    if (data.error) { showToast('Classification failed — pick from the catalog', true); closeScanner(); return; }

    // Multi-item response
    var items = data.items || [{ productId: data.productId, product: data.product, confidence: data.confidence, color: data.color, quantity: 1 }];

    var scanned = items.map(function(item) {
      var prod = item.productId ? products[item.productId] : null;
      return {
        productId: item.productId || null,
        productName: item.product || (prod ? prod.name : 'Unknown'),
        quantity: item.quantity || 1,
        confidence: item.confidence || 0,
        priceCents: prod ? (prod.priceCents || 0) : 0,
        imageUrl: prod && prod.images && prod.images.length > 0 ? (typeof prod.images[0] === 'string' ? prod.images[0] : (prod.images[0].url || '')) : ''
      };
    }).filter(function(item) { return item.productId; });

    if (scanned.length === 0) {
      showToast('Could not identify product — pick it from the catalog', true);
      closeScanner();
      return;
    }

    // Merge scanned items into the running cart, then return to the catalog
    scanned.forEach(function(s) {
      var ex = saleItems.findIndex(function(i) { return i.productId === s.productId; });
      if (ex >= 0) saleItems[ex].quantity += s.quantity;
      else saleItems.push(s);
    });
    if (camera && camera.isActive()) camera.stop();
    showScreen('catalogScreen');
    refreshCartUI();
    document.getElementById('cartPanel').classList.add('expanded');
    showToast('Added ' + scanned.length + ' item' + (scanned.length !== 1 ? 's' : '') + ' from photo');
  })
  .catch(function(err) {
    hideLoading();
    showToast('Error: ' + err.message, true);
    closeScanner();
  });
}

// ============================================================
// Cart line-item rendering (shared by the cart panel + checkout list)
// ============================================================
function cartItemHtml(item, idx) {
  var img = item.imageUrl
    ? '<img src="' + item.imageUrl + '" alt="">'
    : '<div style="width:50px;height:50px;background:var(--border);border-radius:6px;"></div>';
  // Tier-rule line: priced as part of its bundle (marginal); shows the rule badge
  // + its share, no qty/sale/override controls (each tap is one unit).
  if (item.pricingRuleId) {
    return '<div class="sale-item">' + img +
      '<div class="sale-item-info">' +
        '<div class="sale-item-name">' + esc(item.productName) + '</div>' +
        '<div class="sale-item-meta"><span class="cart-line-sale">' + fmtCents(item.priceCents || 0) + '</span>' +
          '<span class="tier-tag">🏷️ ' + esc(item.pricingRuleName || 'Deal') + '</span></div>' +
      '</div>' +
      '<span class="remove-btn" onclick="removeItem(' + idx + ')">&times;</span>' +
    '</div>';
  }
  var unit = item.priceCents || 0;
  var overridden = item.overridePriceCents != null;
  var onSale = item.saleCents != null && !item.skipSale && !overridden;
  // Per-item charged price (always shown). Struck full price when sale/override applies.
  var unitLine;
  if (overridden) {
    unitLine = '<span class="cart-line-orig">' + fmtCents(item.fullPriceCents) + '</span>' +
               '<span class="cart-line-sale">' + fmtCents(unit) + ' ea</span>' +
               '<span class="override-tag">override</span>';
  } else if (onSale) {
    unitLine = '<span class="cart-line-orig">' + fmtCents(item.fullPriceCents) + '</span>' +
               '<span class="cart-line-sale">' + fmtCents(unit) + ' ea</span>';
  } else {
    unitLine = '<span>' + fmtCents(unit) + ' ea</span>';
  }
  var lineTotal = item.quantity > 1 ? '<span class="cart-line-total"> · ' + fmtCents(unit * item.quantity) + '</span>' : '';
  var controls = '';
  if (item.saleCents != null && !overridden) {
    controls += '<button class="line-sale-toggle" onclick="toggleLineSale(' + idx + ')">' +
      (item.skipSale ? 'Apply ' + esc(item.saleName || 'sale') : 'Charge full price') + '</button>';
  }
  if (canOverridePrice) {
    controls += overridden
      ? '<button class="line-sale-toggle" onclick="clearLineOverride(' + idx + ')">Reset price</button>'
      : '<button class="line-sale-toggle" onclick="overrideLinePrice(' + idx + ')">Override price</button>';
  }
  return '<div class="sale-item">' + img +
    '<div class="sale-item-info">' +
      '<div class="sale-item-name">' + esc(item.productName) + '</div>' +
      '<div class="sale-item-meta">' + unitLine + lineTotal + '</div>' +
      (controls ? '<div class="line-controls">' + controls + '</div>' : '') +
    '</div>' +
    '<div class="sale-item-qty">' +
      '<button class="qty-btn" onclick="adjustQty(' + idx + ',-1)">-</button>' +
      '<span class="qty-val">' + item.quantity + '</span>' +
      '<button class="qty-btn" onclick="adjustQty(' + idx + ',1)">+</button>' +
    '</div>' +
    '<span class="remove-btn" onclick="removeItem(' + idx + ')">&times;</span>' +
  '</div>';
}
