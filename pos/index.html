<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>My Shop — Point of Sale</title><!-- TENANT: brand -->
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/pos/manifest.json">
<style>
:root {
  --bg: #1a1a1a;
  --card: #242424;
  --border: #333;
  --text: #e8e0d4;
  --muted: #9a9089;
  --gold: #c4944a;
  --green: #4caf50;
  --yellow: #ffc107;
  --red: #f44336;
  --blue: #42a5f5;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: -webkit-fill-available;
  -webkit-user-select: none; user-select: none;
  padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
}

/* Top bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border);
}
.top-bar h1 { font-size: 16px; font-weight: 600; }
.top-bar .mode-badge { font-size: 11px; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: 600; }

/* Screens */
.screen { display: none; height: calc(100vh - 50px - var(--safe-top) - var(--safe-bottom)); overflow-y: auto; }
.screen.active { display: flex; flex-direction: column; }

/* Camera screen */
#cameraScreen { position: relative; background: #000; overflow: hidden; }
#cameraScreen video { width: 100%; height: 100%; object-fit: cover; }
.capture-btn {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff;
  background: rgba(255,255,255,0.3); cursor: pointer; z-index: 10;
  -webkit-tap-highlight-color: transparent;
}
.capture-btn:active { background: rgba(255,255,255,0.6); }
.capture-btn.processing { opacity: 0.5; pointer-events: none; }
.camera-denied {
  display: none; position: absolute; inset: 0; background: var(--bg);
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  padding: 24px; text-align: center;
}
.camera-denied p { color: var(--muted); }
.manual-btn {
  position: absolute; bottom: 36px; right: 24px; z-index: 10;
  background: var(--card); color: var(--text); border: 1px solid var(--border);
  padding: 10px 16px; border-radius: 8px; font-size: 14px; cursor: pointer;
}

/* Result screen */
#resultScreen { padding: 0; }
.result-header { display: flex; gap: 12px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
.result-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }
.result-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.result-name { font-size: 18px; font-weight: 600; }
.result-confidence { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; margin-top: 4px; }
.conf-high { color: var(--green); }
.conf-med { color: var(--yellow); }
.conf-low { color: var(--red); }

/* Items list */
.items-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.sale-item {
  display: flex; align-items: center; gap: 12px; padding: 12px;
  background: var(--card); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border);
}
.sale-item img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
.sale-item-info { flex: 1; }
.sale-item-name { font-weight: 600; font-size: 15px; }
.sale-item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.sale-item-qty { display: flex; align-items: center; gap: 8px; }
.qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-val { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }
.remove-btn { color: var(--red); font-size: 20px; cursor: pointer; padding: 4px 8px; }

/* Add more items button */
.add-more-btn {
  display: block; width: 100%; padding: 12px; margin-top: 4px;
  background: transparent; border: 2px dashed var(--border); border-radius: 8px;
  color: var(--muted); font-size: 14px; cursor: pointer; text-align: center;
}
.add-more-btn:active { background: var(--card); }

/* Payment section */
.payment-section { padding: 16px; border-top: 1px solid var(--border); background: var(--card); }
.payment-row { display: flex; gap: 8px; margin-bottom: 12px; }
.payment-type-btn {
  flex: 1; padding: 14px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--card); color: var(--text); font-size: 16px; font-weight: 600;
  cursor: pointer; text-align: center;
}
.payment-type-btn.selected { border-color: var(--gold); background: rgba(196,148,74,0.15); }
.amount-input {
  width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 24px; font-weight: 600;
  text-align: center; margin-bottom: 12px;
}
.amount-input::placeholder { color: var(--muted); }
.save-sale-btn {
  width: 100%; padding: 16px; border-radius: 8px; border: none;
  background: var(--green); color: #fff; font-size: 18px; font-weight: 700;
  cursor: pointer;
}
.save-sale-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.save-sale-btn:active:not(:disabled) { opacity: 0.8; }

/* Product tiles (shared by the catalog grid) — large, image-forward, price prominent */
.picker-card {
  background: var(--card); border-radius: 10px; border: 1px solid var(--border);
  overflow: hidden; cursor: pointer; transition: border-color 0.1s, transform 0.05s;
}
.picker-card { position: relative; }
.picker-card:active { border-color: var(--gold); transform: scale(0.98); }
/* Square tiles: image height = column width (no max-height cap), so each row
   is at least 1x the column. object-fit: contain shows the ENTIRE product
   (no cropping), letterboxed on a dark backdrop for non-square photos. */
.picker-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: contain; background: #1a1a1a; display: block; }
/* Photo-less products: show the name on the tile face instead of a blank box. */
.picker-card-noimg { width: 100%; aspect-ratio: 1 / 1; background: linear-gradient(135deg, #2b2b2b, #1f1f1f); display: flex; align-items: center; justify-content: center; padding: 12px; box-sizing: border-box; }
.picker-card-noimg span { font-size: 16px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.3; max-height: 100%; overflow: hidden; }
.picker-card-info { padding: 10px 12px; }
.picker-card-name { font-size: 16px; font-weight: 600; line-height: 1.25; }
.picker-card-price { font-size: 18px; font-weight: 700; color: var(--gold); margin-top: 4px; }
/* "N options ›" badge on a product that drills into variants */
.variant-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: var(--text); font-size: 12px; font-weight: 600; padding: 4px 9px; border-radius: 999px; backdrop-filter: blur(2px); }
/* Back bar shown in place of the category strip while drilled into a product's variants */
.variant-back-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); cursor: pointer; font-size: 15px; color: var(--muted); }
.variant-back-bar strong { color: var(--text); }
.variant-back-arrow { font-size: 20px; line-height: 1; color: var(--gold); }
.variant-back-sep { color: var(--border); }

/* Success screen */
#successScreen { align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 16px; }
#successScreen .checkmark { font-size: 72px; }
#successScreen h2 { font-size: 24px; }
#successScreen p { color: var(--muted); font-size: 16px; }
.new-sale-btn {
  margin-top: 16px; padding: 16px 40px; border-radius: 8px; border: none;
  background: var(--gold); color: #000; font-size: 18px; font-weight: 700; cursor: pointer;
}

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--card); color: var(--text); padding: 10px 20px; border-radius: 8px;
  font-size: 14px; z-index: 100; border: 1px solid var(--border);
  opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
.toast.error { border-color: var(--red); }

/* Loading overlay */
.loading-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  z-index: 50;
}
.loading-overlay.show { display: flex; }
.loading-overlay .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { color: var(--text); font-size: 14px; }

/* Auth screen */
#authScreen { align-items: center; justify-content: center; padding: 40px; text-align: center; gap: 16px; }
#authScreen h2 { font-size: 20px; }
#authScreen p { color: var(--muted); }
.sign-in-btn {
  padding: 14px 32px; border-radius: 8px; border: none;
  background: var(--gold); color: #000; font-size: 16px; font-weight: 600; cursor: pointer;
}

/* ============================================================
   Catalog-first POS: home grid + category strip + persistent cart
   ============================================================ */

/* Catalog screen (home) */
#catalogScreen { padding: 0; }
#catalogScreen.active { display: flex; flex-direction: column; }
.catalog-main { flex: 1; display: flex; flex-direction: column; min-height: 0; min-width: 0; }
.catalog-header { display: flex; gap: 8px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); align-items: center; }
.catalog-header input { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; }
.scan-btn { flex: 0 0 auto; display: flex; align-items: center; gap: 6px; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; }
.scan-btn:active { border-color: var(--gold); }

/* Category strip */
.category-strip { display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
.cat-chip { flex: 0 0 auto; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.cat-chip.active { border-color: var(--gold); background: rgba(196,148,74,0.15); color: var(--text); }

/* Catalog grid scroll area (reuses .picker-card tile styles).
   Fixed 3 columns — large square tiles, scroll for more.
   grid-auto-rows: max-content is REQUIRED: with the default `auto`, rows size to
   min-content and an aspect-ratio image's derived height isn't counted, so each
   row collapsed to just the name/price strip and the square image overflowed
   (clipped by .picker-card's overflow:hidden). max-content sizes each row to the
   full square tile. */
#catalogGrid { flex: 1; overflow-y: auto; padding: 14px; padding-bottom: 96px; display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: max-content; gap: 14px; align-content: start; }

/* Cart panel — bottom sheet on phone, right rail on tablet */
.cart-panel { position: fixed; left: 0; right: 0; bottom: 0; background: var(--card); border-top: 1px solid var(--border); z-index: 40; display: flex; flex-direction: column; max-height: 78vh; padding-bottom: var(--safe-bottom); box-shadow: 0 -4px 16px rgba(0,0,0,0.3); }
.cart-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; gap: 12px; }
.cart-summary { font-size: 16px; }
.cart-summary .muted { color: var(--muted); font-weight: 400; font-size: 14px; }
.cart-header .chevron { color: var(--muted); transition: transform 0.2s; font-size: 14px; }
.cart-panel.expanded .cart-header .chevron { transform: rotate(180deg); }
.cart-body { display: none; flex-direction: column; min-height: 0; border-top: 1px solid var(--border); }
.cart-panel.expanded .cart-body { display: flex; }
.cart-items { overflow-y: auto; padding: 8px 12px; max-height: 42vh; }
.cart-empty { text-align: center; color: var(--muted); padding: 24px; font-size: 14px; }
.cart-charge-btn { margin: 12px 16px 16px; padding: 16px; border-radius: 8px; border: none; background: var(--green); color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; }
.cart-charge-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.cart-charge-btn:active:not(:disabled) { opacity: 0.85; }

@media (min-width: 768px) {
  #catalogScreen.active { flex-direction: row; }
  .cart-panel { position: static; max-height: none; flex: 0 0 340px; border-top: none; border-left: 1px solid var(--border); box-shadow: none; }
  .cart-header { cursor: default; }
  .cart-header .chevron { display: none; }
  .cart-body { display: flex !important; flex: 1; }
  .cart-items { max-height: none; flex: 1; }
  #catalogGrid { padding-bottom: 12px; }
}

/* Checkout (result) screen header + back nav */
.checkout-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
.back-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 8px 12px; cursor: pointer; }
.checkout-header h2 { font-size: 16px; font-weight: 600; }

/* Camera-screen close button (scanner is now opt-in) */
.cam-close { position: absolute; top: 16px; left: 16px; z-index: 11; background: rgba(0,0,0,0.55); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <h1 data-tenant="brand">My Shop</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="mode-badge" id="modeBadge">POS</span>
    <span id="outboxBadge" onclick="_flushOutbox()" style="display:none;align-items:center;gap:4px;font-size:0.72rem;background:var(--yellow);color:#000;padding:2px 8px;border-radius:10px;font-weight:600;cursor:pointer;" title="Tap to sync now"></span>
    <button id="eventSettingsBtn" onclick="showEventSettings()" style="display:none;background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:16px;cursor:pointer;color:var(--text);">⚙</button>
  </div>
</div>

<!-- Event Banner (shown when linked to an event) -->
<div id="eventBanner" style="display:none;background:var(--green);color:white;padding:8px 16px;font-size:13px;align-items:center;justify-content:space-between;">
  <span>🎪 <strong id="eventBannerName">Event</strong> — <span id="eventBannerStats">0 packed, 0 sold</span></span>
</div>

<!-- Auth Screen -->
<div id="authScreen" class="screen">
  <h2>Sign In Required</h2>
  <p>You need to sign in to use the Point of Sale.</p>
  <button class="sign-in-btn" onclick="signIn()">Sign In with Google</button>
</div>

<!-- Catalog Screen (home) — browse products, persistent cart -->
<div id="catalogScreen" class="screen">
  <div class="catalog-main">
    <div class="catalog-header">
      <input type="text" id="catalogSearch" placeholder="Search products..." oninput="filterCatalog(this.value)">
      <button class="scan-btn" onclick="openScanner()" title="Identify a product with the camera">📷 Scan</button>
    </div>
    <div class="category-strip" id="categoryStrip"></div>
    <div class="variant-back-bar" id="variantBackBar" onclick="exitVariants()" style="display:none;">
      <span class="variant-back-arrow">‹</span>
      <span>All products</span>
      <span class="variant-back-sep">·</span>
      <strong id="variantBackName"></strong>
    </div>
    <div id="catalogGrid"></div>
  </div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header" onclick="toggleCart()">
      <span class="cart-summary" id="cartSummary"><span class="muted">Cart is empty</span></span>
      <span class="chevron">▲</span>
    </div>
    <div class="cart-body">
      <div class="cart-items" id="cartItems"></div>
      <button class="cart-charge-btn" id="cartChargeBtn" onclick="goToCheckout()" disabled>Charge</button>
    </div>
  </div>
</div>

<!-- Camera / Scanner Screen (opt-in, launched from the Scan button) -->
<div id="cameraScreen" class="screen">
  <button class="cam-close" onclick="closeScanner()">‹ Back</button>
  <video id="cameraVideo" autoplay playsinline muted></video>
  <button class="capture-btn" id="captureBtn" onclick="capturePhoto()"></button>
  <button class="manual-btn" onclick="closeScanner()">Browse Catalog</button>
  <div class="camera-denied" id="cameraDenied">
    <p>Camera access is needed to identify products.<br>Please allow camera access in your browser settings.</p>
    <button class="manual-btn" style="position:static" onclick="closeScanner()">Browse Catalog Instead</button>
  </div>
</div>

<!-- Checkout / Pay Screen -->
<div id="resultScreen" class="screen">
  <div class="checkout-header">
    <button class="back-btn" onclick="addMoreItems()">‹ Back</button>
    <h2>Review &amp; Pay</h2>
  </div>
  <div class="items-list" id="itemsList"></div>
  <button class="add-more-btn" onclick="addMoreItems()">+ Add More Items</button>
  <div class="payment-section">
    <div class="payment-row">
      <button class="payment-type-btn selected" id="cashBtn" onclick="selectPayment('cash')">Cash</button>
      <button class="payment-type-btn" id="squareBtn" onclick="selectPayment('square')">Square</button>
    </div>
    <input type="text" class="amount-input" id="amountInput" placeholder="$0.00" inputmode="decimal" onfocus="this.select()">
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <input type="text" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;" id="posContact" placeholder="Email or phone for receipt (optional)" inputmode="email">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;" id="notesRow">
      <input type="text" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;" id="saleNotes" placeholder="Notes (optional)">
    </div>
    <button class="save-sale-btn" id="saveSaleBtn" onclick="saveSale()">Complete Sale</button>
  </div>
</div>

<!-- Success Screen -->
<div id="successScreen" class="screen">
  <div class="checkmark">&#10003;</div>
  <h2>Sale Recorded!</h2>
  <p id="successSummary"></p>
  <div id="receiptSection" style="margin-top:16px;">
    <button onclick="showReceiptForm()" style="background:none;border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;">📧 Send Receipt?</button>
    <div id="receiptForm" style="display:none;margin-top:16px;text-align:left;max-width:320px;margin-left:auto;margin-right:auto;">
      <div style="margin-bottom:10px;">
        <label style="font-size:13px;color:var(--muted);display:block;margin-bottom:4px;">Email</label>
        <input type="email" id="receiptEmail" placeholder="customer@email.com" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:'DM Sans',sans-serif;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--muted);">
          <input type="checkbox" id="receiptOptIn" checked> OK to follow up with future offers
        </label>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="sendReceiptBtn" onclick="sendReceipt()" style="flex:1;background:var(--primary);color:white;border:none;padding:10px;border-radius:6px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;">Send</button>
        <button onclick="skipReceipt()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:10px 16px;border-radius:6px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;">Skip</button>
      </div>
      <div id="receiptStatus" style="margin-top:8px;font-size:13px;"></div>
    </div>
  </div>
  <button class="new-sale-btn" onclick="newSale()">New Sale</button>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p id="loadingText">Identifying product...</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase + Camera -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="../shared/mastdb.js?v=1"></script>
<script src="../shared/camera.js"></script>
<script src="../pod-config.js"></script>
<script src="../storefront-tenant.js"></script>
<script src="../tenant-brand.js?v=2"></script>
<script>
// ============================================================
// Firebase Init — deferred until tenant config resolves
// ============================================================
var firebaseApp, db, auth;
var eventContextUnsub = null;
var CLASSIFY_URL, UPLOAD_URL, PRODUCTS_PATH, SALES_PATH, SALES_EVENTS_PATH, STUDIO_LOCATIONS_PATH;

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// W2.5: register service worker scoped to /pos/ ONLY (must not register at root —
// would steal admin/storefront fetches).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/pos/sw.js', { scope: '/pos/' })
      .then(function(reg) { console.log('[pos] SW registered scope=' + reg.scope); })
      .catch(function(err) { console.error('[pos] SW registration failed', err); });
  });
}
var STUDIO_RADIUS_METERS = 500;

// ============================================================
// State
// ============================================================
var products = {};
var productsList = [];
var camera = null;
var currentUser = null;
var authToken = null;
var saleItems = [];       // [{ productId, productName, quantity, confidence, price }]
var capturedImageBase64 = null;
var capturedPreviewUrl = null;
var paymentType = 'cash';

// Catalog browse state
var currentCategory = 'all';
var currentFilter = '';
var _catList = [];
var variantParent = null; // pid whose variants are currently shown (2-step drill-in), else null

// Event context (from URL param or GPS detection)
var eventId = null;
var eventData = null;
var isRemote = false;

// Parse eventId from URL
(function() {
  var params = new URLSearchParams(window.location.search);
  eventId = params.get('eventId') || null;
})();

// Haversine distance in meters
function haversineDistance(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function detectLocation() {
  if (eventId) return; // Already linked via URL param

  // Fetch active events first (needed for all scenarios)
  MastDB.query(SALES_EVENTS_PATH).orderByChild('status').equalTo('active').once().then(function(activeEvents) {
    activeEvents = activeEvents || {};
    var eventKeys = Object.keys(activeEvents);

    // Show gear icon now that detection is running
    document.getElementById('eventSettingsBtn').style.display = '';

    if (!navigator.geolocation) {
      // No geolocation — show event picker if events exist, else skip
      if (eventKeys.length > 0) showEventModal(activeEvents, null);
      return;
    }

    MastDB.get(STUDIO_LOCATIONS_PATH).then(function(locations) {
      if (!locations || Object.keys(locations).length === 0) {
        // No studios configured — show modal if events exist
        if (eventKeys.length > 0) showEventModal(activeEvents, null);
        return;
      }

      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        var nearStudio = false;

        Object.keys(locations).forEach(function(k) {
          var loc = locations[k];
          var dist = haversineDistance(lat, lng, loc.lat, loc.lng);
          if (dist <= (loc.radius || STUDIO_RADIUS_METERS)) nearStudio = true;
        });

        if (!nearStudio) {
          isRemote = true;
          if (eventKeys.length === 1) {
            // Single active event — suggest it
            showEventModal(activeEvents, eventKeys[0]);
          } else if (eventKeys.length > 1) {
            // Multiple — let user pick
            showEventModal(activeEvents, null);
          } else {
            // Away from studio, no events
            showEventModal({}, null);
          }
        }
        // At studio — no modal, POS opens normally
      }, function() {
        // GPS failed — show event picker if events exist, else show away notice
        if (eventKeys.length > 0) showEventModal(activeEvents, null);
        else showEventModal({}, null);
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
    });
  });
}

function showEventModal(activeEvents, suggestedEventId) {
  var existing = document.getElementById('eventModeModal');
  if (existing) existing.remove();

  var eventKeys = Object.keys(activeEvents);
  var html = '<div id="eventModeModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;">' +
    '<div style="background:var(--card);border-radius:12px;padding:24px;max-width:380px;width:100%;text-align:center;">';

  if (eventKeys.length === 0) {
    // Scenario C: No active events
    html += '<div style="font-size:2.5rem;margin-bottom:12px;">📍</div>' +
      '<h3 style="margin:0 0 8px;font-size:16px;">You\u2019re away from the studio</h3>' +
      '<p style="color:var(--muted);font-size:14px;margin-bottom:20px;">No active events found. Sales will record without an event link.</p>' +
      '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
        '<button onclick="dismissEventModal()" style="padding:12px 24px;border-radius:8px;border:none;background:var(--green);color:white;font-size:14px;font-weight:600;cursor:pointer;">Continue</button>' +
      '</div>';
  } else if (suggestedEventId && activeEvents[suggestedEventId]) {
    // Scenario A: Single suggested event
    var ev = activeEvents[suggestedEventId];
    var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
    var evInfo = esc(ev.name || 'Active Event');
    if (evDate) evInfo += ' \u00b7 ' + esc(evDate);
    if (ev.location) evInfo += ' \u00b7 ' + esc(ev.location);

    html += '<div style="font-size:2.5rem;margin-bottom:12px;">🎪</div>' +
      '<h3 style="margin:0 0 8px;font-size:16px;">Craft Fair Mode</h3>' +
      '<p style="color:var(--muted);font-size:14px;margin-bottom:20px;">Detected: <strong>' + evInfo + '</strong></p>' +
      '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
        '<button onclick="linkToEvent(\'' + suggestedEventId + '\')" style="padding:12px 24px;border-radius:8px;border:none;background:var(--green);color:white;font-size:14px;font-weight:600;cursor:pointer;">\u2713 Yes, that\u2019s right</button>' +
        (eventKeys.length > 1 ? '<button onclick="expandEventList()" style="padding:12px 24px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;">Pick different \u25be</button>' : '') +
        '<button onclick="dismissEventModal()" style="padding:12px 24px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;">No event</button>' +
      '</div>' +
      '<div id="eventListExpanded" style="display:none;margin-top:16px;"></div>';
  } else {
    // Scenario B: Multiple events, no suggestion
    html += '<div style="font-size:2.5rem;margin-bottom:12px;">🎪</div>' +
      '<h3 style="margin:0 0 8px;font-size:16px;">Which event are you at?</h3>' +
      '<div style="margin-top:12px;text-align:left;">';
    eventKeys.forEach(function(eid) {
      var ev = activeEvents[eid];
      var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
      html += '<button onclick="linkToEvent(\'' + eid + '\')" style="display:block;width:100%;padding:12px 16px;margin-bottom:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;text-align:left;">' +
        '<strong>' + esc(ev.name || 'Event') + '</strong>' + (evDate ? ' <span style="color:var(--muted);">\u00b7 ' + esc(evDate) + '</span>' : '') +
        '</button>';
    });
    html += '<button onclick="dismissEventModal()" style="display:block;width:100%;padding:12px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:14px;cursor:pointer;text-align:center;">No event \u2014 just record sales</button>';
    html += '</div>';
  }

  html += '</div></div>';

  // Store active events for expandEventList / event settings
  window._activeEvents = activeEvents;

  document.body.insertAdjacentHTML('beforeend', html);
}

function expandEventList() {
  var container = document.getElementById('eventListExpanded');
  if (!container) return;
  var activeEvents = window._activeEvents || {};
  var html = '';
  Object.keys(activeEvents).forEach(function(eid) {
    var ev = activeEvents[eid];
    var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
    html += '<button onclick="linkToEvent(\'' + eid + '\')" style="display:block;width:100%;padding:10px 14px;margin-bottom:6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;text-align:left;">' +
      '<strong>' + esc(ev.name || 'Event') + '</strong>' + (evDate ? ' <span style="color:var(--muted);">\u00b7 ' + esc(evDate) + '</span>' : '') +
      '</button>';
  });
  container.innerHTML = html;
  container.style.display = 'block';
}

function linkToEvent(evId) {
  eventId = evId;
  loadEventContext();
  dismissEventModal();
  document.getElementById('eventSettingsBtn').style.display = '';
  showToast('Linked to event!');
}

function dismissEventModal() {
  var el = document.getElementById('eventModeModal');
  if (el) el.remove();
}

function showEventSettings() {
  var existing = document.getElementById('eventSettingsModal');
  if (existing) existing.remove();

  // Fetch fresh active events
  MastDB.query(SALES_EVENTS_PATH).orderByChild('status').equalTo('active').once().then(function(activeEvents) {
    activeEvents = activeEvents || {};
    var eventKeys = Object.keys(activeEvents);

    var html = '<div id="eventSettingsModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;">' +
      '<div style="background:var(--card);border-radius:12px 12px 0 0;padding:24px;max-width:400px;width:100%;max-height:70vh;overflow-y:auto;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
          '<h3 style="margin:0;font-size:16px;">Event Settings</h3>' +
          '<button onclick="closeEventSettings()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);">\u2715</button>' +
        '</div>' +
        '<p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Current: <strong>' + esc(eventData ? (eventData.name || 'Event') : 'No event linked') + '</strong></p>';

    if (eventKeys.length > 0) {
      html += '<div style="margin-bottom:12px;">';
      eventKeys.forEach(function(eid) {
        var ev = activeEvents[eid];
        var evDate = ev.date ? new Date(ev.date).toLocaleDateString() : '';
        var isCurrent = eid === eventId;
        html += '<button onclick="switchEvent(\'' + eid + '\')" style="display:block;width:100%;padding:12px 16px;margin-bottom:8px;border-radius:8px;border:1px solid ' + (isCurrent ? 'var(--green)' : 'var(--border)') + ';background:' + (isCurrent ? 'rgba(76,175,80,0.1)' : 'transparent') + ';color:var(--text);font-size:14px;cursor:pointer;text-align:left;">' +
          (isCurrent ? '\u2713 ' : '') + '<strong>' + esc(ev.name || 'Event') + '</strong>' + (evDate ? ' <span style="color:var(--muted);">\u00b7 ' + esc(evDate) + '</span>' : '') +
          '</button>';
      });
      html += '</div>';
    } else {
      html += '<p style="color:var(--muted);font-size:14px;">No active events found.</p>';
    }

    if (eventId) {
      html += '<button onclick="unlinkEvent()" style="display:block;width:100%;padding:12px 16px;border-radius:8px;border:none;background:transparent;color:#C62828;font-size:14px;cursor:pointer;text-align:center;">Unlink event</button>';
    }

    html += '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
  });
}

function switchEvent(evId) {
  if (evId === eventId) {
    closeEventSettings();
    return;
  }
  // Detach old listener
  if (eventContextUnsub) { eventContextUnsub(); eventContextUnsub = null; }
  eventId = evId;
  loadEventContext();
  closeEventSettings();
  showToast('Switched to event!');
}

function unlinkEvent() {
  if (eventContextUnsub) { eventContextUnsub(); eventContextUnsub = null; }
  eventId = null;
  eventData = null;
  document.getElementById('modeBadge').textContent = 'POS';
  document.getElementById('modeBadge').style.background = '';
  document.getElementById('eventBanner').style.display = 'none';
  closeEventSettings();
  showToast('Event unlinked');
}

function closeEventSettings() {
  var el = document.getElementById('eventSettingsModal');
  if (el) el.remove();
}

// Auth — init Firebase and attach listener after tenant resolves
// ============================================================
window.TENANT_READY.then(function() {
  try { firebaseApp = firebase.app(); } catch (e) { firebaseApp = firebase.initializeApp(TENANT_FIREBASE_CONFIG); }
  MastDB.init({ firestore: firebaseApp.firestore(), tenantId: TENANT_ID });
  auth = firebaseApp.auth();

  CLASSIFY_URL = TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/classifyImage';
  UPLOAD_URL = TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/uploadImage';
  PRODUCTS_PATH = 'public/products';
  SALES_PATH = 'admin/sales';
  SALES_EVENTS_PATH = 'admin/salesEvents';
  STUDIO_LOCATIONS_PATH = 'config/studioLocations';

  auth.onAuthStateChanged(function(user) {
    if (user) {
      currentUser = user;
      user.getIdToken().then(function(token) {
        authToken = token;
        loadProducts();
        if (eventId) {
          loadEventContext();
          document.getElementById('eventSettingsBtn').style.display = '';
        } else {
          detectLocation(); // GPS check if no event pre-linked
        }
        showScreen('catalogScreen');
      });
    } else {
      currentUser = null;
      authToken = null;
      showScreen('authScreen');
    }
  });
}).catch(function(err) {
  console.error('[pos] Tenant resolution failed:', err.message);
});

function loadEventContext() {
  if (!eventId) return;
  if (eventContextUnsub) { eventContextUnsub(); eventContextUnsub = null; }
  eventContextUnsub = MastDB.subscribe(SALES_EVENTS_PATH + '/' + eventId, function(val) {
    eventData = val;
    if (eventData) {
      document.getElementById('modeBadge').textContent = 'FAIR';
      document.getElementById('modeBadge').style.background = 'var(--green)';
      var banner = document.getElementById('eventBanner');
      banner.style.display = 'flex';
      document.getElementById('eventBannerName').textContent = eventData.name || 'Event';
      // Calculate stats
      var totalPacked = 0, totalSold = 0;
      if (eventData.allocations) {
        Object.keys(eventData.allocations).forEach(function(pid) {
          totalPacked += (eventData.allocations[pid].quantity || 0);
          totalSold += (eventData.allocations[pid].sold || 0);
        });
      }
      document.getElementById('eventBannerStats').textContent = totalPacked + ' packed, ' + totalSold + ' sold, ' + (totalPacked - totalSold) + ' remaining';
    }
  });
}

function signIn() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(err) {
    showToast('Sign in failed: ' + err.message, true);
  });
}

function loadProducts() {
  MastDB.get(PRODUCTS_PATH).then(function(val) {
    products = val || {};
    productsList = Object.values(products)
      .filter(function(p) { return !p.availability || p.availability === 'available'; })
      .sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
    renderCategoryStrip();
    renderCatalog();

function initCamera() {
  var video = document.getElementById('cameraVideo');
  camera = new MastCamera({
    videoElement: video,
    onCapture: handleCapture,
    onError: function(err) {
      if (err.type === 'permission') {
        document.getElementById('cameraDenied').style.display = 'flex';
      } else {
        showToast('Camera error: ' + err.message, true);
      }
    },
    onReady: function() {}
  });
  camera.start();
}

// Scanner is opt-in: launched from the catalog "Scan" button.
function openScanner() {
  document.getElementById('cameraDenied').style.display = 'none';
  showScreen('cameraScreen');
  if (!camera) { initCamera(); }
  else if (!camera.isActive()) { camera.start(); }
}

function closeScanner() {
  if (camera && camera.isActive()) camera.stop();
  showScreen('catalogScreen');
}

function capturePhoto() {
  if (!camera || !camera.isActive()) return;
  var btn = document.getElementById('captureBtn');
  btn.classList.add('processing');
  camera.capture().then(function() {
    btn.classList.remove('processing');
  }).catch(function() {
    btn.classList.remove('processing');
  });
}

function handleCapture(result) {
  capturedImageBase64 = result.base64;
  capturedPreviewUrl = result.previewUrl;
  camera.stop();

  // Show loading, call classify
  showLoading('Identifying product...');

  fetch(CLASSIFY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
    body: JSON.stringify({ image: result.base64, context: 'pos' })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    hideLoading();
    if (data.error) { showToast('Classification failed — pick from the catalog', true); closeScanner(); return; }

    // Multi-item response
    var items = data.items || [{ productId: data.productId, product: data.product, confidence: data.confidence, color: data.color, quantity: 1 }];

    var scanned = items.map(function(item) {
      var prod = item.productId ? products[item.productId] : null;
      return {
        productId: item.productId || null,
        productName: item.product || (prod ? prod.name : 'Unknown'),
        quantity: item.quantity || 1,
        confidence: item.confidence || 0,
        priceCents: prod ? (prod.priceCents || 0) : 0,
        imageUrl: prod && prod.images && prod.images.length > 0 ? (typeof prod.images[0] === 'string' ? prod.images[0] : (prod.images[0].url || '')) : ''
      };
    }).filter(function(item) { return item.productId; });

    if (scanned.length === 0) {
      showToast('Could not identify product — pick it from the catalog', true);
      closeScanner();
      return;
    }

    // Merge scanned items into the running cart, then return to the catalog
    scanned.forEach(function(s) {
      var ex = saleItems.findIndex(function(i) { return i.productId === s.productId; });
      if (ex >= 0) saleItems[ex].quantity += s.quantity;
      else saleItems.push(s);
    });
    if (camera && camera.isActive()) camera.stop();
    showScreen('catalogScreen');
    refreshCartUI();
    document.getElementById('cartPanel').classList.add('expanded');
    showToast('Added ' + scanned.length + ' item' + (scanned.length !== 1 ? 's' : '') + ' from photo');
  })
  .catch(function(err) {
    hideLoading();
    showToast('Error: ' + err.message, true);
    closeScanner();
  });
}

// ============================================================
// Cart line-item rendering (shared by the cart panel + checkout list)
// ============================================================
function cartItemHtml(item, idx) {
  var img = item.imageUrl
    ? '<img src="' + item.imageUrl + '" alt="">'
    : '<div style="width:50px;height:50px;background:var(--border);border-radius:6px;"></div>';
  var meta = item.priceCents > 0 && window.formatCents ? window.formatCents(item.priceCents) : '';
  return '<div class="sale-item">' + img +
    '<div class="sale-item-info">' +
      '<div class="sale-item-name">' + esc(item.productName) + '</div>' +
      (meta ? '<div class="sale-item-meta">' + meta + '</div>' : '') +
    '</div>' +
    '<div class="sale-item-qty">' +
      '<button class="qty-btn" onclick="adjustQty(' + idx + ',-1)">-</button>' +
      '<span class="qty-val">' + item.quantity + '</span>' +
      '<button class="qty-btn" onclick="adjustQty(' + idx + ',1)">+</button>' +
    '</div>' +
    '<span class="remove-btn" onclick="removeItem(' + idx + ')">&times;</span>' +
  '</div>';
}

function renderItems() {
  var html = '';
  saleItems.forEach(function(item, idx) { html += cartItemHtml(item, idx); });
  document.getElementById('itemsList').innerHTML = html;
}

function adjustQty(idx, delta) {
  saleItems[idx].quantity = Math.max(1, saleItems[idx].quantity + delta);
  refreshCartUI();
}

function removeItem(idx) {
  saleItems.splice(idx, 1);
  refreshCartUI();
}

function autoFillAmount() {
  var total = 0;
  saleItems.forEach(function(item) {
    total += (item.priceCents || 0) * item.quantity;
  });
  if (total > 0) {
    document.getElementById('amountInput').value = '$' + (total / 100).toFixed(2);
  } else {
    document.getElementById('amountInput').value = '';
  }
}

function addMoreItems() {
  showScreen('catalogScreen');
}

// ============================================================
// Save Sale
// ============================================================
// ============================================================
// W2.5: IndexedDB outbox for offline-queued sales
// ============================================================
var OUTBOX_DB_NAME = 'mast-pos';
var OUTBOX_DB_VERSION = 1;
var OUTBOX_STORE = 'pos_outbox';
var OUTBOX_MAX_ATTEMPTS = 5;

function _openOutboxDb() {
  return new Promise(function(resolve, reject) {
    if (!('indexedDB' in window)) { reject(new Error('IndexedDB not supported')); return; }
    var req = indexedDB.open(OUTBOX_DB_NAME, OUTBOX_DB_VERSION);
    req.onupgradeneeded = function() {
      var db = req.result;
      if (!db.objectStoreNames.contains(OUTBOX_STORE)) {
        var store = db.createObjectStore(OUTBOX_STORE, { keyPath: 'localId' });
        store.createIndex('syncedAt', 'syncedAt', { unique: false });
      }
    };
    req.onsuccess = function() { resolve(req.result); };
    req.onerror = function() { reject(req.error); };
  });
}

function _uuid() {
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'pos-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
}

function _writeSaleToOutbox(saleRecord) {
  return _openOutboxDb().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(OUTBOX_STORE, 'readwrite');
      var row = {
        localId: _uuid(),
        saleRecord: saleRecord,
        queuedAt: new Date().toISOString(),
        attemptCount: 0,
        lastAttemptError: null,
        syncedAt: null,
        serverSaleId: null
      };
      tx.objectStore(OUTBOX_STORE).put(row);
      tx.oncomplete = function() { resolve(row); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}

function _listOutbox() {
  return _openOutboxDb().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(OUTBOX_STORE, 'readonly');
      var req = tx.objectStore(OUTBOX_STORE).getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = function() { reject(req.error); };
    });
  });
}

function _updateOutboxRow(localId, patch) {
  return _openOutboxDb().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(OUTBOX_STORE, 'readwrite');
      var store = tx.objectStore(OUTBOX_STORE);
      var getReq = store.get(localId);
      getReq.onsuccess = function() {
        var row = getReq.result;
        if (!row) { resolve(null); return; }
        Object.keys(patch).forEach(function(k) { row[k] = patch[k]; });
        store.put(row);
      };
      tx.oncomplete = function() { resolve(true); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}

function _flushOutbox() {
  if (!navigator.onLine) return Promise.resolve({ flushed: 0, pending: 0, errors: 0 });
  return _listOutbox().then(function(rows) {
    var pending = rows.filter(function(r) {
      return !r.syncedAt && (r.attemptCount || 0) < OUTBOX_MAX_ATTEMPTS;
    });
    if (pending.length === 0) {
      _renderOutboxBadge(0);
      return { flushed: 0, pending: 0, errors: 0 };
    }
    var flushed = 0, errors = 0;
    return pending.reduce(function(p, row) {
      return p.then(function() {
        return _writeSaleToServer(row.saleRecord).then(function() {
          flushed++;
          return _updateOutboxRow(row.localId, {
            syncedAt: new Date().toISOString(),
            serverSaleId: row.saleRecord.saleId
          });
        }).catch(function(err) {
          errors++;
          return _updateOutboxRow(row.localId, {
            attemptCount: (row.attemptCount || 0) + 1,
            lastAttemptError: (err && err.message) || String(err)
          });
        });
      });
    }, Promise.resolve()).then(function() {
      return _listOutbox().then(function(rows2) {
        var still = rows2.filter(function(r) { return !r.syncedAt; }).length;
        _renderOutboxBadge(still);
        if (flushed > 0) showToast('Synced ' + flushed + ' queued sale' + (flushed === 1 ? '' : 's'));
        return { flushed: flushed, pending: still, errors: errors };
      });
    });
  }).catch(function(err) {
    console.warn('[pos-outbox] flush failed', err);
    return { flushed: 0, pending: 0, errors: 1 };
  });
}

function _renderOutboxBadge(count) {
  var el = document.getElementById('outboxBadge');
  if (!el) return;
  if (!count || count <= 0) { el.style.display = 'none'; return; }
  el.style.display = 'inline-flex';
  el.textContent = 'Outbox: ' + count + ' pending';
}

function _refreshOutboxBadge() {
  _listOutbox().then(function(rows) {
    var pending = rows.filter(function(r) { return !r.syncedAt; }).length;
    _renderOutboxBadge(pending);
  }).catch(function() {});
}

// ============================================================
// W2.5: Network-write half of saveSale (extracted)
// Resolves on Firestore write success; rejects on any network failure.
// ============================================================
function _writeSaleToServer(saleRecord) {
  var saleId = saleRecord.saleId;
  var now = saleRecord.createdAt || saleRecord.timestamp;
  var items = saleRecord.items || [];
  var imagePromise;
  if (saleRecord.__capturedImageBase64 && saleRecord.__authToken) {
    imagePromise = fetch(UPLOAD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + saleRecord.__authToken },
      body: JSON.stringify({ image: saleRecord.__capturedImageBase64, tags: ['pos', 'sale'], source: 'pos' })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.imageId) saleRecord.imageId = data.imageId;
    })
    .catch(function() { /* Image save failed — continue without */ });
  } else {
    imagePromise = Promise.resolve();
  }

  return imagePromise.then(function() {
    // Create the REAL order through the shop pipeline (submitOrder POS mode).
    // The order draws down physical onHand itself, so we deliberately do NOT
    // call decrementInventory below — that would double-count stock.
    return _createPosOrder(saleRecord);
  }).then(function(orderResult) {
    saleRecord.orderId = orderResult.orderId || null;
    saleRecord.orderNumber = orderResult.orderNumber || null;
    // Persist the admin/sales mirror (kept for existing reports + Fair mode),
    // now linked to the order. Strip transient __ fields first.
    var persisted = {};
    Object.keys(saleRecord).forEach(function(k) {
      if (k.indexOf('__') !== 0) persisted[k] = saleRecord[k];
    });
    return MastDB.set(SALES_PATH + '/' + saleId, persisted);
  }).then(function() {
    // Inventory is owned by the order now — no client-side decrement here.
    if (saleRecord.eventId && eventData && eventData.allocations) {
      return updateEventAllocations(items);
    }
  }).then(function() {
    autoReconcileSquare(saleId, now);
    return saleId;
  });
}

// Create a real in-person order via submitOrder's POS mode. Server reprices
// from the catalog and finalizes the order as paid + delivered (no hosted
// checkout — the seller charges on their own method). Resolves to the order
// result; rejects (non-network) on a server rejection e.g. insufficient stock.
function _createPosOrder(saleRecord) {
  var token = authToken || saleRecord.__authToken; // prefer the live token (fresher on outbox flush)
  var orderItems = (saleRecord.items || []).map(function(it) {
    return { pid: it.productId, variantId: it.variantId || null, qty: it.quantity };
  });
  var payload = { data: {
    channel: 'pos',
    items: orderItems,
    posPayment: { method: saleRecord.paymentType || 'cash', tenderedCents: saleRecord.amount || 0 },
    customerContact: saleRecord.customerContact || null
  } };
  return fetch(TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/submitOrder', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'X-Tenant-ID': TENANT_ID },
    body: JSON.stringify(payload)
  }).then(function(r) { return r.json(); }).then(function(resp) {
    var result = resp && resp.result;
    if (!result || !result.success) {
      throw new Error((result && result.error) || 'Order could not be created');
    }
    return result; // { orderId, orderNumber, paid, paymentMethod }
  });
}

function saveSale() {
  if (saleItems.length === 0) { showToast('No items in sale', true); return; }

  var amountStr = document.getElementById('amountInput').value.replace(/[^0-9.]/g, '');
  var amountCents = Math.round(parseFloat(amountStr) * 100);
  if (isNaN(amountCents) || amountCents <= 0) { showToast('Enter a valid amount', true); return; }

  var btn = document.getElementById('saveSaleBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  var saleId = MastDB.newKey(SALES_PATH);
  var now = new Date().toISOString();

  // Optional receipt contact, asked at the register (email or phone).
  var contactVal = (document.getElementById('posContact').value || '').trim();
  var customerContact = null;
  if (contactVal) {
    customerContact = contactVal.indexOf('@') >= 0 ? { email: contactVal } : { phone: contactVal };
  }

  var saleRecord = {
    saleId: saleId,
    timestamp: now,
    createdAt: now,
    paymentType: paymentType,
    amount: amountCents,
    items: saleItems.map(function(item) {
      return { productId: item.productId, variantId: item.variantId || null, productName: item.productName, quantity: item.quantity, priceCents: item.priceCents || 0, confidence: item.confidence };
    }),
    imageId: null,
    receiptSent: false,
    customerContact: customerContact,
    squarePaymentId: null,
    eventId: eventId || null,
    status: 'captured',
    notes: document.getElementById('saleNotes').value || null,
    recordedBy: currentUser ? currentUser.uid : null,
    // Transient fields stripped before persist:
    __capturedImageBase64: capturedImageBase64 || null,
    __authToken: authToken || null
  };

  function _onSaved(label) {
    lastSaleId = saleId;
    lastSaleAmount = amountCents;
    lastSaleItems = saleItems.slice();
    btn.disabled = false;
    btn.textContent = 'Complete Sale';
    var totalStr = '$' + (amountCents / 100).toFixed(2);
    var itemNames = saleItems.map(function(i) { return i.productName; }).join(', ');
    var orderTag = saleRecord.orderNumber ? ('Order ' + saleRecord.orderNumber + ' · ') : '';
    document.getElementById('successSummary').textContent = orderTag + totalStr + ' ' + paymentType + ' — ' + itemNames;
    document.getElementById('receiptForm').style.display = 'none';
    document.getElementById('receiptEmail').value = '';
    document.getElementById('receiptOptIn').checked = true;
    document.getElementById('receiptStatus').textContent = '';
    showScreen('successScreen');
    checkSculptureCommission(saleItems);
    if (label) showToast(label);
  }

  // Offline at submit time → queue directly
  if (!navigator.onLine) {
    _writeSaleToOutbox(saleRecord).then(function() {
      _refreshOutboxBadge();
      _onSaved('Offline — sale queued');
    }).catch(function(err) {
      btn.disabled = false;
      btn.textContent = 'Complete Sale';
      showToast('Could not queue sale: ' + (err.message || err), true);
    });
    return;
  }

  // Online: try server; on network failure, fall back to outbox
  _writeSaleToServer(saleRecord).then(function() {
    _onSaved();
  }).catch(function(err) {
    var isNetwork = err && (err.code === 'unavailable' ||
      /network|offline|failed to fetch|fetch/i.test(err.message || ''));
    if (isNetwork) {
      _writeSaleToOutbox(saleRecord).then(function() {
        _refreshOutboxBadge();
        _onSaved('Network down — sale queued');
      }).catch(function(qErr) {
        btn.disabled = false;
        btn.textContent = 'Complete Sale';
        showToast('Save failed and queue failed: ' + (qErr.message || qErr), true);
      });
    } else {
      btn.disabled = false;
      btn.textContent = 'Complete Sale';
      showToast('Error saving sale: ' + (err.message || err), true);
    }
  });
}

function decrementInventory(productQtys) {
  var promises = [];
  Object.keys(productQtys).forEach(function(pid) {
    var qty = productQtys[pid];
    var prod = products[pid];
    var stockPath = 'admin/inventory/' + pid + '/stock';
    promises.push(
      MastDB.get(stockPath).then(function(current) {
        if (current !== null && typeof current === 'number') {
          // Legacy flat stock number — treat as onHand
          var newVal = Math.max(0, current - qty);
          return MastDB.set(stockPath, newVal).then(function() {
            if (prod && prod.businessLine === 'sculpture' && newVal <= 0) {
              return MastDB.set('public/products/' + pid + '/status', 'sold');
            }
          });
        }
        // Object-based stock — decrement onHand
        if (current && typeof current === 'object' && current._default) {
          var curOnHand = current._default.onHand || 0;
          var newOnHand = Math.max(0, curOnHand - qty);
          return MastDB.set('admin/inventory/' + pid + '/stock/_default/onHand', newOnHand).then(function() {
            // Write audit trail
            MastDB.push('admin/inventory/' + pid + '/history', {
              action: 'sold', reason: 'pos_sale', qty: -qty, previousQty: curOnHand, newQty: newOnHand,
              actor: 'pos', actorType: 'system', timestamp: new Date().toISOString()
            });
            if (prod && prod.businessLine === 'sculpture' && newOnHand <= 0) {
              return MastDB.set('public/products/' + pid + '/status', 'sold');
            }
          });
        }
      })
    );
  });
  return Promise.all(promises);
}

function updateEventAllocations(items) {
  if (!eventId) return Promise.resolve();
  var promises = [];
  items.forEach(function(item) {
    if (!item.productId) return;
    var soldPath = SALES_EVENTS_PATH + '/' + eventId + '/allocations/' + item.productId + '/sold';
    promises.push(
      MastDB.get(soldPath).then(function(current) {
        return MastDB.set(soldPath, (current || 0) + (item.quantity || 1));
      })
    );
  });
  return Promise.all(promises);
}

// ============================================================
// Catalog (home grid) + category strip
// ============================================================
// Normalize a category for de-duplication + matching: lowercase, treat
// hyphens/underscores as spaces, collapse whitespace. Merges the messy
// real-world variants a catalog accumulates — "Bowls"/"bowls",
// "Home Decor"/"home-decor" — into one browse chip.
function catKey(c) {
  return String(c || '').toLowerCase().replace(/[-_]+/g, ' ').replace(/\s+/g, ' ').trim();
}
function titleCase(s) {
  return String(s || '').replace(/\b\w/g, function(m) { return m.toUpperCase(); });
}

function renderCategoryStrip() {
  // normalized key -> display label (Title Case of the key, for a clean chip)
  var seen = {};
  function add(c) {
    var k = catKey(c);
    if (k && !(k in seen)) seen[k] = titleCase(k);
  }
  productsList.forEach(function(p) {
    add(p.category);
    if (Array.isArray(p.categories)) p.categories.forEach(add);
  });
  _catList = Object.keys(seen).sort().map(function(k) { return seen[k]; });

  var html = '<div class="cat-chip ' + (currentCategory === 'all' ? 'active' : '') + '" onclick="selectCategory(-1)">All</div>';
  _catList.forEach(function(label, i) {
    var active = currentCategory !== 'all' && catKey(currentCategory) === catKey(label);
    html += '<div class="cat-chip ' + (active ? 'active' : '') + '" onclick="selectCategory(' + i + ')">' + esc(label) + '</div>';
  });

  var strip = document.getElementById('categoryStrip');
  strip.innerHTML = html;
  // Hide the strip entirely when there are no categories to browse by
  strip.style.display = _catList.length ? 'flex' : 'none';
}

function selectCategory(i) {
  currentCategory = i < 0 ? 'all' : _catList[i];
  variantParent = null;            // leave variant view when changing category
  renderCategoryStrip();
  updateCatalogChrome();
  renderCatalog();
}

function productInCategory(p, cat) {
  if (cat === 'all') return true;
  var k = catKey(cat);
  if (catKey(p.category) === k) return true;
  if (Array.isArray(p.categories)) {
    for (var i = 0; i < p.categories.length; i++) {
      if (catKey(p.categories[i]) === k) return true;
    }
  }
  return false;
}

// ============================================================
// Variant resolution helpers — POS reimplements the small subset of
// products-v2 logic it needs (the admin module isn't loaded here).
// A variant inherits the product's base price/image unless it overrides.
// ============================================================
function productVariants(p) { return p && Array.isArray(p.variants) ? p.variants : []; }
function hasVariants(p) { return productVariants(p).length > 0; }

function variantLabel(v) {
  if (!v) return 'Variant';
  if (v.name) return v.name;                       // explicit name wins
  if (v.combo) {                                   // else the option combo, e.g. {color:'Red'}
    var parts = Object.keys(v.combo).map(function(k) { return v.combo[k]; }).filter(Boolean);
    if (parts.length) return parts.join(' / ');
  }
  return 'Variant';
}
function productImg(p) {
  var imgs = p && p.images;
  if (imgs && imgs.length) return typeof imgs[0] === 'string' ? imgs[0] : (imgs[0].url || '');
  return '';
}
function variantImg(p, v) {
  var imgs = (p && p.images) || [];
  if (v && typeof v.imageIndex === 'number' && v.imageIndex >= 0 && v.imageIndex < imgs.length) {
    var im = imgs[v.imageIndex];
    return typeof im === 'string' ? im : (im.url || '');
  }
  return productImg(p);                            // inherit base image
}
function variantPriceCents(p, v) {
  return (v && typeof v.priceCents === 'number') ? v.priceCents : (p.priceCents || 0);
}
// Lowest variant price — drives the "from $X" label on a parent tile.
function minVariantPriceCents(p) {
  var vs = productVariants(p), min = Infinity;
  vs.forEach(function(v) { var c = variantPriceCents(p, v); if (c > 0 && c < min) min = c; });
  return min === Infinity ? (p.priceCents || 0) : min;
}

function tileHtml(onclickAttr, imgUrl, name, priceHtml, badge) {
  if (imgUrl) {
    return '<div class="picker-card" ' + onclickAttr + '>' +
      '<img src="' + imgUrl + '" alt="" loading="lazy">' + (badge || '') +
      '<div class="picker-card-info">' +
        '<div class="picker-card-name">' + esc(name) + '</div>' +
        '<div class="picker-card-price">' + priceHtml + '</div>' +
      '</div>' +
    '</div>';
  }
  // Photo-less product: name fills the tile face, price below (no duplicate name).
  return '<div class="picker-card" ' + onclickAttr + '>' +
    '<div class="picker-card-noimg"><span>' + esc(name) + '</span></div>' + (badge || '') +
    '<div class="picker-card-info">' +
      '<div class="picker-card-price">' + priceHtml + '</div>' +
    '</div>' +
  '</div>';
}

function renderCatalog() {
  // Variant view — drilled into one product, showing each of its variants.
  if (variantParent) {
    var parent = products[variantParent];
    if (!parent || !hasVariants(parent)) {
      variantParent = null;                        // stale parent — fall through to product list
    } else {
      var vhtml = '';
      productVariants(parent).forEach(function(v) {
        var price = variantPriceCents(parent, v);
        vhtml += tileHtml(
          'onclick="pickVariant(\'' + parent.pid + '\',\'' + esc(String(v.id)) + '\')"',
          variantImg(parent, v),
          variantLabel(v),
          price > 0 ? fmtCents(price) : '',
          ''
        );
      });
      document.getElementById('catalogGrid').innerHTML = vhtml ||
        '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;">No variants</div>';
      return;
    }
  }

  // Product view — default products only (one tile per product).
  var f = (currentFilter || '').toLowerCase();
  var filtered = productsList.filter(function(p) {
    if (!productInCategory(p, currentCategory)) return false;
    if (f && (p.name || '').toLowerCase().indexOf(f) === -1) return false;
    return true;
  });

  var html = '';
  filtered.forEach(function(p) {
    var priceHtml, badge = '';
    if (hasVariants(p)) {
      var min = minVariantPriceCents(p);
      priceHtml = min > 0 ? 'from ' + fmtCents(min) : '';
      badge = '<span class="variant-badge">' + productVariants(p).length + ' options ›</span>';
    } else {
      priceHtml = (typeof p.priceCents === 'number' && p.priceCents > 0) ? fmtCents(p.priceCents) : '';
    }
    html += tileHtml('onclick="onProductTap(\'' + p.pid + '\')"', productImg(p), p.name || '', priceHtml, badge);
  });
  if (!filtered.length) {
    html = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;">No products found</div>';
  }
  document.getElementById('catalogGrid').innerHTML = html;
}

function filterCatalog(val) {
  currentFilter = val || '';
  variantParent = null;                            // searching returns to the product list
  updateCatalogChrome();
  renderCatalog();
}

// Tap a product tile → drill into variants (2-step) or add directly (1-step).
function onProductTap(pid) {
  var prod = products[pid];
  if (!prod) return;
  if (hasVariants(prod)) {
    variantParent = pid;
    updateCatalogChrome();
    renderCatalog();
  } else {
    pickProduct(pid);
  }
}

function exitVariants() {
  variantParent = null;
  updateCatalogChrome();
  renderCatalog();
}

// Swap the category strip for a "‹ All products · ProductName" bar in variant view.
function updateCatalogChrome() {
  var strip = document.getElementById('categoryStrip');
  var back = document.getElementById('variantBackBar');
  if (variantParent && products[variantParent]) {
    if (strip) strip.style.display = 'none';
    back.style.display = 'flex';
    document.getElementById('variantBackName').textContent = products[variantParent].name || 'Product';
  } else {
    back.style.display = 'none';
    if (strip) strip.style.display = _catList.length ? 'flex' : 'none';
  }
}

function pickProduct(pid) {
  var prod = products[pid];
  if (!prod) return;
  addToCart({ productId: pid, variantId: null, productName: prod.name, priceCents: prod.priceCents || 0, imageUrl: productImg(prod) });
  showToast('Added: ' + prod.name);
}

function pickVariant(pid, vid) {
  var prod = products[pid];
  if (!prod) return;
  var v = productVariants(prod).filter(function(x) { return String(x.id) === String(vid); })[0];
  if (!v) return;
  var label = variantLabel(v);
  addToCart({ productId: pid, variantId: vid, productName: prod.name + ' — ' + label, priceCents: variantPriceCents(prod, v), imageUrl: variantImg(prod, v) });
  exitVariants();                                  // back to the product list, ready for the next item
  showToast('Added: ' + prod.name + ' — ' + label);
}

// Shared add/increment — dedup on product + variant.
function addToCart(item) {
  var existing = saleItems.findIndex(function(i) {
    return i.productId === item.productId && (i.variantId || null) === (item.variantId || null);
  });
  if (existing >= 0) {
    saleItems[existing].quantity++;
  } else {
    item.quantity = 1;
    item.confidence = 100;                         // manual pick
    saleItems.push(item);
  }
  refreshCartUI();
}

// ============================================================
// Persistent cart panel
// ============================================================
function cartTotalCents() {
  var total = 0;
  saleItems.forEach(function(it) { total += (it.priceCents || 0) * it.quantity; });
  return total;
}

function fmtCents(c) {
  return window.formatCents ? window.formatCents(c) : '$' + (c / 100).toFixed(2);
}

function renderCart() {
  var count = 0;
  saleItems.forEach(function(it) { count += it.quantity; });
  var total = cartTotalCents();

  document.getElementById('cartSummary').innerHTML = count > 0
    ? '<strong>' + count + ' item' + (count !== 1 ? 's' : '') + '</strong> <span class="muted">· ' + fmtCents(total) + '</span>'
    : '<span class="muted">Cart is empty</span>';

  var container = document.getElementById('cartItems');
  if (!saleItems.length) {
    container.innerHTML = '<div class="cart-empty">Tap a product to add it to the cart</div>';
  } else {
    var html = '';
    saleItems.forEach(function(item, idx) { html += cartItemHtml(item, idx); });
    container.innerHTML = html;
  }

  var chargeBtn = document.getElementById('cartChargeBtn');
  chargeBtn.disabled = saleItems.length === 0;
  chargeBtn.textContent = total > 0 ? 'Charge ' + fmtCents(total) : 'Charge';
}

// Keep every cart surface (panel, checkout list, amount field) in sync
function refreshCartUI() {
  renderCart();
  if (document.getElementById('resultScreen').classList.contains('active')) {
    renderItems();
  }
  autoFillAmount();
}

function toggleCart() {
  if (window.innerWidth >= 768) return; // always-expanded rail on tablet
  document.getElementById('cartPanel').classList.toggle('expanded');
}

function goToCheckout() {
  if (saleItems.length === 0) { showToast('Cart is empty', true); return; }
  renderItems();
  autoFillAmount();
  showScreen('resultScreen');
}

// ============================================================
// Receipt Flow
// ============================================================

var lastSaleId = null;
var lastSaleAmount = 0;
var lastSaleItems = [];

function showReceiptForm() {
  document.getElementById('receiptForm').style.display = '';
  document.getElementById('receiptEmail').focus();
}

function skipReceipt() {
  document.getElementById('receiptForm').style.display = 'none';
}

async function sendReceipt() {
  var email = document.getElementById('receiptEmail').value.trim();
  var optIn = document.getElementById('receiptOptIn').checked;

  if (!email) { showToast('Enter email', true); return; }

  var btn = document.getElementById('sendReceiptBtn');
  var statusEl = document.getElementById('receiptStatus');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  statusEl.textContent = '';

  var token = authToken;
  var base = TENANT_FIREBASE_CONFIG.cloudFunctionsBase;
  var results = [];

  try {
    var receiptData = {
      items: lastSaleItems.map(function(i) { return { productName: i.productName, quantity: i.quantity }; }),
      amount: lastSaleAmount,
      date: new Date().toISOString().split('T')[0],
      saleId: lastSaleId
    };

    if (email) {
      var emailResp = await fetch(base + '/sendReceipt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'X-Tenant-ID': TENANT_ID },
        body: JSON.stringify(Object.assign({}, receiptData, { email: email }))
      });
      var emailResult = await emailResp.json();
      results.push(emailResult.success ? '📧 Email sent' : '❌ Email failed');
    }

    // Update sale record with customer contact
    if (lastSaleId) {
      var contactUpdate = { receiptSent: true, customerContact: {} };
      if (email) contactUpdate.customerContact.email = email;
      contactUpdate.customerContact.optIn = optIn;
      MastDB.update(SALES_PATH + '/' + lastSaleId, contactUpdate);
    }

    statusEl.innerHTML = '<span style="color:var(--green);">' + results.join(' · ') + '</span>';
    showToast(results.join(', '));
  } catch (err) {
    statusEl.innerHTML = '<span style="color:#f44336;">Error: ' + esc(err.message) + '</span>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send';
  }
}

// Auto-reconcile Square payment after PoS sale
async function autoReconcileSquare(saleId, saleTimestamp) {
  if (paymentType !== 'square') return;
  try {
    var token = authToken;
    var resp = await fetch(TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/reconcileSquarePayment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'X-Tenant-ID': TENANT_ID },
      body: JSON.stringify({ saleId: saleId, saleTimestamp: saleTimestamp, toleranceMinutes: 5 })
    });
    var result = await resp.json();
    if (result.matched) {
      console.log('Square reconciled: payment ' + result.paymentId + ', delta ' + result.deltaSeconds + 's');
    }
  } catch (err) {
    console.log('Square reconciliation skipped:', err.message);
  }
}

// ============================================================
// Sculpture Commission Prompt
// ============================================================
function checkSculptureCommission(items) {
  var sculptureItems = items.filter(function(item) {
    var prod = products[item.productId];
    return prod && prod.businessLine === 'sculpture';
  });
  if (sculptureItems.length === 0) return;

  var piece = sculptureItems[0];
  var prod = products[piece.productId];
  setTimeout(function() {
    showCommissionPrompt(piece.productId, prod.name);
  }, 500);
}

function showCommissionPrompt(pid, pieceName) {
  var modal = document.createElement('div');
  modal.id = 'commissionModal';
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.innerHTML =
    '<div style="background:var(--card);border-radius:12px;padding:24px;max-width:400px;width:100%;">' +
      '<h3 style="margin:0 0 8px 0;color:var(--text);font-size:1.1rem;">Commission Opportunity</h3>' +
      '<p style="margin:0 0 16px 0;color:var(--muted);font-size:0.88rem;">This piece has sold. Would you like to offer the customer a commission for a similar work?</p>' +
      '<div style="display:flex;gap:8px;">' +
        '<button onclick="openCommissionForm(\'' + pid.replace(/'/g, "\\'") + '\', \'' + (pieceName || '').replace(/'/g, "\\'") + '\')" style="flex:1;padding:12px;border-radius:6px;border:none;background:var(--gold);color:white;font-weight:600;font-size:0.88rem;cursor:pointer;">Yes — Log Inquiry</button>' +
        '<button onclick="dismissCommissionModal()" style="flex:1;padding:12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.88rem;cursor:pointer;">Skip</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
}

function dismissCommissionModal() {
  var modal = document.getElementById('commissionModal');
  if (modal) modal.remove();
}

function openCommissionForm(pid, pieceName) {
  var modal = document.getElementById('commissionModal');
  if (!modal) return;
  var inner = modal.querySelector('div');
  inner.innerHTML =
    '<h3 style="margin:0 0 12px 0;color:var(--text);font-size:1.1rem;">Log Commission Inquiry</h3>' +
    '<p style="margin:0 0 12px 0;color:var(--muted);font-size:0.82rem;">For: ' + (pieceName || 'Unknown piece') + '</p>' +
    '<div style="margin-bottom:12px;"><label style="display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;">Customer Name</label>' +
      '<input type="text" id="commName" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.88rem;box-sizing:border-box;"></div>' +
    '<div style="margin-bottom:12px;"><label style="display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;">Email</label>' +
      '<input type="text" id="commContact" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.88rem;box-sizing:border-box;"></div>' +
    '<div style="margin-bottom:16px;"><label style="display:block;font-size:0.78rem;color:var(--muted);margin-bottom:4px;">Notes (optional)</label>' +
      '<textarea id="commNotes" rows="2" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.88rem;resize:vertical;box-sizing:border-box;"></textarea></div>' +
    '<div style="display:flex;gap:8px;">' +
      '<button id="commSubmitBtn" onclick="submitCommission(\'' + pid.replace(/'/g, "\\'") + '\', \'' + (pieceName || '').replace(/'/g, "\\'") + '\')" style="flex:1;padding:12px;border-radius:6px;border:none;background:var(--gold);color:white;font-weight:600;font-size:0.88rem;cursor:pointer;">Save Inquiry</button>' +
      '<button onclick="dismissCommissionModal()" style="flex:1;padding:12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:0.88rem;cursor:pointer;">Cancel</button>' +
    '</div>';
}

async function submitCommission(pid, pieceName) {
  var name = document.getElementById('commName').value.trim();
  var contact = document.getElementById('commContact').value.trim();
  var notes = document.getElementById('commNotes').value.trim();

  if (!name && !contact) {
    showToast('Enter at least a name or contact', true);
    return;
  }

  var btn = document.getElementById('commSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    var commId = MastDB.newKey('admin/commissions');
    var record = {
      sourcePieceId: pid,
      sourcePieceName: pieceName,
      customerName: name || null,
      customerContact: contact || null,
      notes: notes || null,
      status: 'new',
      channel: 'pos',
      createdAt: new Date().toISOString()
    };
    await MastDB.set('admin/commissions/' + commId, record);

    // Trigger SendGrid notification via Cloud Function
    try {
      var token = currentUser ? await currentUser.getIdToken() : null;
      if (token) {
        fetch(TENANT_FIREBASE_CONFIG.cloudFunctionsBase + '/commissionNotify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, 'X-Tenant-ID': TENANT_ID },
          body: JSON.stringify({ commissionId: commId, pieceName: pieceName, customerName: name, customerContact: contact, notes: notes, channel: 'pos' })
        }).catch(function() { /* notification failed silently */ });
      }
    } catch (e) { /* notification send failed — non-blocking */ }

    dismissCommissionModal();
    showToast('Commission inquiry saved');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Save Inquiry';
    showToast('Error: ' + err.message, true);
  }
}

// ============================================================
// New Sale (reset)
// ============================================================
function newSale() {
  saleItems = [];
  capturedImageBase64 = null;
  capturedPreviewUrl = null;
  paymentType = 'cash';
  lastSaleId = null;
  lastSaleAmount = 0;
  lastSaleItems = [];
  document.getElementById('amountInput').value = '';
  document.getElementById('saleNotes').value = '';
  document.getElementById('posContact').value = '';
  document.getElementById('cashBtn').classList.add('selected');
  document.getElementById('squareBtn').classList.remove('selected');
  // Reset catalog browse state and return to the home grid
  currentCategory = 'all';
  currentFilter = '';
  variantParent = null;
  var search = document.getElementById('catalogSearch');
  if (search) search.value = '';
  if (camera && camera.isActive()) camera.stop();
  renderCategoryStrip();
  updateCatalogChrome();
  renderCatalog();
  refreshCartUI();
  document.getElementById('cartPanel').classList.remove('expanded');
  showScreen('catalogScreen');
}

// ============================================================
// Screen Management
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'Loading...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

function showToast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// W2.5: outbox auto-flush triggers
window.addEventListener('online', function() {
  console.log('[pos-outbox] online — flushing');
  _flushOutbox();
});
window.addEventListener('load', function() {
  _refreshOutboxBadge();
  if (navigator.onLine) {
    setTimeout(_flushOutbox, 1500);
  }
});
</script>
