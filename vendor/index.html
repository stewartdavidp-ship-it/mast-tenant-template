<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://*.firebaseio.com https://apis.google.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://us-central1-mast-platform-prod.cloudfunctions.net https://*.firebaseio.com wss://*.firebaseio.com https://*.firebasestorage.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api.ipify.org; img-src 'self' data: blob: https:; frame-src 'self' https://*.firebaseapp.com https://*.firebaseio.com; frame-ancestors 'none';">
<title>Vendor Portal</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --card: #ffffff;
  --border: #e5e2dd;
  --text: #1a1a1a;
  --text-secondary: #6b6560;
  --primary: #2a7c6f;
  --primary-bg: rgba(42,124,111,0.08);
  --amber: #c4853c;
  --amber-bg: rgba(196,133,60,0.08);
  --green: #10b981;
  --red: #ef4444;
  --blue: #3b82f6;
  --indigo: #6366f1;
  --indigo-bg: rgba(99,102,241,0.08);
  --purple: #8b5cf6;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e1117;
    --card: #1a1d26;
    --border: #2d3140;
    --text: #e8e4df;
    --text-secondary: #8a8680;
    --primary: #3fa594;
    --primary-bg: rgba(63,165,148,0.14);
    --amber-bg: rgba(196,133,60,0.12);
    --indigo-bg: rgba(99,102,241,0.12);
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  }
}
html.dark {
  --bg: #0e1117;
  --card: #1a1d26;
  --border: #2d3140;
  --text: #e8e4df;
  --text-secondary: #8a8680;
  --primary: #3fa594;
  --primary-bg: rgba(63,165,148,0.14);
  --amber-bg: rgba(196,133,60,0.12);
  --indigo-bg: rgba(99,102,241,0.12);
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
}
html.light {
  --bg: #faf8f5;
  --card: #ffffff;
  --border: #e5e2dd;
  --text: #1a1a1a;
  --text-secondary: #6b6560;
  --primary: #2a7c6f;
  --primary-bg: rgba(42,124,111,0.08);
  --amber-bg: rgba(196,133,60,0.08);
  --indigo-bg: rgba(99,102,241,0.08);
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--primary); text-decoration: none; }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Error page */
.error-page { text-align: center; padding: 80px 20px; }
.error-page .error-icon { font-size: 48px; margin-bottom: 16px; }
.error-page h2 { font-size: 22px; margin-bottom: 8px; }
.error-page p { color: var(--text-secondary); }

/* Nav */
.portal-nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; position: sticky; top: 0; z-index: 40; }
.portal-nav-inner { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.nav-brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; color: var(--primary); }
.nav-brand svg { color: var(--primary); }
.nav-vendor-name { font-size: 13px; color: var(--text-secondary); }

/* Show banner */
.show-banner { background: var(--primary-bg); border-bottom: 1px solid var(--border); padding: 16px 20px; }
.show-banner-inner { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.show-banner-name { font-size: 16px; font-weight: 600; }
.show-banner-date { font-size: 13px; color: var(--text-secondary); }

/* Tabs */
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; position: sticky; top: 49px; z-index: 39; }
.tabs-inner { max-width: 800px; margin: 0 auto; display: flex; width: 100%; }
.tab-btn { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text-secondary); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: color 0.15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

/* Content */
.content { max-width: 800px; margin: 0 auto; padding: 20px; }
.section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
.section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.section h4 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.section-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-header h3 { margin-bottom: 0; }
.section-header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.highlight-border { border-color: var(--primary); border-width: 2px; }

/* Badges */
.badge { display: inline-flex; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge-green { background: rgba(16,185,129,0.1); color: var(--green); }
.badge-amber { background: rgba(196,133,60,0.1); color: var(--amber); }
.badge-red { background: rgba(239,68,68,0.1); color: var(--red); }
.badge-blue { background: rgba(59,130,246,0.1); color: var(--blue); }
.badge-gray { background: #eee; color: #888; }
.badge-muted { background: #f0f0f0; color: #999; font-size: 11px; }

/* Info grid */
.info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.info-item { padding: 12px; background: var(--bg); border-radius: 8px; }
.info-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.info-value { font-size: 15px; font-weight: 500; }

/* Status row */
.status-row { display: flex; gap: 24px; flex-wrap: wrap; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.stat-card { text-align: center; padding: 14px 8px; background: var(--bg); border-radius: 10px; }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }

/* Setup / attendee notes */
.setup-notes { margin-top: 12px; padding: 12px; background: var(--bg); border-radius: 8px; font-size: 13px; line-height: 1.5; }
.attendee-notes { margin-top: 10px; font-size: 13px; color: var(--text-secondary); }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s; font-family: inherit; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-amber { background: var(--amber); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-link { background: none; border: none; color: var(--primary); font-size: 13px; font-weight: 500; cursor: pointer; padding: 0; font-family: inherit; }
.btn-link.muted { color: var(--text-secondary); }
.btn-link.small { font-size: 12px; }
.btn-link.danger { color: var(--red); }
.btn-link.amber { color: var(--amber); }
.btn-preview { margin-top: 16px; width: 100%; padding: 10px; background: var(--primary-bg); color: var(--primary); border: 1px solid rgba(42,124,111,0.2); border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.btn-preview:hover { background: rgba(42,124,111,0.14); }

/* Form elements */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
.form-input, .form-textarea, select.form-input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; background: var(--bg); color: var(--text); font-family: inherit;
}
.form-input:focus, .form-textarea:focus, select.form-input:focus { outline: none; border-color: var(--primary); }
.form-textarea { min-height: 70px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.form-hint.text-right { text-align: right; }
.form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
.inline-form { display: flex; align-items: flex-end; gap: 12px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } .inline-form { flex-direction: column; align-items: stretch; } }

/* Logo */
.logo-area { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.logo-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); }
.logo-placeholder { width: 80px; height: 80px; border-radius: 12px; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: var(--primary); }

/* Profile view */
.profile-view {}
.profile-header { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
.profile-name { font-size: 18px; font-weight: 600; }
.profile-category { font-size: 13px; color: var(--text-secondary); }
.profile-bio { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 10px; }
.profile-link { font-size: 13px; color: var(--primary); margin-bottom: 4px; }

/* Tags */
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; margin-bottom: 8px; }
.tag { padding: 3px 10px; background: var(--primary-bg); color: var(--primary); border-radius: 12px; font-size: 12px; font-weight: 500; }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.empty-subtitle { font-size: 13px; color: var(--text-secondary); }
.empty-text { color: var(--text-secondary); font-size: 14px; }
.empty-text.centered { text-align: center; padding: 16px 0; }
.italic { font-style: italic; }
.small { font-size: 12px; }

/* Promotion cards */
.promo-card { margin-bottom: 12px; }
.promo-card-header { display: flex; align-items: flex-start; justify-content: space-between; }
.promo-card-code { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.promo-card-code code { font-family: 'DM Mono', monospace, monospace; font-weight: 700; color: var(--primary); font-size: 14px; }
.promo-card-value { font-size: 13px; color: var(--text-secondary); }
.promo-card-msg { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.promo-card-actions { display: flex; gap: 10px; }

/* Wallet */
.wallet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.wallet-card { padding: 16px; border-radius: 10px; text-align: center; }
.wallet-card.amber { background: var(--amber-bg); }
.wallet-card.indigo { background: var(--indigo-bg); }
.wallet-amount { font-size: 28px; font-weight: 700; }
.wallet-card.amber .wallet-amount { color: var(--amber); }
.wallet-card.indigo .wallet-amount { color: var(--indigo); }
.wallet-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
.wallet-sub { font-size: 11px; color: var(--text-secondary); opacity: 0.7; }
.wallet-stats { font-size: 12px; color: var(--text-secondary); }
.coin-price { font-size: 18px; font-weight: 700; color: var(--green); padding-bottom: 6px; }
.convert-preview { font-size: 14px; color: var(--indigo); font-weight: 500; padding-bottom: 6px; white-space: nowrap; }

/* Ad cards */
.ad-card { border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; background: var(--bg); }
.ad-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.ad-card-title { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.ad-headline { font-size: 14px; font-weight: 600; }
.ad-card-meta { font-size: 12px; color: var(--text-secondary); }
.ad-card-actions { display: flex; gap: 10px; flex-shrink: 0; }

/* Progress bar */
.progress-bar { width: 100%; background: var(--border); border-radius: 4px; height: 6px; margin-bottom: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--indigo); border-radius: 4px; transition: width 0.3s; }

/* Top-up form */
.topup-form { display: flex; align-items: flex-end; gap: 12px; margin-top: 10px; padding: 12px; background: var(--card); border-radius: 8px; }

/* Ad form */
.ad-form-container { background: var(--bg); border: 2px solid var(--primary); border-radius: 10px; padding: 20px; margin-bottom: 16px; }

/* Ad preview */
.ad-preview-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.ad-preview-label { font-size: 10px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.ad-preview-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.ad-preview-sponsored { font-size: 10px; color: var(--text-secondary); padding: 8px 16px 0; }
.ad-preview-body { padding: 8px 16px 16px; }
.ad-preview-vendor { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.ad-preview-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
.ad-preview-logo-placeholder { width: 40px; height: 40px; background: var(--bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.ad-preview-name { font-weight: 500; font-size: 14px; }
.ad-preview-meta { font-size: 12px; color: var(--text-secondary); }
.ad-preview-image { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
.ad-preview-headline { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.ad-preview-promo { background: rgba(16,185,129,0.08); border-radius: 8px; padding: 10px; }

/* Ad image preview */
.ad-image-preview { position: relative; display: inline-block; }
.ad-image-preview img { width: 100%; max-height: 160px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
.ad-image-remove { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; border-radius: 50%; background: var(--red); color: #fff; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* Promo preview in profile */
.preview-promos { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.preview-promos h4 { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.preview-promo-card { background: var(--bg); border-radius: 8px; padding: 10px; margin-bottom: 6px; }
.promo-value { font-size: 12px; color: var(--green); font-weight: 600; }
.promo-code { font-size: 12px; background: var(--card); padding: 2px 8px; border-radius: 4px; color: var(--primary); font-weight: 700; margin-top: 4px; display: inline-block; }

/* Profile preview */
.preview-hero { width: 100%; height: 192px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }
.preview-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.preview-location { font-size: 13px; color: var(--text-secondary); }
.preview-bio { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; }

/* Transaction list */
.tx-list { max-height: 300px; overflow-y: auto; }
.tx-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.tx-item:last-child { border-bottom: none; }
.tx-desc-text { font-size: 13px; font-weight: 500; }
.tx-date { font-size: 11px; color: var(--text-secondary); }
.tx-amount { font-weight: 600; font-size: 13px; font-family: 'DM Mono', monospace, monospace; }
.tx-amount.positive { color: var(--green); }
.tx-amount.negative { color: var(--red); }

/* Announcements */
.announcement-card { border-left: 3px solid var(--primary); }
.announcement-card.high-priority { border-left-color: var(--amber); background: rgba(196,133,60,0.03); }
.announcement-body { font-size: 14px; line-height: 1.6; color: var(--text-secondary); }
.announcement-date { font-size: 12px; color: var(--text-secondary); margin-top: 8px; opacity: 0.7; }

/* Messages */
.msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.msg-success { background: rgba(16,185,129,0.1); color: var(--green); }
.msg-error { background: rgba(239,68,68,0.1); color: var(--red); }
.msg-close { background: none; border: none; font-size: 18px; cursor: pointer; color: inherit; padding: 0 4px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; z-index: 50; display: flex; align-items: flex-end; justify-content: center; }
.modal-overlay::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
.modal-content { position: relative; background: var(--card); border-radius: 16px 16px 0 0; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.25s ease-out; }
.modal-header { position: sticky; top: 0; background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 10; border-radius: 16px 16px 0 0; }
.modal-title { font-size: 18px; font-weight: 700; }
.modal-subtitle { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
.modal-close { background: none; border: none; font-size: 24px; color: var(--text-secondary); cursor: pointer; padding: 0; }
.modal-body { padding: 20px; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* Utility */
.text-muted { color: var(--text-secondary); }
.text-right { text-align: right; }

/* Footer */
.portal-footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; font-size: 12px; color: var(--text-secondary); }

/* Responsive */
@media (min-width: 640px) {
  .modal-content { border-radius: 16px; align-self: center; }
  .modal-header { border-radius: 16px 16px 0 0; }
}
@media (max-width: 640px) {
  .wallet-grid { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .ad-card-header { flex-direction: column; gap: 8px; }
  .promo-card-header { flex-direction: column; gap: 8px; }
  .section-header-bar { flex-direction: column; gap: 10px; align-items: flex-start; }
  .topup-form { flex-direction: column; }
}
</style>
<script>
(function(){var s=localStorage.getItem('mast-theme');var d=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='dark'||(s!=='light'&&d))document.documentElement.classList.add('dark');else document.documentElement.classList.add('light');})();
</script>
</head>
<body>
<button id="themeToggle" onclick="toggleMastTheme()" title="Toggle dark mode" style="position:fixed;top:12px;right:12px;z-index:9999;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:16px;box-shadow:var(--shadow);color:var(--text);display:flex;align-items:center;justify-content:center;padding:0;"></button>

<div id="app">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="../storefront-tenant.js"></script>
<script src="../tenant-brand.js?v=2"></script>
<script src="vendor.js?v=2"></script>
<script>
function toggleMastTheme(){var h=document.documentElement;var dark=h.classList.contains('dark');if(dark){h.classList.remove('dark');h.classList.add('light');localStorage.setItem('mast-theme','light');}else{h.classList.remove('light');h.classList.add('dark');localStorage.setItem('mast-theme','dark');}updateThemeBtn();}
function updateThemeBtn(){var b=document.getElementById('themeToggle');if(!b)return;b.textContent=document.documentElement.classList.contains('dark')?'☀':'🌙';}
updateThemeBtn();
</script>
</body>
</html>
