<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Portal</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --card: #ffffff;
  --border: #e5e2dd;
  --text: #1a1a1a;
  --text-secondary: #6b6560;
  --primary: #2a7c6f;
  --primary-bg: rgba(42,124,111,0.08);
  --amber: #c4853c;
  --green: #10b981;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--primary); text-decoration: none; }

.loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-page { text-align: center; padding: 80px 20px; }
.error-page h2 { font-size: 22px; margin-bottom: 8px; }
.error-page p { color: var(--text-secondary); }

/* Header */
.portal-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 20px; }
.portal-header-inner { max-width: 800px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.portal-title { font-size: 18px; font-weight: 700; }
.portal-subtitle { font-size: 13px; color: var(--text-secondary); }

/* Tabs */
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; }
.tabs-inner { max-width: 800px; margin: 0 auto; display: flex; width: 100%; }
.tab-btn { padding: 12px 18px; font-size: 14px; font-weight: 500; color: var(--text-secondary); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

/* Content */
.content { max-width: 800px; margin: 0 auto; padding: 20px; }
.section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.section-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }

/* Form elements */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
.form-input, .form-textarea {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; background: var(--bg); color: var(--text); font-family: inherit;
}
.form-input:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
.form-textarea { min-height: 70px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-amber { background: var(--amber); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* Info grid */
.info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.info-item { padding: 12px; background: var(--bg); border-radius: 8px; }
.info-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.info-value { font-size: 15px; font-weight: 500; }

/* Status badges */
.badge { display: inline-flex; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge-green { background: rgba(16,185,129,0.1); color: var(--green); }
.badge-amber { background: rgba(196,133,60,0.1); color: var(--amber); }
.badge-red { background: rgba(239,68,68,0.1); color: var(--red); }
.badge-blue { background: rgba(59,130,246,0.1); color: var(--blue); }
.badge-gray { background: var(--border); color: var(--text-secondary); }

/* Logo upload */
.logo-area { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.logo-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 1px solid var(--border); }
.logo-placeholder { width: 80px; height: 80px; border-radius: 12px; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: var(--primary); }

/* Promo table */
.promo-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.promo-table th { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); font-weight: 600; }
.promo-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.promo-toggle { width: 36px; height: 20px; border-radius: 10px; border: none; cursor: pointer; position: relative; }
.promo-toggle.on { background: var(--green); }
.promo-toggle.off { background: var(--border); }

/* Wallet */
.wallet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.wallet-card { padding: 16px; background: var(--bg); border-radius: 10px; text-align: center; }
.wallet-amount { font-size: 28px; font-weight: 700; }
.wallet-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

/* Ad card */
.ad-card { border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.ad-headline { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.ad-stats { font-size: 12px; color: var(--text-secondary); }

/* Transaction list */
.tx-list { max-height: 300px; overflow-y: auto; }
.tx-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.tx-desc { color: var(--text-secondary); }
.tx-amount { font-weight: 600; }
.tx-amount.positive { color: var(--green); }
.tx-amount.negative { color: var(--red); }

.msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.msg-success { background: rgba(16,185,129,0.1); color: var(--green); }
.msg-error { background: rgba(239,68,68,0.1); color: var(--red); }

@media (max-width: 640px) {
  .wallet-grid { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="app">
  <div class="loading"><div class="spinner"></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="../storefront-tenant.js"></script>
<script src="../tenant-brand.js?v=2"></script>
<script>
(function() {
  'use strict';

  var FUNCTIONS_BASE = 'https://us-central1-mast-platform-prod.cloudfunctions.net';
  var app = document.getElementById('app');
  var token = '';
  var portalData = null;
  var activeTab = 'show';
  var editingProfile = false;
  var savingProfile = false;
  var msg = null; // { type: 'success'|'error', text: '' }

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function init() {
    var params = new URLSearchParams(window.location.search);
    token = params.get('token') || '';

    if (!token) {
      renderError('No access token', 'Please use the link from your vendor invite email.');
      return;
    }

    // Check for Stripe purchase callback
    if (params.get('purchase') === 'success') {
      msg = { type: 'success', text: 'Coin purchase successful! Your balance will update shortly.' };
      // Reload data after a brief delay for webhook processing
      setTimeout(function() { loadPortalData(); }, 3000);
    } else if (params.get('purchase') === 'cancelled') {
      msg = { type: 'error', text: 'Coin purchase was cancelled.' };
    }

    loadPortalData();
  }

  function loadPortalData() {
    fetch(FUNCTIONS_BASE + '/eventsGetVendorPortalData?token=' + encodeURIComponent(token))
      .then(function(r) {
        if (r.status === 401) throw new Error('Invalid or expired invite link. Please contact the organizer for a new link.');
        if (!r.ok) throw new Error('Failed to load vendor data.');
        return r.json();
      })
      .then(function(d) {
        portalData = d;
        document.title = (d.vendor.businessName || 'Vendor') + ' — ' + (d.show.name || 'Portal');
        render();
      })
      .catch(function(err) {
        renderError('Access Denied', err.message);
      });
  }

  function renderError(title, message) {
    app.innerHTML = '<div class="error-page"><h2>' + esc(title) + '</h2><p>' + esc(message) + '</p></div>';
  }

  function render() {
    if (!portalData) return;
    var show = portalData.show;
    var vendor = portalData.vendor;

    var h = '';

    // Header
    h += '<div class="portal-header"><div class="portal-header-inner">';
    h += '<div><div class="portal-title">' + esc(vendor.businessName) + '</div>';
    h += '<div class="portal-subtitle">' + esc(show.name) + '</div></div>';
    var statusClass = vendor.status === 'confirmed' ? 'badge-green' : vendor.status === 'cancelled' ? 'badge-red' : 'badge-amber';
    h += '<span class="badge ' + statusClass + '">' + esc(vendor.status || 'pending') + '</span>';
    h += '</div></div>';

    // Tabs
    var tabs = ['show', 'profile', 'promotions', 'ads'];
    h += '<div class="tabs"><div class="tabs-inner">';
    var tabLabels = { show: 'Show Info', profile: 'My Profile', promotions: 'Promotions', ads: 'Ads' };
    tabs.forEach(function(t) {
      h += '<button class="tab-btn' + (activeTab === t ? ' active' : '') + '" onclick="setTab(\'' + t + '\')">' + tabLabels[t] + '</button>';
    });
    h += '</div></div>';

    h += '<div class="content">';

    if (msg) {
      h += '<div class="msg msg-' + msg.type + '">' + esc(msg.text) + '</div>';
    }

    if (activeTab === 'show') h += renderShowTab();
    else if (activeTab === 'profile') h += renderProfileTab();
    else if (activeTab === 'promotions') h += renderPromotionsTab();
    else if (activeTab === 'ads') h += renderAdsTab();

    h += '</div>';

    app.innerHTML = h;
  }

  function renderShowTab() {
    var show = portalData.show;
    var booth = portalData.booth;
    var vendor = portalData.vendor;

    var h = '<div class="section"><h3>Show Details</h3>';
    h += '<div class="info-grid">';
    h += infoItem('Show', show.name);
    h += infoItem('Venue', show.venue || '—');
    h += infoItem('Address', show.address || '—');
    h += infoItem('Dates', (show.startDate || '—') + (show.endDate && show.endDate !== show.startDate ? ' — ' + show.endDate : ''));
    h += infoItem('Status', show.status || '—');
    if (show.setupTime) h += infoItem('Setup Time', show.setupTime);
    h += '</div>';
    if (show.setupNotes) {
      h += '<div style="margin-top:12px;padding:12px;background:var(--primary-bg);border-radius:8px;font-size:13px;line-height:1.5;">' + esc(show.setupNotes) + '</div>';
    }
    if (show.attendeeNotes) {
      h += '<p style="margin-top:10px;font-size:13px;color:var(--text-secondary);">' + esc(show.attendeeNotes) + '</p>';
    }
    h += '</div>';

    // Booth
    h += '<div class="section"><h3>Your Booth</h3>';
    if (booth) {
      h += '<div class="info-grid">';
      h += infoItem('Booth', booth.name);
      if (booth.location) h += infoItem('Location', booth.location);
      if (booth.size) h += infoItem('Size', booth.size);
      h += '</div>';
    } else {
      h += '<p style="color:var(--text-secondary);font-size:14px;">No booth assigned yet. The organizer will assign your booth.</p>';
    }
    var payBadge = vendor.paymentStatus === 'paid' ? 'badge-green' : 'badge-amber';
    h += '<div style="margin-top:10px;">Payment: <span class="badge ' + payBadge + '">' + esc(vendor.paymentStatus || 'unpaid') + '</span></div>';
    h += '</div>';

    if (show.slug) {
      h += '<div class="section"><h3>Show Page</h3>';
      h += '<p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">Your listing is visible to attendees on the show page.</p>';
      h += '<a href="../show/' + esc(show.slug) + '" target="_blank" class="btn btn-primary btn-sm">View Show Page ↗</a>';
      h += '</div>';
    }

    return h;
  }

  function renderProfileTab() {
    var vendor = portalData.vendor;

    var h = '<div class="section"><h3>Vendor Profile</h3>';
    h += '<p class="section-subtitle">This info is visible to attendees on the show page.</p>';

    // Logo
    h += '<div class="logo-area">';
    if (vendor.logoUrl) {
      h += '<img class="logo-img" src="' + esc(vendor.logoUrl) + '" alt="Logo" onerror="this.style.display=\'none\'">';
    } else {
      h += '<div class="logo-placeholder">' + esc((vendor.businessName || '?')[0].toUpperCase()) + '</div>';
    }
    h += '<div><input type="file" id="logoInput" accept="image/*" style="display:none" onchange="uploadLogo(this)">';
    h += '<button class="btn btn-secondary btn-sm" onclick="document.getElementById(\'logoInput\').click()">Change Logo</button></div>';
    h += '</div>';

    if (editingProfile) {
      h += '<form onsubmit="saveProfile(event)">';
      h += '<div class="form-row">';
      h += formField('Business Name', 'ep_businessName', vendor.businessName);
      h += formField('Category', 'ep_category', vendor.category);
      h += '</div>';
      h += formFieldArea('Bio', 'ep_bio', vendor.bio || vendor.businessDescription);
      h += '<div class="form-row">';
      h += formField('Website', 'ep_websiteUrl', vendor.websiteUrl);
      h += formField('Instagram', 'ep_instagramHandle', vendor.instagramHandle);
      h += '</div>';
      h += formField('Tags (comma-separated)', 'ep_tags', (vendor.tags || []).join(', '));
      h += '<div style="display:flex;gap:8px;margin-top:12px;">';
      h += '<button class="btn btn-primary" type="submit"' + (savingProfile ? ' disabled' : '') + '>' + (savingProfile ? 'Saving...' : 'Save') + '</button>';
      h += '<button class="btn btn-secondary" type="button" onclick="cancelEdit()">Cancel</button>';
      h += '</div></form>';
    } else {
      h += '<div class="info-grid">';
      h += infoItem('Business Name', vendor.businessName);
      h += infoItem('Category', vendor.category || '—');
      h += infoItem('Website', vendor.websiteUrl || '—');
      h += infoItem('Instagram', vendor.instagramHandle || '—');
      h += '</div>';
      if (vendor.bio || vendor.businessDescription) {
        h += '<p style="margin-top:10px;font-size:14px;color:var(--text-secondary);line-height:1.5;">' + esc(vendor.bio || vendor.businessDescription) + '</p>';
      }
      if (vendor.tags && vendor.tags.length > 0) {
        h += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;">';
        vendor.tags.forEach(function(t) { h += '<span style="padding:3px 10px;background:var(--primary-bg);color:var(--primary);border-radius:12px;font-size:12px;">' + esc(t) + '</span>'; });
        h += '</div>';
      }
      h += '<button class="btn btn-primary btn-sm" style="margin-top:14px;" onclick="startEdit()">Edit Profile</button>';
    }

    h += '</div>';
    return h;
  }

  function renderPromotionsTab() {
    var promotions = portalData.promotions || [];

    var h = '<div class="section"><h3>Promotions & Coupons</h3>';
    h += '<p class="section-subtitle">Coupons are shown to attendees on the show page.</p>';

    if (promotions.length === 0) {
      h += '<p style="color:var(--text-secondary);font-size:14px;padding:20px 0;text-align:center;">No promotions yet. Add a coupon to attract attendees!</p>';
    } else {
      h += '<table class="promo-table"><thead><tr><th>Code</th><th>Value</th><th>Message</th><th>Active</th></tr></thead><tbody>';
      promotions.forEach(function(p) {
        var val = p.couponType === 'percentage' ? (p.couponValue + '%') : ('$' + (p.couponValue / 100).toFixed(2));
        h += '<tr>';
        h += '<td><strong>' + esc(p.mastCouponCode) + '</strong></td>';
        h += '<td>' + esc(val) + '</td>';
        h += '<td style="color:var(--text-secondary);font-size:13px;">' + esc(p.attendeeMessage || '—') + '</td>';
        h += '<td><span class="badge ' + (p.active ? 'badge-green' : 'badge-gray') + '">' + (p.active ? 'Active' : 'Off') + '</span></td>';
        h += '</tr>';
      });
      h += '</tbody></table>';
    }

    h += '</div>';
    return h;
  }

  function renderAdsTab() {
    var wallet = portalData.wallet || {};
    var ads = portalData.vendorAds || [];
    var transactions = portalData.transactions || [];
    var config = portalData.adConfig || {};

    var h = '<div class="section"><h3>Ad Wallet</h3>';
    h += '<div class="wallet-grid">';
    h += '<div class="wallet-card"><div class="wallet-amount">' + (wallet.coins || 0) + '</div><div class="wallet-label">Coins</div></div>';
    h += '<div class="wallet-card"><div class="wallet-amount">' + (wallet.tokens || 0) + '</div><div class="wallet-label">Tokens</div></div>';
    h += '</div>';

    // Actions
    h += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
    h += '<button class="btn btn-amber btn-sm" onclick="buyCoins()">Buy Coins</button>';
    if ((wallet.coins || 0) > 0) {
      h += '<button class="btn btn-primary btn-sm" onclick="convertCoins()">Convert Coins → Tokens</button>';
    }
    h += '</div>';
    h += '</div>';

    // Active Ads
    h += '<div class="section"><h3>Your Ads</h3>';
    if (ads.length === 0) {
      h += '<p style="color:var(--text-secondary);font-size:14px;text-align:center;padding:16px 0;">No ads yet. Purchase coins and create ads to promote your booth.</p>';
    } else {
      ads.forEach(function(a) {
        h += '<div class="ad-card">';
        h += '<div class="ad-headline">' + esc(a.headline || 'Untitled Ad') + '</div>';
        h += '<div class="ad-stats">';
        h += 'Tokens: ' + (a.tokensRemaining || 0) + '/' + (a.tokensCommitted || 0);
        h += ' · Impressions: ' + (a.impressions || 0);
        h += ' · <span class="badge ' + (a.active ? 'badge-green' : 'badge-gray') + '">' + (a.active ? 'Active' : 'Inactive') + '</span>';
        h += '</div></div>';
      });
    }
    h += '</div>';

    // Transaction History
    if (transactions.length > 0) {
      h += '<div class="section"><h3>Transaction History</h3>';
      h += '<div class="tx-list">';
      transactions.forEach(function(tx) {
        var isPositive = tx.type === 'purchase' || tx.type === 'earn';
        h += '<div class="tx-item">';
        h += '<div><div style="font-weight:500;">' + esc(tx.description || tx.type) + '</div>';
        h += '<div class="tx-desc">' + esc(tx.timestamp ? new Date(tx.timestamp).toLocaleDateString() : '') + '</div></div>';
        h += '<div class="tx-amount ' + (isPositive ? 'positive' : 'negative') + '">' + (isPositive ? '+' : '-') + tx.amount + ' ' + esc(tx.currency || '') + '</div>';
        h += '</div>';
      });
      h += '</div></div>';
    }

    return h;
  }

  // Helpers
  function infoItem(label, value) {
    return '<div class="info-item"><div class="info-label">' + esc(label) + '</div><div class="info-value">' + esc(value || '—') + '</div></div>';
  }
  function formField(label, id, value) {
    return '<div class="form-group"><label class="form-label">' + esc(label) + '</label><input class="form-input" type="text" id="' + id + '" value="' + esc(value || '') + '"></div>';
  }
  function formFieldArea(label, id, value) {
    return '<div class="form-group"><label class="form-label">' + esc(label) + '</label><textarea class="form-textarea" id="' + id + '">' + esc(value || '') + '</textarea></div>';
  }

  // Actions
  window.setTab = function(t) { activeTab = t; msg = null; render(); };

  window.startEdit = function() { editingProfile = true; render(); };
  window.cancelEdit = function() { editingProfile = false; render(); };

  window.saveProfile = function(e) {
    e.preventDefault();
    savingProfile = true;
    render();

    var updates = {
      businessName: document.getElementById('ep_businessName').value.trim(),
      category: document.getElementById('ep_category').value.trim(),
      bio: document.getElementById('ep_bio').value.trim(),
      websiteUrl: document.getElementById('ep_websiteUrl').value.trim(),
      instagramHandle: document.getElementById('ep_instagramHandle').value.trim(),
      tags: document.getElementById('ep_tags').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean)
    };

    // Use manageAd endpoint pattern — but we need a profile update endpoint.
    // For now, use eventsManageAd with action=updateProfile (extending its purpose)
    // Actually, there's no profile update function. We'll need to do a direct RTDB write
    // via the vendor portal. Since the vendor page has no auth, we rely on the token.
    // TODO: Add eventsUpdateVendorProfile Cloud Function in a future session.
    // For now, simulate success and update local state.
    portalData.vendor = Object.assign(portalData.vendor, updates);
    editingProfile = false;
    savingProfile = false;
    msg = { type: 'success', text: 'Profile updated locally. (Server sync coming soon.)' };
    render();
  };

  window.uploadLogo = function(input) {
    if (!input.files || !input.files[0]) return;
    msg = { type: 'success', text: 'Uploading logo...' };
    render();

    window.TENANT_READY.then(function() {
      var fbApp;
      try { fbApp = firebase.app('vendor-upload'); } catch (e) {
        fbApp = firebase.initializeApp(window.TENANT_FIREBASE_CONFIG, 'vendor-upload');
      }
      var storage = fbApp.storage();
      var file = input.files[0];
      var ext = file.name.split('.').pop() || 'jpg';
      var path = window.TENANT_ID + '/events/vendors/' + portalData.show.id + '/' + portalData.vendor.id + '/logo.' + ext;
      storage.ref(path).put(file).then(function(snap) {
        return snap.ref.getDownloadURL();
      }).then(function(url) {
        portalData.vendor.logoUrl = url;
        msg = { type: 'success', text: 'Logo uploaded!' };
        render();
      }).catch(function(err) {
        msg = { type: 'error', text: 'Logo upload failed: ' + err.message };
        render();
      });
    });
  };

  window.buyCoins = function() {
    var config = portalData.adConfig || {};
    var amount = prompt('How many coins? (Min: ' + (config.minCoinPurchase || 10) + ', Max: ' + (config.maxCoinPurchase || 100) + ')');
    if (!amount) return;

    fetch(FUNCTIONS_BASE + '/eventsPurchaseCoins', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, coinAmount: parseInt(amount, 10) })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.checkoutUrl) {
        window.location.href = d.checkoutUrl;
      } else {
        msg = { type: 'error', text: d.error || 'Failed to start checkout' };
        render();
      }
    })
    .catch(function(err) {
      msg = { type: 'error', text: 'Failed: ' + err.message };
      render();
    });
  };

  window.convertCoins = function() {
    var wallet = portalData.wallet || {};
    var config = portalData.adConfig || {};
    var rate = config.tokenRate || 10;
    var maxConvert = Math.floor((wallet.coins || 0) / rate) * rate;
    if (maxConvert < rate) { msg = { type: 'error', text: 'Not enough coins. Need at least ' + rate + ' coins.' }; render(); return; }

    var amount = prompt('Convert coins to tokens. Rate: ' + rate + ' coins = 1 token. Max: ' + maxConvert + ' coins.');
    if (!amount) return;

    fetch(FUNCTIONS_BASE + '/eventsConvertCoins', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, coinAmount: parseInt(amount, 10) })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { msg = { type: 'error', text: d.error }; }
      else {
        msg = { type: 'success', text: 'Converted! New balance: ' + d.coins + ' coins, ' + d.tokens + ' tokens.' };
        portalData.wallet.coins = d.coins;
        portalData.wallet.tokens = d.tokens;
      }
      render();
    })
    .catch(function(err) {
      msg = { type: 'error', text: 'Failed: ' + err.message };
      render();
    });
  };

  window.TENANT_READY ? window.TENANT_READY.then(init) : init();
})();
</script>
</body>
</html>
