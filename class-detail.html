<script>
(function(){
  var P='https://mast-platform-prod-default-rtdb.firebaseio.com/mast-platform';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  window.__earlyTenant=fetch(P+'/tenantsByDomain/'+ek+'.json').then(function(r){return r.ok?r.json():null}).then(function(tid){
    if(!tid)return null;
    return fetch(P+'/tenants/'+tid+'/publicConfig.json').then(function(r){return r.ok?r.json():null}).then(function(pc){
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>

<style>
.cd-container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 7rem 2rem 4rem;
}
.cd-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  text-decoration: none;
  font-size: 0.9rem;
  margin-bottom: 1.5rem;
}
.cd-back:hover { text-decoration: underline; }

.cd-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
  margin-bottom: 3rem;
}
.cd-image {
  aspect-ratio: 4/3;
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg);
}
.cd-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.cd-image-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  color: var(--warm-gray, #888);
}

.cd-info h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem;
  font-weight: 400;
  margin: 0 0 0.5rem;
  color: var(--text);
}
.cd-type-badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: var(--primary);
  color: #fff;
  margin-bottom: 1rem;
}
.cd-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 1.5rem;
}
.cd-meta-item {
  background: var(--surface-card);
  border: 1px solid var(--surface-card-border);
  border-radius: 6px;
  padding: 10px 14px;
}
.cd-meta-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--warm-gray, #888);
  margin-bottom: 2px;
}
.cd-meta-value {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text);
}
.cd-price-main {
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 0.5rem;
}
.cd-price-note {
  font-size: 0.85rem;
  color: var(--warm-gray, #888);
}

.cd-description {
  margin-bottom: 3rem;
  line-height: 1.7;
  color: var(--text);
}
.cd-description h2 {
  font-size: 1.3rem;
  font-weight: 500;
  margin: 0 0 0.75rem;
}

/* Sessions */
.cd-sessions h2 {
  font-size: 1.3rem;
  font-weight: 500;
  margin: 0 0 1rem;
}
.cd-session-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cd-session-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--surface-card);
  border: 1px solid var(--surface-card-border);
  border-radius: 8px;
  transition: border-color 0.2s;
}
.cd-session-row:hover { border-color: var(--primary); }
.cd-session-date {
  font-weight: 500;
  color: var(--text);
  min-width: 140px;
}
.cd-session-time {
  color: var(--warm-gray, #888);
  font-size: 0.9rem;
  min-width: 120px;
}
.cd-session-spots {
  font-size: 0.85rem;
  color: var(--warm-gray, #888);
  min-width: 80px;
  text-align: center;
}
.cd-session-spots.full { color: #EF9A9A; font-weight: 600; }

.cd-book-btn {
  padding: 8px 24px;
  border-radius: 6px;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
}
.cd-book-btn:hover { opacity: 0.85; }
.cd-book-btn:disabled {
  background: var(--border);
  color: var(--warm-gray, #888);
  cursor: not-allowed;
  opacity: 0.6;
}

.cd-no-sessions {
  padding: 2rem;
  text-align: center;
  color: var(--warm-gray, #888);
  background: var(--surface-card);
  border-radius: 8px;
}

.cd-loading {
  text-align: center;
  padding: 8rem 2rem;
  color: var(--warm-gray, #888);
}

/* Auth gate modal */
.cd-auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.cd-auth-modal {
  background: var(--surface-card, #1a1a2e);
  border: 1px solid var(--surface-card-border, #333);
  border-radius: 12px;
  padding: 2rem;
  max-width: 380px;
  width: 90%;
  text-align: center;
}
.cd-auth-modal h3 {
  margin: 0 0 0.5rem;
  font-size: 1.2rem;
  color: var(--text);
}
.cd-auth-modal p {
  margin: 0 0 1.5rem;
  font-size: 0.9rem;
  color: var(--warm-gray, #888);
  line-height: 1.5;
}
.cd-auth-google-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-radius: 6px;
  border: 1px solid var(--border, #444);
  background: #fff;
  color: #333;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  justify-content: center;
  transition: background 0.2s;
}
.cd-auth-google-btn:hover { background: #f5f5f5; }
.cd-auth-cancel-btn {
  display: block;
  margin: 0.75rem auto 0;
  padding: 8px 16px;
  border: none;
  background: transparent;
  color: var(--warm-gray, #888);
  font-size: 0.85rem;
  cursor: pointer;
}
.cd-auth-cancel-btn:hover { color: var(--text); }

/* Pass prompt buttons */
.cd-pass-use-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-radius: 6px;
  border: 1px solid var(--primary, #6C63FF);
  background: var(--primary, #6C63FF);
  color: #fff;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  justify-content: center;
  transition: opacity 0.2s;
}
.cd-pass-use-btn:hover { opacity: 0.85; }
.cd-pass-use-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.cd-pass-pay-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-radius: 6px;
  border: 1px solid var(--border, #444);
  background: #fff;
  color: #333;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  justify-content: center;
  margin-top: 8px;
  transition: background 0.2s;
}
.cd-pass-pay-btn:hover { background: #f5f5f5; }

/* Series enrollment CTA */
.cd-series-cta {
  margin-bottom: 2rem;
  text-align: center;
}
.cd-series-btn {
  display: block;
  width: 100%;
  padding: 14px 24px;
  border-radius: 8px;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.cd-series-btn:hover { opacity: 0.85; }
.cd-series-spots {
  margin-top: 8px;
  font-size: 0.85rem;
  color: var(--warm-gray, #888);
}
.cd-series-or {
  margin-top: 6px;
  font-size: 0.85rem;
  color: var(--warm-gray, #888);
}
.cd-series-started {
  padding: 12px 20px;
  background: rgba(200,150,50,0.15);
  border: 1px solid rgba(200,150,50,0.3);
  border-radius: 8px;
  color: #FFD54F;
  font-size: 0.95rem;
  text-align: center;
}

/* Waitlist buttons */
.cd-waitlist-btn {
  padding: 8px 24px;
  border-radius: 6px;
  border: 1px solid var(--primary);
  background: transparent;
  color: var(--primary);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.cd-waitlist-btn:hover { background: var(--primary); color: #fff; }
.cd-series-waitlist-btn {
  display: block;
  width: 100%;
  padding: 14px 24px;
  border-radius: 8px;
  border: 1px solid var(--primary);
  background: transparent;
  color: var(--primary);
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.cd-series-waitlist-btn:hover { background: var(--primary); color: #fff; }
.cd-waitlist-note {
  margin-top: 6px;
  font-size: 0.8rem;
  color: var(--warm-gray, #888);
}

/* Booking confirmation banner */
.cd-booking-confirm {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10000;
  transform: translateY(-100%);
  transition: transform 0.3s ease;
  pointer-events: none;
}
.cd-booking-confirm.visible {
  transform: translateY(0);
}
.cd-booking-confirm-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px 24px;
  background: var(--primary, #6C63FF);
  color: #fff;
  font-size: 1rem;
  font-weight: 500;
  text-align: center;
}
.cd-booking-confirm-icon {
  font-size: 1.4rem;
}

@media (max-width: 768px) {
  .cd-container { padding: 6rem 1.5rem 3rem; }
  .cd-header { grid-template-columns: 1fr; gap: 1.5rem; }
  .cd-info h1 { font-size: 1.6rem; }
  .cd-session-row { flex-wrap: wrap; gap: 8px; }
  .cd-session-date, .cd-session-time, .cd-session-spots { min-width: auto; }
}
</style>

<nav id="mainNav"></nav>
<div class="nav-mobile-menu" id="mobileMenu"></div>

<div class="cd-container" id="classDetailContainer">
  <div class="cd-loading">Loading class details...</div>
</div>

<footer id="siteFooter"></footer>

<script src="storefront-tenant.js"></script>
<script src="storefront-theme.js"></script>
<script src="storefront-nav.js"></script>
<script src="tenant-brand.js?v=2"></script>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
(function() {
  'use strict';

  var DAY_LABELS = { mon: 'Mon', tue: 'Tue', wed: 'Wed', thu: 'Thu', fri: 'Fri', sat: 'Sat', sun: 'Sun' };
  var MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatPrice(cents) {
    if (typeof cents !== 'number') return '';
    return '$' + (cents / 100).toFixed(2);
  }

  function formatTime(t) {
    if (!t) return '';
    var parts = t.split(':');
    var h = parseInt(parts[0], 10);
    var m = parts[1];
    var ampm = h >= 12 ? 'PM' : 'AM';
    if (h > 12) h -= 12;
    if (h === 0) h = 12;
    return h + ':' + m + ' ' + ampm;
  }

  function formatSessionDate(dateStr) {
    if (!dateStr) return '';
    var parts = dateStr.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    return dayNames[d.getDay()] + ', ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getDate();
  }

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // Get class ID from URL
  var params = new URLSearchParams(window.location.search);
  var classId = params.get('id');
  if (!classId) {
    document.getElementById('classDetailContainer').innerHTML = '<div class="cd-loading">Class not found. <a href="classes.html">Browse all classes</a></div>';
    // still run scripts below so nav builds
  }

  window.TENANT_READY.then(function() {
    if (!classId) return;

    var app; try { app = firebase.app(); } catch (e) { app = firebase.initializeApp(TENANT_FIREBASE_CONFIG); }
    var db = app.database();

    Promise.all([
      db.ref(TENANT_ID + '/public/classes/' + classId).once('value'),
      db.ref(TENANT_ID + '/public/classSessions').orderByChild('classId').equalTo(classId).once('value')
    ]).then(function(results) {
      var cls = results[0].val();
      if (!cls) {
        document.getElementById('classDetailContainer').innerHTML =
          '<div class="cd-loading">Class not found. <a href="classes.html">Browse all classes</a></div>';
        return;
      }
      cls.id = classId;

      var sessData = results[1].val() || {};
      var today = todayStr();
      var sessions = Object.keys(sessData).map(function(id) {
        var s = sessData[id];
        s.id = id;
        return s;
      }).filter(function(s) {
        return s.status === 'scheduled' && s.date >= today;
      }).sort(function(a, b) {
        return (a.date + a.startTime).localeCompare(b.date + b.startTime);
      });

      document.title = cls.name + ' \u2014 ' + (window.TENANT_TITLE_SUFFIX ? TENANT_TITLE_SUFFIX() : 'Studio');
      renderDetail(cls, sessions);
    }).catch(function(err) {
      console.error('[class-detail] Load failed:', err);
      document.getElementById('classDetailContainer').innerHTML =
        '<div class="cd-loading">Unable to load class details. <a href="classes.html">Browse all classes</a></div>';
    });
  }).catch(function(err) {
    console.error('[class-detail] Tenant failed:', err);
  });

  function renderDetail(cls, sessions) {
    var container = document.getElementById('classDetailContainer');

    var image = '';
    if (cls.imageIds && cls.imageIds.length > 0) image = cls.imageIds[0];

    var typeLabel = cls.type === 'dropin' ? 'Open Studio' : cls.type.charAt(0).toUpperCase() + cls.type.slice(1);

    var price = formatPrice(cls.priceCents);
    var priceNote = 'per session';
    if (cls.type === 'series' && cls.seriesInfo && cls.seriesInfo.seriesPriceCents) {
      price = formatPrice(cls.seriesInfo.seriesPriceCents);
      priceNote = cls.seriesInfo.totalSessions ? cls.seriesInfo.totalSessions + '-session series' : 'full series';
      if (cls.seriesInfo.allowDropIn && cls.priceCents) {
        priceNote += ' &middot; Drop-in: ' + formatPrice(cls.priceCents);
      }
    }

    var schedDesc = '';
    if (cls.schedule) {
      if (cls.schedule.type === 'recurring' && cls.schedule.days) {
        schedDesc = cls.schedule.days.map(function(d) { return DAY_LABELS[d] || d; }).join(', ');
        if (cls.schedule.startTime) schedDesc += ' at ' + formatTime(cls.schedule.startTime);
      } else if (cls.schedule.type === 'once') {
        schedDesc = formatSessionDate(cls.schedule.date || cls.schedule.startDate);
        if (cls.schedule.startTime) schedDesc += ' at ' + formatTime(cls.schedule.startTime);
      }
    }

    var html = '<a href="classes.html" class="cd-back">&#8592; All Classes</a>';

    // Header: image + info
    html += '<div class="cd-header">' +
      '<div class="cd-image">' +
      (image ? '<img src="' + esc(image) + '" alt="' + esc(cls.name) + '">' : '<div class="cd-image-placeholder">&#128197;</div>') +
      '</div>' +
      '<div class="cd-info">' +
      '<span class="cd-type-badge">' + esc(typeLabel) + '</span>' +
      '<h1>' + esc(cls.name) + '</h1>' +
      '<div class="cd-price-main">' + price + '</div>' +
      '<div class="cd-price-note">' + priceNote + '</div>' +
      (!cls.materialsIncluded && cls.materialsCostCents ? '<div class="cd-price-note" style="color:var(--primary,#C4853C);">+ ' + formatPrice(cls.materialsCostCents) + ' materials fee' + (cls.materialsNote ? ' (' + esc(cls.materialsNote) + ')' : '') + '</div>' : '') +
      '<div class="cd-meta-grid">' +
      '<div class="cd-meta-item"><div class="cd-meta-label">Schedule</div><div class="cd-meta-value">' + esc(schedDesc || 'See dates below') + '</div></div>' +
      '<div class="cd-meta-item"><div class="cd-meta-label">Duration</div><div class="cd-meta-value">' + (cls.duration || '—') + ' min</div></div>' +
      '<div class="cd-meta-item"><div class="cd-meta-label">Capacity</div><div class="cd-meta-value">' + (cls.capacity || '—') + ' students</div></div>' +
      '<div class="cd-meta-item"><div class="cd-meta-label">Materials</div><div class="cd-meta-value">' + (cls.materialsIncluded ? (cls.materialsNote || 'Included') : (cls.materialsCostCents ? formatPrice(cls.materialsCostCents) + ' fee' : 'Not included')) + '</div></div>' +
      '</div>' +
      '</div></div>';

    // Description
    if (cls.description) {
      html += '<div class="cd-description"><h2>About This Class</h2><p>' + esc(cls.description) + '</p></div>';
    }

    // Series enrollment CTA
    var isSeries = cls.type === 'series' && cls.seriesInfo;
    var seriesPrice = isSeries && cls.seriesInfo.seriesPriceCents ? cls.seriesInfo.seriesPriceCents : 0;
    var allowDropIn = isSeries && cls.seriesInfo.allowDropIn;
    var totalSessions = isSeries && cls.seriesInfo.totalSessions ? cls.seriesInfo.totalSessions : sessions.length;
    var seriesEnrolled = cls.seriesEnrolled || 0;
    var seriesSpotsLeft = Math.max(0, (cls.capacity || 0) - seriesEnrolled);
    var firstSessionDate = sessions.length > 0 ? sessions[0].date : null;
    var seriesStarted = firstSessionDate && firstSessionDate < todayStr();

    if (isSeries && sessions.length > 0) {
      if (seriesStarted) {
        html += '<div class="cd-series-cta">' +
          '<div class="cd-series-started">This series has already started' +
          (allowDropIn ? ' &mdash; drop-in sessions available below' : '') +
          '</div></div>';
      } else if (seriesSpotsLeft <= 0) {
        var seriesWaitlisted = cls.seriesWaitlisted || 0;
        html += '<div class="cd-series-cta">' +
          '<button class="cd-series-waitlist-btn" onclick="window._joinWaitlist(null, \'' + esc(cls.id) + '\', \'' + esc(cls.name) + '\', \'series\')">' +
          'Join Series Waitlist</button>' +
          '<div class="cd-waitlist-note">' + (seriesWaitlisted > 0 ? seriesWaitlisted + ' on waitlist' : 'Be the first on the waitlist') + '</div>' +
          (allowDropIn ? '<div class="cd-series-or">or check for drop-in availability below</div>' : '') +
          '</div>';
      } else {
        html += '<div class="cd-series-cta">' +
          '<button class="cd-series-btn" onclick="window._bookSeries(\'' + esc(cls.id) + '\', \'' + esc(cls.name) + '\', ' + seriesPrice + ', ' + totalSessions + ', ' + (cls.materialsIncluded ? 0 : (cls.materialsCostCents || 0)) + ')">' +
          'Enroll in Full Series &mdash; ' + formatPrice(seriesPrice) + ' (' + totalSessions + ' sessions)' +
          '</button>' +
          '<div class="cd-series-spots">' + seriesSpotsLeft + ' series spot' + (seriesSpotsLeft !== 1 ? 's' : '') + ' available</div>' +
          (allowDropIn ? '<div class="cd-series-or">or book individual sessions below as drop-ins at ' + formatPrice(cls.priceCents) + ' each</div>' : '') +
          '</div>';
      }
    }

    // Sessions
    html += '<div class="cd-sessions"><h2>Upcoming Sessions (' + sessions.length + ')</h2>';
    if (sessions.length === 0) {
      html += '<div class="cd-no-sessions">No upcoming sessions scheduled. Check back soon!</div>';
    } else {
      html += '<div class="cd-session-list">';
      sessions.forEach(function(s) {
        // Drop-in spots = capacity - seriesEnrolled - session dropIns
        var dropInEnrolled = s.enrolled || 0;
        var dropInSpotsLeft = Math.max(0, (s.capacity || cls.capacity || 0) - seriesEnrolled - dropInEnrolled);
        var isFull = dropInSpotsLeft <= 0;

        // For series without drop-in, don't show per-session Book buttons
        // Also only show drop-in for future sessions (not past)
        var showBookBtn = (!isSeries || allowDropIn) && s.date >= todayStr();

        var sessionWaitlisted = s.waitlisted || 0;
        html += '<div class="cd-session-row">' +
          '<span class="cd-session-date">' + formatSessionDate(s.date) + '</span>' +
          '<span class="cd-session-time">' + formatTime(s.startTime) + ' - ' + formatTime(s.endTime) + '</span>' +
          '<span class="cd-session-spots' + (isFull ? ' full' : '') + '">' + (isFull ? 'Full' + (sessionWaitlisted > 0 ? ' (' + sessionWaitlisted + ' waiting)' : '') : dropInSpotsLeft + ' spot' + (dropInSpotsLeft !== 1 ? 's' : '') + ' left') + '</span>' +
          (showBookBtn ?
            (isFull ?
              '<button class="cd-waitlist-btn" onclick="window._joinWaitlist(\'' + esc(s.id) + '\', \'' + esc(cls.id) + '\', \'' + esc(cls.name) + '\', \'dropin\')">Waitlist</button>' :
              '<button class="cd-book-btn" onclick="window._bookSession(\'' + esc(s.id) + '\', \'' + esc(cls.id) + '\', \'' + esc(cls.name) + '\', ' + (cls.priceCents || 0) + ', ' + dropInSpotsLeft + ', \'' + esc(s.date) + '\', \'' + esc(s.startTime) + '\', ' + (cls.materialsIncluded ? 0 : (cls.materialsCostCents || 0)) + ')">' +
              (isSeries ? 'Drop-in' : 'Book') + '</button>')
            : '') +
          '</div>';
      });
      html += '</div>';
    }
    html += '</div>';

    container.innerHTML = html;
  }

  // Book full series — adds as a single cart item
  window._bookSeries = function(classId, className, seriesPriceCents, totalSessions, materialsCostCents) {
    if (!window.MastCart) { alert('Cart not loaded yet. Please wait.'); return; }

    function addSeriesToCart() {
      window.MastCart.addItem({
        pid: classId + '-series',
        name: className + ' (Full Series — ' + totalSessions + ' sessions)',
        price: '$' + (seriesPriceCents / 100).toFixed(2),
        priceCents: seriesPriceCents,
        options: {},
        qty: 1,
        bookingType: 'class',
        classId: classId,
        image: ''
      });

      // Auto-add materials fee for series (one fee covers all sessions)
      if (materialsCostCents && materialsCostCents > 0) {
        window.MastCart.addItem({
          pid: classId + '-series-materials',
          name: className + ' — Materials (Series)',
          price: '$' + (materialsCostCents / 100).toFixed(2),
          priceCents: materialsCostCents,
          options: {},
          qty: 1,
          bookingType: 'class-materials',
          classId: classId,
          image: ''
        });
      }

      // Use the same confirmation banner
      var banner = document.createElement('div');
      banner.className = 'cd-booking-confirm';
      banner.innerHTML = '<div class="cd-booking-confirm-inner"><div class="cd-booking-confirm-icon">&#10003;</div><div class="cd-booking-confirm-text">Series enrolled — ' + className + '</div></div>';
      document.body.appendChild(banner);
      requestAnimationFrame(function() { banner.classList.add('visible'); });
      setTimeout(function() { banner.classList.remove('visible'); setTimeout(function() { banner.remove(); }, 300); }, 2500);
    }

    var user = window.MastCart.getCurrentUser();
    if (user && !user.isAnonymous) {
      addSeriesToCart();
      return;
    }

    // Auth gate — same pattern
    if (window.siteSignIn) window.siteSignIn();
    var fbApp = window.MastCart.getFirebaseApp();
    if (!fbApp) return;
    var unsubscribe = fbApp.auth().onAuthStateChanged(function(u) {
      if (u && !u.isAnonymous) { unsubscribe(); addSeriesToCart(); }
    });
  };

  // Join waitlist for a full session or series
  window._joinWaitlist = function(sessionId, classId, className, enrollmentType) {
    if (!window.MastCart) { alert('Cart not loaded yet. Please wait.'); return; }

    function doJoinWaitlist() {
      var user = window.MastCart.getCurrentUser();
      var fbApp = window.MastCart.getFirebaseApp();
      if (!user || !fbApp) return;
      var db = fbApp.database();

      // Check not already enrolled/waitlisted
      var checkPath = TENANT_ID + '/public/enrollments';
      db.ref(checkPath).orderByChild('studentUid').equalTo(user.uid).once('value').then(function(snap) {
        var existing = snap.val() || {};
        var isDuplicate = Object.values(existing).some(function(e) {
          if (e.status === 'cancelled' || e.status === 'cancelled_insufficient_enrollment') return false;
          if (enrollmentType === 'series') return e.classId === classId && e.enrollmentType === 'series';
          return e.sessionId === sessionId;
        });
        if (isDuplicate) {
          alert('You are already enrolled or on the waitlist for this class.');
          return;
        }

        // Get current waitlist count and assign position
        var counterPath;
        if (enrollmentType === 'series') {
          counterPath = TENANT_ID + '/public/classes/' + classId + '/seriesWaitlisted';
        } else {
          counterPath = TENANT_ID + '/public/classSessions/' + sessionId + '/waitlisted';
        }

        db.ref(counterPath).transaction(function(current) {
          return (current || 0) + 1;
        }).then(function(result) {
          var position = result.snapshot.val();

          // Create waitlist enrollment
          var enrollmentRef = db.ref(TENANT_ID + '/public/enrollments').push();
          var enrollmentData = {
            classId: classId,
            studentUid: user.uid,
            studentName: user.displayName || '',
            studentEmail: user.email || '',
            status: 'waitlisted',
            enrollmentType: enrollmentType,
            waitlistPosition: position,
            paymentMethod: 'pending',
            pricePaid: 0,
            enrolledAt: new Date().toISOString()
          };
          if (sessionId) enrollmentData.sessionId = sessionId;
          return enrollmentRef.set(enrollmentData).then(function() { return position; });
        }).then(function(position) {
          // Show confirmation banner
          var banner = document.createElement('div');
          banner.className = 'cd-booking-confirm';
          banner.innerHTML = '<div class="cd-booking-confirm-inner"><div class="cd-booking-confirm-icon">&#128276;</div><div class="cd-booking-confirm-text">Waitlisted #' + position + ' — ' + className + '</div></div>';
          document.body.appendChild(banner);
          requestAnimationFrame(function() { banner.classList.add('visible'); });
          setTimeout(function() { banner.classList.remove('visible'); setTimeout(function() { banner.remove(); }, 300); }, 3000);
        }).catch(function(err) {
          console.error('[class-detail] Waitlist join failed:', err);
          alert('Failed to join waitlist. Please try again.');
        });
      });
    }

    // Auth gate
    var user = window.MastCart.getCurrentUser();
    if (user && !user.isAnonymous) {
      doJoinWaitlist();
      return;
    }

    if (window.siteSignIn) window.siteSignIn();
    var fbApp = window.MastCart.getFirebaseApp();
    if (!fbApp) return;
    var unsubscribe = fbApp.auth().onAuthStateChanged(function(u) {
      if (u && !u.isAnonymous) { unsubscribe(); doJoinWaitlist(); }
    });
  };

  window._bookSession = function(sessionId, classId, className, priceCents, spotsLeft, date, time, materialsCostCents) {
    if (!window.MastCart) { alert('Cart not loaded yet. Please wait.'); return; }

    function showBookingConfirmation(message, isPass) {
      var banner = document.createElement('div');
      banner.className = 'cd-booking-confirm';
      banner.innerHTML =
        '<div class="cd-booking-confirm-inner">' +
          '<div class="cd-booking-confirm-icon">' + (isPass ? '&#9889;' : '&#10003;') + '</div>' +
          '<div class="cd-booking-confirm-text">' + message + '</div>' +
        '</div>';
      document.body.appendChild(banner);
      // Trigger animation
      requestAnimationFrame(function() { banner.classList.add('visible'); });
      setTimeout(function() {
        banner.classList.remove('visible');
        setTimeout(function() { banner.remove(); }, 300);
      }, 2500);
    }

    function addToCart() {
      var dateParts = date.split('-');
      var dateLabel = dateParts[1] + '/' + dateParts[2] + '/' + dateParts[0];

      window.MastCart.addItem({
        pid: classId,
        name: className + ' - ' + dateLabel,
        price: priceCents ? '$' + (priceCents / 100).toFixed(2) : 'Free',
        priceCents: priceCents,
        options: { date: date, time: time },
        qty: 1,
        bookingType: 'class',
        sessionId: sessionId,
        classId: classId,
        availableStock: spotsLeft,
        image: ''
      });

      // Auto-add materials fee as separate line item
      if (materialsCostCents && materialsCostCents > 0) {
        window.MastCart.addItem({
          pid: classId + '-materials',
          name: className + ' — Materials',
          price: '$' + (materialsCostCents / 100).toFixed(2),
          priceCents: materialsCostCents,
          options: { date: date, time: time },
          qty: 1,
          bookingType: 'class-materials',
          sessionId: sessionId,
          classId: classId,
          image: ''
        });
      }

      showBookingConfirmation('Added to cart — ' + className, false);
    }

    // Check for applicable pass and offer to use it
    function checkPassAndBook() {
      var user = window.MastCart.getCurrentUser();
      if (!user) { addToCart(); return; }

      var fbApp = window.MastCart.getFirebaseApp();
      if (!fbApp) { addToCart(); return; }
      var db = fbApp.database();

      db.ref(TENANT_ID + '/public/accounts/' + user.uid + '/wallet/passes').once('value')
        .then(function(snap) {
          var passesObj = snap.val() || {};
          var now = new Date().toISOString();
          var PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };

          // Find applicable passes: active, has remaining credits, not expired, covers this class
          var applicable = Object.keys(passesObj).map(function(pid) {
            var p = passesObj[pid];
            p._id = pid;
            return p;
          }).filter(function(p) {
            if (p.status !== 'active') return false;
            if (p.expiresAt && p.expiresAt < now) return false;
            if (p.visitsRemaining !== null && p.visitsRemaining <= 0) return false;
            return true;
          });

          // Check class scope from pass definitions (need to look up allowedClassIds)
          if (applicable.length === 0) {
            addToCart();
            return;
          }

          // Load pass definitions to check scope
          var defIds = applicable.map(function(p) { return p.passDefinitionId; }).filter(Boolean);
          var defPromises = defIds.map(function(did) {
            return db.ref(TENANT_ID + '/public/passDefinitions/' + did).once('value');
          });

          Promise.all(defPromises).then(function(defSnaps) {
            var defMap = {};
            defSnaps.forEach(function(s, i) { if (s.val()) defMap[defIds[i]] = s.val(); });

            var validPasses = applicable.filter(function(p) {
              var def = defMap[p.passDefinitionId];
              if (!def) return true; // no def found = allow (backward compat)
              if (!def.allowedClassIds) return true; // null = all classes
              return def.allowedClassIds.indexOf(classId) !== -1;
            }).sort(function(a, b) {
              var pa = PRIORITY_ORDER[a.priority] || 1;
              var pb = PRIORITY_ORDER[b.priority] || 1;
              if (pa !== pb) return pa - pb;
              // Earlier expiration first (use pass before it expires)
              if (a.expiresAt && b.expiresAt) return a.expiresAt.localeCompare(b.expiresAt);
              if (a.expiresAt) return -1;
              return 1;
            });

            if (validPasses.length === 0) {
              addToCart();
              return;
            }

            // Show pass prompt modal
            showPassPrompt(validPasses[0], sessionId, classId, className, date, time, spotsLeft);
          }).catch(function() { addToCart(); });
        })
        .catch(function() { addToCart(); });
    }

    function showPassPrompt(pass, sessionId, classId, className, date, time, spotsLeft) {
      var triggerBtn = document.activeElement;
      var overlay = document.createElement('div');
      overlay.className = 'cd-auth-overlay';
      overlay.setAttribute('role', 'dialog');
      overlay.setAttribute('aria-modal', 'true');
      overlay.setAttribute('aria-labelledby', 'passPromptTitle');

      var remainLabel = pass.visitsRemaining !== null ? pass.visitsRemaining + ' visit' + (pass.visitsRemaining !== 1 ? 's' : '') + ' remaining' : 'Unlimited';
      var expLabel = pass.expiresAt ? 'Expires ' + new Date(pass.expiresAt).toLocaleDateString() : 'No expiration';

      overlay.innerHTML =
        '<div class="cd-auth-modal">' +
          '<h3 id="passPromptTitle">Use your pass?</h3>' +
          '<p style="margin-bottom:0.75rem;"><strong>' + esc(pass.passDefinitionName) + '</strong></p>' +
          '<p style="font-size:0.85rem;margin-bottom:1.5rem;">' + esc(remainLabel) + ' &middot; ' + esc(expLabel) + '</p>' +
          '<button class="cd-pass-use-btn" id="passUseBtn">Use Pass &mdash; Free</button>' +
          '<button class="cd-pass-pay-btn" id="passPayBtn">' + formatPrice(priceCents) + ' &mdash; Pay Instead</button>' +
          '<button class="cd-auth-cancel-btn" id="passPromptCancel">Cancel</button>' +
        '</div>';
      document.body.appendChild(overlay);
      document.getElementById('passUseBtn').focus();

      function closeModal() {
        overlay.remove();
        if (triggerBtn) triggerBtn.focus();
      }

      document.getElementById('passPromptCancel').onclick = closeModal;
      overlay.onclick = function(e) { if (e.target === overlay) closeModal(); };
      overlay.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Tab') {
          var focusable = overlay.querySelectorAll('button');
          var first = focusable[0], last = focusable[focusable.length - 1];
          if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
          else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      });

      // Use pass: deduct credit and create enrollment
      document.getElementById('passUseBtn').onclick = function() {
        var btn = document.getElementById('passUseBtn');
        btn.disabled = true;
        btn.textContent = 'Booking...';

        var user = window.MastCart.getCurrentUser();
        var fbApp = window.MastCart.getFirebaseApp();
        if (!user || !fbApp) { closeModal(); addToCart(); return; }
        var db = fbApp.database();
        var passRef = db.ref(TENANT_ID + '/public/accounts/' + user.uid + '/passes/' + pass._id);

        // Atomic deduct via transaction to prevent double-spend
        passRef.transaction(function(current) {
          if (!current) return current;
          current.visitsUsed = (current.visitsUsed || 0) + 1;
          if (current.visitsRemaining !== null && current.visitsRemaining !== undefined) {
            current.visitsRemaining = Math.max(0, current.visitsRemaining - 1);
            if (current.visitsRemaining <= 0) current.status = 'expired';
          }
          // Activate on first use
          if (!current.activatedAt) {
            current.activatedAt = new Date().toISOString();
          }
          return current;
        }).then(function(result) {
          if (!result.committed) {
            console.warn('[class-detail] Pass transaction not committed');
            closeModal();
            addToCart();
            return;
          }
          var updatedPass = result.snapshot.val();
          // Set expiration on first-use activation if validity window defined
          if (updatedPass && updatedPass.activatedAt && !updatedPass.expiresAt) {
            db.ref(TENANT_ID + '/public/passDefinitions/' + pass.passDefinitionId).once('value').then(function(defSnap) {
              var def = defSnap.val();
              if (def && def.validityDays) {
                var exp = new Date(updatedPass.activatedAt);
                exp.setDate(exp.getDate() + def.validityDays);
                passRef.update({ expiresAt: exp.toISOString() });
              }
            }).catch(function() { /* non-critical */ });
          }
          createPassEnrollment(db, user, sessionId, classId, className, date, time, pass._id);
          closeModal();
          showBookingConfirmation('Booked with your pass — ' + className, true);
        }).catch(function(err) {
          console.error('[class-detail] Pass deduction failed:', err);
          closeModal();
          addToCart();
        });
      };

      // Pay instead: normal cart flow
      document.getElementById('passPayBtn').onclick = function() {
        closeModal();
        addToCart();
      };
    }

    // Create enrollment record for pass-based booking
    function createPassEnrollment(db, user, sessionId, classId, className, date, time, customerPassId) {
      var enrollmentRef = db.ref(TENANT_ID + '/public/enrollments').push();
      enrollmentRef.set({
        classId: classId,
        sessionId: sessionId,
        studentUid: user.uid,
        studentName: user.displayName || '',
        studentEmail: user.email || '',
        status: 'confirmed',
        enrollmentType: 'dropin',
        paymentMethod: 'pass',
        customerPassId: customerPassId,
        pricePaid: 0,
        enrolledAt: new Date().toISOString()
      }).then(function() {
        // Increment session drop-in enrolled count
        db.ref(TENANT_ID + '/public/classSessions/' + sessionId + '/enrolled')
          .transaction(function(current) { return (current || 0) + 1; });
      }).catch(function(err) {
        console.error('[class-detail] Enrollment creation failed:', err);
      });
    }

    // Auth gate: require signed-in (non-anonymous) user for class bookings
    var user = window.MastCart.getCurrentUser();
    if (user && !user.isAnonymous) {
      checkPassAndBook();
      return;
    }

    // Show sign-in prompt (accessible modal)
    var bookBtn = document.activeElement;
    var overlay = document.createElement('div');
    overlay.className = 'cd-auth-overlay';
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');
    overlay.setAttribute('aria-labelledby', 'cdAuthTitle');
    overlay.innerHTML =
      '<div class="cd-auth-modal">' +
        '<h3 id="cdAuthTitle">Sign in to book a class</h3>' +
        '<p>You need an account to enroll in classes so we can manage your bookings.</p>' +
        '<button class="cd-auth-google-btn" id="cdAuthSignIn">' +
          '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.04 24.04 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>' +
          'Continue with Google' +
        '</button>' +
        '<button class="cd-auth-cancel-btn" id="cdAuthCancel">Cancel</button>' +
      '</div>';
    document.body.appendChild(overlay);

    // Focus the sign-in button
    document.getElementById('cdAuthSignIn').focus();

    function closeModal() {
      overlay.remove();
      if (bookBtn) bookBtn.focus();
    }

    document.getElementById('cdAuthCancel').onclick = closeModal;
    overlay.onclick = function(e) {
      if (e.target === overlay) closeModal();
    };
    // Close on Escape
    overlay.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
      // Trap focus inside modal
      if (e.key === 'Tab') {
        var focusable = overlay.querySelectorAll('button');
        var first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    });

    document.getElementById('cdAuthSignIn').onclick = function() {
      closeModal();
      // Use the shared sign-in flow from cart.js
      if (window.siteSignIn) window.siteSignIn();

      // Listen for auth state change to complete the booking
      var fbApp = window.MastCart.getFirebaseApp();
      if (!fbApp) return;
      var unsubscribe = fbApp.auth().onAuthStateChanged(function(u) {
        if (u && !u.isAnonymous) {
          unsubscribe();
          checkPassAndBook();
        }
      });
    };
  };
})();
</script>
