<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cart.css">
<link rel="stylesheet" href="checkout.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="storefront-tenant.js"></script>
<script src="tenant-brand.js?v=2"></script>
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --cream: #FAF6F0;
    --cream-dark: #F0E8DB;
    --charcoal: #1A1A1A;
    --warm-gray: #6B6560;
    --warm-gray-light: #9B958E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--charcoal);
    background: var(--cream);
    overflow-x: hidden;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.25rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(250,246,240,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--cream-dark);
  }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--charcoal);
    text-decoration: none;
  }
  .nav-links { list-style: none; display: flex; gap: 2rem; }
  .nav-links a {
    color: var(--warm-gray);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--charcoal); }

  /* HERO */
  .hero {
    margin-top: 80px;
    padding: 6rem 2rem 4rem;
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px - 200px);
  }
  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 300;
    color: var(--charcoal);
    margin-bottom: 0.75rem;
    line-height: 1.1;
  }
  .hero-tagline {
    font-size: 1.15rem;
    color: var(--warm-gray);
    margin-bottom: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .hero-description {
    max-width: 600px;
    font-size: 1rem;
    color: var(--warm-gray);
    line-height: 1.7;
    margin-bottom: 2.5rem;
  }
  .hero-location {
    font-size: 0.85rem;
    color: var(--warm-gray-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }
  .hero-links {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .hero-links a {
    padding: 0.75rem 2rem;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--charcoal);
    color: var(--cream);
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    background: transparent;
    color: var(--charcoal);
    border: 1px solid var(--cream-dark);
  }
  .btn-secondary:hover { border-color: var(--warm-gray-light); }

  /* CONTACT SECTION */
  .contact {
    padding: 3rem 2rem;
    text-align: center;
    border-top: 1px solid var(--cream-dark);
  }
  .contact h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    margin-bottom: 1rem;
    color: var(--charcoal);
  }
  .contact-info {
    display: flex;
    gap: 2rem;
    justify-content: center;
    flex-wrap: wrap;
    color: var(--warm-gray);
    font-size: 0.9rem;
  }
  .contact-info a {
    color: var(--warm-gray);
    text-decoration: none;
  }
  .contact-info a:hover { color: var(--charcoal); }
  .contact-info-item { display: flex; align-items: center; gap: 0.5rem; }

  /* NEWSLETTER */
  .newsletter {
    padding: 2.5rem 2rem;
    text-align: center;
    background: var(--cream-dark);
  }
  .newsletter h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
  }
  .newsletter p {
    font-size: 0.85rem;
    color: var(--warm-gray);
    margin-bottom: 1rem;
  }
  #nlSignupForm {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 500px;
    margin: 0 auto;
  }
  #nlSignupForm input {
    padding: 0.6rem 1rem;
    border: 1px solid var(--cream-dark);
    border-radius: 4px;
    font-size: 0.85rem;
    background: var(--cream);
    font-family: inherit;
  }
  #nlSignupForm button {
    padding: 0.6rem 1.5rem;
    background: var(--charcoal);
    color: var(--cream);
    border: none;
    border-radius: 4px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: inherit;
  }

  /* FOOTER */
  footer {
    padding: 2rem 2rem 1.5rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--warm-gray-light);
    border-top: 1px solid var(--cream-dark);
  }
  footer a {
    color: var(--warm-gray-light);
    text-decoration: none;
  }
  footer a:hover { color: var(--warm-gray); }
  .footer-links {
    list-style: none;
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .powered-by {
    margin-top: 1rem;
    font-size: 0.75rem;
    color: var(--warm-gray-light);
  }
  .powered-by a { font-weight: 500; }

  /* HIDDEN UNTIL TENANT RESOLVES */
  .tenant-content { opacity: 0; transition: opacity 0.3s ease; }
  .tenant-content.ready { opacity: 1; }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .nav-links { gap: 1rem; }
    .hero { padding: 4rem 1.5rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-brand" data-tenant="brand">My Shop</a>
  <ul class="nav-links">
    <li><a href="shop.html">Shop</a></li>
    <li><a href="schedule.html">Events</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="#" id="navSignIn">Sign In</a></li>
  </ul>
</nav>

<main class="hero tenant-content">
  <h1 class="hero-name" data-tenant="brand">My Shop</h1>
  <p class="hero-tagline" data-tenant="tagline"></p>
  <p class="hero-description" data-tenant="description"></p>
  <p class="hero-location" data-tenant="location"></p>
  <div class="hero-links">
    <a href="shop.html" class="btn-primary">Browse the Shop</a>
    <a href="schedule.html" class="btn-secondary">Upcoming Events</a>
  </div>
</main>

<section class="contact tenant-content">
  <h2>Get in Touch</h2>
  <div class="contact-info">
    <div class="contact-info-item">
      <a href="#" data-tenant-href="email" data-tenant="email"></a>
    </div>
    <div class="contact-info-item">
      <a href="#" data-tenant-href="instagram" data-tenant="instagram"></a>
    </div>
    <div class="contact-info-item">
      <span data-tenant="location"></span>
    </div>
  </div>
</section>

<section class="newsletter tenant-content">
  <h3>Stay in the Loop</h3>
  <p>Events, new collections, and studio updates — no spam, ever.</p>
  <form id="nlSignupForm" onsubmit="return false;">
    <input type="text" id="nlName" placeholder="Your name" required>
    <input type="email" id="nlEmail" placeholder="Your email address" required>
    <button type="button" onclick="window.nlSubscribe && window.nlSubscribe()">Subscribe</button>
  </form>
</section>

<footer class="tenant-content">
  <ul class="footer-links">
    <li><a href="shop.html">Shop</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="schedule.html">Events</a></li>
    <li><a href="commission.html">Commissions</a></li>
    <li><a href="orders.html">Orders</a></li>
  </ul>
  <div data-tenant="year-brand"></div>
  <div class="powered-by"><a href="https://runmast.com">Powered by Mast</a></div>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// Initialize Firebase after tenant resolves
window.TENANT_READY.then(function() {
  if (!window.TENANT_FIREBASE_CONFIG || !window.TENANT_FIREBASE_CONFIG.databaseURL) return;

  var app = firebase.initializeApp({
    apiKey: TENANT_FIREBASE_CONFIG.apiKey,
    authDomain: TENANT_FIREBASE_CONFIG.authDomain,
    databaseURL: TENANT_FIREBASE_CONFIG.databaseURL,
    projectId: TENANT_FIREBASE_CONFIG.projectId,
    storageBucket: TENANT_FIREBASE_CONFIG.storageBucket
  });
  var db = firebase.database();

  // Reveal content
  document.querySelectorAll('.tenant-content').forEach(function(el) {
    el.classList.add('ready');
  });

  // Update document title
  var brand = window.TENANT_BRAND;
  if (brand && brand.name) {
    document.title = brand.name + (brand.tagline ? ' — ' + brand.tagline : '');
  }

  // Newsletter subscribe
  window.nlSubscribe = function() {
    var name = document.getElementById('nlName').value.trim();
    var email = document.getElementById('nlEmail').value.trim();
    if (!name || !email) return;
    var btn = document.querySelector('#nlSignupForm button');
    btn.disabled = true;
    btn.textContent = 'Subscribing...';
    var subRef = db.ref(TENANT_ID + '/newsletter/subscribers').push();
    var token = subRef.key + '-' + Date.now().toString(36);
    subRef.set({
      id: subRef.key, name: name, email: email, notes: null,
      subscribedAt: new Date().toISOString(), source: 'website-form',
      status: 'active', unsubscribeToken: token, unsubscribedAt: null
    }).then(function() {
      document.getElementById('nlSignupForm').innerHTML =
        '<p style="color:var(--warm-gray);font-size:0.95rem;">You\'re subscribed! Thanks for joining.</p>';
    }).catch(function(err) {
      console.error('Signup error:', err);
      btn.disabled = false;
      btn.textContent = 'Subscribe';
      alert('Something went wrong. Please try again.');
    });
  };
}).catch(function(err) {
  console.error('[index] Tenant init failed:', err.message);
  // Show content anyway with defaults
  document.querySelectorAll('.tenant-content').forEach(function(el) {
    el.classList.add('ready');
  });
});
</script>
<script src="cart.js"></script>
<script src="checkout.js?v=2"></script>
<script src="feedback-widget.js"></script>
<script src="share-widget.js"></script>
</body>
</html>
