<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://*.firebaseio.com https://apis.google.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://us-central1-mast-platform-prod.cloudfunctions.net https://*.firebaseio.com wss://*.firebaseio.com https://*.firebasestorage.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://maps.googleapis.com https://places.googleapis.com https://api.ipify.org; img-src 'self' data: blob: https:; frame-src 'self' https://*.firebaseapp.com https://*.firebaseio.com; frame-ancestors 'none';">
<title>My Passes &mdash; My Shop</title>
<link rel="preconnect" href="https://mast-platform-prod-default-rtdb.firebaseio.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<script>
(function(){
  var P='https://mast-platform-prod-default-rtdb.firebaseio.com/mast-platform';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  window.__earlyTenant=fetch(P+'/tenantsByDomain/'+ek+'.json').then(function(r){return r.ok?r.json():null}).then(function(tid){
    if(!tid)return null;
    return fetch(P+'/tenants/'+tid+'/publicConfig.json').then(function(r){return r.ok?r.json():null}).then(function(pc){
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="storefront.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
.mp-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 7rem 2rem 4rem;
}
.mp-header {
  text-align: center;
  margin-bottom: 2.5rem;
}
.mp-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  margin: 0 0 0.5rem;
  color: var(--text);
}
.mp-header p {
  font-size: 0.95rem;
  color: var(--warm-gray, #888);
}

/* Sign-in prompt */
.mp-signin {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--warm-gray, #888);
}
.mp-signin-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-radius: 6px;
  border: 1px solid var(--border, #444);
  background: #fff;
  color: #333;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  margin-top: 1rem;
  transition: background 0.2s;
}
.mp-signin-btn:hover { background: #f5f5f5; }

/* Filter tabs */
.mp-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 1.5rem;
  justify-content: center;
}
.mp-tab {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.mp-tab:hover { border-color: var(--primary); color: var(--primary); }
.mp-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Pass cards */
.mp-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.mp-card {
  background: var(--surface-card);
  border: 1px solid var(--surface-card-border);
  border-radius: 10px;
  padding: 1.5rem;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 1rem;
  align-items: center;
}
.mp-card.expired { opacity: 0.55; }
.mp-card-info h3 {
  margin: 0 0 4px;
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
}
.mp-card-meta {
  font-size: 0.85rem;
  color: var(--warm-gray, #888);
  line-height: 1.6;
}
.mp-card-right {
  text-align: right;
}
.mp-card-status {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.mp-status-active { background: rgba(6,95,70,0.25); color: #4DB6AC; }
.mp-status-expired { background: rgba(200,60,60,0.2); color: #EF9A9A; }
.mp-status-paused { background: rgba(200,150,50,0.2); color: #FFD54F; }

.mp-card-visits {
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text);
}
.mp-card-visits-label {
  font-size: 0.75rem;
  color: var(--warm-gray, #888);
}

/* Progress bar for packs */
.mp-progress {
  width: 120px;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
  margin: 6px 0 0 auto;
}
.mp-progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  transition: width 0.3s;
}

.mp-empty {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--warm-gray, #888);
}
.mp-browse-btn {
  display: inline-block;
  margin-top: 1rem;
  padding: 10px 24px;
  border-radius: 6px;
  background: var(--primary);
  color: #fff;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: opacity 0.2s;
}
.mp-browse-btn:hover { opacity: 0.85; }

.mp-loading {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--warm-gray, #888);
}

@media (max-width: 768px) {
  .mp-container { padding: 6rem 1.5rem 3rem; }
  .mp-header h1 { font-size: 1.8rem; }
  .mp-card { grid-template-columns: 1fr; }
  .mp-card-right { text-align: left; display: flex; align-items: center; gap: 12px; }
  .mp-progress { margin: 0; }
}
</style>
</head>
<body>
<nav id="mainNav"></nav>
<div class="nav-mobile-menu" id="mobileMenu"></div>

<div class="mp-container">
  <div class="mp-header">
    <h1>My Passes</h1>
    <p>Manage your class passes and memberships</p>
  </div>
  <div id="mpContent">
    <div class="mp-loading">Loading...</div>
  </div>
</div>

<footer id="siteFooter"></footer>

<script src="storefront-tenant.js"></script>
<script src="storefront-theme.js"></script>
<script src="storefront-nav.js"></script>
<script src="tenant-brand.js?v=2"></script>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
(function() {
  'use strict';

  var allPasses = [];
  var currentFilter = 'all';

  function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatDate(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
  }

  function renderSignIn() {
    var content = document.getElementById('mpContent');
    content.innerHTML =
      '<div class="mp-signin">' +
        '<p>Sign in to view your passes and memberships.</p>' +
        '<button class="mp-signin-btn" onclick="if(window.siteSignIn)window.siteSignIn();">' +
          '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.04 24.04 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>' +
          'Sign in with Google' +
        '</button>' +
      '</div>';
  }

  function renderPasses() {
    var content = document.getElementById('mpContent');
    var now = new Date().toISOString();

    // Auto-expire passes that are past their expiration date
    var passes = allPasses.map(function(p) {
      if (p.status === 'active' && p.expiresAt && p.expiresAt < now) {
        p.status = 'expired';
      }
      return p;
    });

    var filtered = passes.filter(function(p) {
      if (currentFilter === 'active') return p.status === 'active';
      if (currentFilter === 'expired') return p.status === 'expired' || p.status === 'paused';
      return true;
    });

    var activeCount = passes.filter(function(p) { return p.status === 'active'; }).length;
    var expiredCount = passes.filter(function(p) { return p.status === 'expired' || p.status === 'paused'; }).length;

    var html = '';

    // Tabs
    html += '<div class="mp-tabs">' +
      '<button class="mp-tab' + (currentFilter === 'all' ? ' active' : '') + '" onclick="window._mpFilter(\'all\', this)">All (' + passes.length + ')</button>' +
      '<button class="mp-tab' + (currentFilter === 'active' ? ' active' : '') + '" onclick="window._mpFilter(\'active\', this)">Active (' + activeCount + ')</button>' +
      '<button class="mp-tab' + (currentFilter === 'expired' ? ' active' : '') + '" onclick="window._mpFilter(\'expired\', this)">Expired (' + expiredCount + ')</button>' +
      '</div>';

    if (filtered.length === 0) {
      if (passes.length === 0) {
        html += '<div class="mp-empty">' +
          '<p>You don\'t have any passes yet.</p>' +
          '<a href="classes.html" class="mp-browse-btn">Browse Passes &amp; Classes</a>' +
          '</div>';
      } else {
        html += '<div class="mp-empty"><p>No passes match this filter.</p></div>';
      }
    } else {
      html += '<div class="mp-list">';
      filtered.forEach(function(p) {
        var statusClass = 'mp-status-' + (p.status || 'active');
        var statusLabel = (p.status || 'active').charAt(0).toUpperCase() + (p.status || 'active').slice(1);
        var isExpired = p.status === 'expired' || p.status === 'paused';

        var visitsDisplay = '';
        var progressBar = '';
        if (p.visitsRemaining !== null && p.visitsRemaining !== undefined) {
          var totalVisits = (p.visitsUsed || 0) + (p.visitsRemaining || 0);
          visitsDisplay = '<div class="mp-card-visits">' + p.visitsRemaining + '</div>' +
            '<div class="mp-card-visits-label">of ' + totalVisits + ' visits left</div>';
          var pct = totalVisits > 0 ? Math.round((p.visitsRemaining / totalVisits) * 100) : 0;
          progressBar = '<div class="mp-progress"><div class="mp-progress-fill" style="width:' + pct + '%"></div></div>';
        } else {
          visitsDisplay = '<div class="mp-card-visits">&infin;</div>' +
            '<div class="mp-card-visits-label">Unlimited</div>';
        }

        var meta = '';
        if (p.purchasedAt) meta += 'Purchased: ' + formatDate(p.purchasedAt);
        if (p.activatedAt) meta += '<br>Activated: ' + formatDate(p.activatedAt);
        else if (p.status === 'active') meta += '<br>Activates on first use';
        if (p.expiresAt) meta += '<br>Expires: ' + formatDate(p.expiresAt);
        if (p.visitsUsed) meta += '<br>Visits used: ' + p.visitsUsed;

        html += '<div class="mp-card' + (isExpired ? ' expired' : '') + '">' +
          '<div class="mp-card-info">' +
            '<h3>' + esc(p.passDefinitionName || 'Pass') + '</h3>' +
            '<div class="mp-card-meta">' + meta + '</div>' +
          '</div>' +
          '<div class="mp-card-right">' +
            '<span class="mp-card-status ' + statusClass + '">' + esc(statusLabel) + '</span><br>' +
            visitsDisplay +
            progressBar +
          '</div>' +
          '</div>';
      });
      html += '</div>';
    }

    content.innerHTML = html;
  }

  window._mpFilter = function(filter, el) {
    currentFilter = filter;
    renderPasses();
  };

  // Init
  window.TENANT_READY.then(function() {
    document.title = 'My Passes \u2014 ' + (window.TENANT_TITLE_SUFFIX ? TENANT_TITLE_SUFFIX() : 'Studio');

    var app;
    try { app = firebase.app(); } catch (e) { app = firebase.initializeApp(TENANT_FIREBASE_CONFIG, 'public-my-passes'); }
    var db = app.database();
    var auth = app.auth();

    function loadPasses(user) {
      db.ref(TENANT_ID + '/public/accounts/' + user.uid + '/passes').once('value')
        .then(function(snap) {
          var data = snap.val() || {};
          allPasses = Object.keys(data).map(function(id) {
            var p = data[id];
            p._id = id;
            return p;
          }).sort(function(a, b) {
            // Active first, then by purchase date descending
            if (a.status === 'active' && b.status !== 'active') return -1;
            if (a.status !== 'active' && b.status === 'active') return 1;
            return (b.purchasedAt || '').localeCompare(a.purchasedAt || '');
          });
          renderPasses();
        })
        .catch(function(err) {
          console.error('[my-passes] Load failed:', err);
          document.getElementById('mpContent').innerHTML =
            '<div class="mp-empty"><p>Unable to load passes. Please try again.</p></div>';
        });
    }

    auth.onAuthStateChanged(function(user) {
      if (user && !user.isAnonymous) {
        loadPasses(user);
      } else {
        renderSignIn();
      }
    });
  }).catch(function(err) {
    console.error('[my-passes] Tenant failed:', err);
  });
})();
</script>
<script src="cart.js"></script>
<script defer src="feedback-widget.js"></script>
<script defer src="share-widget.js"></script>

</body>
</html>
