<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://apis.google.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://us-central1-mast-platform-prod.cloudfunctions.net https://*.firebasestorage.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com https://maps.googleapis.com https://places.googleapis.com https://api.ipify.org; img-src 'self' data: blob: https:; frame-src 'self' https://*.firebaseapp.com; frame-ancestors 'none';">
  <title>My Shop Blog</title><!-- TENANT: brand -->
  <!-- Preconnect to external origins — saves ~200ms DNS+TLS per origin -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <!-- Early tenant prefetch — starts RTDB fetch immediately during HTML parsing,
       before any external scripts download. storefront-tenant.js consumes the result. -->
  <script>
  (function(){
    var B='https://firestore.googleapis.com/v1/projects/mast-platform-prod/databases/(default)/documents';
    var h=location.hostname,C=5*60*1000;
    if(h==='localhost'||h==='127.0.0.1')return;
    try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
    var ek=h.replace(/\./g,'_');
    function uv(v){if(v==null)return null;if('stringValue' in v)return v.stringValue;if('booleanValue' in v)return v.booleanValue;if('integerValue' in v)return Number(v.integerValue);if('doubleValue' in v)return v.doubleValue;if('nullValue' in v)return null;if('timestampValue' in v)return v.timestampValue;if('mapValue' in v){var o={};var f=v.mapValue.fields||{};for(var k in f)o[k]=uv(f[k]);return o;}if('arrayValue' in v)return(v.arrayValue.values||[]).map(uv);return null;}
    function uf(fields){var o={};for(var k in fields)o[k]=uv(fields[k]);return o;}
    function uw(d){if(d&&typeof d==='object'&&!Array.isArray(d)&&'_v' in d&&Object.keys(d).length===1)return d._v;return d;}
    window.__earlyTenant=fetch(B+'/platform_tenantsByDomain/'+ek).then(function(r){return r.ok?r.json():null}).then(function(doc){
      var tid=doc&&doc.fields?uw(uf(doc.fields)):null;
      if(typeof tid!=='string'||!tid)return null;
      return fetch(B+'/platform_tenants/'+tid).then(function(r){return r.ok?r.json():null}).then(function(tdoc){
        if(!tdoc||!tdoc.fields)return null;
        var tf=uf(tdoc.fields);var pc=tf.publicConfig||null;
        return pc?{tenantId:tid,publicConfig:pc}:null;
      });
    }).catch(function(){return null;});
  })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../storefront.css">
  <link rel="stylesheet" href="../cart.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="../checkout.css" media="print" onload="this.media='all'">
  <script>(function(){var s=localStorage.getItem('mast-theme');var d=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='dark'||(s!=='light'&&d))document.documentElement.classList.add('dark');else document.documentElement.classList.add('light');})();</script>
  <style>
    /* ===== POST CONTENT ===== */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 7rem 1.5rem 3rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--amber);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .back-link:hover { color: var(--amber-light); }

    .post-meta {
      color: var(--text-light);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .post-author {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .post-date {
      color: var(--text-light);
      font-size: 0.85rem;
      margin-bottom: 2.5rem;
    }

    /* Rich HTML body (blog posts) */
    .post-body {
      line-height: 1.8;
      font-size: 0.95rem;
      color: var(--text);
    }
    .post-body p { margin-bottom: 1rem; }
    .post-body img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 1.2rem 0;
    }
    .post-body b, .post-body strong { font-weight: 600; }
    .post-body i, .post-body em { font-style: italic; }
    .post-body u { text-decoration: underline; }
    .post-body h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 2rem 0 0.75rem;
    }
    .post-body h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 500;
      margin: 1.5rem 0 0.5rem;
    }
    .post-body blockquote {
      border-left: 3px solid var(--primary, #C4853C);
      padding-left: 16px;
      margin: 1.2rem 0;
      color: var(--text-light, #666);
      font-style: italic;
    }
    .post-body ul, .post-body ol { padding-left: 28px; margin: 0.8rem 0; }
    .post-body li { margin: 0.4rem 0; }
    .post-body a { color: var(--primary, #C4853C); text-decoration: underline; }
    .post-body a:hover { opacity: 0.8; }
    .post-body hr { border: none; border-top: 1px solid var(--border, #eee); margin: 2rem 0; }
    .post-body .blog-img-caption {
      font-size: 0.8rem;
      color: var(--text-light);
      text-align: center;
      margin-top: -0.5rem;
      margin-bottom: 1.2rem;
    }

    /* Section-based (newsletter issues) */
    .post-section { margin-bottom: 2.5rem; }
    .post-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
      color: var(--text);
    }
    .post-section p {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
    }
    .post-section img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 1rem 0;
    }

    .post-divider {
      border: none;
      border-top: 1px solid var(--surface-card-border);
      margin: 2rem 0;
    }

    .post-tags {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--surface-card-border);
    }
    .post-tag {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--amber);
      background: color-mix(in srgb, var(--primary) 8%, transparent);
      padding: 4px 12px;
      border-radius: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    footer {
      background: var(--surface-dark);
      color: var(--on-dark-muted);
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
    }
    footer a { color: var(--on-dark-muted); }

    /* Powered by Mast badge */
    .powered-by-mast {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0 0;
      margin-top: 0.8rem;
    }
    .powered-by-mast a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .powered-by-mast a:hover { opacity: 1; }
    .powered-by-mast svg { width: 8px; height: 16px; flex-shrink: 0; }
    .powered-by-mast .pbm-stack { display: flex; flex-direction: column; gap: 1px; }
    .powered-by-mast .pbm-wm {
      font-family: 'Archivo', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: -0.025em;
      color: #f0ebe0;
      line-height: 1;
    }
    .powered-by-mast .pbm-label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.03em;
      color: #6a8aaa;
      line-height: 1;
    }

    .loading { text-align: center; padding: 3rem; color: var(--text-light); }
    .error { text-align: center; padding: 3rem; color: var(--text-light); }

    @media (max-width: 600px) {
      .container { padding: 5rem 1rem 2rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<nav id="mainNav" data-nav-transparent></nav>

<div class="nav-mobile-menu" id="mobileMenu"></div>

<div class="container">
  <a href="./" class="back-link">&larr; Back to From the Studio</a>
  <div id="postContent" data-slot="blog-post">
    <div class="loading">Loading post...</div>
  </div>
</div>

<footer>
  <p data-tenant="brand-location">My Shop</p>
  <p style="margin-top:6px;"><a href="../index.html">Home</a> &bull; <a href="../shop.html">Shop</a> &bull; <a href="./">From the Studio</a> &bull; <a href="https://runmast.com/privacy" target="_blank" rel="noopener">Privacy</a></p>
  <div class="powered-by-mast">
    <a href="https://runmast.com" target="_blank" rel="noopener">
      <svg viewBox="0 0 32 64" fill="none"><rect x="14" y="0" width="3.5" height="64" rx="1.75" fill="#f0ebe0"/><path d="M17.5 3 L32 11 L17.5 20 Z" fill="#e8a84c"/><path d="M17.5 24 L28 30.5 L17.5 38 Z" fill="#f0ebe0" opacity="0.25"/></svg>
      <div class="pbm-stack">
        <span class="pbm-wm">Mast</span>
        <span class="pbm-label">Powered by Mast</span>
      </div>
    </a>
  </div>
</footer>


<!-- Storefront scripts first — use fetch() only, no Firebase SDK needed -->
<script src="../storefront-tenant.js"></script>
<script src="../storefront-theme.js"></script>
<script src="../storefront-nav.js"></script>
<script src="../tenant-brand.js?v=2"></script>
<!-- Firebase SDK — loaded after storefront scripts so nav/theme render first -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="../shared/mastdb.js?v=1"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
window.TENANT_READY.then(function() {
  if (!firebase.apps.length) firebase.initializeApp(TENANT_FIREBASE_CONFIG);
  MastDB.init({ firestore: firebase.firestore(), tenantId: TENANT_ID });

  var params = new URLSearchParams(window.location.search);
  var postId = params.get('id');
  var source = params.get('source') || 'blog';

  if (!postId) {
    document.getElementById('postContent').innerHTML = '<div class="error"><p>Post not found. <a href="./">Back to From the Studio</a></p></div>';
    return;
  }

  var path = source === 'newsletter' ? 'newsletter/published/' : 'blog/published/';

  MastDB.get(path + postId).then(function(post) {
    if (!post) {
      document.getElementById('postContent').innerHTML = '<div class="error"><p>Post not found. <a href="./">Back to From the Studio</a></p></div>';
      return;
    }

    document.title = post.title + ' \u2014 ' + TENANT_TITLE_SUFFIX();

    // OG meta tags for social sharing
    var ogTags = [
      { property: 'og:title', content: post.title || '' },
      { property: 'og:type', content: 'article' },
      { property: 'og:url', content: window.location.href }
    ];
    if (post.excerpt) ogTags.push({ property: 'og:description', content: post.excerpt });
    else if (post.bodyHtml) {
      var _ogTmp = document.createElement('div'); _ogTmp.innerHTML = post.bodyHtml;
      var _ogDesc = (_ogTmp.textContent || '').trim().substring(0, 200);
      if (_ogDesc) ogTags.push({ property: 'og:description', content: _ogDesc });
    }
    if (post.image) ogTags.push({ property: 'og:image', content: post.image });
    ogTags.push({ name: 'twitter:card', content: post.image ? 'summary_large_image' : 'summary' });
    ogTags.forEach(function(tag) {
      var meta = document.createElement('meta');
      Object.keys(tag).forEach(function(k) { meta.setAttribute(k, tag[k]); });
      document.head.appendChild(meta);
    });

    // Schema.org: BlogPosting
    if (window.MastSchema) {
      post._id = post._id || postId;
      MastSchema.inject(MastSchema.blogPosting(post));
    }

    var date = post.publishedAt ? new Date(post.publishedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
    var numLabel = source === 'newsletter' ? 'Issue #' + (post.issueNumber || '?') : 'Post #' + (post.postNumber || '?');

    var html = '<div class="post-meta">' + numLabel + '</div>' +
      '<h1>' + escHtml(post.title || 'Untitled') + '</h1>' +
      (post.author ? '<div class="post-author">By ' + escHtml(post.author) + '</div>' : '') +
      '<div class="post-date">' + date + '</div>';

    if (post.bodyHtml) {
      html += '<div class="post-body">' + DOMPurify.sanitize(post.bodyHtml) + '</div>';
      if (post.tags && post.tags.length > 0) {
        html += '<div class="post-tags">';
        post.tags.forEach(function(tag) {
          html += '<span class="post-tag">' + escHtml(tag) + '</span>';
        });
        html += '</div>';
      }
    } else if (post.sections) {
      var sections = post.sections || [];
      sections.forEach(function(sec, idx) {
        if (!sec.content || !sec.content.trim()) return;
        html += '<div class="post-section">';
        if (sec.title) html += '<h2>' + escHtml(sec.title) + '</h2>';
        var paragraphs = sec.content.split('\n').filter(function(p) { return p.trim(); });
        paragraphs.forEach(function(p) { html += '<p>' + escHtml(p) + '</p>'; });
        (sec.images || []).forEach(function(imgId) {
          MastDB.get('images/' + imgId).then(function(img) {
            if (img && img.url) {
              var imgEl = document.createElement('img');
              imgEl.src = img.url;
              imgEl.alt = img.alt || '';
              var sectionDiv = document.querySelectorAll('.post-section')[idx];
              if (sectionDiv) sectionDiv.appendChild(imgEl);
            }
          });
        });
        html += '</div>';
        if (idx < sections.length - 1) html += '<hr class="post-divider">';
      });
    }

    document.getElementById('postContent').innerHTML = html;
  }).catch(function(err) {
    console.error('Error loading post:', err);
    document.getElementById('postContent').innerHTML = '<div class="error"><p>Unable to load post. <a href="./">Back to From the Studio</a></p></div>';
  });

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
}).catch(function(err) {
  console.error('[blog-post] Tenant resolution failed:', err.message);
});
</script>
<script src="../schema-org.js"></script>
<script src="../cart.js"></script>
<script defer src="../checkout.js?v=2"></script>
<script defer src="../feedback-widget.js"></script>
<script defer src="../share-widget.js"></script>
</body>
</html>
