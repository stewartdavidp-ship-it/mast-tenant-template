<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://*.firebaseio.com https://apis.google.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://us-central1-mast-platform-prod.cloudfunctions.net https://*.firebaseio.com wss://*.firebaseio.com https://*.firebasestorage.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://maps.googleapis.com https://api.ipify.org; img-src 'self' data: blob: https:; frame-src 'self' https://*.firebaseapp.com https://*.firebaseio.com; frame-ancestors 'none';">
  <title>My Shop Blog</title><!-- TENANT: brand -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../storefront.css">
  <link rel="stylesheet" href="../cart.css">
  <link rel="stylesheet" href="../checkout.css">
  <script>(function(){var s=localStorage.getItem('mast-theme');var d=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='dark'||(s!=='light'&&d))document.documentElement.classList.add('dark');else document.documentElement.classList.add('light');})();</script>
  <style>
    /* ===== POST CONTENT ===== */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 7rem 1.5rem 3rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--amber);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .back-link:hover { color: var(--amber-light); }

    .post-meta {
      color: var(--text-light);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .post-author {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .post-date {
      color: var(--text-light);
      font-size: 0.85rem;
      margin-bottom: 2.5rem;
    }

    /* Rich HTML body (blog posts) */
    .post-body {
      line-height: 1.8;
      font-size: 0.95rem;
      color: var(--text);
    }
    .post-body p { margin-bottom: 1rem; }
    .post-body img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 1.2rem 0;
    }
    .post-body b, .post-body strong { font-weight: 600; }
    .post-body i, .post-body em { font-style: italic; }
    .post-body u { text-decoration: underline; }
    .post-body h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 2rem 0 0.75rem;
    }
    .post-body .blog-img-caption {
      font-size: 0.8rem;
      color: var(--text-light);
      text-align: center;
      margin-top: -0.5rem;
      margin-bottom: 1.2rem;
    }

    /* Section-based (newsletter issues) */
    .post-section { margin-bottom: 2.5rem; }
    .post-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
      color: var(--text);
    }
    .post-section p {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-muted);
      margin-bottom: 0.8rem;
    }
    .post-section img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 1rem 0;
    }

    .post-divider {
      border: none;
      border-top: 1px solid var(--surface-card-border);
      margin: 2rem 0;
    }

    .post-tags {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--surface-card-border);
    }
    .post-tag {
      display: inline-block;
      font-size: 0.75rem;
      color: var(--amber);
      background: color-mix(in srgb, var(--primary) 8%, transparent);
      padding: 4px 12px;
      border-radius: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    footer {
      background: var(--surface-dark);
      color: var(--on-dark-muted);
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
    }
    footer a { color: var(--on-dark-muted); }

    /* Powered by Mast badge */
    .powered-by-mast {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0 0;
      margin-top: 0.8rem;
    }
    .powered-by-mast a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .powered-by-mast a:hover { opacity: 1; }
    .powered-by-mast svg { width: 8px; height: 16px; flex-shrink: 0; }
    .powered-by-mast .pbm-stack { display: flex; flex-direction: column; gap: 1px; }
    .powered-by-mast .pbm-wm {
      font-family: 'Archivo', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: -0.025em;
      color: #f0ebe0;
      line-height: 1;
    }
    .powered-by-mast .pbm-label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.03em;
      color: #6a8aaa;
      line-height: 1;
    }

    .loading { text-align: center; padding: 3rem; color: var(--text-light); }
    .error { text-align: center; padding: 3rem; color: var(--text-light); }

    @media (max-width: 600px) {
      .container { padding: 5rem 1rem 2rem; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<nav id="mainNav" data-nav-transparent></nav>

<div class="nav-mobile-menu" id="mobileMenu"></div>

<div class="container">
  <a href="./" class="back-link">&larr; Back to From the Studio</a>
  <div id="postContent" data-slot="blog-post">
    <div class="loading">Loading post...</div>
  </div>
</div>

<footer>
  <p data-tenant="brand-location">My Shop</p>
  <p style="margin-top:6px;"><a href="../index.html">Home</a> &bull; <a href="../shop.html">Shop</a> &bull; <a href="./">From the Studio</a></p>
  <div class="powered-by-mast">
    <a href="https://runmast.com" target="_blank" rel="noopener">
      <svg viewBox="0 0 32 64" fill="none"><rect x="14" y="0" width="3.5" height="64" rx="1.75" fill="#f0ebe0"/><path d="M17.5 3 L32 11 L17.5 20 Z" fill="#e8a84c"/><path d="M17.5 24 L28 30.5 L17.5 38 Z" fill="#f0ebe0" opacity="0.25"/></svg>
      <div class="pbm-stack">
        <span class="pbm-wm">Mast</span>
        <span class="pbm-label">Powered by Mast</span>
      </div>
    </a>
  </div>
</footer>


<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="../storefront-tenant.js"></script>
<script src="../storefront-theme.js"></script>
<script src="../storefront-nav.js"></script>
<script src="../tenant-brand.js?v=2"></script>
<script>
window.TENANT_READY.then(function() {
  if (!firebase.apps.length) firebase.initializeApp(TENANT_FIREBASE_CONFIG);
  var db = firebase.database();

  var params = new URLSearchParams(window.location.search);
  var postId = params.get('id');
  var source = params.get('source') || 'blog';

  if (!postId) {
    document.getElementById('postContent').innerHTML = '<div class="error"><p>Post not found. <a href="./">Back to From the Studio</a></p></div>';
    return;
  }

  var path = source === 'newsletter' ? TENANT_ID + '/newsletter/published/' : TENANT_ID + '/blog/published/';

  db.ref(path + postId).once('value').then(function(snap) {
    var post = snap.val();
    if (!post) {
      document.getElementById('postContent').innerHTML = '<div class="error"><p>Post not found. <a href="./">Back to From the Studio</a></p></div>';
      return;
    }

    document.title = post.title + ' \u2014 ' + TENANT_TITLE_SUFFIX();

    var date = post.publishedAt ? new Date(post.publishedAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
    var numLabel = source === 'newsletter' ? 'Issue #' + (post.issueNumber || '?') : 'Post #' + (post.postNumber || '?');

    var html = '<div class="post-meta">' + numLabel + '</div>' +
      '<h1>' + escHtml(post.title || 'Untitled') + '</h1>' +
      (post.author ? '<div class="post-author">By ' + escHtml(post.author) + '</div>' : '') +
      '<div class="post-date">' + date + '</div>';

    if (post.bodyHtml) {
      html += '<div class="post-body">' + DOMPurify.sanitize(post.bodyHtml) + '</div>';
      if (post.tags && post.tags.length > 0) {
        html += '<div class="post-tags">';
        post.tags.forEach(function(tag) {
          html += '<span class="post-tag">' + escHtml(tag) + '</span>';
        });
        html += '</div>';
      }
    } else if (post.sections) {
      var sections = post.sections || [];
      sections.forEach(function(sec, idx) {
        if (!sec.content || !sec.content.trim()) return;
        html += '<div class="post-section">';
        if (sec.title) html += '<h2>' + escHtml(sec.title) + '</h2>';
        var paragraphs = sec.content.split('\n').filter(function(p) { return p.trim(); });
        paragraphs.forEach(function(p) { html += '<p>' + escHtml(p) + '</p>'; });
        (sec.images || []).forEach(function(imgId) {
          db.ref(TENANT_ID + '/images/' + imgId).once('value').then(function(imgSnap) {
            var img = imgSnap.val();
            if (img && img.url) {
              var imgEl = document.createElement('img');
              imgEl.src = img.url;
              imgEl.alt = img.alt || '';
              var sectionDiv = document.querySelectorAll('.post-section')[idx];
              if (sectionDiv) sectionDiv.appendChild(imgEl);
            }
          });
        });
        html += '</div>';
        if (idx < sections.length - 1) html += '<hr class="post-divider">';
      });
    }

    document.getElementById('postContent').innerHTML = html;
  }).catch(function(err) {
    console.error('Error loading post:', err);
    document.getElementById('postContent').innerHTML = '<div class="error"><p>Unable to load post. <a href="./">Back to From the Studio</a></p></div>';
  });

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
}).catch(function(err) {
  console.error('[blog-post] Tenant resolution failed:', err.message);
});
</script>
<script src="../cart.js"></script>
<script src="../checkout.js?v=2"></script>
<script src="../feedback-widget.js"></script>
<script src="../share-widget.js"></script>
</body>
</html>
