<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.cloudfunctions.net; img-src 'self' data: blob: https:; object-src 'self' https: blob: data:; frame-src 'self' https: blob: data:; frame-ancestors 'none';">
<title>Lookbook</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="storefront.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
html, body { margin: 0; padding: 0; height: 100%; background: #111; }
body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; color: #fff; }
.lb-frame { width: 100%; height: 100vh; border: none; display: block; }
.lb-error {
  max-width: 520px;
  margin: 64px auto;
  padding: 28px 24px;
  background: #fff;
  color: #1a1a1a;
  border-radius: 12px;
  text-align: center;
}
.lb-error h1 { font-size: 1.3rem; font-weight: 600; margin: 0 0 12px; }
.lb-error p { font-size: 0.9rem; line-height: 1.55; color: #555; margin: 0; }
.lb-loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ccc;
  font-size: 0.9rem;
  text-align: center;
}
</style>
</head>
<body>
<div id="lb-loading" class="lb-loading">Loading lookbook…</div>
<div id="lb-error-card" class="lb-error" style="display:none">
  <h1 id="lb-error-h">This lookbook isn't available</h1>
  <p id="lb-error-p">Please check the link from your email and try again.</p>
</div>
<embed id="lb-frame" class="lb-frame" type="application/pdf" style="display:none">

<!-- W2 R5: Firebase compat SDK removed — viewer now reads via JWT-vouched
     getLookbookByToken CF. -->
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var token = params.get('t');
  var loadingEl = document.getElementById('lb-loading');
  var errorCard = document.getElementById('lb-error-card');
  var errorH = document.getElementById('lb-error-h');
  var errorP = document.getElementById('lb-error-p');
  var frame = document.getElementById('lb-frame');

  function showError(h, p) {
    loadingEl.style.display = 'none';
    frame.style.display = 'none';
    errorH.textContent = h;
    errorP.textContent = p;
    errorCard.style.display = 'block';
  }

  if (!token) {
    showError('Link missing required info', 'Please use the link from the email you received.');
    return;
  }

  // Best-effort open tracking — fires alongside the data fetch.
  function trackOpen() {
    try {
      fetch('https://us-central1-mast-platform-prod.cloudfunctions.net/trackLookbookOpen', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ t: token }),
      }).catch(function(){ /* swallow */ });
    } catch (e) { /* noop */ }
  }

  // W2 R5: fetch lookbook data via JWT-vouched CF (was a direct Firestore
  // read; denied by `isAdmin(tid)` rules). The CF verifies the JWT server-side
  // against the per-tenant signing secret and returns only the PDF URL +
  // metadata the viewer needs.
  var getEndpoint = 'https://us-central1-mast-platform-prod.cloudfunctions.net/getLookbookByToken';

  fetch(getEndpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ t: token }),
  }).then(function(resp){
    return resp.json().then(function(json){ return { ok: resp.ok, status: resp.status, json: json }; });
  }).then(function(r){
    if (!r.ok || !r.json || !r.json.ok) {
      var err = (r.json && r.json.error) || 'unknown-error';
      if (err === 'revoked') {
        showError('This lookbook link has been revoked', 'Please contact the sender for a new link.');
      } else if (err === 'invalid-token') {
        showError('This lookbook link is no longer valid', 'It may have expired. Please contact the sender for a new link.');
      } else if (err === 'lookbook-not-found') {
        showError('Lookbook not found', 'The lookbook may have been removed. Please contact the sender.');
      } else {
        showError('Could not load lookbook', 'Please try refreshing the page.');
      }
      return;
    }
    var lookbook = r.json.lookbook || {};
    if (!lookbook.pdfUrl) {
      showError('Lookbook not found', 'The lookbook may have been removed. Please contact the sender.');
      return;
    }
    // Fire-and-forget open tracking now that we know token is valid.
    trackOpen();
    // Render the PDF.
    frame.src = lookbook.pdfUrl;
    frame.style.display = 'block';
    loadingEl.style.display = 'none';
  }).catch(function(err){
    console.error('lookbook-load-failed', err);
    showError('Could not reach the server', 'Please check your connection and try refreshing.');
  });
})();
</script>
</body>
</html>
