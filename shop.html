<style>
  /* ========= BUTTONS ========= */
  .btn {
    display: inline-block;
    padding: 0.9rem 2.2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: all 0.3s;
    font-weight: 400;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--amber);
    color: #fff;
    border: 1px solid var(--amber);
  }

  .btn-primary:hover {
    background: var(--amber-light);
    border-color: var(--amber-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px color-mix(in srgb, var(--primary) 35%, transparent);
  }

  .btn-outline {
    background: transparent;
    color: var(--charcoal);
    border: 1px solid var(--charcoal);
  }

  .btn-outline:hover {
    background: var(--charcoal);
    color: #fff;
    transform: translateY(-2px);
  }

  .btn-outline-light {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
  }

  .btn-outline-light:hover {
    border-color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.06);
    transform: translateY(-2px);
  }

  /* ========= SECTIONS SHARED ========= */
  section { padding: 7rem 3rem; }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 1rem;
    color: var(--charcoal);
  }

  .section-subtitle {
    font-size: 1rem;
    color: var(--warm-gray);
    max-width: 520px;
    line-height: 1.7;
    font-weight: 300;
  }

  /* ========= FOOTER ========= */
  /* Powered by Mast badge */
  .powered-by-mast {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0 0;
    border-top: 1px solid rgba(255,255,255,0.12);
    margin-top: 1.5rem;
  }
  .powered-by-mast a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    opacity: 0.9;
    transition: opacity 0.3s;
  }
  .powered-by-mast a:hover { opacity: 1; }
  .powered-by-mast svg { width: 8px; height: 16px; flex-shrink: 0; }
  .powered-by-mast .pbm-stack { display: flex; flex-direction: column; gap: 1px; }
  .powered-by-mast .pbm-wm {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: -0.025em;
    color: #f0ebe0;
    line-height: 1;
  }
  .powered-by-mast .pbm-label {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 9px;
    letter-spacing: 0.03em;
    color: #6a8aaa;
    line-height: 1;
  }

  /* ========= SCROLL ANIMATIONS ========= */
  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .glass-divider {
    height: 3px;
    background: var(--glass-gradient);
    opacity: 0.55;
  }

  /* ========= PAGE HEADER ========= */
  .page-header {
    background: var(--surface-dark);
    padding: 10rem 3rem 5rem;
    text-align: center;
  }

  .page-header .section-label { color: var(--amber-light); }
  .page-header .section-title { color: var(--on-dark); font-size: clamp(2.5rem, 5vw, 3.8rem); }
  .page-header .section-subtitle { color: var(--on-dark-muted); margin: 0 auto; }

  /* ========= CATEGORY FILTER ========= */
  .category-filter {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    max-width: 1200px;
    margin: 0 auto;
    padding-bottom: 3rem;
  }

  .filter-pill {
    padding: 0.55rem 1.5rem;
    border: 1px solid var(--surface-card-border);
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--warm-gray);
    background: var(--surface-card);
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
  }

  .filter-pill:hover,
  .filter-pill.active {
    background: var(--surface-dark);
    color: var(--on-dark);
    border-color: var(--surface-dark);
  }

  /* ========= PRODUCT GRID ========= */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .product-card {
    background: var(--surface-card);
    border-radius: 4px;
    overflow: hidden;
    transition: all 0.3s;
  }

  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
  }

  .product-image {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1;
  }

  .product-image img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: transform 0.6s ease;
  }

  .product-card:hover .product-image img {
    transform: scale(1.06);
  }

  .product-category {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    font-weight: 500;
  }

  .product-info {
    padding: 1.25rem 1.5rem;
  }

  .product-info h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 400;
    margin: 0.4rem 0;
  }

  .product-link {
    display: inline-block;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    text-decoration: none;
    font-weight: 400;
    margin-top: 0.5rem;
    transition: color 0.3s;
  }

  .product-link:hover { color: var(--teal-deep); }

  .product-link::after {
    content: ' \2192';
  }

  .product-price {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--charcoal);
    margin: 0.3rem 0 0;
  }

  .category-section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 300;
    color: var(--charcoal);
    text-align: center;
    margin: 3.5rem 0 1.5rem;
    letter-spacing: 0.02em;
  }

  .category-section-title:first-of-type {
    margin-top: 0;
  }

  /* ========= SHOP CTA BANNER ========= */
  .shop-cta {
    background: linear-gradient(135deg, var(--amber) 0%, var(--amber-light) 50%, var(--amber-glow) 100%);
    text-align: center;
    padding: 5rem 3rem;
    margin-top: 4rem;
  }

  .shop-cta h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 300;
    color: #fff;
    margin-bottom: 1rem;
  }

  .shop-cta p {
    font-size: 1rem;
    color: rgba(255,255,255,0.8);
    margin-bottom: 2rem;
    font-weight: 300;
  }

  .shop-cta .btn {
    background: #fff;
    color: #2a2a2a;
    border: 1px solid #fff;
  }

  .shop-cta .btn:hover {
    background: var(--charcoal);
    color: #fff;
    border-color: var(--charcoal);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  }

  /* ========= RESPONSIVE ========= */
  @media (max-width: 1024px) {
    .product-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 768px) {
    .page-header { padding: 7rem 1.5rem 3rem; }
    .product-grid { grid-template-columns: 1fr; max-width: 400px; }
  }

  @media (max-width: 768px) {
    section { padding: 4rem 1.5rem; }
  }

  /* ========= GIFT CARD (inline in shop) ========= */
  .gc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.25rem;
    margin-bottom: 2rem;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
  }
  .gc-denom-card {
    background: var(--surface-card);
    border: 1px solid var(--surface-card-border);
    border-radius: 10px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .gc-denom-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }
  .gc-denom-card.selected {
    border-color: var(--amber, #D4A853);
    box-shadow: 0 0 0 2px var(--amber, #D4A853);
  }
  .gc-denom-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .gc-denom-amount {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.75rem;
  }
  .gc-denom-btn {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 6px;
    border: 1px solid var(--primary, #D4A853);
    background: transparent;
    color: var(--primary, #D4A853);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .gc-denom-btn:hover { background: var(--primary, #D4A853); color: #fff; }
  .gc-custom-input-wrap {
    display: flex; align-items: center; justify-content: center; gap: 2px; margin-bottom: 0.75rem;
  }
  .gc-custom-prefix { font-size: 1.4rem; font-weight: 600; color: var(--text); }
  .gc-custom-input {
    width: 90px; font-size: 1.4rem; font-weight: 600;
    font-family: 'DM Sans', sans-serif; color: var(--text);
    background: transparent; border: none;
    border-bottom: 2px solid var(--surface-card-border, #444);
    text-align: center; padding: 2px 4px; outline: none;
  }
  .gc-custom-input:focus { border-bottom-color: var(--primary, #D4A853); }
  .gc-custom-range { font-size: 0.75rem; color: var(--warm-gray, #888); margin-bottom: 0.5rem; }
  .gc-options {
    background: var(--surface-card); border: 1px solid var(--surface-card-border);
    border-radius: 10px; padding: 1.5rem; margin-bottom: 2rem; display: none;
    max-width: 1200px; margin-left: auto; margin-right: auto;
  }
  .gc-options.visible { display: block; }
  .gc-options-title {
    font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
    font-weight: 400; color: var(--text); margin: 0 0 1rem; text-align: center;
  }
  .gc-selected-amount {
    text-align: center; font-size: 1.1rem; font-weight: 500;
    color: var(--primary, #D4A853); margin-bottom: 1rem;
  }
  .gc-toggle {
    display: flex; gap: 0; border: 1px solid var(--surface-card-border, #444);
    border-radius: 8px; overflow: hidden; margin: 0 auto 1.25rem; max-width: 340px;
  }
  .gc-toggle-btn {
    flex: 1; padding: 10px 16px; font-size: 0.85rem; font-weight: 500;
    font-family: 'DM Sans', sans-serif; border: none; background: transparent;
    color: var(--warm-gray, #888); cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .gc-toggle-btn.active { background: var(--primary, #D4A853); color: #fff; }
  .gc-gift-fields { display: none; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem; }
  .gc-gift-fields.visible { display: flex; }
  .gc-field label {
    display: block; font-size: 0.8rem; font-weight: 500;
    color: var(--warm-gray, #888); margin-bottom: 4px;
  }
  .gc-field input, .gc-field textarea {
    width: 100%; padding: 8px 12px; font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif; color: var(--text);
    background: var(--bg, #1a1a1a); border: 1px solid var(--surface-card-border, #444);
    border-radius: 6px; outline: none; box-sizing: border-box;
  }
  .gc-field input:focus, .gc-field textarea:focus { border-color: var(--primary, #D4A853); }
  .gc-field textarea { resize: vertical; min-height: 70px; }
  .gc-qty-row {
    display: flex; align-items: center; justify-content: center; gap: 12px; margin: 1rem 0;
  }
  .gc-qty-label { font-size: 0.85rem; color: var(--warm-gray, #888); }
  .gc-qty-stepper {
    display: flex; align-items: center; gap: 0;
    border: 1px solid var(--surface-card-border, #444); border-radius: 6px; overflow: hidden;
  }
  .gc-qty-btn {
    width: 34px; height: 34px; border: none; background: transparent;
    color: var(--text); font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background 0.15s;
  }
  .gc-qty-btn:hover { background: rgba(255,255,255,0.05); }
  .gc-qty-btn:disabled { opacity: 0.3; cursor: default; }
  .gc-qty-val {
    width: 40px; text-align: center; font-size: 0.95rem; font-weight: 500;
    color: var(--text); font-family: 'DM Sans', sans-serif;
  }
  .gc-add-btn {
    display: block; width: 100%; max-width: 340px; margin: 0 auto;
    padding: 12px 24px; border-radius: 6px; border: none;
    background: var(--primary, #D4A853); color: #fff; font-size: 0.95rem;
    font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.15s;
  }
  .gc-add-btn:hover { opacity: 0.9; }

  @media (max-width: 768px) {
    .gc-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
    .gc-denom-amount { font-size: 1.3rem; }
    .gc-options { padding: 1.25rem; }
  }

</style>
</head>

      <svg viewBox="0 0 32 64" fill="none"><rect x="14" y="0" width="3.5" height="64" rx="1.75" fill="#f0ebe0"/><path d="M17.5 3 L32 11 L17.5 20 Z" fill="#e8a84c"/><path d="M17.5 24 L28 30.5 L17.5 38 Z" fill="#f0ebe0" opacity="0.25"/></svg>
      <div class="pbm-stack">
        <span class="pbm-wm">Mast</span>
        <span class="pbm-label">Powered by Mast</span>
      </div>
    </a>
  </div>
</footer>

<!-- Storefront scripts first — use fetch() only, no Firebase SDK needed -->
<script src="storefront-tenant.js"></script>
<script src="storefront-theme.js"></script>
<script src="storefront-nav.js"></script>
<script src="tenant-brand.js?v=2"></script>
<!-- Firebase SDK — loaded after storefront scripts so nav/theme render first -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="shared/mastdb.js?v=1"></script>
<script>
window.TENANT_READY.then(function() {
  // Firebase — load shop products dynamically grouped by category
  var allShopItems = [];
  var SHOP_CATS = [];
  var SHOP_IDS = [];
  var saleLookup = {};
  var _shopGiftCardConfig = null;
  var _shopGcSelectedCents = 0;
  var _shopGcGiftType = 'self';
  var _shopGcQty = 1; // pid → {discountType, discountValue, saleName, variants?}

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function formatCents(cents) {
    return '$' + (cents / 100).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function calcSalePrice(originalCents, discountType, discountValue) {
    if (discountType === 'percent') return Math.round(originalCents * (1 - discountValue / 100));
    return Math.max(0, originalCents - discountValue); // fixed in cents
  }

  // Badge resolver — mirrors product.html resolveBadge
  function resolveBadge(product, config) {
    var si = product.stockInfo;
    var badges = (config && config.badges) || {};
    var isDiscontinued = product.availability === 'discontinued';
    var effective = si ? ((si.totalAvailable || 0)) : 0;
    var stockType = si ? si.stockType : null;
    if (isDiscontinued && effective <= 0) return { text: badges.discontinuedSold || 'Retired', cssClass: 'retired' };
    if (isDiscontinued && effective > 0) return { text: badges.discontinuedInStock || 'Final Stock', cssClass: 'final-stock' };
    if ((stockType === 'strict' || stockType === 'in-stock' || stockType === 'limited') && effective <= 0) return { text: 'Sold Out', cssClass: 'sold-out' };
    if ((stockType === 'strict' || stockType === 'in-stock' || stockType === 'limited') && effective <= ((si && si.lowStockThreshold) || 2)) return { text: (badges.lowStock || 'Only {n} Left').replace('{n}', effective), cssClass: 'low-stock' };
    if (stockType === 'stock-to-build' && effective <= 0) return { text: badges.madeToOrder || 'Made to Order', cssClass: 'made-to-order' };
    if (stockType === 'build-to-order' || stockType === 'made-to-order') return { text: badges.madeToOrder || 'Made to Order', cssClass: 'made-to-order' };
    // Legacy fallback
    if (product.availability === 'made-to-order') return { text: badges.madeToOrder || 'Made to Order', cssClass: 'made-to-order' };
    if (product.availability === 'back-ordered') return { text: 'Back Ordered', cssClass: 'back-ordered' };
    if (product.availability === 'sold') return { text: 'Sold', cssClass: 'sold' };
    return null;
  }

  function resolveLeadTime(product, config) {
    if (!config || !config.showLeadTime) return null;
    var si = product.stockInfo;
    if (!si) return null;
    var effective = (si.totalAvailable || 0);
    if ((si.stockType === 'strict' || si.stockType === 'in-stock' || si.stockType === 'stock-to-build') && effective > 0) {
      var d = si.stockFulfillmentDays || 2;
      return 'Ships in ' + d + ' day' + (d !== 1 ? 's' : '');
    }
    if (typeof si.productionLeadTimeDays === 'number' && si.productionLeadTimeDays > 0) {
      var ld = si.productionLeadTimeDays;
      return ld >= 7 ? 'Made to order \u2014 ' + Math.round(ld / 7) + 'wk' : 'Made to order \u2014 ' + ld + 'd';
    }
    return null;
  }

  // Badge CSS class to background color map (used for positioned badge overlay)
  var badgeBgMap = {
    'sold-out': 'rgba(92,61,46,0.85)', 'sold': 'rgba(92,61,46,0.85)',
    'made-to-order': 'rgba(200,160,60,0.85)', 'back-ordered': 'rgba(120,120,120,0.85)',
    'low-stock': 'rgba(230,81,0,0.85)', 'final-stock': 'rgba(192,86,33,0.85)',
    'retired': 'rgba(92,61,46,0.85)'
  };

  function buildSaleLookup(salesData) {
    saleLookup = {};
    if (!salesData) return;
    var now = new Date().toISOString();
    Object.keys(salesData).forEach(function(saleId) {
      var sale = salesData[saleId];
      if (sale.archived) return;
      if (sale.startDate && sale.startDate > now) return;
      if (sale.endDate && sale.endDate < now) return;
      var products = sale.products || [];
      products.forEach(function(entry) {
        var pid = typeof entry === 'string' ? entry : entry.pid;
        if (!pid) return;
        saleLookup[pid] = {
          saleName: sale.name,
          discountType: sale.discountType,
          discountValue: sale.discountValue,
          variants: typeof entry === 'object' && entry.variants ? entry.variants : null
        };
      });
    });
  }

  function buildFilterPills() {
    var container = document.getElementById('categoryFilterPills');
    if (!container) return;
    var html = '<span class="filter-pill active" onclick="filterShop(\'all\', this)">All</span>';
    SHOP_CATS.forEach(function(cat) {
      html += '<span class="filter-pill" onclick="filterShop(\'' + cat.id + '\', this)">' + esc(cat.label) + '</span>';
    });
    // Add Gift Cards pill if enabled for this tenant
    if (_shopGiftCardConfig && _shopGiftCardConfig.giftCardsEnabled) {
      var denoms = _shopGiftCardConfig.giftCardDenominations || [];
      var customEnabled = _shopGiftCardConfig.giftCardCustomEnabled || false;
      if (denoms.length > 0 || customEnabled) {
        html += '<span class="filter-pill" onclick="filterShop(\'gift-cards\', this)">Gift Cards</span>';
      }
    }
    container.innerHTML = html;
  }

  // Membership state for early product access
  var _shopMemberConfig = null;
  var _shopEffectiveMember = false;

  (function() {
    var app; try { app = firebase.app(); } catch (e) { app = firebase.initializeApp(TENANT_FIREBASE_CONFIG); }
    MastDB.init({ firestore: app.firestore(), tenantId: TENANT_ID });

    // Load membership data for early product access gating
    (function() {
      var auth = app.auth();
      var user = auth.currentUser;
      if (user && !user.isAnonymous) {
        Promise.all([
          MastDB.get('admin/membership/config'),
          MastDB.get('public/accounts/' + user.uid + '/wallet/membership')
        ]).then(function(results) {
          _shopMemberConfig = results[0];
          var status = results[1];
          if (_shopMemberConfig && _shopMemberConfig.enabled && status) {
            var today = new Date().toISOString().slice(0, 10);
            _shopEffectiveMember = status.status === 'active' ||
              (status.status === 'cancelled' && status.expiryDate && status.expiryDate > today);
          }
        }).catch(function() {});
      }
      // Listen for auth changes (user signs in after page load)
      auth.onAuthStateChanged(function(u) {
        if (u && !u.isAnonymous && !_shopEffectiveMember) {
          Promise.all([
            MastDB.get('admin/membership/config'),
            MastDB.get('public/accounts/' + u.uid + '/wallet/membership')
          ]).then(function(results) {
            _shopMemberConfig = results[0];
            var status = results[1];
            if (_shopMemberConfig && _shopMemberConfig.enabled && status) {
              var today = new Date().toISOString().slice(0, 10);
              _shopEffectiveMember = status.status === 'active' ||
                (status.status === 'cancelled' && status.expiryDate && status.expiryDate > today);
              // Re-render if products already loaded
              if (allShopItems.length > 0) renderShop(null);
            }
          }).catch(function() {});
        }
      });
    })();

    // Load shop header background image from gallery
    MastDB.query('public/gallery').orderByChild('section').equalTo('shop').once().then(function(data) {
      if (!data || Object.keys(data).length === 0) return;
      var items = Object.values(data).filter(function(i) { return i.visible !== false && !i.templateHidden && i.url; });
      if (items.length > 0) {
        var header = document.querySelector('.page-header');
        if (header) header.style.backgroundImage = "url('" + items[0].url + "')";
      }
    }).catch(function() {});

    // Load categories, products, sales, and wallet config in parallel
    var gcConfigPromise = MastDB.get('public/config/walletConfig').catch(function() { return null; });

    MastDB.get('public/config/categories').then(function(catData) {
      if (catData && Array.isArray(catData)) {
        SHOP_CATS = catData.filter(function(c) { return c && c.id && c.id !== 'shop' && c.label; });
      }
      SHOP_IDS = SHOP_CATS.map(function(c) { return c.id; });
      // Load products, sales, and gift card config in parallel
      return Promise.all([
        MastDB.get('public/products'),
        MastDB.get('public/sales-promotions'),
        gcConfigPromise
      ]);
    }).then(function(results) {
      _shopGiftCardConfig = results[2];
      buildFilterPills();
      var data = results[0];
      var salesData = results[1];
      buildSaleLookup(salesData);
      if (!data) return;
      allShopItems = Object.values(data)
        .filter(function(p) {
          // Keep discontinued products (portfolio visibility), hide non-discontinued sold items
          if (p.availability === 'sold' && p.availability !== 'discontinued') return false;
          // When no categories configured, show all active products
          if (SHOP_IDS.length === 0) return p.status === 'active' || !p.status;
          var cats = p.categories || [];
          if (!cats.some(function(c) { return SHOP_IDS.indexOf(c) !== -1; })) return false;
          // Early product access gate: products with future publishDate visible only to members
          if (p.publishDate) {
            var pubDate = p.publishDate;
            var nowStr = new Date().toISOString().slice(0, 10);
            if (pubDate > nowStr) {
              if (!_shopEffectiveMember) return false;
              var earlyHours = _shopMemberConfig && _shopMemberConfig.earlyProductAccessHours;
              if (!earlyHours) return false;
              var accessTime = new Date(new Date(pubDate + 'T00:00:00').getTime() - earlyHours * 3600000);
              if (new Date() < accessTime) return false;
              // Mark for early access badge
              p._earlyAccess = true;
            }
          }
          // Seconds products: hide if no price or no stock (they can't be built, only sold from inventory)
          if (cats.indexOf('seconds') !== -1) {
            // Channel-First Phase 1a — accept any tier price (retail/direct) or legacy priceCents
            var _scTier = window.getProductTierPrice ? window.getProductTierPrice(p, 'retail') : null;
            var hasPriceCents = (typeof _scTier === 'number' && _scTier > 0) || (typeof p.priceCents === 'number' && p.priceCents > 0);
            if (!hasPriceCents) return false;
            var si = p.stockInfo;
            if (si) {
              var eff = (si.totalAvailable || 0);
              if (eff <= 0) return false;
            }
          }
          return true;
        })
        .sort(function(a, b) {
          var sa = a.sortOrder != null ? a.sortOrder : 9999;
          var sb = b.sortOrder != null ? b.sortOrder : 9999;
          if (sa !== sb) return sa - sb;
          return (a.name || '').localeCompare(b.name || '');
        });
      // Check URL hash for category auto-filter (e.g., /shop#drinkware or /shop#gift-cards)
      var hash = window.location.hash.replace('#', '').toLowerCase();
      var isGcHash = hash === 'gift-cards' || hash === 'gift cards' || hash === 'giftcards';
      var matchedCat = (!isGcHash && hash) ? SHOP_CATS.find(function(c) { return c.id.toLowerCase() === hash || c.label.toLowerCase() === hash; }) : null;
      if (isGcHash && _shopGiftCardConfig && _shopGiftCardConfig.giftCardsEnabled) {
        renderShop('gift-cards');
        setTimeout(function() {
          var pills = document.querySelectorAll('.filter-pill');
          pills.forEach(function(p) {
            p.classList.remove('active');
            if (p.textContent.toLowerCase() === 'gift cards') p.classList.add('active');
          });
        }, 0);
      } else if (matchedCat) {
        renderShop(matchedCat.id);
        setTimeout(function() {
          var pills = document.querySelectorAll('.filter-pill');
          pills.forEach(function(p) {
            p.classList.remove('active');
            if (p.textContent.toLowerCase() === matchedCat.label.toLowerCase()) p.classList.add('active');
          });
        }, 0);
      } else {
        renderShop('all');
      }
      // Schema.org structured data
      if (window.MastSchema) {
        MastSchema.inject(MastSchema.organization());
        MastSchema.inject(MastSchema.productList(allShopItems, 'Shop'));
      }
    }).catch(function(err) {
      console.error('Shop load error:', err);
      document.getElementById('shopContainer').innerHTML = '<p style="text-align:center;color:var(--warm-gray);padding:3rem;">Unable to load products.</p>';
    });
  })();

  // --- Gift Card Section (inline in shop) ---
  function renderGiftCardSection() {
    var config = _shopGiftCardConfig;
    if (!config || !config.giftCardsEnabled) return '';
    var denoms = config.giftCardDenominations || [];
    var customEnabled = config.giftCardCustomEnabled || false;
    var customMin = config.giftCardCustomMin || 500;
    var customMax = config.giftCardCustomMax || 50000;
    if (denoms.length === 0 && !customEnabled) return '';

    var html = '<div class="gc-grid" id="shopGcGrid">';
    denoms.forEach(function(cents) {
      html += '<div class="gc-denom-card" data-cents="' + cents + '" onclick="window._shopGcSelect(' + cents + ', this)">' +
        '<div class="gc-denom-icon">&#127873;</div>' +
        '<div class="gc-denom-amount">' + esc(formatCents(cents)) + '</div>' +
        '<button class="gc-denom-btn" type="button">Select</button>' +
      '</div>';
    });
    if (customEnabled) {
      html += '<div class="gc-denom-card" id="shopGcCustomCard" data-cents="custom">' +
        '<div class="gc-denom-icon">&#9997;&#65039;</div>' +
        '<div class="gc-custom-input-wrap">' +
          '<span class="gc-custom-prefix">$</span>' +
          '<input type="number" class="gc-custom-input" id="shopGcCustomInput" placeholder="0.00" min="' + (customMin / 100).toFixed(2) + '" max="' + (customMax / 100).toFixed(2) + '" step="0.01">' +
        '</div>' +
        '<div class="gc-custom-range">' + esc(formatCents(customMin)) + ' &ndash; ' + esc(formatCents(customMax)) + '</div>' +
        '<button class="gc-denom-btn" type="button" onclick="window._shopGcSelectCustom()">Select</button>' +
      '</div>';
    }
    html += '</div>';

    // Options panel
    html += '<div class="gc-options" id="shopGcOptions" style="position:relative;">' +
      '<button type="button" onclick="window._shopGcClose()" style="position:absolute;top:12px;right:14px;background:none;border:none;color:var(--warm-gray,#888);font-size:1.4rem;cursor:pointer;padding:4px 8px;line-height:1;transition:color 0.15s;" onmouseover="this.style.color=\'var(--text)\'" onmouseout="this.style.color=\'var(--warm-gray,#888)\'">&times;</button>' +
      '<div class="gc-options-title">Gift Card Options</div>' +
      '<div class="gc-selected-amount" id="shopGcSelectedLabel"></div>' +
      '<div class="gc-toggle">' +
        '<button class="gc-toggle-btn active" id="shopGcToggleSelf" type="button" onclick="window._shopGcToggleType(\'self\')">Buy for myself</button>' +
        '<button class="gc-toggle-btn" id="shopGcToggleGift" type="button" onclick="window._shopGcToggleType(\'gift\')">Send as gift</button>' +
      '</div>' +
      '<div class="gc-gift-fields" id="shopGcGiftFields">' +
        '<div class="gc-field"><label for="shopGcRecipientEmail">Recipient email</label>' +
          '<input type="email" id="shopGcRecipientEmail" placeholder="friend@example.com"></div>' +
        '<div class="gc-field"><label for="shopGcSenderName">Your name</label>' +
          '<input type="text" id="shopGcSenderName" placeholder="Your name"></div>' +
        '<div class="gc-field"><label for="shopGcSenderMessage">Personal message (optional)</label>' +
          '<textarea id="shopGcSenderMessage" placeholder="Enjoy this gift!"></textarea></div>' +
      '</div>' +
      '<div class="gc-qty-row">' +
        '<span class="gc-qty-label">Quantity:</span>' +
        '<div class="gc-qty-stepper">' +
          '<button class="gc-qty-btn" type="button" id="shopGcQtyMinus" onclick="window._shopGcQty(-1)">&minus;</button>' +
          '<span class="gc-qty-val" id="shopGcQtyVal">1</span>' +
          '<button class="gc-qty-btn" type="button" id="shopGcQtyPlus" onclick="window._shopGcQty(1)">+</button>' +
        '</div>' +
      '</div>' +
      '<button class="gc-add-btn" type="button" onclick="window._shopGcAddToCart()">Add to Cart</button>' +
    '</div>';

    return html;
  }

  function renderShop(filter) {
    var container = document.getElementById('shopContainer');
    if (!container) return;

    // Gift cards filter — render only gift card section
    if (filter === 'gift-cards') {
      var gcHtml = renderGiftCardSection();
      container.innerHTML = gcHtml || '<p style="text-align:center;color:var(--warm-gray);padding:3rem;">Gift cards are not available.</p>';
      return;
    }

    if (allShopItems.length === 0 && !(filter === 'all' && _shopGiftCardConfig && _shopGiftCardConfig.giftCardsEnabled)) {
      container.innerHTML = '<p style="text-align:center;color:var(--warm-gray);padding:3rem;">No products found.</p>';
      return;
    }

    var html = '';
    var catsToShow = filter === 'all' ? SHOP_CATS : SHOP_CATS.filter(function(c) { return c.id === filter; });

    catsToShow.forEach(function(cat) {
      var items = allShopItems.filter(function(p) {
        var cats = p.categories || [];
        return cats.indexOf(cat.id) !== -1;
      });
      if (items.length === 0) return;

      if (filter === 'all') {
        html += '<h2 class="category-section-title">' + esc(cat.label) + '</h2>';
      }
      html += '<div class="product-grid">';
      items.forEach(function(product) {
        var name = product.name || '';
        // Channel-First Phase 1a — resolve via tier helper (default retail), fallback to legacy priceCents
        var _shopTier = (window.getProductTierPrice ? window.getProductTierPrice(product, 'retail') : null);
        var priceCentsVal = (typeof _shopTier === 'number' && _shopTier > 0)
          ? _shopTier
          : ((typeof product.priceCents === 'number') ? product.priceCents : 0);
        var pid = product.pid || '';
        var img = (product.images && product.images.length > 0) ? (typeof product.images[0] === 'string' ? product.images[0] : (product.images[0].url || '')) : '';
        var link = pid ? 'product.html?id=' + encodeURIComponent(pid) : 'shop.html';
        var isLocal = !!pid;
        var isSoldSculpture = product.businessLine === 'sculpture' && product.status === 'sold';
        var isSold = product.availability === 'sold' || isSoldSculpture;
        var _sdCfg = window._shopDisplayConfig || {};
        var stockBadge = resolveBadge(product, _sdCfg);
        var showBadge = !!stockBadge;
        var badgeLabel = stockBadge ? stockBadge.text : '';
        var badgeBg = stockBadge ? (badgeBgMap[stockBadge.cssClass] || 'rgba(120,120,120,0.85)') : '';
        // Format price with "from" prefix for variant products, sale strikethrough
        var priceDisplay = '';
        var saleInfo = saleLookup[pid];
        var isOnSale = saleInfo && priceCentsVal > 0;
        if (isSold || isSoldSculpture) {
          priceDisplay = '<p class="product-price" style="font-size:0.82rem;color:var(--warm-gray,#6B6560);">Commission available</p>';
        } else if (product.priceType === 'request') {
          priceDisplay = '<p class="product-price" style="font-size:0.82rem;color:var(--warm-gray,#6B6560);">Price on request</p>';
        } else if (isOnSale && product.priceType !== 'from') {
          var origFormatted = formatCents(priceCentsVal);
          var salePrice = calcSalePrice(priceCentsVal, saleInfo.discountType, saleInfo.discountValue);
          priceDisplay = '<p class="product-price">' +
            '<span style="text-decoration:line-through;color:var(--warm-gray,#6B6560);font-weight:400;">' + origFormatted + '</span> ' +
            '<span style="font-weight:700;color:var(--accent,var(--primary,#c05621));">' + formatCents(salePrice) + '</span></p>';
        } else if (product.priceType === 'from' && priceCentsVal > 0) {
          if (isOnSale && product.variants && product.variants.length > 0) {
            // Calculate true "from" price accounting for variant-specific sale targeting
            var minEffective = Infinity;
            var minOriginal = Infinity;
            for (var vi = 0; vi < product.variants.length; vi++) {
              var v = product.variants[vi];
              // Channel-First Phase 1a — pass variant obj so legacy variants without IDs still resolve
              var vp = (window.getProductTierPrice ? window.getProductTierPrice(product, 'retail', v) : null);
              if (typeof vp !== 'number' || vp <= 0) vp = (typeof v.priceCents === 'number') ? v.priceCents : priceCentsVal;
              if (typeof vp !== 'number') continue;
              if (vp < minOriginal) minOriginal = vp;
              // Channel-First Phase 1b (D30) — saleInfo.variants may contain stable IDs OR legacy combo-keys.
              var vKey = v.combo ? Object.values(v.combo).join('|') : (v.name || '');
              var variantInSale = !saleInfo.variants
                || (v.id && saleInfo.variants.indexOf(v.id) !== -1)
                || (vKey && saleInfo.variants.indexOf(vKey) !== -1);
              var effectivePrice = variantInSale ? calcSalePrice(vp, saleInfo.discountType, saleInfo.discountValue) : vp;
              if (effectivePrice < minEffective) minEffective = effectivePrice;
            }
            if (minEffective < minOriginal) {
              priceDisplay = '<p class="product-price"><span style="font-size:0.8rem;color:var(--warm-gray,#6B6560);font-weight:400;">from </span>' +
                '<span style="text-decoration:line-through;color:var(--warm-gray,#6B6560);font-weight:400;">' + formatCents(minOriginal) + '</span> ' +
                '<span style="font-weight:700;color:var(--accent,var(--primary,#c05621));">' + formatCents(minEffective) + '</span></p>';
            } else {
              priceDisplay = '<p class="product-price"><span style="font-size:0.8rem;color:var(--warm-gray,#6B6560);font-weight:400;">from </span>' + formatCents(minOriginal) + '</p>';
            }
          } else if (isOnSale) {
            var fromSalePrice = calcSalePrice(priceCentsVal, saleInfo.discountType, saleInfo.discountValue);
            priceDisplay = '<p class="product-price"><span style="font-size:0.8rem;color:var(--warm-gray,#6B6560);font-weight:400;">from </span>' +
              '<span style="text-decoration:line-through;color:var(--warm-gray,#6B6560);font-weight:400;">' + formatCents(priceCentsVal) + '</span> ' +
              '<span style="font-weight:700;color:var(--accent,var(--primary,#c05621));">' + formatCents(fromSalePrice) + '</span></p>';
          } else {
            priceDisplay = '<p class="product-price"><span style="font-size:0.8rem;color:var(--warm-gray,#6B6560);font-weight:400;">from </span>' + formatCents(priceCentsVal) + '</p>';
          }
        } else if (priceCentsVal > 0) {
          priceDisplay = '<p class="product-price">' + formatCents(priceCentsVal) + '</p>';
        }
        var saleBadge = isOnSale && !isSold;
        var earlyAccessBadge = product._earlyAccess ? { label: 'Early Access', bg: 'rgba(42,124,111,0.9)' } : null;
        // Sale badge takes priority over generic stock badges (Made to Order, etc.)
        // so customers can see at a glance which items are discounted. Sold/early-access
        // still win because they convey scarcity.
        var badgeToShow = earlyAccessBadge ||
          (saleBadge ? { label: 'Sale', bg: 'rgba(192,86,33,0.85)' } :
            (showBadge ? { label: badgeLabel, bg: badgeBg } : null));
        var isRetired = product.availability === 'discontinued' && stockBadge && stockBadge.cssClass === 'retired';
        var leadTime = resolveLeadTime(product, _sdCfg);
        var leadTimeHtml = leadTime ? '<p style="font-size:0.75rem;color:var(--text-muted,#9e9890);margin:2px 0 0 0;">' + esc(leadTime) + '</p>' : '';
        var linkText = isSold || isRetired ? 'Request Commission' : 'View Details';
        html += '<div class="product-card fade-up" style="opacity:1;transform:translateY(0)">' +
          '<div class="product-image" style="position:relative;"><a href="' + esc(link) + '"' + (isLocal ? '' : ' target="_blank" rel="noopener"') + '>' + (img ? '<img src="' + esc(img) + '" alt="' + esc(name) + '" loading="lazy" />' : '') + '</a>' +
            (badgeToShow ? '<span style="position:absolute;top:8px;right:8px;background:' + badgeToShow.bg + ';color:white;font-size:0.7rem;font-weight:600;padding:3px 8px;border-radius:4px;">' + badgeToShow.label + '</span>' : '') +
          '</div>' +
          '<div class="product-info">' +
            '<span class="product-category">' + esc(cat.label) + '</span>' +
            '<h3>' + esc(name) + '</h3>' +
            priceDisplay +
            leadTimeHtml +
            (link ? '<a href="' + esc(link) + '" class="product-link"' + (isLocal ? '' : ' target="_blank" rel="noopener"') + '>' + linkText + '</a>' : '') +
          '</div></div>';
      });
      html += '</div>';
    });

    // Append gift cards section when showing all categories
    if (filter === 'all' && _shopGiftCardConfig && _shopGiftCardConfig.giftCardsEnabled) {
      var gcSection = renderGiftCardSection();
      if (gcSection) {
        html += '<h2 class="category-section-title">Gift Cards</h2>';
        html += gcSection;
      }
    }

    container.innerHTML = html;
  }

  window.filterShop = function(cat, el) {
    var pills = document.querySelectorAll('.filter-pill');
    pills.forEach(function(p) { p.classList.remove('active'); });
    el.classList.add('active');
    renderShop(cat);
  };

  // --- Gift Card Interactions (shop inline) ---
  function _shopGcShowOptions() {
    var panel = document.getElementById('shopGcOptions');
    if (!panel) return;
    panel.classList.add('visible');
    document.getElementById('shopGcSelectedLabel').textContent = formatCents(_shopGcSelectedCents) + ' Gift Card';
    document.getElementById('shopGcQtyVal').textContent = '1';
    document.getElementById('shopGcQtyMinus').disabled = true;
    document.getElementById('shopGcQtyPlus').disabled = false;
    document.getElementById('shopGcToggleSelf').classList.add('active');
    document.getElementById('shopGcToggleGift').classList.remove('active');
    document.getElementById('shopGcGiftFields').classList.remove('visible');
    var e = document.getElementById('shopGcRecipientEmail');
    var n = document.getElementById('shopGcSenderName');
    var m = document.getElementById('shopGcSenderMessage');
    if (e) e.value = '';
    if (n) n.value = '';
    if (m) m.value = '';
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  window._shopGcClose = function() {
    _shopGcSelectedCents = 0;
    _shopGcQty = 1;
    _shopGcGiftType = 'self';
    var cards = document.querySelectorAll('#shopGcGrid .gc-denom-card');
    for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
    var panel = document.getElementById('shopGcOptions');
    if (panel) panel.classList.remove('visible');
  };

  window._shopGcSelect = function(cents, el) {
    _shopGcSelectedCents = cents;
    _shopGcQty = 1;
    _shopGcGiftType = 'self';
    var cards = document.querySelectorAll('#shopGcGrid .gc-denom-card');
    for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
    el.classList.add('selected');
    _shopGcShowOptions();
  };

  window._shopGcSelectCustom = function() {
    var input = document.getElementById('shopGcCustomInput');
    if (!input) return;
    var val = parseFloat(input.value);
    if (isNaN(val) || val <= 0) { input.focus(); return; }
    var cents = Math.round(val * 100);
    var minCents = Math.round(parseFloat(input.getAttribute('min')) * 100);
    var maxCents = Math.round(parseFloat(input.getAttribute('max')) * 100);
    if (cents < minCents || cents > maxCents) { input.focus(); return; }
    _shopGcSelectedCents = cents;
    _shopGcQty = 1;
    _shopGcGiftType = 'self';
    var cards = document.querySelectorAll('#shopGcGrid .gc-denom-card');
    for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
    var card = document.getElementById('shopGcCustomCard');
    if (card) card.classList.add('selected');
    _shopGcShowOptions();
  };

  window._shopGcToggleType = function(type) {
    _shopGcGiftType = type;
    var selfBtn = document.getElementById('shopGcToggleSelf');
    var giftBtn = document.getElementById('shopGcToggleGift');
    var fields = document.getElementById('shopGcGiftFields');
    if (type === 'self') {
      selfBtn.classList.add('active'); giftBtn.classList.remove('active'); fields.classList.remove('visible');
    } else {
      selfBtn.classList.remove('active'); giftBtn.classList.add('active'); fields.classList.add('visible');
    }
  };

  window._shopGcQty = function(delta) {
    _shopGcQty = Math.max(1, Math.min(10, _shopGcQty + delta));
    document.getElementById('shopGcQtyVal').textContent = String(_shopGcQty);
    document.getElementById('shopGcQtyMinus').disabled = _shopGcQty <= 1;
    document.getElementById('shopGcQtyPlus').disabled = _shopGcQty >= 10;
  };

  window._shopGcAddToCart = function() {
    if (!_shopGcSelectedCents || _shopGcSelectedCents <= 0) return;
    var recipientEmail = '', senderName = '', senderMessage = '';
    if (_shopGcGiftType === 'gift') {
      var emailEl = document.getElementById('shopGcRecipientEmail');
      var nameEl = document.getElementById('shopGcSenderName');
      var msgEl = document.getElementById('shopGcSenderMessage');
      recipientEmail = (emailEl ? emailEl.value : '').trim();
      senderName = (nameEl ? nameEl.value : '').trim();
      senderMessage = (msgEl ? msgEl.value : '').trim();
      if (!recipientEmail) { emailEl.focus(); return; }
      if (recipientEmail.indexOf('@') === -1 || recipientEmail.indexOf('.') === -1) { emailEl.focus(); return; }
      if (!senderName) { nameEl.focus(); return; }
    }
    if (typeof MastCart === 'undefined' || !MastCart.addItem) { console.error('[shop-gc] MastCart not available'); return; }
    MastCart.addItem({
      pid: 'gift-card-' + _shopGcSelectedCents,
      name: 'Gift Card - ' + formatCents(_shopGcSelectedCents),
      price: formatCents(_shopGcSelectedCents),
      priceCents: _shopGcSelectedCents,
      image: '',
      bookingType: 'gift-card',
      options: {
        giftType: _shopGcGiftType,
        recipientEmail: recipientEmail,
        senderName: senderName,
        senderMessage: senderMessage
      },
      qty: _shopGcQty,
      isGiftCard: true
    });
    MastCart.showToast('Gift card added to cart');
    // Reset
    _shopGcSelectedCents = 0;
    _shopGcQty = 1;
    _shopGcGiftType = 'self';
    var cards = document.querySelectorAll('#shopGcGrid .gc-denom-card');
    for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
    var panel = document.getElementById('shopGcOptions');
    if (panel) panel.classList.remove('visible');
  };

  // Support back/forward navigation with hash-based category filtering
  window.addEventListener('hashchange', function() {
    var hash = window.location.hash.replace('#', '').toLowerCase();
    // Handle gift-cards hash
    if (hash === 'gift-cards' || hash === 'gift cards' || hash === 'giftcards') {
      var pills = document.querySelectorAll('.filter-pill');
      pills.forEach(function(p) {
        p.classList.remove('active');
        if (p.textContent.toLowerCase() === 'gift cards') p.classList.add('active');
      });
      renderShop('gift-cards');
      return;
    }
    var matchedCat = hash ? SHOP_CATS.find(function(c) { return c.id.toLowerCase() === hash || c.label.toLowerCase() === hash; }) : null;
    var catId = matchedCat ? matchedCat.id : 'all';
    var catLabel = matchedCat ? matchedCat.label.toLowerCase() : 'all';
    var pills = document.querySelectorAll('.filter-pill');
    pills.forEach(function(p) {
      p.classList.remove('active');
      if (p.textContent.toLowerCase() === catLabel) p.classList.add('active');
    });
    renderShop(catId);
  });
}).catch(function(err) { console.error('[shop] Tenant resolution failed:', err.message); });
</script>
<script>
  // Intersection Observer for scroll animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

</script>

<!-- ============ ANALYTICS TRACKING ============ -->
<script>
window.TENANT_READY.then(function() {
  if (typeof MastDB === 'undefined' || !MastDB.tenantId()) return;
  var HITS = 'analytics/hits';
  var now = new Date();
  var page = 'shop';
  var d = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0');
  var visitorIp = '';

  function track(type, action) {
    var hit = { t: type, p: page, ts: Date.now(), d: d };
    if (action) hit.a = action;
    if (visitorIp) hit.ip = visitorIp;
    MastDB.push(HITS, hit).catch(function() {});
  }

  fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(data) {
    visitorIp = data.ip ? data.ip.replace(/\.\d+$/, '.0') : '';
  }).catch(function() {}).finally(function() {
    track('pv');
  });

  document.addEventListener('click', function(e) {
    var el = e.target.closest('a, button');
    if (!el) return;
    var href = (el.href || '').toLowerCase();
    var text = (el.textContent || '').trim().toLowerCase();
    var action = null;

    if (href.indexOf('instagram.com') !== -1) action = 'social_instagram';
    else if (href.indexOf('about.html') !== -1) action = 'nav_about';
    else if (href.indexOf('schedule.html') !== -1) action = 'nav_schedule';
    else if (href.indexOf('index.html') !== -1 || href.endsWith('/')) action = 'nav_home';

    if (action) track('ev', action);
  }, true);
}).catch(function(err) { console.error('[shop] Analytics failed:', err.message); });
</script>

window.TENANT_READY.then(function() {

    var welcome = document.getElementById('shopWelcome');
    if (user && !user.isAnonymous) {
      if (welcome) {
        var firstName = (user.displayName || '').split(' ')[0] || 'friend';
        welcome.textContent = 'Welcome back, ' + firstName + '!';
        welcome.style.display = '';
      }
    } else {
      if (welcome) welcome.style.display = 'none';
    }
  });
}).catch(function(err) { console.error('[shop] Auth welcome failed:', err.message); });
