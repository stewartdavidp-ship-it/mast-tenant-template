<style>
  /* ========= BUTTONS ========= */
  .btn {
    display: inline-block;
    padding: 0.9rem 2.2rem;
    font-family: 'DM Sans', sans-serif;

    letter-spacing: 0.15em;

    color: #6a8aaa;
    line-height: 1;

  /* ========= SCROLL ANIMATIONS ========= */
  .fade-up {
    opacity: 0;
    transform: translateY(40px);

<script>
window.TENANT_READY.then(function() {
  // Firebase — load shop products dynamically grouped by category
  var allShopItems = [];
  var SHOP_CATS = [];
  var SHOP_IDS = [];

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function buildFilterPills() {
    var container = document.getElementById('categoryFilterPills');
    if (!container) return;
    var html = '<span class="filter-pill active" onclick="filterShop(\'all\', this)">All</span>';
    SHOP_CATS.forEach(function(cat) {
      html += '<span class="filter-pill" onclick="filterShop(\'' + cat.id + '\', this)">' + esc(cat.label) + '</span>';
    });
    container.innerHTML = html;
  }

  (function() {
    var app = firebase.initializeApp(TENANT_FIREBASE_CONFIG, 'public-shop');
    var db = app.database();

    // Load categories from Firebase, then load products
    db.ref(TENANT_ID + '/public/config/categories').once('value').then(function(catSnap) {
      var catData = catSnap.val();
      if (catData && Array.isArray(catData)) {
        SHOP_CATS = catData.filter(function(c) { return c && c.id && c.label; });
      }
      SHOP_IDS = SHOP_CATS.map(function(c) { return c.id; });
      buildFilterPills();
      return db.ref(TENANT_ID + '/public/products').once('value');
    }).then(function(snap) {
      var data = snap.val();
      if (!data) return;
      allShopItems = Object.values(data)
        .filter(function(p) {
          if (p.availability && p.availability !== 'available') return false;
          var cats = p.categories || [];
          return cats.some(function(c) { return SHOP_IDS.indexOf(c) !== -1; });
        })
        .sort(function(a, b) {
          var sa = a.sortOrder != null ? a.sortOrder : 9999;
          var sb = b.sortOrder != null ? b.sortOrder : 9999;
          if (sa !== sb) return sa - sb;
          return (a.name || '').localeCompare(b.name || '');
        });
      renderShop('all');
    }).catch(function() {
      document.getElementById('shopContainer').innerHTML = '<p style="text-align:center;color:var(--warm-gray);padding:3rem;">Unable to load products.</p>';
    });
  })();

  function renderShop(filter) {
    var container = document.getElementById('shopContainer');
    if (!container) return;
    if (allShopItems.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:var(--warm-gray);padding:3rem;">No products found.</p>';
      return;
    }

    var html = '';
    var catsToShow = filter === 'all' ? SHOP_CATS : SHOP_CATS.filter(function(c) { return c.id === filter; });

    catsToShow.forEach(function(cat) {
      var items = allShopItems.filter(function(p) {
        var cats = p.categories || [];
        return cats.indexOf(cat.id) !== -1;
      });
      if (items.length === 0) return;

      if (filter === 'all') {
        html += '<h2 class="category-section-title">' + esc(cat.label) + '</h2>';
      }
      html += '<div class="product-grid">';
      items.forEach(function(product) {
        var name = product.name || '';
        var price = product.price || '';
        var pid = product.pid || '';
        var img = (product.images && product.images.length > 0) ? product.images[0] : '';
        var link = pid ? 'product.html?id=' + encodeURIComponent(pid) : 'shop.html';
        var isLocal = !!pid;
        var isSoldSculpture = product.businessLine === 'sculpture' && product.status === 'sold';
        html += '<div class="product-card fade-up" style="opacity:1;transform:translateY(0)">' +
          '<div class="product-image"' + (isSoldSculpture ? ' style="position:relative;"' : '') + '><a href="' + esc(link) + '"' + (isLocal ? '' : ' target="_blank" rel="noopener"') + '>' + (img ? '<img src="' + esc(img) + '" alt="' + esc(name) + '" loading="lazy" />' : '') + '</a>' +
            (isSoldSculpture ? '<span style="position:absolute;top:8px;right:8px;background:rgba(92,61,46,0.85);color:white;font-size:0.7rem;font-weight:600;padding:3px 8px;border-radius:4px;">Sold</span>' : '') +
          '</div>' +
          '<div class="product-info">' +
            '<span class="product-category">' + esc(cat.label) + '</span>' +
            '<h3>' + esc(name) + '</h3>' +
            (isSoldSculpture ? '<p class="product-price" style="font-size:0.82rem;color:var(--warm-gray,#6B6560);">Commission available</p>' : (price ? '<p class="product-price">' + esc(price) + '</p>' : '')) +
            (link ? '<a href="' + esc(link) + '" class="product-link"' + (isLocal ? '' : ' target="_blank" rel="noopener"') + '>' + (isSoldSculpture ? 'Request Commission' : 'View Details') + '</a>' : '') +
          '</div></div>';
      });
      html += '</div>';
    });

    container.innerHTML = html;
  }

  window.filterShop = function(cat, el) {
    var pills = document.querySelectorAll('.filter-pill');
    pills.forEach(function(p) { p.classList.remove('active'); });
    el.classList.add('active');
    renderShop(cat);
  };
}).catch(function(err) { console.error('[shop] Tenant resolution failed:', err.message); });
</script>
<script>
  // Intersection Observer for scroll animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

</script>

<!-- ============ ANALYTICS TRACKING ============ -->
<script>
window.TENANT_READY.then(function() {
  var db = firebase.app('public-shop').database();
  var HITS = TENANT_ID + '/analytics/hits';
  var now = new Date();
  var page = 'shop';
  var d = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0');
  var visitorIp = '';

  function track(type, action) {
    var hit = { t: type, p: page, ts: Date.now(), d: d };
    if (action) hit.a = action;
    if (visitorIp) hit.ip = visitorIp;
    db.ref(HITS).push(hit).catch(function() {});
  }

  fetch('https://api.ipify.org?format=json').then(function(r) { return r.json(); }).then(function(data) {
    visitorIp = data.ip || '';
  }).catch(function() {}).finally(function() {
    track('pv');
  });

  document.addEventListener('click', function(e) {
    var el = e.target.closest('a, button');
    if (!el) return;
    var href = (el.href || '').toLowerCase();
    var text = (el.textContent || '').trim().toLowerCase();
    var action = null;

    if (href.indexOf('instagram.com') !== -1) action = 'social_instagram';
    else if (href.indexOf('about.html') !== -1) action = 'nav_about';
    else if (href.indexOf('schedule.html') !== -1) action = 'nav_schedule';
    else if (href.indexOf('index.html') !== -1 || href.endsWith('/')) action = 'nav_home';

    if (action) track('ev', action);
  }, true);
}).catch(function(err) { console.error('[shop] Analytics failed:', err.message); });
</script>

  auth.onAuthStateChanged(function(user) {
    var welcome = document.getElementById('shopWelcome');
    if (user && !user.isAnonymous) {
      if (welcome) {
        var firstName = (user.displayName || '').split(' ')[0] || 'friend';
        welcome.textContent = 'Welcome back, ' + firstName + '!';
        welcome.style.display = '';
      }
    } else {
      if (welcome) welcome.style.display = 'none';
    }
  });
}).catch(function(err) { console.error('[shop] Auth welcome failed:', err.message); });
</script>
<script defer src="feedback-widget.js"></script>
<script defer src="share-widget.js"></script>

</body>
