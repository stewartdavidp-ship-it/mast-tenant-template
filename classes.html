<script>
(function(){
  var P='https://mast-platform-prod-default-rtdb.firebaseio.com/mast-platform';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  window.__earlyTenant=fetch(P+'/tenantsByDomain/'+ek+'.json').then(function(r){return r.ok?r.json():null}).then(function(tid){
    if(!tid)return null;
    return fetch(P+'/tenants/'+tid+'/publicConfig.json').then(function(r){return r.ok?r.json():null}).then(function(pc){
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>

<style>
/* ── Classes page styles ── */
.classes-hero {
  position: relative;
  padding: 8rem 2rem 4rem;
  text-align: center;
  background: var(--surface-dark);
  color: var(--on-dark);
}
.classes-hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 300;
  letter-spacing: 0.04em;
  margin: 0 0 0.5rem;
}
.classes-hero p {
  font-size: 1rem;
  opacity: 0.7;
  max-width: 500px;
  margin: 0 auto;
}
.classes-my-btn {
  display: inline-block;
  margin-top: 1rem;
  padding: 8px 20px;
  border: 1px solid var(--primary, #C8963C);
  border-radius: 6px;
  color: var(--primary, #C8963C);
  font-size: 0.85rem;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.2s, color 0.2s;
}
.classes-my-btn:hover {
  background: var(--primary, #C8963C);
  color: #fff;
}
.classes-filter-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin: 2rem auto 0;
  max-width: 800px;
}
.classes-filter-pill {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.classes-filter-pill:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.classes-filter-pill.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.classes-section {
  padding: 3rem 2rem 4rem;
  max-width: 1200px;
  margin: 0 auto;
}

.classes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
}

.class-card {
  background: var(--surface-card);
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
  border: 1px solid var(--surface-card-border);
}
.class-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.1);
}
.class-card a {
  text-decoration: none;
  color: inherit;
}
.class-card-image {
  position: relative;
  aspect-ratio: 4/3;
  overflow: hidden;
  background: var(--bg);
}
.class-card-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}
.class-card:hover .class-card-image img {
  transform: scale(1.06);
}
.class-card-image .class-type-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: rgba(0,0,0,0.6);
  color: #fff;
}
.class-card-body {
  padding: 1.25rem;
}
.class-card-body h3 {
  margin: 0 0 4px;
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
}
.class-card-schedule {
  font-size: 0.85rem;
  color: var(--warm-gray, #888);
  margin-bottom: 8px;
}
.class-card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.9rem;
}
.class-card-price {
  font-weight: 600;
  color: var(--primary);
}
.class-card-spots {
  font-size: 0.8rem;
  color: var(--warm-gray, #888);
}

.classes-empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--warm-gray, #888);
}

@media (max-width: 1024px) {
  .classes-grid { grid-template-columns: repeat(2, 1fr); }
}
/* ── Auth gate modal (shared with class-detail) ── */
.cd-auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.cd-auth-modal {
  background: var(--surface-card, #1a1a2e);
  border: 1px solid var(--surface-card-border, #333);
  border-radius: 12px;
  padding: 2rem;
  max-width: 380px;
  width: 90%;
  text-align: center;
}
.cd-auth-modal h3 {
  margin: 0 0 0.5rem;
  font-size: 1.2rem;
  color: var(--text);
}
.cd-auth-modal p {
  margin: 0 0 1.5rem;
  font-size: 0.9rem;
  color: var(--warm-gray, #888);
  line-height: 1.5;
}
.cd-auth-google-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  border-radius: 6px;
  border: 1px solid var(--border, #444);
  background: #fff;
  color: #333;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  justify-content: center;

}
.cd-auth-google-btn:hover { background: #f5f5f5; }
.cd-auth-cancel-btn {
  display: block;
  margin: 0.75rem auto 0;
  padding: 8px 16px;

  background: transparent;
  color: var(--warm-gray, #888);
  font-size: 0.85rem;
  cursor: pointer;
}
.cd-auth-cancel-btn:hover { color: var(--text); }

/* ── Passes & Packs section ── */
.passes-section {
  padding: 2rem 2rem 4rem;
  max-width: 1200px;
  margin: 0 auto;
  border-top: 1px solid var(--border, #333);
}
.passes-heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 400;
  letter-spacing: 0.02em;
  margin: 0 0 0.25rem;
  color: var(--text);
  text-align: center;
}
.passes-subheading {
  text-align: center;
  font-size: 0.95rem;
  color: var(--warm-gray, #888);
  margin: 0 0 2rem;
}
.passes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
}
.pass-card {
  background: var(--surface-card);
  border: 1px solid var(--surface-card-border);
  border-radius: 10px;
  padding: 1.75rem;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s, box-shadow 0.3s;
}
.pass-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.1);
}
.pass-card-type {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: var(--primary);
  color: #fff;
  margin-bottom: 0.75rem;
  align-self: flex-start;
}
.pass-card h3 {
  margin: 0 0 0.5rem;
  font-size: 1.15rem;
  font-weight: 500;
  color: var(--text);
}
.pass-card-desc {
  font-size: 0.88rem;
  color: var(--warm-gray, #888);
  line-height: 1.5;
  margin-bottom: 1rem;
  flex: 1;
}
.pass-card-details {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 1rem;
}
.pass-card-tag {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75rem;
  background: rgba(255,255,255,0.06);
  color: var(--warm-gray, #888);
  border: 1px solid var(--border, #333);
}
.pass-card-price {
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 1rem;
}
.pass-card-btn {
  padding: 10px 20px;
  border-radius: 6px;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
  width: 100%;
}
.pass-card-btn:hover { opacity: 0.85; }

@media (max-width: 1024px) {
  .passes-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .classes-hero { padding: 7rem 1.5rem 3rem; }
  .classes-hero h1 { font-size: 2rem; }
  .classes-section { padding: 2rem 1.5rem; }
  .classes-grid { grid-template-columns: 1fr; }
  .passes-section { padding: 1.5rem 1.5rem 3rem; }
  .passes-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
(function() {
  'use strict';

  var DAY_LABELS = { mon: 'Mon', tue: 'Tue', wed: 'Wed', thu: 'Thu', fri: 'Fri', sat: 'Sat', sun: 'Sun' };
  var allClasses = [];
  var currentFilter = 'all';

  function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatPrice(cents) {
    if (typeof cents !== 'number') return '';
    return '$' + (cents / 100).toFixed(2);
  }

  function formatTime(t) {
    if (!t) return '';
    var parts = t.split(':');
    var h = parseInt(parts[0], 10);
    var m = parts[1];
    var ampm = h >= 12 ? 'PM' : 'AM';
    if (h > 12) h -= 12;
    if (h === 0) h = 12;
    return h + ':' + m + ' ' + ampm;
  }

  function schedSummary(cls) {
    if (!cls.schedule) return '';
    if (cls.schedule.type === 'recurring' && cls.schedule.days) {
      var days = cls.schedule.days.map(function(d) { return DAY_LABELS[d] || d; }).join(', ');
      var time = cls.schedule.startTime ? ' at ' + formatTime(cls.schedule.startTime) : '';
      return days + time;
    }
    if (cls.schedule.type === 'once') {
      var date = cls.schedule.date || cls.schedule.startDate || '';
      if (date) {
        var parts = date.split('-');
        date = parts[1] + '/' + parts[2] + '/' + parts[0];
      }
      return date + (cls.schedule.startTime ? ' at ' + formatTime(cls.schedule.startTime) : '');
    }
    return '';
  }

  function buildFilterPills(categories) {
    var container = document.getElementById('classFilterPills');
    if (!container) return;
    var html = '<span class="classes-filter-pill active" onclick="window._classFilter(\'all\', this)">All</span>';
    categories.forEach(function(cat) {
      html += '<span class="classes-filter-pill" onclick="window._classFilter(\'' + esc(cat) + '\', this)">' + esc(cat.charAt(0).toUpperCase() + cat.slice(1)) + '</span>';
    });
    container.innerHTML = html;
  }

  window._classFilter = function(cat, el) {
    currentFilter = cat;
    var pills = document.querySelectorAll('.classes-filter-pill');
    pills.forEach(function(p) { p.classList.remove('active'); });
    if (el) el.classList.add('active');
    renderClasses();
  };

  function renderClasses() {
    var grid = document.getElementById('classesGrid');
    if (!grid) return;

    var filtered = allClasses.filter(function(c) {
      if (c.status !== 'active' && c.status !== 'published') return false;
      if (currentFilter !== 'all' && (c.category || '').toLowerCase() !== currentFilter.toLowerCase()) return false;
      return true;
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="classes-empty"><p>No classes available right now. Check back soon!</p></div>';
      return;
    }

    var html = '';
    filtered.forEach(function(cls) {
      var image = '';
      if (cls.imageIds && cls.imageIds.length > 0) {
        image = cls.imageIds[0]; // URL or image ref
      }

      var price = formatPrice(cls.priceCents);
      if (cls.type === 'series' && cls.seriesInfo && cls.seriesInfo.seriesPriceCents) {
        price = formatPrice(cls.seriesInfo.seriesPriceCents);
      }

      var typeLabel = cls.type === 'dropin' ? 'Open Studio' : cls.type;

      html += '<div class="class-card">' +
        '<a href="class-detail.html?id=' + esc(cls.id) + '">' +
        '<div class="class-card-image">' +
        (image ? '<img src="' + esc(image) + '" alt="' + esc(cls.name) + '" loading="lazy">' : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--warm-gray);font-size:3rem;">&#128197;</div>') +
        '<span class="class-type-badge">' + esc(typeLabel) + '</span>' +
        '</div>' +
        '<div class="class-card-body">' +
        '<h3>' + esc(cls.name) + '</h3>' +
        '<div class="class-card-schedule">' + esc(schedSummary(cls)) + '</div>' +
        (cls.duration ? '<div class="class-card-schedule">' + cls.duration + ' min' + (cls.materialsIncluded ? ' &middot; Materials included' : (cls.materialsCostCents ? ' &middot; + $' + (cls.materialsCostCents / 100).toFixed(2) + ' materials' : '')) + '</div>' : '') +
        '<div class="class-card-meta">' +
        '<span class="class-card-price">' + price + '</span>' +
        '<span class="class-card-spots">' + (cls.capacity || '') + ' spots</span>' +
        '</div>' +
        '</div></a></div>';
    });

    grid.innerHTML = html;
  }

  // Init
  window.TENANT_READY.then(function() {
    document.title = 'Classes \u2014 ' + (window.TENANT_TITLE_SUFFIX ? TENANT_TITLE_SUFFIX() : 'Studio');

    var app;
    try { app = firebase.app(); } catch (e) { app = firebase.initializeApp(TENANT_FIREBASE_CONFIG); }
    var db = app.database();

    // Show "My Classes" button for logged-in users
    if (firebase.auth) {
      app.auth().onAuthStateChanged(function(user) {
        var btn = document.getElementById('myClassesBtn');
        if (btn) btn.style.display = (user && !user.isAnonymous) ? '' : 'none';
      });
    }

    // Load classes and pass definitions in parallel
    Promise.all([
      db.ref(TENANT_ID + '/public/classes').once('value'),
      db.ref(TENANT_ID + '/public/passDefinitions').once('value')
    ]).then(function(results) {
      var data = results[0].val() || {};
      allClasses = Object.keys(data).map(function(id) {
        var c = data[id];
        c.id = id;
        return c;
      });

      // Build category pills from actual class data
      var cats = {};
      allClasses.forEach(function(c) {
        if ((c.status === 'active' || c.status === 'published') && c.category) cats[c.category.toLowerCase()] = true;
      });
      buildFilterPills(Object.keys(cats).sort());
      renderClasses();

      // Render passes
      var passData = results[1].val() || {};
      var passes = Object.keys(passData).map(function(id) {
        var p = passData[id];
        p.id = id;
        return p;
      }).sort(function(a, b) { return (a.sortOrder || 0) - (b.sortOrder || 0); });

      if (passes.length > 0) renderPasses(passes);
      // Schema.org structured data
      if (window.MastSchema) {
        MastSchema.inject(MastSchema.organization());
        MastSchema.injectAll(MastSchema.courseList(allClasses));
      }
    }).catch(function(err) {
      console.error('[classes] Failed to load:', err);
      document.getElementById('classesGrid').innerHTML = '<div class="classes-empty"><p>Unable to load classes.</p></div>';
    });
  }).catch(function(err) {
    console.error('[classes] Tenant resolution failed:', err);
  });

  // ── Pass rendering ──
  var PASS_TYPE_LABELS = {
    'drop-in': 'Drop-in',
    'pack': 'Class Pack',
    'unlimited': 'Unlimited',
    'limited': 'Limited',
    'series': 'Series',
    'intro': 'Intro Offer'
  };

  function renderPasses(passes) {
    var section = document.getElementById('passesSection');
    var grid = document.getElementById('passesGrid');
    if (!section || !grid || passes.length === 0) return;

    var html = '';
    passes.forEach(function(p) {
      var typeLabel = PASS_TYPE_LABELS[p.type] || p.type;
      var price = formatPrice(p.priceCents);
      var tags = [];
      if (p.visitCount) tags.push(p.visitCount + ' visits');
      if (p.validityDays) {
        if (p.validityDays >= 365) tags.push(Math.round(p.validityDays / 365) + ' year');
        else if (p.validityDays >= 30) tags.push(Math.round(p.validityDays / 30) + ' month' + (p.validityDays >= 60 ? 's' : ''));
        else tags.push(p.validityDays + ' days');
      }
      if (p.type === 'unlimited') tags.push('Unlimited classes');
      if (p.introOnly) tags.push('New students only');

      html += '<div class="pass-card">' +
        '<span class="pass-card-type">' + esc(typeLabel) + '</span>' +
        '<h3>' + esc(p.name) + '</h3>' +
        (p.description ? '<div class="pass-card-desc">' + esc(p.description) + '</div>' : '<div class="pass-card-desc"></div>') +
        '<div class="pass-card-details">' +
        tags.map(function(t) { return '<span class="pass-card-tag">' + esc(t) + '</span>'; }).join('') +
        '</div>' +
        '<div class="pass-card-price">' + price + '</div>' +
        '<button class="pass-card-btn" onclick="window._buyPass(\'' + esc(p.id) + '\', \'' + esc(p.name) + '\', ' + (p.priceCents || 0) + ')">Add to Cart</button>' +
        '</div>';
    });

    grid.innerHTML = html;
    section.style.display = '';
  }

  // ── Buy pass handler (add to cart with auth gate) ──
  window._buyPass = function(passDefId, passName, priceCents) {
    if (!window.MastCart) { alert('Cart not loaded yet. Please wait.'); return; }

    function addPassToCart() {
      window.MastCart.addItem({
        pid: 'pass-' + passDefId,
        name: passName,
        price: priceCents ? '$' + (priceCents / 100).toFixed(2) : 'Free',
        priceCents: priceCents,
        options: {},
        qty: 1,
        bookingType: 'pass',
        passDefinitionId: passDefId,
        image: ''
      });
      window.MastCart.openDrawer();
      window.MastCart.showToast('Pass added to cart!');
    }

    // Auth gate: require signed-in user for pass purchases
    var user = window.MastCart.getCurrentUser();
    if (user && !user.isAnonymous) {
      addPassToCart();
      return;
    }

    // Reuse the same auth modal pattern from class-detail.html
    var triggerBtn = document.activeElement;
    var overlay = document.createElement('div');
    overlay.className = 'cd-auth-overlay';
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');
    overlay.setAttribute('aria-labelledby', 'passAuthTitle');
    overlay.innerHTML =
      '<div class="cd-auth-modal">' +
        '<h3 id="passAuthTitle">Sign in to purchase a pass</h3>' +
        '<p>You need an account so we can apply your pass to future bookings.</p>' +
        '<button class="cd-auth-google-btn" id="passAuthSignIn">' +
          '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.04 24.04 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>' +
          'Continue with Google' +
        '</button>' +
        '<button class="cd-auth-cancel-btn" id="passAuthCancel">Cancel</button>' +
      '</div>';
    document.body.appendChild(overlay);
    document.getElementById('passAuthSignIn').focus();

    function closeModal() {
      overlay.remove();
      if (triggerBtn) triggerBtn.focus();
    }

    document.getElementById('passAuthCancel').onclick = closeModal;
    overlay.onclick = function(e) { if (e.target === overlay) closeModal(); };
    overlay.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'Tab') {
        var focusable = overlay.querySelectorAll('button');
        var first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    });

    document.getElementById('passAuthSignIn').onclick = function() {
      closeModal();
      if (window.siteSignIn) window.siteSignIn();
      var fbApp = window.MastCart.getFirebaseApp();
      if (!fbApp) return;
      var unsubscribe = fbApp.auth().onAuthStateChanged(function(u) {
        if (u && !u.isAnonymous) {
          unsubscribe();
          addPassToCart();
        }
      });
    };
  };
})();
