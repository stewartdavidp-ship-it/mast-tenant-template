<script>
(function(){
  var P='https://mast-platform-prod-default-rtdb.firebaseio.com/mast-platform';
  var h=location.hostname,C=5*60*1000;
  if(h==='localhost'||h==='127.0.0.1')return;
  try{var r=localStorage.getItem('mast_tenant_'+h);if(r){var c=JSON.parse(r);if(Date.now()-c.timestamp<C){window.__earlyTenant=Promise.resolve(c.data);return;}}}catch(e){}
  var ek=h.replace(/\./g,'_');
  window.__earlyTenant=fetch(P+'/tenantsByDomain/'+ek+'.json').then(function(r){return r.ok?r.json():null}).then(function(tid){
    if(!tid)return null;
    return fetch(P+'/tenants/'+tid+'/publicConfig.json').then(function(r){return r.ok?r.json():null}).then(function(pc){
      return pc?{tenantId:tid,publicConfig:pc}:null;
    });
  }).catch(function(){return null;});
})();
</script>

<!-- DOMPurify for HTML sanitization -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

<script>
(function() {
  'use strict';

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  window.TENANT_READY.then(function() {
    document.title = 'Terms & Conditions \u2014 ' + (window.TENANT_TITLE_SUFFIX ? TENANT_TITLE_SUFFIX() : 'Shop');

    var app;
    try { app = firebase.app(); } catch (e) { app = firebase.initializeApp(TENANT_FIREBASE_CONFIG, 'public-terms'); }
    var db = app.database();
    var tid = window.TENANT_ID;
    if (!tid) {
      document.getElementById('tcBody').innerHTML = '<div class="tc-placeholder"><p>Unable to load terms.</p></div>';
      return;
    }

    db.ref(tid + '/public/content/terms').once('value').then(function(snap) {
      var data = snap.val();
      var body = document.getElementById('tcBody');

      if (!data || !data.html) {
        body.innerHTML = '<div class="tc-placeholder"><p>Terms &amp; conditions are being prepared. Please check back soon.</p></div>';
        return;
      }

      // Sanitize HTML with DOMPurify
      var clean = window.DOMPurify ? DOMPurify.sanitize(data.html, {
        ALLOWED_TAGS: ['h1','h2','h3','h4','p','ul','ol','li','strong','em','br','a','span'],
        ALLOWED_ATTR: ['href','target','rel','class']
      }) : esc(data.html);

      var html = '<div class="tc-content">' + clean + '</div>';
      if (data.updatedAt) {
        html += '<div class="tc-updated">Last updated: ' + esc(new Date(data.updatedAt).toLocaleDateString()) + '</div>';
      }
      body.innerHTML = html;
    }).catch(function(err) {
      console.error('[terms] Load failed:', err);
      document.getElementById('tcBody').innerHTML = '<div class="tc-placeholder"><p>Unable to load terms. Please try again later.</p></div>';
    });
  }).catch(function(err) {
    console.error('[terms] Tenant failed:', err);
  });
})();
</script>
